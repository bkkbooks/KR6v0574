body:
  text: 復薑摩西先生書美國紐約宗教聯合會名譽幹事薑摩西先生閣下頃奉大函及附寄對世界公義與和平共同信念之宣言異常欣慰與感謝得悉貴會之成立與工作及為世界公義與和平所作之善工尤覺興奮今日世界需要各宗教之聯合呼聲至急本人對貴會宣言所得之印象甚深謹願在此向做此善工之貴會諸同仁表示敬意關於宣言內容本人對所提各點均表同意但仍願就其中之三點提出愚見其一為第二段之第一句其中有云都是一個上帝的子孫愚見以為應改為都是平等的第二點係在第二段原文為我們相信上帝愚見應改為我們相信真理第三點係在第三段原文為能引之為一個上帝之人類家庭的統一愚見應改為而能引之於人類平等全地球人類家庭的統一至希對此三點惠豫指教於結束此函之前謹願將敝國宗教徒聯誼會之情形略為報告先生對此組織或已稍有所聞該會成立於年餘之前會員包括回教天主教基督教及佛教之信徒白健生將軍于斌主教陳文淵會督馮煥璋將軍及本人等五人為常務理事常務理事會每月舉行一次理事會每半年約舉行兩次此外並請各宗教徒領袖作公開講演同時參加一切有益於抗戰建國之各項活動惟最大之貢獻則在促進各宗教徒間之諒解同情合作及互助同人等更望將來可作更大之貢獻非但有關本國之事務即整個世界中之國際事項亦係相同但該會尚非完全前途之留待吾等積極努力者正多先生及貴會諸友人之各種援助均甚需要及銘感敬祈時賜大教同仁等亦將盡量設法與先生常通消息俾雙方於將來彼此認識及互相幫助尤願請求先生向貴會諸朋友前代為致意專此奉達敬頌道祺並祝偉大之使命早日完成你的朋友太虛謹啓卅三七十五見海刊二十五卷九十期合刊
