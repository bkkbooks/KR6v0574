body:
  text: 覆淨性居士書讀手書并太夫人哀啓彌見居士性行淳篤德慧真粹之有本令慈淑世間之人道通解脫之佛乘精進持誦誠極以明命終於預期長齋之日而忽得誦佛持經諸上善人俱會一時其即為永辭忍土誕登樂邦之徵歟數日前於李隱塵居士信中得聞其太夫人往生安養之瑞今又聞乎居士夫念佛一法門之在今日抑何實驗者之比比耶宏正法益群生徹乎自他通乎上下始終淺深唯佛圓了約言緣因了因云何緣因建僧團開法會流布經像護持道場救濟人世嚴淨佛國三施等運四攝齊修云何了因探研了義契經體究真如法性真性顯則妙慧生妙慧生則了義明法眼清淨法門通達隨機示教咸令覺悟當熟覽大智度論及般若諸經約之以百論中論十二門論諸論疏然後融會乎法華涅槃天台諸書出家在俗各有儀軌因機設化互為方便此不須拘執也疑為獨覺須發大悲不適衙門莫味靜樂但得般若火旺正宜煩惱薪多如何如何惟善思擇庚申正月二十三日釋太虛覆見海刊一卷三期
