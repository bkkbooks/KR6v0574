body:
  text: 致駐日德使書大德國駐日公使台鑒徑啓者衲於去年十一月間赴東京佛教大會得與貴使握手言歡並承招待殷勤感謝奚似承示他日衲赴美宣傳佛教時可繞道歐洲先往貴國一遊並承慨允致函駐華公使為之介紹感何可言想此項函件刻下早經發出如蒙再賜一大片或大函介紹俾得持以晉謁尤所盼感專此敬頌勛綏衲太虛和南十五年一月十五日時在蘇州見海刊七卷二期
