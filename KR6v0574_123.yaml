body:
  text: 覆靈濤法師書靈濤法師得惠書承問為感覺三法師已回漳州南山寺病日起矣二量守間師者佳但亦為破量則可為立量則猶有過蓋因念之一字指何法尚未明確指隨念分別乎指念心所乎指我法執相應心心所乎指三界攝有漏心心所乎指隨念分別及念心所則衆生有時無念若五無心位等佛則大念成就而無時無念淨識常與遍行別境等二十一心所現起故指執相應則初地菩薩始有不起時異生則未有不起時也指三界攝則未至金剛道後異熟空菩薩亦未有不起時也故衆生果有未動念以前否將有所依不極成過由此應改破量曰汝計衆生未動念云云如汝計動念時衆生加汝計二字則過歸被破而可成破矣然風定師者若不計動念未動念但依法性立之亦無過今改作如下衆生與佛無二法性平等故如佛與佛以若觀法性則生佛無二亦猶佛佛無二法法無二故專復順問無惱太虛見海刊十一卷三期
