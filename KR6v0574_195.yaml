body:
  text: 答黃景基問二次十九則一問一起信論曰所言覺者謂心體離念乃至即是如來平等法身由此而言真如本體即諸佛法身又云真如用者所謂諸佛如來乃至攝化衆生由是而言真如之用即諸佛之業用以真如即佛佛即真如故然真如體一而諸佛非一一真如也為釋迦佛耶為阿彌陀佛耶若果是一則修淨土者何以定念阿彌陀佛不念釋迦佛耶如云阿彌陀佛有此願力諸佛既為一體阿彌陀佛之願應即諸佛之願同一真如之用故譬之於水一切有情未解脫以前有如浮漚解脫以後漚化為水則不能指某水為某漚之水也如云真如體同業用既異能用有別能用既別諸佛有別何得云諸佛無差別如云法身無差別受用身有差別則是諸佛受用身仍有彼此自他之分域此與衆生又何以異進退思維理如何通問二煩惱所知二重障顯然有別何以百法但列舉煩惱而不言所知障如云心所相同所望有異究竟何者為異且既為一矣則斷所知障時煩惱障應斷斷煩惱障時所知障隨斷何以二障各別斷耶問三唯識論云種子雖依第八識體而是此識相分非餘在色種子固屬相分若心及心所種子豈相分攝耶問四唯識述記卷二十五第七頁問曰若爾如何知七於六有勢分非八現於七故知説八為第七依下二句似是答詞然所答非所問豈第一句八誤作七七誤作六耶問五意根云者諸説不一顯揚十七云由此意根恆與我見我慢等相應又云如前所説意根恆與四惑俱是以意根為第七識蓋意識之根也唯識論云增上緣依謂內六處述記云即五色根及意根草六卷草一頁宗鏡云唯取同時八識心王為意根是又以同時八識心王為意根也瑜迦云若此六識為彼六識等無間緣即施設此為意根是又以前念六識為意根也即論文所謂為等無間緣依之前滅意也據第一説唯識論解具依多少五識俱有依為五色根六七八識是於內六處外別依六八第六意識俱有依謂七八識是於意根外別依八第七俱有依謂第八識是又完全不依內六處矣則述記所謂八識俱有依皆不過內六處殊難概括而論文所云即內六處亦太狹也據第三説意根既屬前滅意而作等無間緣依又為內六處之一而作等無間緣依則此二依應無區別三依應二若據第二説則意根乃同時八識心王之通稱而非第七之專名又何意義廣狹差異如是問六三支比量真故極成色定不離眼識自許初三攝眼所不攝故如眼識此因自許初三攝眼所不攝何足顯其不離眼識又唯識論云極成眼等識五隨一故如餘不親緣離自色等量云極成眼等識不親緣離自色等五隨一故如餘此中所云離自色當是指色之本質不爾便犯相符過然此因五隨一故何足顯其不親緣色之本質蓋此二因似非同品定有性亦非異品遍無性於因明法是否相違問七因明之法立敵共許然每於因加自許言以簡他之不極成何能得其共許如外人不許大乘經為至教量唯識論立量云諸大乘經至教量攝樂大乘者許能顯示無顛倒理契經攝故如增一等此因在樂大乘者則許之在外人不樂大乘者便不共許何能對外人而成立大乘經至教量攝問八唯識義蘊經論畢宣然唯識論於自他之關係但變他之浮塵根則於種種事實殊多窒礙難通例如張獻忠嗜殺流血之慘同業共變然無獻忠無此浩劫如是衆生變起浩劫則必起獻忠然經論但言變起根身器界未言變起他之有情又依別業言之如甲因先世惡業應受果報而見殺於乙此應是甲之識變是否即異熟生以其因果故然同時必變乙識令其殺己不爾乙何以得殺甲又如友人招往某地中途遇險險固識變亦因果故然亦必變友人之識令其相招不爾不得遇險然經論亦未言變他識者若爾則一切因果報應非關係識變云何唯識此等事實為例甚多理如何通問九唯識論云內遣有情假緣智能除軟品分別隨眠內遣諸法假緣智能除中品分別隨眠此等分別隨眠何者為軟品何者為中品問一因明入正理論疏第一卷第十三頁世親以後皆除第七此第七言是何所指問十一成唯識論刻已讀過一遍頗能領悟近讀述記竟有十之二三殊難索解未審有何方便并應備何種參考書百法明門論八識規矩頌因明論疏均讀過以資研究答一真如體為心佛衆生萬法畢竟平等無差別性真如自體相為一切如來平等法身在衆生曰如來藏亦曰有垢真如在佛曰平等法身亦曰離垢真如絶對不二真如自體相用是一一如來自受用身證真如自體相之果覺是滅盡惑纍所成之智用亦曰智德斷德乃由因行得於圓滿是謂真如自體相用從因致果因果各有專屬故別別住果海難思德用等同真如即所謂等於無等之無等等無上正遍覺故互互遍一住一切一切住一一切遍一一遍一切而非不二非非不二由果德中因行不同之悲願力隨十地菩薩緣現起他受用身及隨二乘六凡緣現起應化身釋迦彌陀娑婆極樂身剎名相差別無量攝歸自受用身雖謂彌陀即釋迦釋迦即彌陀可也歸本真如自體相則釋迦彌陀都不存在唯一平等法身而已歸本真如體則心佛衆生萬法差別都不存在唯一真如而已然本設念佛修淨土之法門者原以由悲願力隨有情緣現身現土引攝漸歸而説不從直顯真如體相而説故依彌陀本願令專憶念以一其信定其心也有情如浮漚佛他受用應化身亦如浮漚但在有情既有不知海水之迷復有執浮漚為海水之迷在佛同時依悲願力隨緣現浮漚身同時遍知海水亦知浮漚無迷倒執故雖業用差別不同異生在迷答二別名煩惱所知通可俱名煩惱即彼無明心所等依迷補特伽羅無我而起者則名煩惱障依迷法無我而起者名所知障斷所知障時煩惱障應斷此義可爾如無五蘊則無假者斷煩惱障時所知障隨斷此義不然若泥團壞非微塵滅答三但屬見分之所緣便名為相分不論其所緣者為心為色若第七見分緣第八見分以為所緣相分故心心所種子既為第八見分所緣皆第八相分攝答四述記之文不錯若爾如何知七於六有勢分非八現於七之問係反質難問謂既不能證明出第八現行於第七識非有勢分則第八現行於第七亦有勢分故知第八可為第七之依答五意根之説一未了義十二處教顯説指前念六識為意根若所引瑜伽論是兼亦密意指第七八識為意根宗鏡以第八識心王為意根者義因於此以彼未説八識若非第七第八密含在意根中則攝法不盡故二了義八識教就第六親近俱有依則指第七以為意根如顯揚是就八識心王各自開導依則指等無間緣以為意根如論文所謂為等無間緣依之前滅意是十二處教既顯指前念六識及密含第七八識以為意根則依六依七依八皆是依意根論云增上緣依謂內六處及所引解俱依多少之文亦皆可會通矣答六初三謂眼色及眼識色既為初三攝又為眼所不攝則必不離於眼識也故用此因以成色塵不離眼識之宗極成眼等識等於耳鼻舌身識五隨一謂隨此五識中所攝或眼識或耳識之一識如餘則若舉耳識即如餘鼻識等此五中隨一之一識既遍是眼等識則遍是宗法性既於不親緣離自色定有則同品定有性於非不親緣離自色遍無則異品遍無性此之比量假如先已成立五識中之耳識等不親緣聲之本質則此眼識既為五識隨一攝之一識亦應均等不親緣離自所變相分色之本質色故五隨一因可成眼等識不親緣離自色之宗又自色指自識所變緣之相分既簡本質並互簡隨五識中餘識所變緣之相分若耳識所變緣相分聲等眼識不能親緣有因見鐘想及鐘聲鐘聲非眼識所親緣答七因明之因雖須立敵共許由難得共許因故加自許簡隨他一之不成過此等比量未必能積極令敵人起信但能消極令敵人不能破既為敵人所不能破則立者便離過能立然不如能得共許因為善答八他有情及他識在四緣中但為自識疏所緣緣及增上緣不為因非緣及等無間由自望他如此由他自望亦然以此各有情識必由自度非他所能度也器界為共共共不共共不共故一部分衆生有一部分衆生無共共故一切有情空器界亦空器界是一部分有情或一切有情所共變非器界所自變故他浮塵根是不共共雖各有情自變亦餘有關係有情所共變故被他生或能生他又被他殺或能殺他衆關係人之共惡業為疏增上緣張獻忠自惡業為異熟因乃有張獻忠之情命衆關係人共惡業及張獻忠自惡業為異熟因乃生張獻忠之浮塵根至張獻忠流血之慘衆關係人同業共變亦張獻忠別業別變衆關係人亦仍各有別別不同之別業變若張獻忠非由自惡業變但衆關係人共惡業變者應同器界或地獄卒為非有情之類既以張獻忠為有情必由自因緣變但亦不無衆同惡業為增上緣助之生耳於他識亦但為增上緣變而不為因緣變二十唯識頌云展轉增上力二識成決定即增上緣變之因果關係亦即因果報應唯識之義答九從人我執所起之分別隨眠為軟品從法我執所起之分別隨眠為中品答一此第七言即指闕三有一從闕一之三闕二之三數到此列在第七位故答十一可讀略述法相義唯識開蒙法苑義林章唯識樞要唯識了義燈唯識演祕唯識觀心覺夢鈔此外則能廣讀論藏中之大乘五蘊論大乘成業論阿毗達磨雜等論瑜伽師地論攝大乘論辨中邊論及楞伽密嚴華嚴等佛二九四九年五月二日釋太虛見海刊三卷六期二問一前第一問諸佛自受用身土究竟為一為多仍未明曉如云為多承示攝歸真如自體相用雖謂釋迦即彌陀彌陀即釋迦可也則是合而為一以其為真如自體相用故真如自體相絶對不二體相與用理應爾故衆生雖同依真如為體以各自起惑造業各有第八識因能各自變起根身器界諸佛第八淨識同此真如體相同此平等法身理應同以法性為身同依法性為土解脫以後當不是各有一第八淨識何緣各自變起自受用身土不同他受用身隨有緣情變現如是推徵理應為一不應為多然經言一佛一剎土剎土非一諸佛非一宗鏡云此方佛以他方佛土為疏所緣如云是一豈有疏所緣以能所俱泯故又成唯識論云自受用身及所依土雖一切佛各變不同而皆無邊不相障礙此即承示所謂一一住互互遍也既云各變不同即是顯然非一與衆生各變器界殆無以異如是依據經論又應為多不應合一究竟如何會通如何決擇問二前第六問極成眼等識決不親緣離自色等五隨一故如餘承示此之比量假如先已成立五識中之耳識等不親緣聲等之本質云云然實際上先未成立餘四識不親緣離自聲等因明法恐不能説假如則喻有能立法不成過且縱成立餘四識而謂他之一識可以隨之均等似亦未安寧不許他之一識為五識中之特別者設量云不相應行法是實有五位法中隨一攝故如餘豈非過也如云先已成立五識不親緣離自色等則宗有相符過如先未成立則非同品定有性因有不足過應如何離過仍懇指示問三成唯識論此識所緣定非離此二隨一故如彼能緣此因似有隨一過以小乘心外有境不許相分與見分同從自證分起彼許見分不離識體未必即以例相分以彼所緣與見分非同從自證分起故是否應於因上置自許言簡隨一過問四成唯識論欲界諸心心所闕輕安説一切地皆有十一者通有尋伺等三地然瑜伽云欲界及色界初靜慮除靜慮中間若定若生名有尋有伺地即靜慮中間若定若生名無尋唯伺地從第二靜慮餘有色界及無色界全名無尋無伺地即尋伺等三地已攝三界九地全而欲界尤顯在尋伺等三地之內何得云欲界闕輕安而尋伺等三地皆有問五成唯識論證有第八識可謂詳盡然大抵根據經説在信佛教者固已無疑在不信佛教者何能共許故近代通人尚謂第八識為佛學家假想之詞此根本問題如不解決則一部大藏都是一方面説話將何以起社會上之信仰問六成唯識論似以相見道最難體會如倣真見道中無間解脫之見分及自證分此際如何倣法無從想像請示端倪問七因明論疏近已讀過第二通尚有未能了解者列舉於左敬求明誨甲第二卷十二頁四不顧論宗乃至不須定顧夫佛弟子應立佛法義乃忽善外宗樂之便立豈不有自教相違之失乙第三卷第一頁以其總聲於別亦轉如言燒衣舉燒衣為例未了其意又此總聲之聲及下文宗聲之聲是否即立宗言聲是無常之聲丙第三卷十七頁賢愛論師乃至故唯六句依止所陳即不以無體為闕應不止六句又云諸德皆説總有七句亦應不止七句請詳示之丁第六卷第四頁且發智論薩婆多師自許佛説亦餘小乘及大乘者兩俱極成非佛語所不攝是兩俱極成非佛語所不攝故因於發智論亦有且亦大乘所自許何以下文云若以發智亦入宗中宗違自教因犯兩俱一分不成因不在彼發智宗故又云簡彼發智等非自許故是與上文顯然相違何也又第九行唯大乘者許非彼攝彼言應指佛語即語意相反似應省去非字或彼下添不字戊第六卷二七頁陰面第九行因疑之喻同喻無體未審其義請舉列明之己第七卷十四頁陰面第六行無細分亦爾細分是否即極微次行云除同有能無能俱分異所和合一有同詮緣因未解其義庚第八卷十二頁量云似現比等皆比量攝如疏俱述此疏是指何疏又外道立量云非比極成現所有量非現量攝極成現量所不攝量所攝故如比量非現量攝與現量所不攝語異義同均為不共許法令加極成言簡隨一過便可以不共許法成不共許法且即以所立為能立以立其所立則一切非量皆可成為正量如云聲非所作極成非所作性故如虛空豈非過也辛第八卷十五頁問身根實智俱得火之自相云何得有燒不燒異意謂俱得火之自相何以身根則燒實智不燒答云火有微盛燒不燒異此答未得其解豈火強盛時便能燒實智耶又第十八頁若一往唯言無二或三所有分別乃至隨應恆有彼故未解其義此二三言是何所指又云準七攝三七言是否指前七識問八真唯識量何以初三攝眼所不攝便足顯色不離眼識豈此三界中眼界不攝他之二界遂可決其不相離也答一諸佛陀自受用身土詰其實際非一非多絶心言故不思議故超數量故離分別故故不應問為一為多亦不能答為多為一一切俱非無可安立言其義相亦復非一非多以諸佛各變不同故非一以皆無邊無障礙故非多異生體無邊礙而相用有邊礙諸佛相用同體等無邊礙此其異也所引經言及宗鏡録仍屬他受用或應化身土故無妨難諸佛身土有三一為法性身土二為受用身土三為變化身土受用身即報身乃修因所成圓滿果因果各有專屬故云各變不同法性身但為因果所依根本智所顯而非因非果者換言之自受用身即所成大圓鏡智相應心品仍是相用而非是體以佛果之相用稱體周圓欲彰與異生違礙真如所起之相用不同故曰真如自體相用不應則以自受用身為真如體以真如體自名法性身故答二假如此云假如乃指或對已信耳等識不緣離自色而未信眼識亦緣不離自色者以言義乃假定敵論為何種人云假如非假定其義云假如故不關因明法有已信耳舌等識不親緣離自色但未信眼身等識亦不親緣離自色者對之立此比量即可無過故因明之有過無過不能概定須看對方為何如人而定之也五識為同類識乃內外大小共許者宗前所置之極成言意即在此故可以五中隨一之餘例此餘既如是此寧不然至五位法乃異類法不相為例若意未決請另博訪答三置自許言此應可爾然亦須檢論文前後若在前文已令小乘等承認相見同依自證而起者則此用已成義為因不須更言自許答四以有尋伺等三地攝三界如所引瑜伽論文是然有尋伺等三地本依禪定之別相而立欲界尋伺非禪定之有尋伺地故他處經論往往唯指初禪為有尋伺地識論蓋依此義故云答五識論證有第八一以教證二以理證其用理證成者即為一般人所不能不同許也要之若無此識惑業誰依果報孰持上帝所造太極所生物質所集以及真性神我等等既皆為因不成非此識更何理可成此雖比知是有亦屬即心可自知為有者若證真如即能明見在無明中譬如有人生來是盲雖復不見自身然亦能信自身定有吾人能信阿賴耶識之有亦復如是真智現前則如生盲眼忽得明了了見其自身故欲真知非修定慧親證不能世所謂通人者離卻假想無所通安能不以為假想哉能向疑處辨個端的便是入路答六真見道中無相而離分別親證真如唯根本智依之轉生帶相之智曰相見道此帶相智所帶變相即二空相及四諦相緣此二空相四諦相之智屬道理勝義證得勝義之安立諦攝不同真見道唯是勝義勝義一真法界之非安立諦所攝云倣法於真見道者以帶相智所帶變相與無相智所親證之法體無異乃是如其實體之相前五識之相分與本質同此相見道之相亦與真見道之真同故亦現量性境譬如有人無意中忽然感受一奇境方感受時未生分別亦無此一奇境之相旋為意識之所識知乃有此一奇境之相在意識中且有認知此一奇境相之意識同時並著然此認知奇境相之相識乃完全依照無意識中之奇境感受而成云倣法者即此依照之義答七甲若依義不依語依了義不依不了義義勝便立何須定顧故自教相違過可用勝義等言簡除或用別時意趣及密意説消釋如立外宗可用汝執等言簡過乙總以樂所成立合説為宗之宗之一聲曰總聲猶云總宗之一宗字此宗之總即對有法及法是宗之別而言宗之一字雖指宗之全體而名然於宗之部分亦可云宗故曰總聲於別亦轉如云燒衣雖只燒衣一分亦可云燒衣也此之聲字與聲是無常之聲無關係丙六句七句皆指闕能立過或以因一喻二之三法為能立或以遍宗法同品定有異品遍無三義相為能立依之離合轉變之闕過式可有七種所謂闕一有三若或闕因或闕同喻或闕異喻者是闕二有三若或闕因同喻或闕因異喻或闕同喻異喻是闕三有一全闕因及同異喻是陳那本以三義相論闕過即三相全闕亦是有體非無體然在無體闕中以但陳宗全闕因及同異喻者為完全無能立之體陳那賢愛以此既全無能立法豈成能立闕過故無闕三之一而唯闕一之三闕二之三之六句也餘諸古德以總闕因同異喻三亦名闕能立過故皆七句丁薩婆多師宗發智論是佛滅四百年時迦旃延造非佛親説與增一阿含等是佛親説不同但薩婆多自許佛説雖餘小乘及餘大乘兩俱極成非佛語所不攝然以是迦旃延造故此大乘家不認發智論為佛説故將發智亦入宗中宗上既違自教立者不認發智非佛語所不攝敵者不認大乘非佛語所不攝因上又犯一分兩俱不成若不將發智入宗中即不以發智為佛説敵者即可出不定過此中唯大乘者許非彼攝彼字指非佛語猶云許非非佛語攝戊因疑之喻同喻無體謂猶預因不能有同喻體例如見霧等故必定有火之語不能有也己無細分作無分子解次行約彼十句謂除去同句等七句同詮於緣因也其詳待考庚此疏指何書今不詳非現量攝是共許法非比極成現所有量非現量攝乃是不共許法故極成現量所不攝量所攝故之因是共許法不是不共許法以比量即是現量不攝量所攝故所舉聲非所作云云不相為例辛火有微盛燒不燒異此答實未妥洽或説自性隨念計度三種分別或説有相無相等七分別無二謂無隨念計度無三兼無自性準七指七分別答八初三界除色塵已舉為所立法之外唯眼識及眼根之二而已既眼根不攝則必眼識攝眼識初三攝非眼攝不離眼識色塵初三攝非眼攝亦應不離眼識故可用此因以成彼色不離眼識宗見海刊三卷九期
