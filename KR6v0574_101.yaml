body:
  text: 復徐兆熊先生書展誦來書論教育若偏重精神或物質之任何一方面皆足成弊甚合鄙意故前此之論教育於激成歐戰之動物教育既不謂然於壓迫當前求生天國使猶太印度淪亡之天神教育亦不謂然而所言人倫教育與佛化教育即為得精神物質的中和而平均發達之教育人倫淺近致遠猶泥故唯佛化為能得各教育之利而不受其弊達到真正富強西洋教育之目的倫理中儒教育之目的及於此更高之目的惜君於佛學毫未研究全不知吾此所謂之佛化教育為何物乃例以菩龕佛像不衣不食此則全出君之誤認而於君所謂佛化教育無關也此復并希於佛化稍研究焉見海刊六卷十期
