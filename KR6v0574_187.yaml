body:
  text: 答朱中翰問三次十則一答一力食乞食原可並存一新僧化但指在山林之一種僧化非概括各地僧化之全故二所謂以竿木隨身遇緣即宗之化則凡有利益無不興崇亦何有障礙於乞食之化哉答二此中廢像亦因此說住山比丘務專修求實證之一種特殊僧化故如是云耳若夫攝俗利衆亦不妨陳像要之亦概括在竿木隨身遇緣即宗之化中律寺當須設像但所設之像應依照經典或如整理僧伽制度論所說著為一定之制不得隨情混列天魔鬼神之像耳見海刊一卷七期二問一佛以斷愛絶欲為止惡修善之根本雖然世間恩愛欲望果非善乎無恩愛則社會不能成立無欲望則進化終莫得而現實使佛化大興則世間一切法皆將變動而天下擾擾恐不能得一日而安況愛欲生於無明然無明非他即真如是若曰斷愛絶欲不將舉此真如而斷之乎問二佛視女子似太輕蔑謂為不能成轉輪聖王大梵天王帝釋魔王佛身此種論調可證明佛教的女性觀甚為抑制的若以此為倫理學原理推而致之必致偏重於男性的一方面夫既同為世界上之人類果可助男而抑女耶然則佛之倫理將為局部底也問三佛法中國王之恩似亦於今世不合且相背焉答一斷愛為小乘法亦為出世三乘法然此所云愛是依我執而起之貪愛癡愛若無貪無癡之慈悲則又是所成而非所斷佛所成之智德福德恩德恩德即慈悲也特不名為愛耳至欲有時專舉與貪同起之欲謂之欲故說絶欲而專就欲以為言欲即願望三十七道品中有欲如意足十波羅密中有願波羅密佛果位中亦不去五別境心所之欲心所非絶欲也至謂無明非他即真如是此言不然無明即癡乃真如之迷而非真如悟真如即是斷無明故斷無明不唯不是斷真如且正須斷無明以顯真如耳答二佛法說俗諦不外乎因緣業果報應之理從業果論現前之果相中既已分明有男女之區別則其德用勢不能等又安能不如男女之實以為說而抑男揚女為平等之空談乎然果由業致業由自造但謂女身不能作轉輪聖王等等而未嘗謂女身不能轉生為男身女身男身不過一時業報相之區別佛法當依同一真如同具佛性而觀平等若業果相則自萬有不同等也若夫真俗圓融即相無相有如維摩詰經之天女說則尚何男女平等不平等之可執乎來問所引之經大致依出世小乘法為說者小乘法專在出世出世在斷貪愛斷愛首在絶淫觀女身而深厭賤之男觀之可女觀之可皆所以絶淫斷愛也故此本非維持人世之倫理學而倫理學則當依人乘大乘之說為柢耳男女同為人類即不能有高下何不同為生類而人與草木平等乎何不同為物類而人與土石平等乎從不平等之業果執平等而不明其真平等之所在復昧佛說此之所因洵乎其難通也答三國王之恩與今世不合則廢不說之亦與佛法何礙佛之應機而說既多人人處處時時互互相望而不合者何限衆藥不為一病而設亦取其適用者可耳況乎國者國家王者主權國土主權所在即為國王不問其為在君主或在民全體或在國自身也復次國者國土國土猶云世界雖至世界大同世界主權在乎人群無復國家存在而人之取所需於世界人群者猶不能不盡所能以為之報則報國王恩之四字仍無疵焉見海刊一卷八期三問一往日桂伯華先生以確信因果輪回之說與否判是真佛法與僞佛法其言曰佛法者因果也而因果必以輪回為根本故不達輪回則因果不通因果不通而侈口言佛者皆謬妄也然豫以為因果之說與輪回之說皆為印度所素有非自釋迦始若以此判是否為真佛教不將以印度數論派等宗為佛教金十七論四吠陀等論典為佛典耶或曰印度諸派雖亦言因果輪回而與佛說究竟不同則請問其相異之處何在如何始為佛底因果輪回說答一輪回之與因果義界廣狹殊大不同蓋輪回僅指三界五趣之有情衆生生死死生在生死中升沉往復未得止息者以言而因果之義則不但通於輪回內之三界有情兼復通於木石水土等一切無情之物一塵之細一滴之微亦因緣所生之果也且又不寧世間有情無情諸物然也即出世三乘所得解脫亦修解脫因所獲解脫果也即無上法王所成大覺亦依大覺因所獲大覺果也此談輪回因果之時不可不先分別觀之者因果之中有一樁三界有情生死輪回的因果是之謂輪回因果而此輪回因果乃是一樁事實對此事實所得不同之見解則便為古近東西諸家之學說與各派之宗教於此輪回因果認為有不有為第一分類於同認為有中又將見得確不確為第二分類印度之順世外道近代之唯物論者皆認為有生之物死即散為物質斷見絶無性靈轉生之事又若耶穌教以靈魂專歸上帝常見等此皆不認有六道衆生輪回因果者也然人死已其性靈轉生為鬼為畜為人之事實乃多有昭昭在人耳目間者此既為一樁現實之事又豈唯物之空言所能取銷為無莊周柏拉圖數論佛教等乃皆認之為有第其認識之方法與認之為有之性質各不同也在佛以定慧神通之力了了照見三界有情死此生彼輪回因果之實況如吾人自視其掌且觀人世等如幻如夢故雖有三界衆生輪回因果但幻有而非有實其實性則本來都無此種種差別生滅之虛僞相也此其根本上與別家之認有輪回因果者已不同矣因別家但依憑偶然發見之一二事實懸為推測不能明其虛實通其原委而即據之設為種種原因結果之說紕謬顛倒轉益滋人迷誤則印度數論派等是也持牛狗戒等亦數論派人用較佛說之洞明業識流轉三界五趣之因緣果報足以發人之深省導之止惡行善反妄歸真者敻然異矣桂伯華之言雖可矯侈談空理不修實行者之枉亦未為平遍圓滿之論然固如朱君所難因釋迦與印度之數論等同說輪回因果故便應以數論為真佛教殆等以人與牛同耕於田故為前提而斷定為人應是牛之結論朱君思之其亦相與撫掌呵呵問二印度數論派自著金十七論者即定多我之說我指神我而佛說實大乘若華嚴第一時教法華第五時教亦承認立神我不過佛教有無我之法印不以神我為各個性而以為普遍性而已但普遍性底神我與金十七論派的多神我說有何別若無別則佛教中底實大乘教不如竟稱為數論派為妥若是則可知實大乘殆非佛底主持說乃隨順婆羅門說法耳即外道若有別其別之處安在答二數論所云之神我不過錯認五陰中之識陰為一人一人別有個能知能見者之個自實體此各人各有能知見者之個自實體即謂之神我此神我之性量如何則數論中有種種派別之說明不同要皆以虛妄分別取其虛妄分別所生之幻影顛倒執為能知能見之我體而已大乘佛果上所云之我即平等真如之體自在解脫之用而已非分別取執中之物也來難所引實大乘若華嚴第一時教法華第五時教亦承認立神我等言此皆於佛法顛倒分別模糊錯亂之談近來日本人所作講佛學之書內最多此類似是而非之說無知者閲之乃益迷悶無由得解然朱君但以涅槃等經嘗說真我之故即謂實大乘教不如竟稱數論派為妥然則朱中翰嘗到茅廁內大便糞蒼蠅亦嘗到茅廁內吃糞以同到茅廁內故朱中翰亦不如竟稱糞蒼蠅為妥歟其可笑不較前者為尤甚乎問三如前所說實大乘恐非釋迦主持說然則釋迦之說為勝乎抑實大乘與外道為勝乎又釋迦的教義果出於阿羅邏迦迦蘭二仙人乎因此二仙人曾為釋迦師故答三明第二條則第三條不成疑問可不待說矣問四馬鳴菩薩創底真如生滅二門說如來藏緣起說如來藏緣起說原非馬鳴所創特馬鳴所說至為詳盡即謂馬鳴所創亦非過言為因襲傳承釋迦說耶抑為革命改造說耶釋迦所說法與馬鳴所創法何者較勝馬鳴雖是應佛懸記而生其所說法或亦依於楞伽密嚴等經起信寶性等論然果超過佛說吾輩不妨宗馬鳴而排釋尊也答四凡學說有因散亂而遂成隱沒一經採集開顯編輯條理始耀然呈露於人之耳目間者蓋往往有也馬鳴宗釋迦所說百部大乘經以造起信論洵大有採集編輯條理開顯之功者也何來乎因襲繼承革命改造及超過佛說等等邪妄分別哉至云吾輩不妨宗馬鳴而排釋迦其吐語尤為不倫既宗馬鳴則根本上便宗釋尊矣馬鳴宗釋尊故既排釋尊則根本上便排馬鳴矣馬鳴宗釋尊故朱君抑何不邏輯之甚問五佛教人天乘教理與佛教倫理有提倡之必要乎若謂不必提倡則將以何者對下愚說法若謂應提倡則其中迷信滋多與實大乘圓教了義的佛說衝突繁出且佛教或不必依此而始得久住吾等居今正宜發揮妙理此種方便隨順說正宜消除有何提倡之必要乎前見悲華君文中有欲提倡佛教倫理人生哲學之語故云答五佛教人天乘教理與佛教倫理有否提倡之必要即請用朱君之語答之若不提倡則將何以對下愚說法故佛教人天乘教理與佛教倫理有提倡之必要若提倡則其中迷信滋多與實大乘圓教了義的佛說衝突繁出今正宜發揮妙理此種方便隨順說正宜消除有何提倡之必要即此兩說一任朱君取捨無乎不可然尚應正告朱君者人天乘教理非徒對下愚說也絶對的沒有迷信且能破除世人種種迷信而與了義大乘一貫者也朱君當深其心以思之勿粗躁浮妄也朱君所問本無解答之價值然以邇來躁妄之徒生吞活剝的獵取二三名句以佛學自矜者多實則雖此種粗淺之疑見邪說亦未能辨之也故不惜筆墨而答之如左見海刊一卷八期十期
