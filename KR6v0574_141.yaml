body:
  text: 致歐陽竟無居士書竟無居士道鑒今中國佛教中人居士與虛固應處較為相知之列而自仁老以來之關係於道誼亦不為不深然虛以間名為各國佛徒所知若印若錫若日若德等佛教學者訪談關於國際佛教之事固常有之至為遊者藉以烘托而自增聲價亦勢所不免或可俾世人多結佛緣或由佛法令世人稍沾法化固將不惜慈悲為引乃居士門下一二意氣少年時托拾日文報浮言對虛及其他佛教緇素吹求攻訐皆由貴院常任油印人筆迹油印並用貴院信封寄發知者雖悉係無知妄人所為而不諒者或將為乃出貴院或居士指使所為殊足為居士及貴院盛德纍且虛門下緇素已多不平者或由誤會而演出對于貴院或居士之反詆甚非佛門之幸故竊願居士一察門下所為稍加裁抑而免橫決專此順頌時祉沙門太虛白附更正南京油印紙之誤傳余至今未見日文的中外日報但據南京寄來油印紙謂日文中外日報云云頗違當日好村所訪談之實雖確否未可知應略請更正好村偕譯人等共四人四月十四日下午訪豫於上海雪竇分院謂此係求贊成中日佛教學會曾訪段芝泉王一亭諸老次第訪豫及印光法師等乃申其所問請豫答之如左問中日佛教學會擬推中日會長各一人日本方面於高楠鈴木二博士孰為宜而中國方面法師能擔任否答高楠博士編印大正新修藏主譯南傳巴利文藏中國佛學者知之較多聞今夏有常惺法師等將遊日本屆時可就詢之余以事繁恕未遑參預問中國僧人近已漸有赴日留學者日本僧人亦有可來中國留學之寺院否且其用費如何答中國僧赴日留學經費頗為不易中國今某某等寺皆附設有佛學院設為國家所許而日僧能遵照中國僧生活習慣者則就某某等寺佛學院可無須納費問擬請法師赴日講演不知有暇否今夏鈴木博士將重遊中國廬山暑期佛學會邀講演否答鈴木博士若有遊廬山之便在大林寺講演期間當邀講演余本年無暇明年後或可能問大醒芝峰法舫等今夏能赴日考察否答或者能之問南傳巴利文藏經已譯成日文中國最好能轉譯之答武昌之世界佛學苑圖書館中有暹羅某親王所贈巴利文藏經並已訂購日譯南傳藏若得一精於此學之日本學者相助當於館中選華文之所無者譯之太虛二四五九見正信六卷九期
