body:
  text: 答鑑民問第一神祕亦有絶對相對基督教的神是只存於神祕的是為絶對的神祕至相對的神祕乃由智慧程度高下而異的佛陀的完全智慧中絶無神祕降此而下皆不免有神祕神祕者何即其智慧程度尚未能覺知之境是前世今世的關係在佛的智慧中及佛徒的理解中只是確知事實如此說他如此并無一點神祕但沒有得到佛的智慧及佛學的理解者或猶視為神祕譬如月與潮的關係稍習科學者知其事實如此而不習科學者則視為神祕果神祕乎哉不思不學而已鑑民君或又以吾此譬為無羈的理性所産生的空中樓閣雖然你既未能親修佛智以求驗及深研佛學以求解要我來對你說則我除掉用你已知的事理為譬使你得以推知所未來的事理更有什麼法子第二佛的科學皆說明在空中是有無數世界的但佛說現在的無數世界中即有化生的世界故并不是將來的空想乃是現在的事實雖我們人世要進化到這種化生世界尚在將來但既有別個事實的證明則便是實事實理應可信行第三原文不承認肉身是人生的桎梏恐是承認肉身是人生的桎梏之誤但此乃由鑑民君讀吾自由史觀的誤解我說現在的人類尚未能完全免除身體上及環境上的桎梏并不是以身體為桎梏第四此乃由混宗教與信仰為一事而誤解宗教是不准人研究且批評而只要人服從的信仰科學佛學哲學是任人研究且批評的但不是沒有信仰若經過研究及批評確實覺得是對的然後再信為是可實行實現的真理這便是佛學與科學的精神一致有何矛盾後面這兩條結論本是吾行之一二十年了的但佛的學說即是佛的主義是思想信仰行動實現一貫的不只是思想不只是研究是要由研究而了解而確信而為篤行而實現的鑑民君的討論我極歡喜但希望能先加以深切的研究見海刊十卷四期附注原題答鑑民君之疑點今改略
