body:
  text: 答趙伯福問八則一三四各條詢整頓遂寧寺僧諸點茲請併合言之一僧伽之人生觀應為經歷學僧職僧德僧三級之人生觀詳建立中國現代佛教住持僧二在遂寧之實施應先決定以遂寧縣佛教會為寺僧產業集中之執行機關而由本縣信佛軍政長官組一監督機關分擔責職三其入手由遂寧縣佛教會作全縣寺庵之僧數產額屋量調查根據調查及當地實情而支配施設之四弘法佛學院可即改為教理院預科而就廣德寺全部屋宇設施之二十歲至三十歲之比丘考取三十至六十人三年卒業五就靈泉寺全部屋宇施設為律儀預科十六歲至二十歲之沙彌考取二十人至四十人二年卒業不及格者還俗及格者得進受比丘戒六就開善寺全部屋宇施設為遂寧縣佛教總布教所內設初高級小學一所全縣未滿十五齡之小沙彌皆收入之又設雲水堂一招待往來僧眾設僧堂一考取曾參學諸方能作諸法事者以應本縣信佛人家誦經拜懺放燄口送往生祈福消災等各種佛事之請布教堂一每七日公開講演佛教一次或二次以起民眾之信仰七市區東區南區西區北區之五區各就原有寺庵各設布教所二所或至六所總數十所或三十所內或設閱報所通俗圖書館通俗教育館半日小學農村夜學民眾學校施診所民眾醫院農場手工場等須就實際情形之所宜而施設之八右各院各所之主持僧職僧由遂寧縣佛教會組織佛教職僧考試委員會召集全縣曾受比丘戒四年及年滿二十四歲以上之僧眾每三年舉行考試一次分門考試就其考取者分別由遂寧縣佛教會任為以上之各職九就城鄉較靜僻之寺院二所或五六所設為長老僧林使年逾五十或六十以上之不願就考而出為職僧之老僧住中休養自修或念佛或參禪或持咒或閱經等悉聽自便但亦可別為一二所較整肅者一二所較方便者俾可隨意所宜入之二詢刱立居士林事近來佛教在家眾所設之居士林佛學社等皆名義未正而所行有增損之過宜如組織佛教正信會為在家眾統一團體之所論與漢口佛教正信會接洽為遂寧佛教正信會之組織五詢置備佛經事日本中國各小字藏經及北平之龍藏皆不甚便於翻閱若將金陵刻經處支那內學院揚州刻經處常州刻經處北平中央刻經院上海醫學書局上海佛學書局武昌佛學院以及各大書局各刻經處所出各流通本佛書購齊之較正續藏所有者所差無幾而且多有為正續藏所未有者故不如就以上各處流通本購置之較便觀覽六詢大乘經典研究次序首研十二門論及攝大乘論次及中論及成唯識論又次及般若經大智度論與深密經瑜伽師地論又次及龍樹提婆無著天親所釋各經與所著各論據以上諸種為大乘之至教量而抉擇披覽其餘一切大乘經論與此土各宗祖師之著述七詢密宗事密宗經典頻伽精舍藏另匯編兩函又續藏中亦多有之其根本在大毘盧遮那成佛經與金剛頂經其餘各經各有儀軌行法難以盡述有唐一行禪師大毘盧遮那成佛經疏可資此宗理論之研究日本僧空海為抑他宗而揚自宗所著二教論十住心論等取喻一時語多偏至在今已不足為研究之依據唯西藏黃派喇嘛祖師宗喀巴所造菩提道次第不為顯教密教之分而於一大乘教分為波羅密門與陀羅尼門之二門頗存印度後期大乘佛教之真相故密宗應就求之八詢中國各宗法門事以古來中國各宗之設立因古代交通梗阻學術隔閡之故遂由新譯來一經一論或來一梵僧遂據之各立一宗各自為門戶之擴張就今探源印度佛教之歷史與流行各地之佛教觀之古來因時制宜所立各宗門戶雖尚不失為方便多門中之各一方便門然亦不宜循守舊來各宗門戶研究之矣況中國佛教唐以後為畸形發展一方則下逗愚民為神道之設教一方則上適高哲為圓頓之玄談而無常智常德之講求修踐致今下者為世詬病為迷信上者若台賢禪淨等亦流為空疏虛渺之僻習且已無舊宗門之可循求哉故今在中國施設之佛教應為從人至佛之大乘漸教而切實從做人起僧寶之建立當從律儀院教理院以為基礎而佛學之研究則當如世界佛學苑計劃書所擬教理行果系統而依解修證之見海刊十一卷十期
