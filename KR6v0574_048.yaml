body:
  text: 囑福善書二通一福善編輯覽閲本刊二十五卷一期所載湘佛教界發起鑄大師像一則竊以萬梁居士等對虛興此過分之譽已令悚惶不安蓋虛僅願學菩薩發心修行而未能者耳而本刊編者未代辭謝反助為宣達更使慚汗無地并適招忌者之謗以後如有關於此種文字務為辭絶為幸太虛老人囑一月九日見海刊二十五卷三期二本年一期載湘鄉鑄像文已誡止矣閲四期中國佛教之改進一文第四段語編者應負刪削之責須知過情評譽適招愆毀後務裁止為要太虛五二七見海刊二十五卷五六期合刊
