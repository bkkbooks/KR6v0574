body:
  text: 覆趙慧綸居士書慧綸賢士如晤疊接來書曷勝欣慰惟以經濟困乏恐不獲卒業亦殊深為躊躇但祝君離諸障礙進步自由耳至陷第二日人之譏此不足慮何者君能以佛法真理報酬教授者令同覺悟即真能報恩者故函詢各節佛法中之人天乘可云初乘其各個的善惡與合衆的善惡即是別業共業譯文與來書已略更正載海潮音他日當可閲及之反對者所云學佛者多愁病此全是虛構之詞云對女子不平等此亦小乘教法如是耳專復叩訊學安太虛合十見海刊四卷三期
