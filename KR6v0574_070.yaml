body:
  text: 答薛集芙先生書集芙先生大鑒展誦來書莫名欽佩意人道之可望善存者端在少數士夫之尚有此種心德耳太虛謬荷稱揚非所克當第平居亦嘗引是為懷其所學散見於拙著道學論衡覺社叢書海潮音雜誌諸書計垂察及之矣改正倫理學說基礎之大論太虛曾觀之吾國古書既無組織完全之倫理學而迻譯自歐美者尤鮮可用此不徒中國為然即大地各國在今亦未有一是而適之倫理學於是嘗慨然欲原本佛法而有人倫學之作大致以適合人道理性之善為因以增進人生利樂之善為果而善之定義必因善果善乃謂之善非是即謂不善既非理性派死守理性桎梏人生尤非功利派徒貪功利違背人道與大論所云事實的形式論義相符順又打破生存競爭之大論此義嘗發其凡於道學論衡之譯著略辨及論天演宗竊謂當根據上節人倫學所定之善惡標準以為積極進行即一方面勇於除惡而一方面勇於為善謂之正勤亦即佛典精進之義祇說努力及互助仍屬無用蓋努力為惡及互助為惡亦努力亦互助也又救正社會奓侈之大論鄙意當說明苦樂皆生於慾望慾望達到即樂慾望達不到即苦而慾望愈奢侈則愈達不到故愈困苦慾望愈簡約則愈易滿足故愈安樂佛典謂天堂亦不能安者是也竊謂此雖三義原為一貫之論首定善惡之標準準之起正當之勤勇精進而赴達人道安樂之目的所引杜威之說頗善但今之附杜威者仍不過不辨別不選擇之趨新耳且所患尤在無總合及系統之思想也因讀尊論略紓鄙懷惟賜裁正焉此復即訊道安見海刊一卷八期
