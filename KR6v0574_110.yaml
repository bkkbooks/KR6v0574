body:
  text: 致吳稚暉先生書稚暉先生我曾見過先生兩三面也曾對先生的文字發生過一次交涉但恐先生都不曾注意及之我雖是個佛徒行為上似乎也還規矩在今日一般佛徒眼中實視為一個很不安分的二十年前的確從一日本留學朋友帶回的書籍中接受了孫中山的三民主義嚴又陵所介紹的思想章太炎的五無論康長素的大同書談嗣同的仁學等旅遊粵又得讀了新世紀接受了巴枯寧克魯泡特金等思想不久又發表了無上帝無靈魂的無神論廢姓的師復等也曾作了朋友嗣後更回轉去將宋明六朝周秦的中國書研究了一番我雖不懂西洋文字有介紹西洋思想的新譯新著出來亦必買一本看看然自信我的思想本質仍完全得之佛學的行佛行言佛言也還一致不過以為有西洋近代的科學則佛學的真理可多得明證有西洋近代的社會文化及克魯泡特金等思想則佛學漸可見之實行馬克思主義我是向來看不起的我自己是以為實行上最低限度也必克魯泡特金才可但隨俗上則難齊一只可隨民族邦國的風習上漸求改進十年來感人世的不安寧嘗出其所信以與世人相見注重於佛學教人做人的原理融攝中國的文化及西洋近代的文明冀中國印度等勇猛精進不落於西洋之後而西洋亦為溫和的進化梁漱溟譏為欲以人乘將佛學擴充到人生上來者是其實佛學本從人生做起的其讚美人生要人生不可虛生遂漸漸推到廣遠的超人境界與先生從招呼朋友推到覆天載地的仁愛實無大差異並非是我代為擴充起來的不過梁漱溟誤認印度灰滅的外道為佛學並認灰滅的外道為最高明的以為不可將這最高明的辦法此時拿來賤用了致此時仍得不著這最高明的辦法的好處反使他日到用得著的時候沒有可用了乃臆造出三種人生的三條路謂此時當走儒家持中的一條路欲推開了佛學生吞了近代西洋化讓儒家出來獨霸這全是宋明儒尊自民族斥他民族的偏見李石岑批評得好人生那曾有這三條路只有一條浩浩蕩蕩向前進達光明正覺的大路第二路只是進行上在適當的時期暫休息一下第三路只是進行上遇了障礙的反動我作的人生觀的科學也曾批評一過不過講明旋螺形的進化比李君稍為曲折一些與先生的卻頗相近然智小謀大近年來弄得雖不曾變成乩壇式的道院同善社等相似而腐化癖化者實居多數正猶先生的結果與陳仲英丁藝軒行過先施公司永安公司之間丁先生所發的慨嘆一樣可歎故現今我又暫時閉起門來但我終信從釋迦以來的真佛學僅在極少數的學者如偃鼠飲河一般各得一飽從未行到人世上來人世上亦從未認清過他的真面目真似空谷幽蘭一般的芳潔人文史上惟印度的阿育王略曾實行過一點載在世界史綱上韋爾斯的公道話稍平心的當皆可值得一顧以印度的民族是新舊婆羅門教及回教的中國民族是儒教及神仙的其他日本西藏等等是牛鬼蛇神的神道的佛的儀制雖容留若干在中國流行著都是隨各民族風習遷就成的其遺教是但保存於極少數的專門學者的若想拿出來公之大衆稍稍移風易俗不難立被排斥的但我想近今的人世既有了以公平態度研求事物真相的科學又有了打開族拘國拘教拘以至人拘的克魯泡特金等思想似乎是應可拿出來供之人世了惟上下古今天空海闊若先生似的庶其能諒解之了我今寫信與先生的動機有二種一因我所作的人生觀的科學上末後有批評先生之黑漆一團的話我當時謂中國近來有兩種人生觀最有力量一是梁漱溟的三條路二是吳稚暉的黑漆一團接著將梁先生的及先生的統統批評一下以謂從黑漆一團到黑漆兆兆兆兆團鬧到底終究是些渾蛋不如高唱也無皮血也無毛拿來吞了罷然我當時未讀到登在太平洋雜志上的全文但在張東蓀的科學與哲學上讀得幾句引來的句一方面認著所言頗有力量一方面下了不滿足的批評然其意也不過胡適之所謂單是登台演劇紅進緑出有何意義而已然心中到底掛念著先生的全文不知到底說些什麼近日看見了群衆書局出版了先生全集的廣告乃急託人買了一部來一讀讀完了先生的一個新信仰的宇宙觀及人生觀乃知以前的大膽批評大錯特錯以先生通篇的意思實與我相近並非是黑漆的胡鬧乃是要演成很光明很真善美的我前此的誤會程度真不下先生當初聽到孫文二字誤會為一定是紅眉毛緑眼睛的強盜我還無忌憚無覆蓋的告訴先生我草年前雖讀過中山先生的三民主義演說但直到今年以前尚不曾讀到孫先生的三民主義全書所以去年與朋友閒談謂三民主義是在清季的時候華民已失其國時講來恢復其故國的今民已復國當更講由民建國的三國主義一國際和平主義未得平等當求得平等既得平等不還以不平等壓迫他國并扶助被壓迫之他國使皆得平等二國政公治主義以施行公開的公平的真民治三國富充勻主義當充分的興農工商而使財力全國調勻至今年讀了中山全書遂知孫先生近年所講的三民主義已擴充二十年前的範圍而國際平和等等早包括在三民主義中這也是我大膽妄說的過舉今因連想附及這是我要向先生求恕其鹵莽的二因先生似乎受了西洋人對於耶穌教或其它宗教的無神論或非宗教論的暗示對於佛學是不屑一覽或無暇一顧的所以怎麼樣叫做佛佛學是什麼先生是始終看佛作鬼神或上帝及靈魂一般的東西或聽丁仲祐先生等謂學佛當先明鬼神說力為排斥然此種神等迷信在佛陀的學說中盡量排斥排斥的最乾淨實在非無政府主義者等之可及隨便拿開百論等書皆可見到佛陀者不過是個對於事物真相有正確知識的先覺者我們對之稱為善友乃為一能引導我們認宇宙事物真是如此的真相真如得到正確覺知的知識正覺之好朋友而已如何可當他鬼神上帝般看待如何好拿佛的學說來放在希伯來亞刺伯及婆羅門等宗教一堆中國民族今以中山先生學說為先覺者遺教然則亦看之為上帝及宗教耶我今為釋迦及其遺教辨白正猶先生為周剛直般一個朋友無辜被人殺害而辨白在確能平恕的先生諒不以我言為忤然先生後來又受梁漱溟謂佛學是定向後求滅一條路而不是理智的暗示遂咬定佛學是人死觀專以反歸黑漆一團為事的排斥之尤力按胡適之等皆受了此種梁漱溟暗示的然韋爾斯則知釋迦為世界理智成功之鋭利的攤開其因明論及俱舍論成唯識論等一看其理智之充滿是不待言了至向後求滅乃印度的斷滅外道小乘亦不如此小乘固然是個人的消極道德近似先生所謂化了勞力吃不到飯還是不願意奪別人飯來吃也便算作難能可貴的一流然亦完全是以理智成功的極至餓死不做賊乃由理智深觀事物真相衆緣和合假名為我其實不殊非我變化連續暫現為我其實瞬即非我然若憑直覺堅執為我妄欲長生不死不能施用理智糾正以至殺他奪他盜他偷他而不恤則於一團兆兆兆團的衆緣變化大流中將遺留一惡運動而激生種種惡反應由此觀察連做賊等為惡的動機也完全剷除了即小乘所謂涅槃或寂滅及解脫寧捨假名暫現之我決不更為害及衆緣變化大流之惡世緣不艱亦隨其能出而福利衆生有時為入群化俗之哲人有時為清風明月之高隱非斷滅之謂然此固猶祇能完成消極之道德者在大乘則不然略近先生所謂能夠想出許多飯來給人吃自然最好的一流布施精進等亦即是由招呼朋友而至覆天載地的仁愛之一流喜捨慈悲等其結果自然也有許多近於神工鬼斧而造成星辰日月飛潛動植的奇觀處也有許多近於神工鬼斧而造成銧質爐以太開火星航路結月球探隊生些機械性小孩以助萬有熱鬧處然實不是什麼鬼怪其初步亦先從人生的吃飯問題做起由吃飯做到人偶的相化再做到人與動物的相化再做到人與植物的相化再做到人與地質的相化毛廁裏石頭也活起來了再做到超人與天體的相化再做到超超人與宇宙的相化再做到宇宙為身身為宇宙的圓化參考自由史觀教育節中所講七重的旋螺形進化滲透了洞明了兆兆兆兆團非常非斷的變化永無窮極更不還歸黑漆一團循先生之道終必還歸黑漆團循佛之道則有進而不退則與先生同而不同似唯此之一點然就吃飯的初步辦法與先生盡心所定的四條標準幾乎多是說過的且蔬食等多是實行的其講求當如何勤勇精進當如何設法生多量物産以博濟群有也多曾盡心過就釋迦捨國之動機既為救衆生之苦入山習禪乃循印度之俗其正覺後之勤勞為衆宣化語君長以治國語夫婦以齊家平易可行不是空談白話若先生所謂西洋的個人私德在律儀上幾乎談得詳過百倍末流降至於宋以來的僧林猶為宋儒嘆為三代禮樂在於是而近今一二稍具律儀的僧林亦為西洋人讚其唾痰於袖中的手巾及分飯而食淨除爪髮等有彼方的美風見某西人筆記夫佛的主義見之言行者如此而先生動曰人死觀曰躐踏懶惰真不知何所據而云然先生以平心實察求事理之真的科學態度為態度竊以謂不應如此架詞以誣枉也若曰觀之印度民族而知然則印度無佛的學派千年矣且其學原始亦僅傳持於其學派之學者間未嘗民族化而千年來則唯婆羅門教回教而已若曰徵之中國現今佛徒而知然則現今的一般佛徒皆歷代帝王以神鬼愚民所養成稍知佛的主義者又疇認其為佛徒者少數佛學者則為儒教及近來西洋教等排斥在山林內安分以營其隱逸生活似亦先生所謂難能可貴的一流先生為熱心科學及無政府主義者於此無神無宗教無民族性無階級性且勤求理智實行進化人生以至超人的學派似宜提攜而不應排斥然先生或以謂其如弄到蛇鼠黃狼一齊顯靈草四夜灶君的上天耀武揚威農民的辛苦粒米都裝入妖巫道姑袋裏何然此等與佛學無關猶之半洋半相的男女桃紅柳緑的創作無恥苟偷的豬仔與先生等所鼓吹的科學無關也果能平恕自可相喻無言抑盲目地攻擊科學者若舉此等為科學的代表固反對不到科學而此等反可依科學為靠山致無恥苟偷等不能去除科學等真相反被障而不能使人民得到實益然盲目地攻擊佛學者若舉蛇鼠顯靈等為佛學代表固亦反對不到佛學而此等反可依佛學為靠山致妖巫道姑等不能去除佛學等真相反被障而不能使人民得到實益何如分別出真的佛學是如何若何真的科學是如何若何使妖巫苟偷等皆不能依附為障然後聯合而肅清妖巫苟偷等類收除弊興利的實益較為兩得然先生或以謂既有了西洋近代的科學則佛學等等更用不著何須留著徒亂人意然所貴乎科學之理智以其能以公平的態度分析考察真僞去僞存真搜集一切真理以成為簡明詳確的公式使人了然無惑可信可行也若專任好惡之情籠統排擊知者固不為動而不知者仍熒惑莫解則科學非示人以真的公理亦為少數學者撐持門面之具矣且佛陀學重實驗以構成理智而開物成物的態度雖同近代西洋科學同可謂之科學然其增進實驗能力的方法則有其同異同者科學以器械若望遠鏡及化藥等助增官覺取自身以外的事物為對象而實驗佛學者固皆可照辦言其異則佛學更以所得的理智進取自身為實驗之對像首分析觀察無始來經驗的結晶本能直覺排除其謬習而擴充為進化的本能直覺為心理的改造心理的改造一度成功進而為生理的改造更進而為物理的改造依改造過的物理生理心理開物成務的功用增進宇宙為之一度擴充更進為心理生理物理的改造換言之即以改進身心官覺用為實驗的器械一度提高一度擴大一度擴大一度提高如此衆緣和合變化相續而不已連宇宙也為之改造地球是三百兆年的暫局人類是六兆年的暫局六兆年後可有超人的一期這是先生所信的如此則可謂近代西洋的科學是人的科學佛的科學可謂人到超人的科學人生觀的科學上謂之狹義科學與廣義科學然在科學所講的科學縱可演成超人到了六百兆年的地球暫局告終或六千兆年的太陽系暫局告終卒無辦法蔡孑民先生的教育方針亦為此說仍不得不歸還黑漆一團變成人死觀且六百兆年六千兆年若放在兆兆兆兆兆年中若佛說的阿僧祇劫等也不過等於先生所說地球六百兆年的一日或一小時演得一小時戲的人生即永歸黑漆縱令黑漆再開新局然前演一小時的人生與此固已無關係則精彩的人生戲劇也不過同先生所說的精蟲在玻璃片上鬧了數分鐘相等仍逃不了胡適之紅進緑出有何意義的話而實實在在只成個一小時即歸黑漆的人死觀但我昔在人生觀的科學曾謂先生的黑漆一團也可謂模仿佛學中有身器質有種子力的阿賴耶識而假設然一進入佛的科學則此衆緣變化的大流遂成個變化永無窮極的當此日球地球的開始其意志情感的衝動或但曰力亦由前前無始來的經驗積集而來非是無端突起故今經過了産生太陽及地球等行星與地球上生物人類超人等等變到毀壞然其續續變化的質力流中又增了不知若干的新經驗積成的本能直覺情感故後後無終中一次二次乃至兆兆兆兆兆兆次再開新局的時候此時一人一秒所演的人生與之永有關係我們不能傾向真美善而演得不良便影響將來的日局變得愈加不良我們能傾向真美善而演得精彩則影響將來的日局變得愈加精彩由惡多善少進到善多惡少更進到無惡純善由是善善增高擴大有進無退永無止境此即大乘涅槃而我們一人一秒所演的人生亦有永遠的意義及價值且一太陽系方成他一太陽系或方壞一太陽系方長進他一太陽系或方衰退若水上漚泡的或起或滅然此成而吸彼壞此衰而助彼長展轉關係我們一人一秒演得真美善不真美善皆能影響一恆星系以至兆兆兆兆兆兆恆星系由暗多明少進到明多暗少更進到無暗純明由是明明增高擴大有進無退遍無邊際此即大乘正覺而我們一時一秒所演的人生亦有普遍的意義及價值此雖充類至盡之語這兩段可應用愛恩斯坦的相對論為渡橋而我們現實的人生上即不能不為此假設否則局於一種情境內姑且胡鬧亦即可局於一小時內但顧目前不恤一切成一各人各占一小時即死的人死觀說什麼吃飯生小孩招呼朋友以至科學及黑漆一團等一概毫無意義故我們要有人生意義要由人進超人要由地球暫局演進為無量恆星壞成相續的無始終無邊中變化大流故我們要有近代西洋科學尤要有佛的科學然行遠自邇登高自卑尤其是我們中國人在今日更當從連名數都還沒有的幼稚園小學場做起做練官覺重感驗的新農工商教育工夫由是增進乃有基礎而不外治生器藝為本之意然徒販些洋貨來裝在身上注入腦中的教育實非科學教育的真方法然事非一概因已成年的人大都已成為教不會新把戲的老狗程度性情種種不齊固有習科學或孔學或佛學等而成君子的亦有成小人的亦有都無所知的亦有博通融貫的攻偏藥愚不妨隨宜修學且中外交通往來互達西洋人不妨對東方人有所言東方人亦不妨對西洋人有所言一言傳布全球可聞歐洲激進疲悶之餘暫得老莊孔孟思想為寧放以蘇息其精力更推以向前趣正覺正覺作排去誤謬知識的正確知識解有直覺理智二種誤謬知識即非量非量亦通於直覺理智然直覺有含非量或不含非量猶理智或有錯誤或無錯誤梁漱溟以直覺為非量謬甚的佛學愈加勤勇科學亦無不宜故除各種靈魂上帝等迷信在今日已確知其為錯謬思想且已毫無用處者外其餘有關於人群調和及人生進化的真理固不妨平等發揮以供衆緣變化之消息亭毒先生以為孔佛等學在個人自行雖可但不應昌言於衆者可知不然我們除未成年的學生暫規定其應學的範圍外對成年人固不能挾一我智人愚之見而唯當自陳其合理之說以憑擇而已論我自己固連幼稚園的教育程度都沒有然亦有上下古今招呼朋友的意思故不禁言之滔滔惟先生賜教并請大安太虛白見海刊九卷一期
