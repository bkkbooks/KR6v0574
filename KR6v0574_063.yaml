body:
  text: 答鄭賢宗函半年多不見足下去年過上海時不能得相會後來信息也沉沉了惟足下志行精切知見端敏諒必深入經藏體解大覺前者兩次來問皆想於晤面時談之故未答覆今恐面談不易將來信録在海潮音通信中略附數語於此印光法師的閲經法就是實行修證法也就是戒定慧在一事上修成的方法我看足下能擇定一種經論若金剛經圓覺經起信論之類每日定一個時候凝心朗誦一過便可是個好的修行法門周圍不靜是要在自心凝定不為搖奪要安定自心故凝心於經直閲不生分別如是久之則周圍的喧鬧皆如影如響雖有若無否則居在山林那風聲溪聲鳥聲蟲聲亦大足攖人也其餘照來書條件所求的實行法門依覺社叢書第一期佛教人乘正法論所列的三皈依法或連著更加入無量壽經的十息念佛法合是三種為日日無間持續有恆的實行法門就也算得嘗一滴而具百川的海味了決定研究法性宗決定用足下所述的補助記憶法以研究法性宗均甚好足下發心上既有與佛法僧的甚深因緣某雖自愧不足為住持佛法的僧亦祇可隨喜足下的勝願代佛法僧受歸了見海刊一卷二期
