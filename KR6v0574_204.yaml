body:
  text: 答某君問九則問一因緣具種引種種生現現熏種三義夫種既生現現復熏種二法遞轉可至無窮具斯二義為用已足何以又有種引種義又前種既能親引後種則後種何用現熏現行既可熏種則後種寧待種引問二種所引種與現所熏種為同為異問三金陵刻百法明門論曇曠義記四卷七頁謂極逈色與極略色體雖無別而義有異其異何在問四三法二種何以簡除現引現一層問五他心在吾識外能為吾之所緣緣乎問六百法五位有情皆具抑專就人類而言問七凡屬有情具有八識義不違然下等動物官覺或闕則前五識且不全心所何以能具感覺運動有極簡單者如蚓如蛆是否能具五十一種復雜之心所問八唯識論有觸食意思食之名以為觸食如芻豢之悅口意思食如義理之悅心當否問九獨影境是親所緣緣否答一種子亦剎那生滅相續者而種子又有長時不起現行者使非種子自類前引後生則前一剎那種子滅後一剎那不能續生種子何能長劫恆轉不斷故因緣應具種引種之義答二前種所引後種全與前種相同等至經過現行熏習則或有新生起者或於前種有熏增者故有不同增上緣違熏更有熏減熏斷者答三推觀極遠之邊際色曰極逈色析觀極微之邊際色曰極略色同屬假想色曰體無別推遠析微不同曰義有異答四現引現屬增上緣所緣緣等無間緣非屬因緣故因緣中簡除之答五他心但托為本質為疏所緣緣不為親所緣緣不惟他心即自身他識例如意識緣眼識亦然其親所緣緣則仍為自識托變之相分即已答六百法五位乃通約一切有情以統計者非專屬人類亦非各各皆具若根若識若心所等多有減略不全具者答七可於前條所答意會之答八所喻近似然觸食通六識觸受六塵意思食為意識之希望答九獨影境惟是意識之親所緣緣見海刊七卷二期
