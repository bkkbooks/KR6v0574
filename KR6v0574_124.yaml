  text: 致范古農李經緯居士書兩居士均鑒佛學書局得二公主持前途當可有美滿之成績然鄙意若循舊式必難將佛學打入思想界之中心引起人普遍的研究故今擬為各科目及方法并擬擔任之人冀分別函請而佛教法要一書尤為需要代禪門日誦擬由古農居士編纂然亦非博涉大藏不能也專此即訊近安太虛啓附華文佛學之分科研究略見居士林林刊第二十五期
