body:
  text: 答倪君偉問三則問一劫與數之分別何在答一常言劫數者非就一人災難而言指多數人而言劫字佛典譯語乃劫波音之略意指時代而言有災難之時曰災劫如最大之災劫全世界毀壞人物皆受其難今日中國人在遭災難之時代世界人類亦在災劫中數字係中國學術之言指一人或一國命運而言然眾人所遭之災劫雖眾人同處於一時代中或有因禍得福或獨免罪者則是其業報之不同業有共業別業共業受共報然亦不必共有其業如各別作而其業相同則還受共報佛典言人生器界之變化均由業報之關係問二人之靈魂不生不滅人生之輪迴是否先有靈魂答二此應自名詞上改正佛法不用靈魂二字平常以為肉體內有一靈魂離開肉體即為鬼自佛典則不然人由色受想行識五蘊合成色指物質受指感受行即行為含有業力在其中能作一切團結之力有此業力代前之業力結合五蘊而為人身此乃業力所生之果報此一生中又有活動又造業行俟其業報盡後又引結而起又有新生命新業報故自佛法言即業報相續並無離開身體之另一物然亦有死後未即作人而為鬼者鬼非離軀體即為鬼以其有鬼業而受鬼報其身識雖與人異而未始無亦屬眾生之一此外更有一種中有身乃死後之身如轉世要做人而未得有父母緣者暫為中有身即後一生命之預備身後世為人即人之中有身後世為畜即畜之中有身問三如業力好是否死後即成仙答三仙乃修煉而得做好事多可以升天非成仙道家所謂仙乃自肉體中提煉出之一部而續其生命此非佛教所注重佛教乃勸人為好人可以受好報而升天此輪迴中最好之事但佛法最後一步乃超出輪迴成羅漢而上更有辟支佛再上為菩薩最高為佛此即出世三乘程心勉記見海刊二十六卷八九期合刊
