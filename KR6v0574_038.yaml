body:
  text: 示法舫書二通一法舫仁者覽日本藏經請用佛學院太虛名義致一公函并述明曾收到若干冊缺何冊等令贈全藏僧制今論不須附印序文亦不須作照原紙型翻印較易印師隱居為善以所言在滬上漸成諍論也顯密經藏大相徑庭今不能不認密藏是佛經則依密宗說亦難否認根據般若或唯識經論同是聖言儘可專門持究不涉其他森甫仲階等勸學儘可不須學百千法門各行其所信毋須強歸於一途大愚余只許其根據之佛心經品似聞其好言人夙生事及將來事余已切函戒之今當更戒仲階也達無所得生佛亦空成佛不成佛是兩頭語三僧祇亦無所施設生佛行果皆如幻事幻事不空空即其性而幻事行果亦難概齊初僧祇菩薩往往昧其夙命一經精進登地名頓悟成佛與教不相違佛學院以專研教理攝行證不必於教理外別論行證也太虛示見海刊十卷七期二法舫師鑒接二日函悉於武院潮音漢會諸事計劃周詳並交託清楚甚堪欣慰今以武院暫事收束祗須保管而無事辦而漢院則因密嚴辭去且須進行接收華鎣山及天台寺等必須有與尊傾心相助者故囑即來渝而半年一年後仍望能返鄂重興武院也專此即詢近祉太虛啓元五見海刊十九卷一期
