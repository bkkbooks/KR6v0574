body:
  text: 答熊慕新問十八則問一金剛經中屢言四句偈四句偈究屬何指答一梵文以一行為一偈謂金經乃至最少一行經文不拘那四句也問二金剛經第十七分我從昔來所得慧眼未曾得聞如是之經何以說慧眼聞經答二慧者照義如眼之照色名慧眼經文即義聞文義即聞慧也問三金剛經第十八分中所說過去現在未來之心皆不可得何以不可得答三緣起無性故剎那即滅故問四金剛經第三十二分末四句云一合相者即是不可說但凡夫之人貪著其事不知所指貪著何事答四即指貪著一合相著一合相即著身相我相也問五阿賴耶識的緣起有始無始答五無始問六佛學上的分段生死與變異生死有何區別答六分段生死有一定限量的形壽變異生死可隨意願功力變易問七何以到佛果地位與四智相應之清淨身土亦是剎那生滅無常答七剎那無常生滅故活潑即寂而常照之大用見海刊二十四卷八期問八焚頂受戒始於何時答八始於清世祖考最初用意乃以此免度牒及區別漢僧與喇嘛之標記直至如今視為當然實應急改問九阿賴耶識前無所始後無所終牠是不是宇宙的本體答九不是是衆生心識中最富有變似功能力的一種識體這識體亦為一切衆生無始以來的無明業感的生滅法問十古德云欲知前世因今生受者是欲知來世果今生作者是誠如是說假定一個人今生既不為善亦不為惡來生應轉生何道答十要看他不為善不作惡之種類而定不為世善不能生人天不為出世善不能得三乘聖果不作自害惡不作害他惡可免受後世自他惡報問十一精神離開物質能獨立存在嗎答十一精神可以獨立存在如無色界有情見海刊二十六卷三期問十二有情衆生在母體受胎時若無神識入胎其胎能凝結否答十二依佛法說三緣不足不能成胎問十三神識在未入胎前牠有形色否答十三未入胎前或是中有身則有形色問十四據科學研究精蟲為構成胎的元素故精蟲亦謂之生元然則不須神識入胎可矣其理對否答十四依佛法說父精亦但為成胎三材料之一不是單獨由精成長蟲問十五男女兩性前世造夫婦因今世感夫婦果今世的夫婦果則又造來世的夫婦因即倒果為因如此輾轉循環勢必永無盡期是否生生世世永為夫婦答十五亦有多生續為夫婦的但二人所造善惡業不同或至怨厭不一定再為夫婦問十六依佛法言凡發宏願者只要願力堅定當可如願以償例如發願生西者只要願力堅定必可生西誠如是說則明皇與貴妃七夕在長生殿夜靜無人私發宏願願生生世世永為夫婦按此種願力極其堅固但不知能實現否答十六癡妄心願之固結亦有可成然二人所造善惡業過遠亦多不遂問十七物質分析到鄰虛塵則空精神分析到何等始空答十七到無分別則空但心物自性本空之空則不由分析或無分別而空問十八佛典所載真言有人說釋尊住世說法因十方世界語言殊故而說真言誠如是說則真言成為十方世界語幾等於現在英語為世界語而真言十方世界語不過較之英語範圍為廣耳但不知此語於經有據否答十八真言乃是一種不同的語言其人所說於典無據見海刊二十六卷五期
