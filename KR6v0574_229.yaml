body:
  text: 答趙辰官問十五則問一佛家所謂不生不滅又所謂隨生隨滅二者的界限如何答一不生不滅是法性隨生隨滅是法相問二佛家把色受想行識歸為五蘊實際上其他四蘊皆是因緣識蘊而生它們的關係是平行的還是對峙的呢答二在五蘊的分類中是平行亦是對峙又相連屬問三大毗婆沙論說色相有三種可見有對不可見有對不可見無對這三色相怎樣區別呢答三一顏色形色等二聲香味觸眼耳鼻舌身三法處攝色問四五蘊論解釋受蘊有三領納一苦二樂三不苦不樂假如以心理學來闡明是感覺的成分多還是感情的成分多答四感覺兼觸受而受已多感情成分問五順正理論說觸從三合而生假如除了識蘊祇有眼色二者相觸成何境界答五如鏡照影而已問六大智度論解釋心有二種一者念念生滅心二者次第相續心既曰念念生滅何以又曰次第相續答六念念生滅就其恆行不住說次第相續就其自類引生說問七佛家所指身中神與中國方士所講的元神出竅的元神以及基督聖靈復活的聖靈是否有同一意義答七略同不盡同身中神即業識元神攝煉精氣成兼色法聖靈指上帝分與聖善心靈見海刊二十四卷七期問八華嚴記文佛降誕之期有諸天妓女於虛空中作妙音樂諸天玉女執孔雀拂現宮牆上諸天玉女各持金瓶盛滿香汁列住空中佛家最忌色蘊何以有此一段記事答八並無最忌色蘊之義華嚴極樂蓮花香光亦色蘊也此所說降於欲界之第四兜率天相故有天女問九所謂五蘊皆空無我隨滅復隨生有無一貫的解釋答九五蘊皆從衆緣隨生隨滅無實體故空無我問十自天地初成以至民主經過如何答十佛說較地質史生物進化史更長遠問一一佛家普度衆生的宏願是否根源於愛答一一源於無我的慈悲故不同自我而出之愛問一二佛家的識從行生與總理行而後知的學說是否相同答一二識從行生的識指一期生命最初的識故不很同但識蘊列行蘊之後等義相近似問一三戰爭與人類的關係如何答一三三界衆生中之欲界地居衆生均不免戰爭天亦不免但佛聖均期能漸減免故以慈仁為教問一四怎樣能夠提高人類的關係答一四發揮其利他的思想與行事問一五怎樣能以佛法的因緣促進世界永久和平的實現答一五闡明佛法真理改變近代做人立國的趨向見海刊二十四卷八期
