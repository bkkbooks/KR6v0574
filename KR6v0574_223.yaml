body:
  text: 答華東基督教教育代表團問五則問一中國佛教的趨勢如何答一佛教徒衆可分二項來說一居家佛教徒即在家信仰佛教的男人女人是二出家佛教徒即男人女人出家的所謂和尚尼姑是在家佛徒近來也有團體的組織如上海及各地的佛教居士林淨業社正信會佛學社等等團體這是一種新興的趨勢出家佛徒之寺院庵堂的僧尼泥困舊式陋習不合現時趨勢致益墮落的固不少也有許多能適合現時環境而興起的例如全國各地寺院之附設佛學院僧學林研究社等僧教育或設辦各項國民小學及慈善事業之孤兒院醫院施診所賑災會等等由以前各個寺院及出家在家佛徒都是散漫的近來則無論在家出家的佛教團體漸由一地方乃至全國都有了系統組織的趨勢在這新舊過渡的變化中息息與全國民族相關係將來的結果要看中國整個民族的趨勢如何問二中國佛教教育有何新計劃答二佛教教育分二項來說一由佛教團體來辦的國民教育概遵照國民政府所規定的學校辦法設辦各項小學校及民衆學校等如雪竇寺今亦設有農讀學校二所二招集有中學程度的僧徒所辦的僧徒教育此即上述各寺院設辦之佛學院等不但使之有學識而且要符佛教的道德修養以住持現代的佛教余個人主張以後應受過中等以上教育的人才能允許出家出家後還要受十二年的僧教育方能完成宣揚佛教的力量問三中日佛教的關係如何答三日本的佛教在隋唐時由中國傳入到了宋元時代日本為適應自己國家的環境産生了日蓮宗淨土真宗真宗的寺僧同人民一樣的有妻子兒女因此其佛教普遍了全國人民比如路德改新教後娶妻育子的牧師就不同天主舊教的神甫和修道女的情形了其國六千餘萬民衆除原有的神道教徒占一半和少數基督教徒外其餘信仰佛教的總在三千萬人以上日本近時佛學研究很發達於國家社會建設事業都有長足的進展但嚴格以論其佛教的精神修養比之我國學有所長行有所短也民十三年余在廬山召開世界佛教聯合會日本佛教徒曾來出席日人回國後發起東亞佛教大會次年我國亦派代表赴日在互相間觀察的結果信仰修行以中國為優然日本之研究佛學能適合現今的科學方法故有互相學習的需要問四佛教對基督教應有如何關係答四余對於基督教向無研究所以講不到什麼但我想從商界工界農界之同一界的關係來說今基督教和佛教同為宗教界當然可以有同是宗教的關係凡宗教對於宇宙萬有都有最高的信仰為一切思想行為的根本和歸宿使人能悔改抑止罪惡的行為越加增長其善德而向上進步並能使有難行能行難忍能忍的毅力佛耶兩教在此點應有相同關係但佛是佛教耶穌是耶穌其教義當然各別然亦有相互資助的地方佛教大乘菩薩以利他之精神來救濟覺悟衆生是都為群衆幸福而犧牲自身利益此於耶穌捨身救世的精神頗堪借鏡而近時有許多高明的基督教徒往往看閲佛經以體會中國人民一般的心理以作貫通的學理研究問五中國佛教對於世界之貢獻如何答五佛教起於印度釋迦牟尼印度乃婆羅門教國家階級制度很嚴釋尊創平等教義以反抗婆羅門教似基督反對猶太教的情形經千餘年後佛教衰頽婆羅門教復興印度即無佛教而印度千餘年的佛教遠播各地即分三期初期小乘佛教流在錫蘭緬甸暹羅二期大乘佛教傳入中國而流及日本朝鮮三期密宗佛教流在中國的藏蒙等地由此現今世界流傳的佛教要算中國來得最完備所以中國佛教對於世界的貢獻就是佛教對於世界的貢獻於此當略說佛教的特質世上科學哲學宗教等各種學問的講明都離不了因果律不單大的事物必有其因就是微小的事物亦何嘗非果部別研究讓之科學哲學宗教專從宇宙萬有的原因是什麼將來的變化又如何去追討例如基督教以所謂神的上帝為最前的因和最後的原因但而佛教的因果論是特殊的佛說一切法皆是因緣所成就是大而山川日月人獸小而草木塵沙蟲蟻這些都是仗因托緣而成譬如稻梁的收穫要有種子的因經過水土人工肥料和相當時間等緣方能結實如此看來推之無邊的世界近之吾人的身軀皆由因緣所成人由業識的因攬父母之緣而成大地山河以衆生的同業為緣地水火風色聲香味觸的共相種為因而生起各因互緣展轉而為因緣沒有單獨的一物可生其他萬物亦沒有特定的一非因果之物可主宰一切尤沒有任何一物不假因緣而能成是為徹底的因果論科學分析到最後的元子電子便沒有了因其餘的宗教哲學亦然於是皆不免把因果律推翻破壞陷於不通惟佛教的因果論最講得通亦最能饜足人類智識上的信仰佛教能夠貢獻於世界的亦就在此性定記見正信六卷三四期合刊注一原題太虛老法師對於五個問題之略解今改題
