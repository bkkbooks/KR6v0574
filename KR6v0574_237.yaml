body:
  text: 答王遠孝問問一般人認為佛教並不能救國則是佛教思想不適合於抗戰期中答此為一般人對於佛教之論調以為佛教不如回教適合抗戰因回教徒能團結抗爭然云佛教不適合於抗戰非佛教本身無組織不能抗戰因偏用佛教一部分消極自了而不用大乘救世精神或致人口減少政綱日弛于是歸過於佛教若能發揮大乘佛教救世精神自可救國救民程心勉記見海刊二十六卷六七期合刊
