body:
  text: 覆佛教普濟日災會謹復者來函敬悉救災恤鄰以暢慈悲普運之本懷極表同情惟所擬辦法似宜改度亡部為宏法部詞與利生相對較為隨順但于宏法部內可略分三條一度亡如所擬云云二文字徵集關於救恤日災文字印成小冊贈送勸化三言說組織講演隊隨處演說藉以警悟以茲三者傳布宏法於國內外是否有當統希裁量順叩慈安釋太虛謹復見海刊四卷九期
