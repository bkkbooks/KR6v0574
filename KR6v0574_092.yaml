body:
  text: 與張純一居士書二通一仲如先生道鑒滬堧一晤彈指六年乘化觀物應多至樂曩讀大著融通各教談道書改造基督教之討論等雖知內祕外現用心甚苦然以時機欠熟辭義含隱未能加以贊言今閲與某女士書有當知真基督教即是一部分之佛教故佛教即是真基督教之骨髓所以圓滿基督教之欠缺者也又云不精研佛教決不能了解真基督之奧妙與欠缺及錯誤又云洋教不足道專就真基督教言其法門遠不及佛教圓滿其條理遠不及佛教邃密又云融通各教皈命基督僅對洋教徒方便引導之説真若探豫懷而達之君筆者非先生之精通佛耶勇猛無畏亦不能為此語以援彼溺於洋教迷海中之大地群生也從佛教之廣大而觀之孔老為菩薩應化華土而階梯佛乘者既瞭無可疑則基督為菩薩應化歐土而階梯佛乘者亦了然可知矣故嘗論我國宋明來之理學丹道可稱為佛教之儒道宗而今則更須有佛教之基督宗以救胥溺洋教之禍今先生既言真基督教為佛教之一部分則持佛教基督宗之旨宏法西洋者其責已得先生肩任之矣欣幸何如然據實定名必應令知基督僅為佛教之宗派一部分不得執此以概佛教尤不得執偏以排佛教之全但當由此以漸通佛法為期乃成妙方便門耳此之妙方便門淺之可救人免墮四惡得全人道進之可拔人入天再進之可通淨土宗真言宗之徑路而勇修菩薩利他之行今欲西洋被於佛化殆非由此門不可然非先生之荷負無畏雖知亦不敢行也特申欽景并頌教安釋太虛和南癸亥十一月草六日見海刊五卷一期二仲如先生大鑒手教並致吳雷川君書均敬讀今夏廬山講演務請駕臨貴西友高君望速代邀同蒞基督教進化為佛教實為今日救世唯一之大事能行此者是即救世主大作諸篇光芒萬丈語皆圓轉無礙但同時令更知佛法之所由高乃由三無數大劫所圓無上果覺海中之所流出故其妙滿非孔老耶諸菩薩能及尤為有力專此順訊著安太虛合十四月十五日見海刊五卷四期
