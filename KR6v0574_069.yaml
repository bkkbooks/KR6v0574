  text: 復妙曇女士書於海潮音月刊加傳記及修續比丘尼傳甚善甚善採輯有得當即可披露於雜記門所論佛教平等真理於第六期海潮音上當有一篇發表至大慈師時機已到宜於出家之語可於本刊第二期復志禪君信中得之女士靈根夙植慧悟超人乃能以深通佛法戒行精嚴抱大慈悲心以宏揚佛法為懷為佛法幸為衆生幸曷其有極見海刊一卷四期
