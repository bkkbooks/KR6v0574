  text: 復甘立仁居士書聞由音聲耳根心識三和合成根在音識之間楞嚴正選聞根雖曰音聞初步入流亡所即遺音返聞不重於音也但心聞洞十方初心不能入此為初心設方便故令即音聞而棄音入聞耳武昌佛學院出版之楞嚴研究可參閲之太虛復見正信二卷十期
