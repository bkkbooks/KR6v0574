body:
  text: 答毗陵陳居士問四則問一多聞熏習可起信去粗所知而於真能斷一分所知則於多聞之外必另有方法使心力強大身心變換方能別有境界唯識之五重觀天台之一心三觀似乎是呆想的態度呆久了可以入定不知這種定一是否一定可以變換身心二是否決定可以發生依性境的慧麼答一以多聞熏習引生如理作意修六度等為資糧位證真切要者乃在四加行位之四尋思觀所引四如實智由如實智入真見道乃能真斷一分所知前此非去皆是伏耳問二禪宗參修之方法可用唯識之理論解釋之否按唯識即謂之遣相觀性復次何以知禪宗之某種方法為決定的正準的可靠的方法答二禪宗方法乃截此非量而得現量高者入真見道低者亦剎那暫伏所知耳正確否須師印證問三依解起行解有三論唯識等行則禪密為佳禪賴自密兼賴他禪宗直切所知而多賴機會其功行是否有唐捐之慮密宗易使人不放逸修行精進其功效是否僅能暫伏煩惱而於所知無大交涉答三功不唐捐現生不悟亦熏為悟種使他生易悟如六祖聞經即悟等密宗亦然淺者暫伏二障如夙具聞思慧根兼得聖智為增上緣亦能斷障證真矣問四煩惱障種全是習氣所知障種似不應稱為習氣唯識論等中亦有此種分別否答四所知障種即名言習氣二取習氣故亦名習氣見成唯識論等見海刊十卷七期
