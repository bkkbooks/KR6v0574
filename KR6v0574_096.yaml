body:
  text: 復張幻龍居士書鄂中佛徒勇行者多研理者鮮得居士之問不禁有足音跫然之喜但前說在明五蘊即空空即五蘊之相即義遂借喻即平常眼識所見堅密之石由顯微鏡可見為不堅密之相以明即凡情所見之色聖智可見為非色即凡情所見之有聖智可見為非有即凡情所見之空聖智可見為不空即凡情所見之無聖智可見為不無故空色相即有無相即而以諸法即空故諸法之定相不可得空即諸法故空之定相亦不可得若諸法若空之定相皆不可得故諸法空不可得而空亦空不可得老聃一指無名之樸二指依無名之樸所起名實相待之二三指名實之二對無名之一待合為三三生萬物則所謂無名為天地之始有名為萬物之母也此但推論之名理非為實證之智境意存無名自然之實未達緣生性空之如極之亦不過以名分位假即對待假推明空理而已般若由法和合假受相續假名對待假以明本空及無自性由如實而證乃如證而說故徵驗之科學反得引為喻也三假皆可明無自性明無自性即是明空即以無自性謂空故能所空無自性有無空無自性固遣無可遣泯無可泯也此覆幻龍居士慧照並訊起居無量太虛和南見海刊六卷二期
