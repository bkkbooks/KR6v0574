body:
  text: 答傳佛傳生書傳佛傳生善友來函述日用功夫未得力各節詳有數緣如腿痛身疲致唯能死念話頭以為抵制又因尚居學戒堂分心兩處行徑未獲專一然此二違緣去之無他繆巧但制之以忍帥之以志一待三陽開泰百體從令自然與春冰俱化也又須知此亦話頭看不上疑情起不切之故今細觀來書所以看不上話頭起不切疑情者因有三種毛病一將心待悟病蓋參究話頭要當念翻身拶入蹤影全絶如夾帶一求悟之想係心於悟欲得到者則依然與顛倒馳逐前境無異二畏怯煩惱病如第一支香之腿痛身疲第二三支香之昏睡學戒堂之鬧境說來易做來萬難等等皆一種之煩惱也參禪人對之不可生畏怯心當知一句話頭倚去如銀山靠背一段疑情提來如寶劍當頭智慧火與煩惱薪戰多多益善須如探險家愈險愈興味愈勇猛前進能如此則無時非話頭得力之處稍存恐懼則一敗不可振也三專心不疑病參話頭與念佛不同心心念念要釘著扭著這一個沒頭沒尾沒面目的誰滾天落地一步不放鬆定要知道他一個著實歷歷明明的是誰無雜念的是誰知雜念起滅分明的是誰皆不可輕輕放過之藏經緇門警訓中有上封佛心牙禪師坐禪儀一篇長蘆慈覺賾禪師坐禪儀一篇又頻伽藏騰帙十有禪宗決疑集一卷皆精切初參用功之術者可仔細一尋討之見海刊一卷一期
