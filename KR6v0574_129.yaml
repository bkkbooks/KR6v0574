body:
  text: 與康寄遙居士書十九通一寄遙居士大鑒前者回電諒荷察及日前朱長者來平晤談多次然以柏林寺開學而常惺法師未回堅邀太虛講二星期故須俟朱公回平及常師來平後再可赴陜也專此順候時祺太虛啓八月草三日二寄遙居士鑒疊復函電應早荷察及今得十三日信而子橋去滬一星期矣赴陜時并須過鄭陜三四日當以速電催子橋來平同赴為善海潮音文庫法相宗上卷有法相唯識學概論可在陜中講之先查出原文印刷行之可也專此即候講經會諸善知識太虛啓八月草六日三寄遙居士鑒函件均悉子橋抵平時本即可偕之赴陜但因子橋被京滬催急而去又因此間常法師未到子橋乃又堅留在此暫教學僧乃留滯此間但陽九月內須赴滬今未能偕至陜則今年或不能作陜行矣又慧空等傳單係現代僧伽等招來反響原笑置之不理但此間有函滬查究者并祝健安太虛九月五日上三函見海刊十二卷十一期四寄遙居士鑒函悉善歸信寄漢口佛教正信會以武昌不能住也善歸善巴利文略知英文但國文甚淺不必辦巴利文學既興善學院中設巴利文一科令專教并使補習國文也詢教整會因政府遲緩未見明文然不遠耳甚欣陜垣佛教有一轉機就陜中速造僧才為要順祝時祉太虛三十三二五寄遙居士鑒致葦舫書轉悉一教整會事以主管部多不須要之顧忌適屈文六表反對遂停滯耳二印光法師應為十二代及屬于民國頗當尊議已轉佛化新聞令徑答矣三吾尚滯渝或仍返縉雲亦隨緣耳順詢近佳太虛啓三月七日六寄遙居士鑒四月十八函今接并答客問一本均悉陜西教務糾紛亦甚如此可勝同概雨坤仍催赴陜如有人幫找得赴陜車當更易也古寶古源亦新受心道戒者何忽惡性如此而心道竟不制而去之耶吾又病月餘未痊殊感衰朽已返縉雲靜養佛教國會社會部促成但內政部志在提産堅阻勿成兩部仍僵持中耳順問近好太虛五二七寄遙居士頃接法舫師來信説半年後已有一個錫蘭教師和一個學僧可來巴利三藏院不難名實相符了照來信所云望預備著并望以五萬元寄重慶和平路二八號考核委員會李子寬為買外匯寄法舫購書籍太虛八卅日八寄遙居士鑒前信曾言及法舫師與錫蘭摩訶菩提會接洽好由該會與世苑巴利三藏院交換教師學僧各一人到達後各由雙方依教師學僧供給而旅費由原派團體供給茲已派好教師學僧二人旅費恐須五十萬元速籌及為荷順問近好太虛十四九寄遙居士函暨印件均好錫蘭摩訶菩提會已正式換文茲抄奉一份請院中預為準備一寮房兩間或一大間二每月送供養每人約一萬餘元不受或代儲以備用三重慶託好一人便到時可代照料至陜派赴錫蘭二人能即來二拾萬元為盻順候近祉太虛啓十二月十六日一寄遙居士世光暑期畢業或可入陜可先預邀余恐二三月後始能東下教整會隨政府遷京赴京主持聘設計望就教況作整理建議也漢藏教理院仍法尊師負責通英文願學巴利文教師實最要可與西北大學教授連絡商請兩錫僧同為半教半學不分教師學僧之比丘固需講述而衆學僧亦需多學英文耳此人望就陜中速為物色一人不惜費先於學僧多多教英語則半年後學僧亦稍能聽英語最善而精了國文及佛學之一法師亦至要世光或可任之而代主院務仍須妙法師也外匯五萬仍交涉購買中而未買成也兩錫僧學程已高在大學畢業以上其來學中國佛學亦兼喜孔老諸子學乃國外研究成博士之類故不與院中學僧同學須專為講授大抵在助其自選經書研究耳本地學僧前作預學專學英文補習國文秋季始入第一學年如此四年每日巴利文英文占二時國文漢經亦占二時不用多講須多有時間溫習研究順訊近祉妙闊法師暨定悟蓮啓太初聖泉諸師均此太虛一月十三日一一寄遙居士來函又寄一萬元來請向吳彬如居士均此敬謝周君書上面談者相符附還善歸赴陜有可能請去函與漢口佛教正信會葦舫師囑即赴陜我亦另信錫僧何時來未有準期仍托周君代辦為妥我行期尚待舟機中順問近祉太虛謹啓二月一日一二寄遙居士法舫師來信及錫蘭二僧履歷茲寄奉彼一二月間或可到渝轉陜也十五萬亦交光宗了參二人彼一星期內可領得護照再加英領簽字及購飛機票等快亦一月可成行耳又為法舫買外匯五萬元事通知到第二晨去買已發表新外匯法不能買要待四號照新價可惜要損失四五百萬法幣也近祉太虛二月二日一三寄遙居士三一函悉社會部文已加函寄去昨可喜者乃五萬元外匯已結購八千餘羅比寄印度此事費盡辛煩終達目的餘見前復順詢近祉太虛啓三五一四寄遙居士鑒十九來函閲悉錫僧以海上船隻未通暢聞仍由印飛渝轉陜故前函已囑仍託渝周季釗接待照拂赴陜至錫僧只需指導若中論成唯識論金剛經楞伽經等讀誦研究便可不須講授要有英語述傳大意為要太虛四二四一五康院董寄遙超一代院長同鑒得索麻開明德潘那西哈錫蘭三比丘自香港來電準於七月十日下午六時到達上海接寓法藏寺藏經會略停擬送至南京轉徐州盻陜派人至京或徐州迎接入西安一預備好三房間每間一床一桌一椅吃飯可分三份共桌食之攜來書籍為置書架為備寒衣被等太虛手啓七十一六寄遙居士錫蘭三比丘到滬兩周矣迭函迭電昨得來函仍未提及而超一師來函更云無經費不能派人來接如此將錫蘭僧擱滬怎可今十日內如車路暢通可由錫蘭僑滬一商人伴同到陜縱興善未周備供養亦須於寂園或佛化社招待盻速復并候近祉太虛啓七二五一七寄遙居士鑒二十三四函及派善歸來電始悉先後一貫之信用前以疊函又電任超一原知不甚妥錫僧舊七月十五要第二安居盼即到方趕及其安居也先于寂園或佛化社供養之矣太虛七二九一八寄遙居士善歸帶來及寄來函均閲悉衰病中仍能勉力法務為感吾亦衰病無可為力但錫蘭三比丘到滬安居後陰十月間赴陜務速商妙闊法師預備一興善屋不敷決於佛化社備靜居一棟二隨錫僧受戒學持錫僧律儀及巴利文選優秀學僧五人至九人詳待善歸述太虛手啓九十四一九寄遙居士二十二函并附件均悉西安要將佛教陜分會與興善巴利院已辦事集力辦清未辦事可緩免人力分散福善於前月二十日病故復問法樂太虛三三以上康居士存稿
