body:
  text: 答白慧問問邇來港中有甲乙二人因問答心經不生不滅不垢不淨不增不減句義引起劇烈諍論雙方來往函件數達十餘終無結論然綜觀甲乙兩方函件論議中所夾帶之枝末語言都不免有所是非但雙方所持基本之意見卻有敵體不同之立場為明雙方立場起見特將其所持基本見解取要録述如下甲之見解空中之旨以遮為表即遮了情執始能表顯真理故心經不生不滅皆為遮情而非表理不但心經為然即全部藏經乃至十方諸佛莫不以此為旨趣以必須執破情忘其理自彰換言之必斷煩惱而證菩提離娑婆此岸乃可到極樂彼岸並認此為大乘了義之談如來之根本義乙之見解空宗之旨雖許以遮為表然亦準以表為遮即表示真理之後情執不破而自亡情執無實體性故所以據心經而論不生不滅為表諸法空相之真理理既表情自亡以明現則暗滅故若云全藏教典十方諸佛更是表理而非遮情法華經云諸佛如來唯以一大事因緣出現於世為欲開佛知見故示佛知見故欲令衆生悟入佛之知見故是以大乘了義之談如來根本之義則唯表真理更無情執可破所謂本無煩惱元是菩提唯心淨土自性彌陀是也按上甲乙兩方見解有極明顯之分野而雙方所解其理散見大小乘經若經典不曾深究理解未有心得者見甲之言必是甲而非乙聞乙之語又非甲而是乙唯我大師教通三藏學博中西慧目一懸邪正自別因此弟子欲明甲乙二人所解孰是特提三問敬乞慈悲下一詳確公正之批評一乙答甲之函是否圓滿二甲乙二人對于心經不生之見解誰為正確三甲乙二人之見解誰是大乘了義之談如來根本之義答一乙答甲之函理旨雖得教詮則疏二甲之問題原就教詮就教詮空宗經論判甲之見解為正但不應擴為全藏諸佛皆然三大乘之空識中三宗皆自居大乘了義如來根本忘詮得旨皆對則空以遮為表執破情亡其理自彰識以表成遮中唯表無遮或即表已遮元是菩提本無煩惱甲空而乙中可知太虛二八八一四在昆明見海刊二十卷九期附注原題附香港寄來研究問題今改入問答
