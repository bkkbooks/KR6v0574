body:
  text: 與法尊書六十通一法尊喇嘛慧覽前年以得座下來信云與昌都某格西可偕來華弘化乃就川東籌設世界佛學院系統中之一漢藏教理院以會通漢藏佛教之理為目的今已正式成立其院址之殊勝經費之充裕不但為世佛苑系統中各院之冠且於漢地各學院將居首屈一指之地位在將來有擴充成拉薩三大寺之一之希望惟現在雖有超一滿智諸師協辦而皆屬望座下回漢乃能實現其理想但現今一二年藏文尚淺可迎請格西來院祈酌之頃即託北平德茂永匯奉川資二百元收到時希即日起身由印度回國至川為要專此即祝精進太虛手啓民國二十一年八月二十九發自重慶北碚二法尊喇嘛鑒子笏居士轉來七月十五一紙書閲悉所云前寄各函暨託趙蹇叔轉交各書均未收到余曾兩函并匯參百元均託子笏轉交囑即回漢主持重慶漢藏教理院仿三大寺只研教理而不傳密今閲來書仍未提及其款究收到否今冬或明春能回極好回國以直到漢口佛教正信會暫停再轉重慶勿逗留他處為要如再須款若干可速來函當即寄交也川北及各省邊赤亂雖時有大局無礙法化頗宏格喜仁波卿書亦未收到吾意座下可即先回漢稍有布置而在一二年後再迎此格喜來漢或朗禪法師在藏稍留一二年後陪此格喜來漢均好如已定期回漢希電報或航空信先通知漢口佛教正信會俾預備迎接專此并候朗禪喇嘛均好太虛手啓十月十九自漢口發三法尊院長覽函悉會議録各端可照辦理託佛天之佑如大局安定而院費於維持中得謀增進要須座下與遍常主任及滿德諸師同發長遠心乃堪望效耳商同院董會聯合具呈將辦理經過及成績具呈南昌行營請酌助經費順頌時綏太虛手啓自漢口發四法尊賢者覽函悉一關寄南昌之件如未寄出仍以由重慶重其地雙挂號寄行營楊祕書長轉呈為妥如已寄來待到後再發二余年內或可到武昌住三廣論畢再好再譯出咒本續道次第便窺黃密組織四座下明年必欲去藏余擬同至廈汕港粵暹緬錫印而入藏一遊但漢藏院希於明夏結束交滿智或遍能另籌辦法太虛二十三年十二月二十一日自溪口發五法尊法師覽今日蔣公來寺已將漢藏院請補助經費事面提應允待與戴先生一商酌之前述之公函可早寄出則當能有多少之成效也屢詢及超一對于藏學人才之注重可知已將以座下品學最優言之順候全院均好太虛啓十二月二十六日自溪口發六法尊法師覽接議録并來書均悉就程度高者設一專習班另加之獎學金先募之如無著亦不多吾可酌助也茲預備於陰臘十五前後抵武昌座下可即來鄂一行待正十外再赴渝也最要在早將咒道次第譯出俾窺藏密之系統省財政何人一查備再函託虛白臘月六日自溪口發七法尊法師覽來函所談甚要今可與科學院立合同各執一紙內容一漢藏院出地科學院出資二期限十年至十五年今法律規定最長租約不過十五年三其收益地方得三或四資方得六或七四原有樹木概歸地方有如須伐去須先商允五合同地段須以所劃定者為範圍近寺各山地自開不必入約六年滿後由地方收回如續辦須另議七違上條款得隨時取銷合同虛復二十四年元月五日自溪口發八法尊法舫法師覽得函悉已于八日乘輪赴渝想已到院多日或舉行畢業矣余就滬療養病漸愈但衰老劇增佛教前途唯望座下等努力而已海刊費只可挨一年算一年陳靜濤營業亦不佳最好從廣銷及招廣告設法余近曾匯百五十元至鄂渝院務請法尊邀同嚴定力任其事以專為研究西藏佛教溝通漢藏文化之工作留少部分學僧作西藏佛教研究員以為專深研究另依舊章招生四十名續辦而法舫盼能攜同葦舫回鄂院充實研究及潮音內容守志來信即須赴鄂研究前談辦佛學函授事最好鄂渝院能聯合在潮音辦渝縉緇素諸知識及潘何王諸院董統希道候并祝闔院安和信寄滬轉太虛自上海發九法尊法師覽函悉專修班有一人已由漢口撥匯一百元補助費矣遍能師應囑發心以本院為常住南京所請費查係蒙藏委會之文化補助費領得不易今尚在與黃慕松商洽中聞院費艱難甚懸念另函希即轉交而於藏文盼將咒道次第譯出湯住心等譯菩提正道論登在佛學半月刊即菩薩戒釋也太虛啓四月十日自溪口發一法尊法師覽前由院董向軍會擬請經費屢經接洽雖未拒絶而無把握且各方經濟同陷艱困對漢藏院已欠千餘元尤切痛感故座下赴藏亦感費絀且一旦離則葦舫去漢藏院或即顛躓因此唯有座下與葦再繼持一年學僧明夏畢業此一年中力訓教職員忠勤吾苑志業由葦將吾學行為系統研究講授使院生精神貫注以長養院命則明年後或可有人維持也唯察之虛白二十四年六月九日自南京發一一法尊法師葦舫法師同覽函悉院費無虞為快慰惟修建仍緩進所云建太虛台尤不可或能略為劉主席潘院董何院護在山作何紀念為好以稍儲蓄備不時之需尤要開荒種植以增産尤為基本茶子已函雪竇又信為購寄矣寫字各件俟辦就再寄聞已成藏文法及咒次甚欣惟菩薩戒已重而榮高湯等近亦成文法將出版又重耳阿旺格西請為問訊能在漢院安居教授尤盼之前函囑學僧延長一載再由座下等切實培教一年即可望有繼人尤希注意鄂院缺人舫堅留塵空以助故渝院事務望座下等對常恩或滿度為精神訓練俾即化成能堅強吾院之幹力尤要虛入川之行尚不易準備夏間曾允子笏赴平淨土刊願移漢院可即移之一舉數得勿緩可也餘再詳順問近祉太虛白六月十一日自南京發一二法尊法師葦舫師等均覽函中兩書均剖悉承奮勤勇協振渝院殊為快慰惟鄂院財才空乏法舫煩勞勉就渝院人才協作之則塵空宜留鄂也尊院長仍兼訓育授佛學葦舫法師教務主任兼授佛學勝濟法師事務主任兼授佛學德潛仁弘諸師量宜酌任難災益深員薪得仍舊已佳若需加可酌行余齒壞一枚悲水淹未登廬阜疲弱不勝熱遂來莫干暫住此祝精進太虛手啓七月十七日自莫干山發一三法尊法師覽函悉比應早達武昌而塵空如未回鄂法舫師不能離武望即商定飛告而明春即迎師回渝之約尤必須履行勿失至於會覺師來信余早知全出彼之錯誤而去函責釋之矣余日內赴奉化約旬日到滬順問近祺太虛手啓十月三日自上海發一四法尊法師覽得書悉已抵仰一星期可轉印度為慰滬匯二百元乃湯屈諸君託匯者前已函仰應收閲矣吾此時尚無赴仰可能不日當仍返滬然仰光不如力勸慈航在彼久居則值緣便當赴緬一行以成中緬連絡葦舫曉西等均來信務盼明春早歸重慶專此順詢旅祉太虛啓二十五年一月一日自廣州發一五法尊師鑒得渝院轉來電報知已安抵拉薩為慰已晤安東格西否已承允來漢否至為念之渝院一切安好省教廳仍月領六百元也四川今為最安全區專待奉安格西蒞臨大轉法輪務希速徑回渝為盼順頌法喜太虛手啓二十五年二月二十五日自溪口發一六法尊法師鑒頃獲川訊悉安東格西已逝至為驚惜而自乾軍長主由座下另請上師回川尤以能請阿旺格西之師以偕阿旺同東下為盼又渝院即招小喇嘛十名來學漢文亦盼速行并電覆順訊時祉太虛啓二十五年二月二十九日自上海發一七法尊座下比聞不日過汴來漢但渝院秋季如教員課程等諸待決希早赴矣慈航來書附致其言行頗亂但殊有熱誠勇氣決于京設律儀林俾率持如去函須囑嚴遵吾教為善順詢旅佳北平經過希函告太虛啓八七自廬山發一八法尊法師鑒得函悉已抵鄂至為欣快虛因病未能赴川已詳昨函而漢藏院祇可仗座下一肩荷負俟書籍到來請即赴渝以主持漢藏院畢業及與院董商續辦事宜并祝旅綏太虛手啓二十五年十二月二十三日自上海發一九法尊法師覽赴川之勞頓病軀實不堪任而渝院之畢業此班及續開後班務望座下即日赴渝且余已另函北衡等請座下負專長渝院之責希勿稍遲滯而法舫勢難離鄂設欲有一代表則託談玄一行並即令葦舫回鄂為要務望兼顧鄂院以渝院有座下及嚴定密嚴足敷矣順祝精進太虛手啓十二三十自無錫發二法尊院長并轉嚴定葦舫密嚴本光諸師均覽譯處章程核還函中所云各點碑記俟重撰重刊要寫各匾額亦待寫寄或俟他日到川再題但諸物質建築等可緩省則緩省勿使因此受經濟困難能有餘資以開發院産尤要又可由院具文至蒙藏委員會漢藏互派遊學由本院承辦順問均佳太虛啓二月三日自無錫發二一法尊法師鑒五日來函欣悉請定教職諸仁及座下盡心院務之表示至為快慰密嚴主任事務尤盼發廣大長遠心以謀本院之發展嚴定主教藏文當能發揮多年積學之心得本光師文學佛學優長望堅忍協助翻譯并詢葦舫主任等均好又搜集材料可預備編一近二年院刊太虛啓二月十八日自上海發二二法尊院長并葦舫主任等均覽疊函均悉印度帶來各件由鍾衡平居士交涉妥上海不開驗轉運至漢口以提單由舫談等探取當為甚妥可勿念紀念台如未做勿做已做易名慈氏自慚福德涼薄望勿以名之順問合院吉利太虛啓三月十八日自上海發二三法尊院長鑒頃聞塵空師已去漢院可以代葦舫之職而囑葦舫師赴鄂勷鄂院事因已調談玄師來雪竇辦學鄂院需人極矣望即與葦塵商行順訊公綏太虛白六月十三日自上海發二四法尊院長聖觀主任同覽今登歌樂山遇林主席談及其在歌樂山所造屋今年恐不及過夏用將在溫泉租磬室住而稍嫌遊人繁雜吾因談及石華等新屋可住彼如有意借住故詢頗詳曾問及有無用具之事或去函邀迓或待來問詢林主席來住則守衛自無問題矣又至成都當即催嚴定及格西速回但最好還是函牛次封囑回虛白二五法尊院長法舫聖觀主任同鑒蓉講將軍將至青城等一遊一塔坪學糧何廳長已函江北縣長二請德格藏昨已將教部四百元交肇乾次封居士填足千元即寄黃杜二君代購運此三昨潘副主任來訪已談與王主席商省府年增助五千元共萬元四女衆部難成事實如增五千成事實則石華可專住喇嘛招一班康藏青年學生最為合宜專此順問院衆安和太虛啓六月十九日自成都發二六尊院長舫觀主任同鑒尊觀來函均悉一馬頌摩的三十元川資已改作雨坤來的川資矣二德格請藏事已見前函三聖觀師事李佐成所言華鎣事已交何廳長進行四今日與田頌堯劉自乾肇乾諸公遊長松山回將再遊青城五時局消息甚危急六一星期後余或回渝七教育部五月份未發下聖觀師可一向祕書主任探問八國文教員陳法健可先去函問之虞佛心或亦仍可來也順問近祉太虛啓自成都發二七法尊法舫法師覽昨與劉自乾委員長等同遊長松山盤桓一宿今晨與談及擬請西康建省委員會年助本院五千元以增設本院康藏青年僧俗來學漢文佛教班已蒙允許盼即擬具辦法具呈徑寄劉委員長呈請為荷此訊安和太虛啓六月二十三日自成都發二八法尊師鑒頃已由成都乘小汽車安抵歌樂山昨晤林主席馬寅初等大約均怕石華遠而不登矣在此小住盼將余著述取一分贈品有多者多取數分來以便在此間陳列連信件可專派一工人送來過青木關約二十餘里專此并問法舫師聖觀師等均好太虛啓七四自歌樂山發二九法尊院長覽昨妙乘來辭退學監職要塵空師留之無效或再回山不願再負學監責如此則學監速須改請吾意最好為塵空師兼否則仍以北海師為宜不得則希於又信等數人內商請之而權限要清負責要專亦一要義也院內廚子聞不再回山已令大林寺來廚子阿四來做煮飯必須教好阿四可教之能煮悶飯方好但嚼米渣實在不好又省教育廳曾來經費及寶源已有何交涉昨融海帶回五隻麵包收到否順問近好太虛啓十十一自重慶發三尊院長舫主任鑒前覆書關院事收閲否渝社請講法余意當可到渝住一月也余三四日後擬回渝社籌赴黔事如不赴黔塵空可住渝否并以問訊嚴定應川大聘為藏文教師諸學藏文者勉之太虛十二二十五自重慶南泉發三一尊院長覽舫聖主任懇切留任關院事三人詳盡商洽所有應興革沿改之事商洽後送來一察塵空師可隨去黔滇其餘教職員商酌聘定國文教員吾意登緣可充任如另有妥人聘之亦宜順問全院安樂太虛十二三十自重慶發三二尊法師鑒函悉謝黃居士等要在楊佃相近結苑亦可但吾以能成佛化村在下北碚坡較宜今想已在渝也賀劉主席稱呼不合吾口吻即問近好太虛二七自貴州發三三法尊法舫葦舫慧泉諸法師了空曉西如雲益亭諸居士并轉渝蓉諸善知識公鑒太虛旅貴陽適值敵機肆虐大施轟燒乃備承電函交馳殷殷慰問頃已安抵昆明敬致謝忱遊興一闌當再返巴都也并祝春祉太虛謹啓二二十四自昆明發三四法尊院長法舫聖觀主任同鑒前撥教育部去年七月份四百元作遊化費赴貴陽前葦舫師猶見全存在箱乃抵貴陽後一用一用即去其半今抵昆明又一用一用將告罄矣如一月份四百元領到時希仍撥來應用託銀行用航空匯昆明海子邊雲南省佛教會月滄法師轉交順祝春祺太虛啓二八二二五自昆明發三五法尊法舫鑒頃在渝應將講完而返縉開學矣余留渝蓋墊被單攜存山院又戴贈靈山圖等及虞佛心題裱成餞秋圖均時為存曬勿黴壞太虛二二十五自昆明發三六法尊院長舫觀主任同鑒前接關院費問題信曾復應已到舫等近來應皆安樂為念關法會既戴李等皆熱烈如有推請本院事應表示歡欣接受並以大公無我態度為作進一步之建議特囑并頌近綏太虛手啓四月二十日自昆明發三七尊院長鑒一教廳費事可速將督學室顏章二君來調查事函告何院護向教廳洽定二請北海主任事已見前函三法舫葦舫擬留一人在縉雲辦教務及中國佛學佛教會事以一人來滇助我辦省佛會雞足山事局勢未決定定再函邀但宜誰留誰來請選擇並商徵二人同意順問近祉太虛手啓五月二十七日自昆明發三八法尊法舫師鑒得函悉教廳費尚未發下為念惟所附來談玄信乃假託的一前月亦幻等來信談玄在寧波阿育王祈禱主密壇二來信的字亦分明非談玄手筆其人不過要想普超回一信以證明是我徒弟以脫罪耳須速通知布雷真如先生等為荷又前來信知葦舫信已為轉交但今得葦舫函未收到恐有遺失太虛七月二十三日自昆明發三九尊院長鑒七三十函悉一關教廳款得由部代催當有相當效力但恐非久計而郭司長所指示由部備案之方式應照具呈并託顧次長幫忙分發在蒙藏司再力託郭司長設法通融備案則下年度可列入預算而經費較可穩固也關編譯事座下偏勞殊有益於國於教而藏人學漢文本應如何編譯可請顧次長指示也順問近好太虛啓八十二自昆明發四尊院長覽三十日函悉一悉編西藏民族政教史作課本甚好二遍能請為院董亦可三工人要用亦祇可酌加工錢請必要的人四出國事尚在待葦舫在渝接洽決定間五關水源缺乏亟須設法接水種菜及各事務要北海主任與事務處各員工多開會詳商辦法員工有須酌加薪者加之六得法舫所編最近概況報告關于訓育導師制雖報告得好聽但關于實行仍恐未全貫徹近讀陳部長訓育之目標及方法與告各校導師書甚重要希與法舫主任集諸教師多開訓育會議依所訂綱要切實施行七近來物價昂貴教職員等或須酌加薪者亦希酌量鼓勵及之專此并問全院員生均好太虛手書九月二日自昆明發四一法尊院長鑒近商法舫以海潮音遷縉雲編發已略有決定此刊為院宣揚而院中教事員生望善為領導豫此刊以各種方便援助則相得益彰而精神可更增奮發專此希致意全院員生太虛手啓九月六日自昆明發四二尊舫法師覽二十七安抵昆明頃定十日由昆明出發或有改期未可知山中諸善友均為致意茲檢錶上小雞血石章一顆遺失問會生可有收拾或為一搜尋如桌底及抽屜等函覆順候近祉太虛手啓十一二自昆明發四三法尊法舫鑒此件日記當再陸續記之茲先將第一部分送交保存除保存外亦可采録其中無關政治者另編新聞發佛化新聞及海潮音登載其有關政治者須暫略去之茲已定十四日先至雞足山約一星期再趨緬約十二月一日到緬京瓦城再去仰光信寄仰光中國佛學會轉順問近祉太虛十一十二自昆明發四四尊院長葦主任等鑒偽剛法來山應善言慰留在院現已如何速告昨晤海樓催速拘靈坤矣前議決由尊葦查款帳慧明歸催十二月份速結出至十二總查報現經存各款須以存摺款等取出查對與存帳無誤而以後須每月十日前將前月收支表造出當日查對帳款勿拘心劍訟應注意所示講經布教以感化人為最要學生會總籌備處可加塵空虞愚為籌備員福善貫仁所記寄來核閲加曾閲著書十種以上而願為私淑學生者得本會會員二人以上之介紹得加入之一條海定速復商務印所遷渝否太虛三十一十自重慶發四五法尊印順葦舫又信止安雨坤福善周觀仁前後輩諸生同鑒一你們祝我壽他事都不用今年只注重把學生會努力籌備我的色身不多年的了而法命寄于茲會二塵空寧達蘊虞愚加入籌備員查在重慶尚有老學生否成都加超一三前捐三十元都買郵票作航空信皮贈海刊等用四葦舫布教陰年內即須舉行尊講經塔坪陰正初亦必速辦教化力最要不可懈緩五尊葦可待開整會再到渝免多一趟跋涉印順希對于支院精刻大藏緣起審辨之作一文我搬獅子山住處尚安已對德勇説假前返院可當書記順問張陶楊諸居士太虛三十一十三自重慶發四六陳濟博自康定康松扎貢噶山來信要求慈氏五論頌及現觀莊嚴論釋各一册請寄交西康省政府交通局邵副局長轉與又慧明來信悉文書無人聘致實難如會計有人慧明任文書頗能勝任不然只能就德勇等強令一人任之函華岩定九促速復省佛會此致尊院長太虛四九自重慶發四七尊院長覽函悉教部所言三點殊以欣慰海定昨來此今已赴謝律師洽商矣縣能幫忙即易解決如不幫忙則較難院函華岩一催定九復省佛會為要次封居士函中述及諸點悉翻入中論誠要濟勇諸古與曾子高等籌款另寄已復次封矣順問近佳太虛手啓三十四十一自重慶發四八法尊葦舫等同覽頃因病兩臂麻木酸痛須返山靜養又因空襲期近仍以住接官亭屋為宜先飭工安設好以備來居色力不加關國佛教事擬推昌圓等任之太虛三十四十九自重慶發四九尊院長返縉應安好聞有歌樂山的人走詢前本院幾為人指充收德僑用雖打銷不卜再生變否世亂茫茫惟淡泊寧靜謹慎耳太虛二月十日自重慶發五法尊院長覽十日函悉一法雨因不知金劍山通訊處尚未復書二土主廟瑪瑙觀余亦已復函令不接海定應無他意如法雨決辭余所示職員更動希察現實并先與葦塵計之庫房多物不能報帳責令現管庫者照接存時點清收帳餘缺少者付為前屆損失不應久懸薪水另各加津貼二十元葦舫塵空慧明海定等總以隨時集談之為好今返山遲速仍未決即問近好太虛四十三自重慶發五一尊代院長覽昨下午抵渝晚間韓子材宗仙商請座下講經事擬定在羅漢寺講普賢行願二十二號起約一旬盼於二十一號能抵渝則二十一號至四號暫離院兩周可還山耳余現暫寓羅漢寺太虛七日自重慶發五二尊法師覽函悉次封居士捐二百元付慧明師處彙交并先為函謝又在渝仍服藥中又因醫院藥廠等創辦尚未回山院中統問好太虛三月二十五日自重慶發五三尊代院長覽頃應返縉雲矣講堂捐款得茂芹昌猷等之十餘萬再加李會長向孔院長捐募諒可湊成所需之數在年內速將修建完竣也返山後務希勿再他出一將工程督促速完了此一事二加勤教訓學僧振奮學心以維本院及全國佛教之生命旁觀他處尤感本院之為要也老人字十二七自衡陽發五四尊院長覽來信并海定自悅來場來信均悉江北起訴事已停止或已如何海定已返院否時事都在大困難中曾國藩説打得過難關便為好漢此正為修煉磨心時也勉之并問慧明海定等太虛二十日自重慶發五五尊法師覽教務及學監諒已商妥如未果則商正果開一分任亦宜以院中之人才濟濟這些職務應不再煩吾操心矣葦法師回院尤可商談大雄校董事衆議僉同余意頃惟待之教育局耳太虛自重慶發五六法尊院長葦舫主任同覽院中恐將近開學了我在專修班的兩鐘點請印順法師講其唯識學探源或人間佛教均可如印師另能多講尤好不能多則此兩點鐘便可嚴定法師應講若干點尊與商定并致聘書關塔坪金劍縉雲近況并盼來函太虛三十二十二五七法尊院長葦塵主任同覽李會長因考核會派他頭一批赴京半月後即須動身來函催赴渝故定明早即乘船赴渝矣余信件明起即轉渝為要王爾昌捐講堂三萬元已付海定捐編譯處十萬待交售券并售余書湊足五萬二千元已有一支配單交海定法物六箱存溫泉寺留有運渝費捌千元待余信運渝均好太虛九十七自溫泉發五八法尊院長一雄校本期學生三百餘經濟充裕學風良好閲唐獻之信可知余去了煩為代理董事長夏初召開一校董會便可二獻之為預定朱校長去後之代校長或繼校長三禪岩或紹隆兩院空出可遷未空仍金劍辦之四李烈鈞校董逝世以陳德宣補充之矣太虛三十五年三月十五日五九法尊院長一十二函悉大雄事今早與海定函已加留朱校長終此期或下期開學再東下今憑此紙與朱校長切留之可也二松案敗訴早有可能敗訴了吃虧早了勿再拖延海刊後交朱校長帶京亦可太虛五十七自上海發六尊院長滿度已返川想曾至院當可面留矣雄校事洵苦極陳德宣處已去函囑照兌至泰豐何廳長返渝曾切函囑為解決渝校結束事當晤矣順問開一正果心朗等均好太虛十二月十六日自上海發上函均法尊存
