body:
  text: 答某師書某某慧鑒自稱意見是很淺薄的誠然是很淺薄的然馬說固不無片面理由佛出印度以三衣一鉢奠定僧團生活而錫緬暹且相承至今而入西藏則另成西藏樣式入日本則另成日本樣式在中國至唐宋亦不得不變成開山力田的禪寺乃至迄今末流不得不群趨於應赴經懺一途豈非在在可以證明佛教也是生産關係的一種麼惟核之萬有因緣生的佛法則馬說與黑格爾之說都不過據一方面的增上緣為執偏以概全之謬見余往講緣成史觀曾對破之即如所謂人類獲得新的生産力的時候此新的生産力是什麼又怎樣獲得豈應不再加思索遽據以推斷一切你向來頗好文藝而於佛法勝義未研究深入對一般哲學與各種社會學益鮮探涉偶及馬說故亦同一般淺薄少年的驟然傾向其實近人的文化社會學亦遠勝馬氏之說況於佛法之所明耶為佛教徒而不信奉佛法為根本的至極的唯一的思想標準則所謂破見較之毀戒尤甚直可捨佛而去何用更自居佛徒而以改教制為言耶余光宣以來即好泛覽各種經濟政治學說及各種社會主義書籍對中印希歐各家哲學亦好探究較擇之無有逮於佛法之圓徹者雖所著真現實論尚未完成而關於社會學則自由史觀已可見其綱領要言之佛法明因緣生法尤其因緣生法則中的業報法則實為佛教最根本的亦最究竟的信念所在此而不信即無所謂佛教更何所用其為住持佛教的僧寺而謀適應改更明治維新後的日本佛教曾與日本整個生産的和文化的各種社會組織發生縝密的有力的聯繫但過於遷就苟求生存發達而漸失佛教的真實性余民四前揆度我國將成一歐美式的民主國故作整理僧伽制度論為適應之建設然以國內軍閥割據政變迭生及歐戰後俄國革命成形勢異前逮民十六遂適應改為僧制今論民二十後外感世界經濟大恐慌內覺中國佛教會無由有全國之健全組織另為建僧大綱之擬議今更縮為先建一菩薩學處皆因中國經濟政治尚無一確定之趨向不能如近代日本佛教與整個經濟政治文化成就聯繫的功效然其屢變皆與整個中國相呼應而起且皆從佛教根本信念流出惜乎你等都不能深切注意研究及此輕易看過致新進後生亦漫不經心而妄生訾議要之佛教必須從根本信念上立起從有根本信念的廣大信衆上增進成立住持佛教的僧衆則縱為適應生存環境變更僧制甚而退出僧衆亦必仍為佛教之信衆否則但為個人或一群人生活求出路別無超俗向上之意義存佛教之名而無佛教之實又烏用是佛教僧寺為哉願你與諸友生同體究之太虛特復二八年四月三日見海刊二十卷三四五六期合刊
