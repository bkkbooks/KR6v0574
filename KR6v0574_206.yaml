body:
  text: 答陳伯達問二則問一佛戒食肉未曾及蛋惟中國習慣持齊者多不食蛋依科學家言蛋黃蛋白均係雞之食料猶人之飲乳殊無生命在內未識蛋究竟可食否問二考賢愚因緣經有某比丘須食肉治病而是日無處得肉有大心居士割身肉以供養時人大怪以為沙門食人肉佛乃制定戒肉規條可見佛在世時沙門亦非決定斷肉惟楞伽經規定一切肉不得食餘經尚許食三淨肉故楊仁山居士晚年亦食肉以資生當世喇嘛食肉行道得力者殊不少設有人因蔬食關係而身體日見衰弱將有性命之憂究應食肉以資生乎抑寧死不食肉乎答一雞卵之無雄者無生命例同牛乳雞卵之有雄者有生命例比人胎若能以光徹照分別則無雄者不妨食之答二大乘菩薩念念為度衆生故斷一切肉不食人天二乘戒中則開許食三淨五淨漸養慈心亦以此方便衰病可察行之見海刊九卷二期
