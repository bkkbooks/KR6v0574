body:
  text: 與杜萬空居士書三通一淨空居士覽頃見所作東方論理學之一之三意汝於因明唯識之學較昔年為進矣然略一瀏覽覺汝於佛法雖窺一斑未能昭徹以之摭談華土之古今文學稍有堪針砭時弊處然以儒道諸子比附佛說往往揚之太高將凡語濫齊聖言過同魚目混珠使人莫辨至取五支論式代八股為作文法縱皆牽強相配亦等八股濫套耳知此何益且言語文字學應歸五明內之聲明如名句文身八囀聲等非屬論理學之因明所攝在中國則為小學即六書音韻形訓等學至文學之文體若詩賦論辯等文法用字法造句法成篇成章結構法等等則近人之文通與古人之文章流別等書肆所在都有在五明屬聲明或工巧明亦非論理學之因明所攝汝於論理學之一學科且未能認清何物遽欲取來施諸應用何粗心膽大之甚耶應知論理學之論字等於心理學之心字物理學之物字是名詞而非動詞故論理學非指議論道理之學說乃指講明運用思想言論之理法若宗因喻等之一科專門學說曰論理學耳汝并論理學一名詞之意義未知何得妄作東方論理學縱能欺人一隅然使稍知因明之論理學者見之豈不令鄙笑學佛者之狂且愚耶汝於因明一名及其中之各各名詞十九誤解如曰法是天地間一切現量又曰現相將現量解同現相不知現量比量等乃專指能緣智之差別名換言之即實智曰現量假智曰比量耳汝乃妄指為所顯現之一切法相又云是故現量五支皆備不知現量且離名及類等分別一字不存五支焉備殊不知三支五支正名為比量耳又不知聲論乃印度之一學派名妄以論中所舉聲是無常例謂是聲論雜湊近人論理學上所舉之人是必死例謂是人論配無常無我之法印殊不知聲是無常由印度之聲論外道妄執聲常佛弟子破其妄執往往對之說聲是無常故論中舉以為例而已因明論在講明立論之法式不在講此無常等理也又言聲是問題是無常是解決則并通俗問題二字亦不了解必有是非疑義始成問題無是非疑義即不成問題單舉一個聲字豈成問題即對佛弟子言聲是無常亦不成問題不成宗體以相符極成故必對主張聲常之聲論派爭聲是常故或對未辨聲常無常之無智者疑非無常故有繼之提出理由證據之必要對能解決之理由證據此乃謂之問題對能成立之因喻此乃謂之宗體故唯立敵相爭是非未判之宗體乃謂之問題耳五支之結則是解決斷案三支以宗之問題經因喻成立後即等於解決之斷案故省結支不用至五支之合支即是三支之喻體汝以千金之裘配喻體非一狐之腋配喻依可知皆是胡說又汝於因上喻上之說明莫不錯亂茲略言數例令推知耳又汝心經天地萬物有無始終證道圖揆之唯識之理亦帶謬解汝若不援用因明或唯識之名詞不言是依據因明或唯識之學說自造若干名詞以自成汝一家言吾固可聽不聞不問今以汝之謬解妄言因明學如是唯識學如是使不知者聞之謬種流傳習非成是則後時雖遇明眼為之指正彼亦將信疑參半不能決了汝誤己雖小而誤人甚大既係吾皈依弟子吾不糾正汝無人說汝故不辭痛切直言也要之汝但不亂談因明唯識汝亦可為人說法唯切忌妄不知以為知耳憐汝衰年篤學宏法心切應即來天童受比丘戒以法為師亦說法為人之師汝意云何釋太虛言見海刊六卷九期二淨空居士覽前見所刊東方論理學第一三卷曾略揭其謬勸令停著今又見其二卷來正欲重加批導適君之信到矣第二卷通體有說真方售假葯之過以名題皆是而義解全非也須知因明學或論理學為講明運用思想言論的規範之學與言語文字學或文學雖不無關係確乃另是一學至此依運用思想言論的規範以闡明何種學理則本無拘限道家依以明道家之理可也儒家依以明儒家之理可也物理學依以明物理學之理可也心理學依以明心理學之理可也佛法依以明佛法之理可也佛法一宗之天台宗依以明天台宗之理可也雖可依此因明學或論理學以闡明各種學理而各種學理皆非此學以此學在明運用思想言論的規範而已猶各種學說雖皆不離文字而文字則自為文字學也故雖全不談佛法亦不妨其為論理學或因明學若西洋論理學及足目因明等或雖全談佛法亦不能成為論理學及因明學禪宗語錄等君欲依此運用思想言論之規範以編為小學教科書亦無不可但一應名為小學國文教科書不應名為因明學或論理學二對於論理學或因明學之性質作用及其專門名詞等應先透徹了解乃可應用三雖可一喝不作一喝用仍以不失其一喝自相為本如供人坐倚之木椅雖遇無柴時可充薪擊敵禦敵時可充武器防夜時可作抵門之物墊高時可作踏腳之用但製椅仍以供人坐倚之用為本若不知此意徒以欲取墊腳之用故對於製成之椅不識其自有為坐倚用之價值將其截低接長東併西湊卒之徒失其坐倚之用而於墊腳之用亦仍不適宜豈非愚癡顛倒四至改良進步其事如已知製椅供人坐倚求於坐倚更適宜之法而另製之如此成改良進步之論理學或因明學乃可名為新論理學或新因明學非君欲充小學國文教科書之所編者得竊用其名如指腳踏為最新之坐椅也望細參之并訊禪悅太虛復見海刊六卷九期三淨空居士覽佛音第三年第二期之最新東方論理學辯已經閱悉君濟時心切用意固善惟對於因明法相之學實未了徹且聞思太無根柢故雖率直淺露為言仍囫圇致辯世有因國文難解而改用白話者君亦以因明書難讀難解率意亂改乃所易者卒為君之臆談非是因明所謂毀桌椅作踏腳用也且深思之太虛白見海刊七卷四期
