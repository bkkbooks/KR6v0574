body:
  text: 答楊一塵問二則問一儒道均言心性不知佛經心性之別何在答一儒道之言心性不易分清佛家所謂心即見聞覺知等是性即性理法物各有其理如以心言同一心之理性則同其性非其心之性則異其性性者內可以貫通外可以分別故性乃法法自爾如火性屬熱水性屬濕儒書天命之謂性之性指人性而言指人應有天然之人性若無人性則非人矣故曰窮理盡性此性即為心思之所辨別也夫所以能辨別一切事物者即心思所辨別一切之理性故理性遍於人同一切萬物儒家存心養性只是養人之性所謂人之性孟子曰性善即仁義禮智是也若依佛法言則在人類之性外更有萬物之性天道等衆生之性出世之菩薩等性故佛說之性不可限於儒家之性至於明心見性之性是明諸法究竟真實性即遍通萬法之性非限於一類者也不僅遍於萬法更是永久不變之真實性此真實無為性平時不能見者以有無明在焉無無明則可以見之至于道家修心煉性自佛法觀之乃與儒家之養性同是有為之性乃欲保其人所稟之性及煉成之性耳依佛法觀所謂天命之謂性之性即業報所成之性此性隨業而轉變以業報有盡時受某種報則有某種性此須於佛法能多研究乃可以明其理也問二性是否即靈性荀子孟子之性如何答二靈者心也明覺靈性之所在即心之在也荀子孟子之性均自人性而言佛法則遍于一切法言荀子云性惡以人生不免有惡而罪由人造推本人性故云惡而人性又本可為善故孟子云性善老子云善人是不善人之師不善人是惡人之資不善指未琢磨若經琢磨則由不善而善矣荀子言人性惡亦可由人為而善亦可由朴而惡也程心勉記見海刊二十六卷六七期合刊
