body:
  text: 答某校長問答科學人生觀完全是機械的由種種物質原素組織而成與佛學小乘由四大五蘊和合而有至解散時無別可得所論略同毫無人生意義亦無人生目的今所以四肢活動者好似機動輪轉唯對於客觀之物質考求是以物競天擇優勝劣敗之論出對於能自動之主觀初無繕治之法貪瞋癡心愈演愈烈凡眼見耳聞種種物件無非是機械盡可為我用縱我制物致殺人之利器愈研愈精小乘則不同觀人生無意義無目的則毫無價值之可言故我空人生亦空人生既否定更不貪求外境以無我故亦無物向來貪瞋癡殺盜淫所得苦的結果遂完全解脫故科學是對物觀外佛學小乘是反心觀內而西洋所謂之心理學亦唯是心之種種影像而已其內心實際何嘗窺得科學家若能內弭其貪瞋癡亦便可進入小乘入佛學玄學人生觀近乎佛法大乘但亦犯科學觀片面之病其能觀主觀指為神我或靈魂等依大乘說正是凡外之我執如其所說則群生本位不離于鬼生也自鬼而來死也歸鬼而去為人為牛者唯換軀殼而已依如此說是墮常見然此形而上玄學比較科學人生觀有意義有目的故亦有價值其錯謬處即是執精神靈魂等為實我故見理不及小乘佛法說五蘊皆緣性本空非有實質玄學指為精神即五蘊之識等四蘊然蘊等咸如幻如夢要了得被認識之精神與物無非是能認識之識一種幻象故佛法說三界唯識玄學能空實我了物如幻則可由玄學而入佛學大乘佛法人生觀即可由科學玄學不圓滿處進觀如夢如幻遷變不停流行不息不執迷以為覺因破迷而成悟便是轉識成智世間之學執有一個固定物體取此捨彼主實東虛西範圍任如何擴充發展總是不圓滿佛法則平等平等一實一切皆實一虛一切皆虛取則無不取捨則無不捨是為佛法人生觀亦名中道第一義諦象賢記見海刊五卷十期附注即在光孝寺講維摩詰經雜録二則之一
