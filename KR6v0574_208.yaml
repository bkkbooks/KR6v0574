body:
  text: 答張曦問八則問一唯識不認識外有境一本十支皆反覆推明此義然影像之外非無本質成立本質取證雖多以破極微和合方分種種反證為最有力按本質之名易混外物迷者易執精而言之外物有無可置勿許縱許實有終非吾識之所得緣所得緣者仍識而已此係揣度不知有當否問二近人或謂二十論天親如夢之答亦有不極成處讀者不可執著以夢無他心醒有他心三境有異此說似甚精到弟子對于茲喻亦尚有疑醒時之山雖有時無一到有山之處山可立現夢時村舍雖有時有一經醒後難可再尋一則有主一則任運執為盡同亦不應理不知然否問三本質塵亦名疏相分惟第八能現乎抑前七皆能現乎問四生而瞽聾其現出相分必甚簡單是否其衆同分中即有所缺缺問五二十論有異大種基記甚略望詳示問六性宗禪宗皆不立階段直證圓成唯識法相廣詮依他世間學問則遍計所執而已此解有誤否問七貓之捕鼠頗難尋思貓為能殺鼠為所殺揆理當不外兩途甲則鼠前生負命債而貓今生捕食以報之乙則鼠無命債今生殺業由貓自造以為甲也則人亦有前生害命而今生抵償者何以人見人或殺或不殺而貓見鼠則必捕以為投胎作鼠必有夙債則應一一被捕無有孑遺何以不被貓食之鼠數仍纍纍此甲理之難通者也以為乙也則貓箇箇皆造殺業來生應一一受報捕殺貓者又是某類即有其類見貓必殺如貓之於鼠則其類亦必有報之者如其類之於貓以類報類推至無窮不可究詰此又乙理之不可解者也若謂貓之殺鼠出之生性偶然則輪回因果之說登時被破究竟貓之能殺果乎因乎鼠之所殺因乎果乎答一本質境對影像境言自識親緣皆為影像其疏托者則名本質或為自有情之他識相分若六識相分之疏托第八識相分為本質或為自他有情之他心心所若六七識及他心智之以心緣心疏托現行他心心所為本質或為他有情之他識相分若欲界有情緣色界或佛淨土疏托之上界有情或佛菩薩等之他識相分為本質對此識之親緣影像雖云本質而仍為他識或他識之親緣影像識者通指一切有情各有八識之總稱決定無識所不緣之識外境故云唯識非以縱有外物識不得緣之識外境為本質但以識所緣到為唯識境也答二醒時夢時應以覺時迷時為例不應以有山處無山處為例醒時有山處無山處應以夢時有村舍處無村舍處為例不應以醒時夢時為例迷中明明有六趣覺後空空無大千可思准之答三詳第一答思准之答四其現行缺某識亦即缺某識之相分然種子仍具有之或第八識所變器界亦仍具有之故聾盲根身轉為聰明根身時眼耳識現眼耳識相分亦現答五此間暫無二十論參考容後查答答六法性法相說明之方法有殊事實之轉進無異觀有為相即無為性故無階段從有漏道進無漏道故有階段世俗學說大都不離計執然間有略知依他者但不能證圓成答七貓之捕殺於鼠貓衆同分業與鼠衆同分業之報也人與人之或相殺或不相殺應以此貓與彼貓或此鼠與彼鼠為例不應以貓與鼠為例鼠被貓食雖亦為鼠同分業之一種然鼠自以鼠業受鼠報不專以供貓食而為鼠猶豬魚等或為人食非專以供人食為豬魚故儘可有不為貓捕殺之鼠而貓亦不專以食鼠而為貓故亦儘可食他物及作貓事鼠被貓食雖係還債然非鼠所知亦非鼠所甘心故仍必銜怨圖報亦果亦因貓之殺鼠雖為收債然貓殺鼠亦仍為殺業亦果亦因以亦因故鼠死或為貓貓死或為鼠以互相報償或牽以他業暫不相報若人之相罵相打非一方或雙方之覺悟或甘心受報或釋怨不求報勢難停止此衆生之所以輪回不已而惟隨緣消舊業更不造新殃為能解脫以恩報怨為能濟度也所舉甲乙二例各偏一邊故皆不當於理見海刊九卷二期
