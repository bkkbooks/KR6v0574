body:
  text: 答劉笠青問四則問一各教下手工夫俱重持戒其義云何問二自修之士對於人事一切煩惱如何屏除問三入道之始志願若何方可成就問四聖人以神道設教而天下服正信歟抑迷信歟答一戒者去其染業而不使之復染也孔子戒色鬥得釋氏戒貪瞋癡同為掃除根本煩惱譬如擒賊擒王為先而其守持之法如子思之戒欺求慊顏子之心齊四勿不二過皆所以去妄存真省之又省以至於無必也四相盡絶一塵不染永久不退方為戒律精嚴故曰萬法無真持戒近是一切聖賢莫不始基於此此第一義諦也答二舊緣無礙而已矣儒者下學上達盡人以合天佛子出世不捨世法要皆以心照境不以境蔽心久則心境雙忘逆順愛瞋猶如光滿太虛聲傳空谷不相留礙所謂煩惱即菩提也夫奔雷掣電起於心目可謂暴矣天地反覆身入玄冥至深遠也大空如日三界煊赫或成冰海晶瑩無際此亦極宇宙之至變也已而此種種幻相燦若空華終不令翳我明覺何況尋常人事一切煩惱皆由無明發生理障既滅事障自銷無勞屏除故曰大定無出入在學者融會焉可耳答三但發願心決定成就願海無邊各隨心量阿彌陀佛以願力結成淨土接引三界十方衆生觀世音地藏菩薩等皆各以度盡衆生為其本願仁者欲立立人欲達達人即願即行即人即己良以萬類為一原之分萬法為一心所造無願無成願量不宏成就不大擴而充之終而成之則專視學者精進之心與廣大之懷以為斷答四正信非迷信也夫太虛一心之所彌綸性為體神為用其於物也體而不遺人之生也神與俱來神聰明正直而一者也詩曰清明在躬志氣如神即此之謂凡夫之人蔽於物欲囿於形體性不復見神失其所依而不可以終失也聖人於是教以事神之道其言曰正汝形一汝志神將來舍降神也盥而不薦有孚顒若侑神也上帝臨汝無二爾心事神也其竭誠致敬凝神一志若此實為復性之初步梵網經曰我是已成佛汝是當成佛當作如是信戒品已具足欲成正覺先具正信正而後信何迷之有見覺社叢書第四期
