body:
  text: 覆顯蔭法師書三通一顯蔭法師鑒疊來函片均悉座下揚化東鄰潛心密教雲天引領健羨何如前寄來大稿已囑大圓居士編入尚望續續惠投文字也對於佛化新青年之盛意已為轉達彼當有較詳之接洽專復即頌得大成就太虛和南見居士林林刊第五期二顯蔭阿闍黎鑒疊函均悉雷斧僧正能來鄂否未可知然已去函歡迎矣水野先生能臨廬山聯合會至為盼祝以係十年前之故交也中國佛教之組織曾擬有僧制論茲檢奉望悉心參攷冀將來能實行也惟現下蓋尚難為統一之進行規劃只有枝枝節節為之耳國中佛徒至日留學殆無此財力能整出一好規範叢林勸日僧多來留學或足為援彼溺于形物而缺戒定之助亦東亞佛化溝通之路也便中將此義提倡之順祝三密妙嚴太虛作禮見居士林林刊第六期三顯蔭阿闍黎道鑒疊函均悉所言皆殷勤懇至念念不忘正法洵僧中之寶也演華說權田僧正事已得其詳曾更正於佛化報及海潮音也密教至弘法大師始開宗明義成一家言此說甚善吾昔曾與大勇言之至弘法大師諸說則略曾閱及之矣此覆順訊法喜太虛和南見林刊第六期
