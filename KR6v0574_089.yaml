body:
  text: 致湖北教育廳長書徑啓者聞近有國學館之設誠為切要但居今日而言國學應不以舊日儒家之故見自封孔孟以外周秦子學漢清經學魏晉玄學隋唐佛學宋明理學何莫非國學之粹乎所分經史文理四科似祇收得孔孟及漢清宋明儒之學應添子學佛學二科庶符國學名實以隋唐之大乘佛學已成中國之特色故縱因格於舊貫未能從根本為改作亦可擴充理學一科內分老莊荀韓墨諸子之子學魏晉六朝之三玄學六朝唐五代宋元明之佛學宋明儒之道學四系以隸屬之據實吾國之學可分小形聲意語文經史子集實刑政德業大道德性命四科文大二科皆關內典而經史子集但可為書之分類不足為學之分類也故依以分經史文理四科亦難允當率陳梗概敬希藻生廳長賜察釋太虛和南言見海刊四卷十一期
