body:
  text: 答淨心長老冕甫居士融高法師書敬復者展誦大札為法為衆生之熱忱溢於言表真菩薩之心行也若能無間緇素混融稚耆上無背於如來之教理下期契於現代之時機以之共維正法應可起衰復興太虛之赴歐觀化乃數年來預定之規劃而提議開全國佛教代表大會及共同發起中國佛學會則為偶逢其緣之事故仍依原訂日期放洋絶無他故也今幸中國佛學會籌備處成立所舉籌備人員皆一時之選堪能負責但依序進行不難一一成就太虛雖遊國外所當效力之處仍當竭綿薄隨諸公之後也專復敬頌道安見海刊九卷七期
