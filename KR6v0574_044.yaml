body:
  text: 致安東格西書安東格西大喇嘛座下前五年得法尊比丘來柬藉聞總持二藏博達五明既充解行尤富悲願曾允蒞內地弘化之情太虛因與四川檀越劉督辦等於世界佛學苑之系內就重慶縉雲山籌設漢藏教理院蓋專備座下之講學地也頃年法尊比丘從拉薩東返主持漢藏院培植稍有基礎奉迎法駕賁臨乃與同人公推法尊院長專迓惟惠然肯來為禱肅頌法祉世界佛學苑苑長太虛謹啟二十四年十一月十日見正信七卷七期
