body:
  text: 答朱芾煌問七則問一煩惱因緣有身五陰身因緣有煩惱為是先有身後有煩惱為是先有煩惱後有身若先有身身則無因若先有煩惱未有身時煩惱寄於何處若煩惱與身一時俱有則互不相因即破因果法亦失十二因緣若煩惱與身俱畢竟無生於第一義則通於世諦則失若失世諦還破第一義諦問二梵網載供養法師應自賣身及男女身既是出家菩薩云何有男女可賣若賣弟子云何不失慈悲又與戒賣男女色之條云何不相矛盾問三藥王菩薩焚身供佛自是得一切色身三昧以後之事非謂初心梵網謂若不燒身臂指供養諸佛非出家菩薩此已攝初心然猶僅限於出家菩薩今傳戒制度則不論在家出家一切需燒又知其難行也燒則從輕不知何所依據淨名謂但發阿耨多羅三藐三菩提心即是出家今云何乃以燒身臂指為出家若出家即已燒身以何精究一切佛法若可輕燒何如勿燒問四佛告優波離聲聞戒與菩薩戒因緣異心異莊嚴異方便異是故聲聞戒淨非菩薩戒淨菩薩戒淨非聲聞戒淨聲聞以求有為破戒以一念不求於有為淨戒菩薩以不求有為破戒以無量劫中常處有中心不生悔為淨戒以此經意推之似無一人同時兼受二戒之理今之律師大抵次第即授二戒此與佛意有無違礙云何行持問五涅槃經佛言我滅度後以佛法付諸國王大臣百官及四眾弟子若末法中有犯戒者聽其苦治若能苦治多諸功德是破戒輩不名比丘名禿居士而梵網第六戒則又禁說四眾罪過夫說猶不可當云何治今北方寺院多違半月說戒之制是以犯戒者多而佛法因以不振我輩既有謢法之責又懼破戒之罪若有確見比丘非法行為之時究應干涉與否彼既向不誦戒則無從於說戒時白其罪過若置不問則佛法將益墜落亦增眾生疑謗三寶之罪其將何以處之問六小兒腹病醫謂有蟲若不以藥下蟲則是疾視其子之死而不救若救子病勢必殺蟲二者何以兼顧又春夏間溝坑臭穢易生疾疫不以防毒藥水洒治則滋傳染藥之亦必殺蟲園丁治樹農人耘苗亦有不能兩全之慮如何處理乃得其宜又推不肉食之義則應綢衣革履不可穿肥皂洋燭不可用一切發酵之物不可食乃至茶不可飲聞香片等茶曾由豬油熏治油漆之屋不可居顏料中多和豬血即素餐之約亦不可應以素菜中多調味之素此物是葷總而言之即處處荊棘難行出家人遠離塵俗或可屏除在家人未免應酬何以善處問七迦葉阿難是佛傳法弟子涅槃經是佛最後說法理宜付與傳法之人乃說此經時佛偏禁此二眾與聽若謂小乘不堪受持大法則涅槃與法華何異況諸阿羅漢與聞涅槃者固甚多耶阿難謂為魔著然佛既能破阿難梵咒之迷寧不能救魔著之困況說經將畢佛終救之何不早拔將來共聞正法迦葉並無魔著佛入涅槃恆沙界外菩薩尚來供養如何迦葉近在耆闍崛山而不知曉直至滅後七日乃始知之耶答一依勝義諦言真性如如本不生滅且無身與煩惱況可言孰先後依世俗諦言煩惱與身互為先後身與煩惱俱時并有論唯識之變種生現現生現現生種皆俱時因果但種生種為先後因果耳故一時俱有並不破因果法蓋因於彼而果於此以彼有故此有即因果之義也然有有煩惱而無身者無色界天或兼二乘無餘涅槃是也有有身而無煩惱者如來他受用身應化身或兼自受身法性身是也有有身有煩惱者欲界色界五趣凡夫或兼二乘及菩薩是也有無身無煩惱者三乘無餘涅槃是也依從真起妄言摩訶衍論謂依如來藏故有生滅心轉不覺則動動則有苦不覺而動即無明煩惱動而有苦即業繫受身此可言先煩惱而後身依息妄歸真言由身有故觀煩惱有由身空故觀煩惱空此可言先身而後煩惱更設喻以明之真心譬水無明煩惱譬風風即水之輕動業繫受身譬水波濤專就水言無風無波以風波皆水故以風波皆非水之真相故專就風波以言前波之動遺為現動之波現動之波傳為將波之動展轉帶起如環無端動與波同時未嘗不為因果也波與動先後亦未嘗不為因果也推之先先而無始也引之後後而無終也若問波濤從水緣何而起則曰風耳風耳欲觀風於水如何止息則波濤相空而水唯澄淨平明是也二諦及二諦不二之義皆在答二梵網雖為出家菩薩戒相然亦兼攝在家菩薩故賣身及男女自是指有身及男女之菩薩言若在無男女者則斷無令彼去尋出個男女來賣之理其不失慈悲之義可觀華嚴寶積等諸經中所記菩薩以妻子等布施之行事至賣男女色乃導眾生以婬此乃表示輕所愛身及男女而尊重恭敬供養於法以此自行亦即以此導人與彼事義不相類例答三法華楞嚴梵網皆勸人燒身臂指供佛所以破人之貪愛也晚世導在家出家諸修學菩薩行者皆略以輕燒亦令稍作破身見斷我愛之因緣耳淨名以理奪事之說別對機言非常訓也云若出家即已燒身以何精究一切佛法則身即不燒會歸壞滅豈色身壞滅便無有能修證佛法乎以何精究佛法的何字好一話頭大須參究況燒身亦即精進修習佛法之一行乎況藥王以得觀一切色身三昧而燒身實亦由燒身而得現一切色身三昧乎云若可輕燒何如勿燒此言不然譬大菩薩行施內外一切施而初學菩薩可隨分施豈以不能一切施便不當施乎又如持戒豈以不能頓一切戒便當不稍漸戒乎然近來有般僧俗但知以燒香疤為受戒反昧受戒之正義又奚足取哉答四佛告優波離之言含有斥小歎大激勵小乘人發大乘心之密意實則菩薩三聚戒攝律儀戒與聲聞共攝善法饒益有情不共故出家菩薩當兼具聲聞律儀以聲聞詳於律儀而缺善法饒益菩薩詳於善法饒益而略於律儀也答五此問題且提出於海潮音徵求全國緇素討論後再為判斷答六有身生則不能殺非身生以全身生有親生則不能不殺非親生以全親生有族生則不能不殺非族生以全族生有人生則不能不殺非人生以全人生有有情生則不能不殺非有情生以全情生故生以殺成殺由生有民胞物與之大慈悲心既不能自已而民物又不能不相殘相殺以自全其生大悲與生不能並存又不能滅一而存一則捨大慈悲心與一切有情同歸之無生法性尚何他道哉然雖發此大菩提悲願而於未能與一切有情同證無生之間雖不免殘殺全生之事然以同體之心不勝其愴惻悲痛之故當力求其減免以並育不害為常經在己身則寧失命而不害生對他生則以親親仁民愛物之差降為變例去其迫不得已之害親害民者而止此為俗諦之中道也哀哉菩薩當以度一切眾生無生為歸當以對於親民非不得已不害生為濟答七迦葉習杜多行樂獨善寂往往不在眾會又靈山會上拈花微笑涅槃妙心付囑已竟故但阿難後仍在會列名時或被魔嬈或聞佛將寂悲泣失情未及到耳見海刊二卷十二期
