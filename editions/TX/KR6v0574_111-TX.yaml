body:
  text: 致閻百川總司令書百川總司令仁者憶前年過晉備承優遇在貴署暢情劇談舉凡天人之故政教之微無不傾懷放抱而出之誠快事也別來忽三易寒暑矣盱衡各方渠率殆皆有蹶竭以赴之概惟仁者休休有容卓然保持常度且揭十三年來實行而不事空談之三民主義使中外欽服然後益佩仁者之大過人也今海內洶洶未即平者徒以張君雨亭未宣布服從三民主義馮君煥章唐君孟瀟未宣布討共耳而數月來每聞列強有進佔吾國沿海諸省風說今上海長江軍艦麇集日本增兵華北而各國亦將繼之而進此國族危急存亡之秋吾國內群雄當併集三民主義之下一德一心協抗外侮豈尚容各豎旗幟以相逐乎然非於各方皆景仰之仁者出而斡旋又孰能扇以和風而消其積痞哉惟善為融內以應外使生民少受一分塗炭亦佛法與樂拔苦之慈悲也故冒昧言之又太虛今將赴坎拿大之世界教育會議後游歷美歐講演中國佛儒之文化儻蒙示我南鍼加以贊助則何幸如之肅此祇頌勳綏釋太虛謹啟見海刊九卷一期
