body:
  text: 答葦舫問問緬甸錫蘭和中國的佛教所有的塔廟佛像都有些不同尤其中國的造像如四天王韋陀伽藍普通塑的關帝像不但錫蘭緬甸沒有就是印度古代的造像中也沒有見過答這有歷史的關係相傳唐時有番人入寇不空三藏修護國法護法四天王現身把番人嚇退唐皇令各寺皆塑四天王像又韋陀見曇無讖譯大雲等經梁武帝時已奉為護法天神至唐道宣律師持戒精嚴感天人獻供傳韋陀為專護僧寺者隋時智者大師在玉泉山入定時見一神自稱關羽師為說法皈依常為護法因此中國供四天王韋陀關帝之像中國現在的寺廟多是元明以後的遺制那時也富有禪教律淨密各宗調和的思想所以佛像都是釋迦藥師彌勒等葦舫記出訪問團日記
