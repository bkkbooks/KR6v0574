body:
  text: 致緬僧阿底沙溫沙書中華民國全國佛學會理事長太虛謹致書緬甸國阿底沙溫沙大德敬啟者太虛前歲訪問貴國與諸上座晤談甚歡別來年餘思念殊深屢接法舫代表函告知大德熱心中緬佛教文化之溝通又樂教吾所派遣之留學僧此誠現代中緬兩國僧伽所應努力之工作按中國佛教多傳梵文而緬佛教則純傳巴利吾中緬兩國僧伽依據佛陀戒律和合親善合巴梵傳佛教而成一世界佛教為實現此種計劃吾前曾分派弟子赴暹羅錫蘭留學今特派吾弟子達居天運二比丘前來貴寺依上座下學習緬甸佛教希如法如律教授教誡至於入寺手續特命法舫法師代為辦理肅此即頌法樂太虛謹啟卅六十五見海刊二十二卷九期
