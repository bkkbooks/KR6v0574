body:
  text: 與黃雪峰居士書吾今據以評判古人者原不外觀察古人平生所遺言義行事之萃全以斷其為何如之輩耳來教既以儒道屬人天乘為是又云孔子以儒立教以人道訓世則彌見以孔子當屬之人乘耳乃復曰孔子超乎儒教非楊墨耶回可同日而語推其極致孔佛一也云云又何所據而云然耶若憑虛而為斯說則若楊若墨若耶若回又孰不可作斯說耶若刺取一二語如所謂先天而天弗違等句以為據耶則若楊若墨若耶若回之書中又孰不能刺取一二語以為比附如所謂融通各教皈命基督之談道書等類以為楊佛一致乃至回佛一致耶若孔子先天而天弗違等語若遇寒則衣遇飢則食此後天而奉天時也若未寒而先貯之棉則寒不能困未飢而預積之糧則飢不能苦此先天而天弗違也無論其本為人事之常無關出世之法即使義符出世之法亦所謂如蟲食木偶然成字而已蓋孔子既未嘗於出世佛法有說到行到彰明皎著之徵驗而顯然為天下後世所咸見者唯在乎人倫之道則亦安能憑自心愛憎之情謂其獨超儒教而與佛一致耶要知佛法間亦與諸世教論同者一者依平等真如觀之雖塵芥蟲蟻亦與十方三世一切諸佛平等尚何世教諸聖之不同等乎然世教諸聖與佛同等亦即與蟻芥同等不足翹異之以為尊榮也二者依差別法化中之一階以言同等若對於人世群俗而言則佛教與各教同有馴致人群以為善之功是也若以其智證之分滿行果之深淺教理之偏圓德用之粗妙雖等覺地之大士猶不能望佛況纔以人倫之至謂之聖人之孔子哉見海刊一卷二期
