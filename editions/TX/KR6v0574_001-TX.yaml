body:
  text: 覆陜西佛教會延請法師函定慧大和尚戒忍大居士道鑒去歲臘底於漢口得讀由杭州轉來貴會邀太虛赴陜講演之函以此間事緣一時難了既苦不能應命又深感公等宏法衛教之熱忱頗思薦人代行遂遲遲未報嗣得抄來一幻師之信暨兌票百元囑為代請一幻師按一幻師初本於太虛杭州兜率寺居住乃去函問時適已雲水他處月來探訊卒未知蹤兼慮其聾病正擬另行轉請間又接催致漢口佛教會之書而李桐仙居士亦來相訪談急望赴陜講演之意遂即就商於漢口華嚴大學諸教授得荷妙闊法師慨然允許不禁竊為陜中之佛教前途幸也蓋妙師蘊藉多學熱心傳教貴會除每星期一二次於馮督所設洗心所講演之外並可請妙法師就貴會為一班專心研究佛學者講起信論楞嚴經等數月則將來自不乏講演之人而太虛得有機緣亦當從公等以遊也來款除為代請經書並餞行等外餘八十元付妙法師充車費專此祇訊道安太虛謹啟三月二十日見海刊三卷四期
