body:
  text: 與王覺先生書醒窟先生哲鑒前承以大著原易攜示連日無暇乘隙稍一披覽乃精義絡繹奔湊真有亭毒千古欲累一世之勝概而尋出數元為易之本既能吻合西洋最新之科哲思想中平為易之歸尤可貫通華夏傳統之聖賢宗旨誠能使國中學者皆知其理則中國思想信仰之重心不難由此而確立其中有數處少有商確條舉於左一各得其中而性命正共得其平而言行和故大中大平易以中正平和意義較足二易為世間之正法而佛法則為由世間而出世間由出世間而世間之正法若根本智後得智皆佛法之出世間智真如亦為根本智相應之理正等正覺為佛果究竟之覺宗下教下則為宋明來禪宗之流布語附以尊德性導學問之旁通無關佛說現比量雖通世間出世間法然雜染清靜逈然有別而配合四智為言尤屬非是故凡關於佛學名詞以盡量刪去不用為妥必欲通之則非深究佛教各根本經論五年十年殊未易言也拙著周易蠡測無何勝義唯周易三世法出世法分別一條或可為論及佛法時之一參考幸存覽焉三直覺一名雖大著卓有新解然此類譯名根於西文原義若羅素之駁柏格森亦大抵根據此名原義以為駁故不如別刱新名用之且常人直覺為似現量之非量尚非現量況根本智等乎此亦應辨之者也專此并頌道祺太虛謹啟二十十三一見海刊十三卷一期
