  text: 致何北衡等居士書二通一北衡院護昌猷曉西院董公鑒比悉法尊法師等在院教學頗為精進漸有成效可期但聞院費陷于困難務祈鼎力設法維持以安院眾為禱順頌公綏太虛啟二四四十八自上海發二北衡院護大鑒聞偕貴州吳主席等來溫泉能蒞縉雲一遊乎虛牙痛將癒承問為謝并頌近綏太虛謹啟二九十一二五漢院存稿
