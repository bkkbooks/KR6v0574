body:
  text: 答淨悟清信女問十則答一前復志禪君書所云者以出家非修學佛法之究竟乃修學佛法之一殊勝方便若能不假此一方便便能見到行到則一面既即俗而真無世俗之可捨一面又因處俗尤能廣攝群流若維摩詰龐蘊之所行故曰最好答二怎樣可使父母或其他長者許子女卑幼出家可尋之佛與佛世諸弟子出家因緣及古來諸高僧高尼之出家事故必能有所取法答三私遁剃度可再歸省答四可於上海有正書局購周安士所著慾海回狂一書心會身踐之亦即可以之感化愛慾者使解脫愛慾答五不得父母許可與棄夫及棄子女等出家在律文本所不許然觀之古之抱剛果之志有堅深之誓者亦不以是而為障礙則在自決耳答六自見出家真實之好以之勸夫勸妻或勸他人固無不可然亦不可輕易教人出家或反致於法於人兩皆有損無益答七善法安放衣食亦自在其中而能亦用佛法開化使亦能安心於是而各修其行為最善答八吾甚昧尼界情形茅菴亦偶聞人說實未細悉答九一面端身正意祇一味將經熟誦一面可閱易解之經漸求了解請靜安寺路三十九號佛學叢書研覽之甚善答十海潮音總望有人來幫助之吾之願亦猶君之願願其相續無盡責吾一人恐終難續傳記調查小說三項甚好有材料儘可登載也見海刊一卷五期
