body:
  text: 答純保問三則答一前眼耳鼻舌身之五識以第六意識為分別依前眼耳鼻舌身意之六識以第七末那識為染淨依而第六意識僅從五緣生者以較眼識之九緣除去明空分別根之四緣故除去明空可知除去分別依者因正是第六識之自身故除去根者因第六識以末那為根根即染淨依故答二散位獨頭意識者即除去夢位之獨頭意識及定位之獨頭意識所餘之獨頭意識皆是也答三且先從覺書海潮音諸講明唯識者類聚研究之再進求成唯識論可也見海刊三卷五期
