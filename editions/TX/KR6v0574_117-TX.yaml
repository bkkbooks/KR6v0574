body:
  text: 致甯達蘊居士書二通一達蘊居士鑒十月十八日之來信今已在此間之中國學院收到吾已由法英比而至於德再二三月可回國矣讀來書藉悉國中及佛學會之現況九月一日中國佛學會常會所議之另組中國佛教會甚贊同然鄙意可即以中國佛學會為中國佛教會籌備處即改組為中國佛教會請商一亭鑄陳懺華康侯禪定智圓惠宗玉皇諸公仍積極進行蓋今於政局統一之下佛教不可不謀一全國之組織以為適應之興革也見海刊九卷十一期二達蘊居士鑒今已由歐抵美一星期矣寓居紐約明日赴華盛頓參觀四日新總統就任五日赴耶路大學六日赴哈脫福特大學七日赴哈佛大學講演仍回紐約於十日在學生公寓講演十一日在哥倫比亞大學講演十二日赴芝加哥約十五日在其大學講演即轉舊金山落上等處講演畢乘船回國預計四月廿外可抵上海國中同人欲知虛消息者請遍為通知世界佛學苑已於巴黎認捐地基但各國贊成設於巴黎否則建設費之籌措皆尚有問題國中對此贊助如何尤要專此須訊佛學諸公均安太虛啟三月一日見海刊十卷三期
