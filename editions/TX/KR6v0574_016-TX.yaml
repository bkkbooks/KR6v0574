  text: 覆巴黎佛學會書德貞女士慧鑒欣奉巴黎佛學會報告書一件並惠詢在巴黎出版之拙著佛學一書所譯法文晦澀錯謬可否由洪先生譯成英文再轉譯法文但書店已出版此書余尚未知彼當時有此書勿再譯他國文之約惟請囑此出版之書寄數份來當另翻譯以副雅望耳專復並祝佛學會興盛太虛見海刊十三卷九期
