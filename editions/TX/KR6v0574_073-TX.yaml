body:
  text: 復蔡育之先生書育之先生鑒來書稱頌逾恆愧不能副此為歉佛門各宗派通俗易修允推淨土而隨人根性不同則亦不拘此例修禪之論散見於各種經論集成之者則有天台小止觀禪波羅密次第法門大乘止觀摩訶止觀各書足堪取資可向各佛經流通處請之門徑諸書若覺社叢書海潮音大乘教義佛學大小辭典等均可其流通處大概皆見於各期海潮音之介紹而首楞嚴經與大乘起信論不可不讀也此復即訊道安太虛敬復見海刊一卷十期
