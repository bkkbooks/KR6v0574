body:
  text: 答劉密機問問無我二字或曰是無主宰或曰是無想其義何是答無我自佛經言有人無我法無我無主宰是人無我有情眾生無固定之主宰者情固定之主體對非主體有宰割之用乃名曰我無我則無主宰如宇宙中有主宰之神而此神乃宇宙之我人有皮膚肌肉血液知覺等其主宰即神我也有情眾生無一定主宰故眾生無我廣義言之眾生均無自性一切眾生由因緣和合而有一切諸法亦然無離一切而單獨之性是以一切諸法一切眾生均無自性然無我非無想想係心之想心所無想乃暫時心之想作用不現起並非真明本空無我以無主宰無自性明無我不是全無自另一面言之即一切法均從因緣所起程心勉記見海刊二十二卷六七期合刊
