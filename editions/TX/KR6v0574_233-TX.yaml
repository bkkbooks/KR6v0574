body:
  text: 答姚際虞問二則問一臨終時如何使一念不亂生西答一一平時念佛專一或能入定二信心堅固願力真切問二每日念佛數時總覺散亂不定如何能不散亂臨終決定往西答二一每日念佛以有恆為要多看淨土經典更能七日為期專心致念久之定能達到一心不亂二多做利人事業維護三寶皆回向往生程心勉記見海刊二十六卷六七期合刊
