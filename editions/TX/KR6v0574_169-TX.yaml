  text: 電賀草堂寺宗鏡和尚成都草堂寺自立佛化初中學校宗鏡校長慧鑒接誦大函藉悉近感僧材缺乏創辦佛化初中學校于九月念一開學等由仰見仁者高瞻遠囑於抗戰期中不殫艱勞拼此熱心毅力預為儲材辨器將來龍象輩出荷擔如來家業正可拭目以待也特電奉覆用伸賀悃世界佛學苑漢藏教理院院長太虛哿印見三十年十月二日佛化新聞
