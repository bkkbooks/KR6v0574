body:
  text: 答張世俊問五則一善導和尚依此土往生之人言故曰皆指凡夫往生余指往生後所登階位故曰極喜地等兩不相違二令執科學者生信須有證神通者公開試演余亦嘗論及但一未知確有神通者二中國易滋鬼神迷信故不宜有其人往西洋公演之最善三令人在可能範圍內儘量免除殺業一語得之矣四本論餘論未著已併入現實主義中矣五大勇師已辭世其入藏求學者情形可見於近期海潮音見海刊十一卷一期
