body:
  text: 復戴季陶院長書季公賜鑒昨承蒞教後晚間又荷惠書感佩奚似奉僧居士昨已赴普陀然十日外當再至杭當以尊意轉達之也宋藏會一函昨遺案頭今再附上虛意除法會請購十藏分贈康藏青蒙各寺外再祈商請林主席褚祕書長鼎力提倡由政府購請數十藏分贈全國各大學各大圖書館以及各國最大文化機關各一藏既以流通佛典亦以宣揚中國文化並使宋藏會藉以圓滿其功德惟垂注及之又阿育王寺為釋尊舍利道場古歷四月二十四日啟講藥師經如得駕臨護持則益令四眾歡騰矣專復順頌晨祉太虛謹啟四月四日見正信四卷二期
