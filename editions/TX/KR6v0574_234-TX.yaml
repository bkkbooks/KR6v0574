body:
  text: 答曾若蘭問三則問一本人對善人存好感對惡人不能有好感僅容忍而已但內心極苦痛如何能無此種分別心答一人生本有喜怒愛惡惟對於善惡分別清楚善其善者惡其惡者是世間做人之道德即是非之心也若自出世法言之則此仍不能離人我憎愛之分別金剛經無人我相照空一切是先要有定慧功夫無我相無法相始無憎愛之分善惡乃自我而生對人而言若能看空人我相則無可憎愛自無善惡人之分別矣蓋眾生均以五欲上立人我假想之分別若能時時自覺則無此分別善惡者亦由世法觀待人我而言者也自出世法言之則無此分別人我善惡已失去差別此乃自高一層觀之夫人我相既空則憎愛已無苟有憎愛之分而自覺其非則有自覺性不憂憎愛心之生起但求能常常覺悟使憎愛心不繼續現行分別心即可漸減問二讀金剛經後仍不能去善惡之分別如何能去之答二讀經後要久久觀行亦可自問此念自何而起順理而觀其念自化不僅不起也故能自明其從緣而起體性均空念自可化而無定性離相隨緣之語亦可以明白其理金剛經云法者是善法非法乃惡法無我相無人相等六句是明一切法空緣起無性者也程心勉記見海刊二十六卷六七期合刊問三若有二人均發大乘心且能實行但一人欲以禮處世固知禮性是空無禮不能維持社會一人則以為不必執著禮且認前者有拘執心二者孰是答三所問之禮是對人之禮可視其所對之人而定而人之根機各不同其人若當機者各可得益自普遍言則前者為真俗圓融而後者若根機相當亦得其利益禪宗語錄有故事一則晚唐某皇帝有二國師一為南陽忠國師一為國一國師某日二師共坐宮中適帝入南陽忠國師起迎帝國一國師默然不迎帝見二人舉動不同乃問國一曰朕為一國之主何以國師坐而不動國一國師應曰虛空還見陛下來而起迎乎帝又問忠國師何以起迎對曰陛下何得自四威儀中見老僧此即明二人均悟空而一用禮一不用然用是即相離相也國一國師直示真諦忠國師則真俗圓用程心勉記見海刊二十六卷八九期合刊
