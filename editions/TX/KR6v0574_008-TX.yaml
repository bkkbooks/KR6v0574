body:
  text: 覆梅埔六屬佛學院籌備處書逕復者奉到大扎誦悉種切諸仁組織佛學院闡發真如恢宏正化敝會無任歡忭自應贊助一切期獲效果至謂前函簡章各件均未奉到遙想諸仁悲深願宏所擬簡章諒無不合當即轉咨國民政府速予轉飭縣屬出示保護并函請鐵禪法師就近保護外理合函知庶不致誤尚希切實進行期收極果佛法幸甚但簡章等項必須呈請國民政府核准立案方為有效此復梅埔六屬佛學院籌備處會長釋太虛見海刊七卷三期
