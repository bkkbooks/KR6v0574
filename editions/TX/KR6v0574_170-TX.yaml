  text: 電賀蔣主席國民政府主席蔣鈞鑒頃披官報敬讅十一中全會公選鈞座為國民政府主席兼海陸空軍大元帥眾望所歸曷勝欽忭揆文奮武負抗建之重任邁古鑠今致國族於復興同盟居四強之列世界奠和平之基偉烈豐功永垂萬代景瞻吉座謳頌無量特電申賀恭叩崇綏中國佛學會理事長太虛叩刪見三十二年十一月四日佛化新聞
