body:
  text: 與蔣特生居士書六通一特生開士大鑒久傾道聞輒深景慕茲者朝蛾返蓉又羈講務得惠片藉悉現升任參謀長諒公務加繁而深以未能一晤敘為悵專此順頌時祉太虛謹上二特生開士慧鑒虛此次來川除應佛會之請及朝蛾之外猶有兩事擬與開士一籌進行一住持佛教之中國寺僧覺須有一番整頓現擬有建立現在中國佛教住持大綱雖事關全國而效在數十年後但第一期儘可由一省施設起劉自乾軍長來訪曾與談及頗為首肯而切實進行須開士與田軍長商妥而鼎力提倡之二世界佛學苑今已擇定北平北海公園內寺為院址明春修理約十萬元業由朱子橋擔任籌集惟開辦及第一期基金亦非再集二十萬元不敷前者在鄂辦研究部曾荷募款捐助而此時所需殷巨必須有力者多方資助始可集事請邀田軍長等共同加入為發起人慷捐巨款以為諸樂施者倡專此統希惠復并頌時祺太虛敬白三特生開士鑒展奉惠霓誠為所云見猶不見者多不見而見如開士甚希有也瀛泉曾以田軍長意來數次前函所言曾告之聞軍長貴恙稍瘥向未晤云專復順頌時祉太虛謹啟四特生開士鑒開讀七日惠書自見純正而所以宣正法以啟人正知者又殷懇如此誠吾所謂十善菩薩行者也近在文殊院曾講瑜伽戒而昔刊行慈宗三要茲奉一冊吾之建教攝群以七眾戒為體而瑜伽戒為用其自行則真實義為體觀上生經為用觀也承詢法要輒舉以告祈慧察太虛白准廿八日離成都赴渝於廿五日傳瑜伽戒五特生開士轉來田軍長函敬悉離省前曾晤田公所談亦同謹為川僧致謝并訊興居太虛啟曾寄慈宗三要送登否六特生開士鑒成都轉來東電精誠溢於言表攝茲淨意名以智行智為先導修萬行故理事同法界宗觀在慧心函詢行程冬月初旬在鄂漢口佛教正信會下旬擬抵廈門南普陀寺專復并訊慧福積進太虛啟並見海刊十二卷一期
