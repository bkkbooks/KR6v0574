body:
  text: 答尚法圓問三則問一名言種子是名言所熏成但名言屬假法何以能熏成種子問二十義量謂法謂軌持軌謂軌範可生物解持謂任持不捨自相風林等聲非能詮表咒術等名詮非顯了違法相義不令他悟不具二義故不名法聲既非法何以百法明門論列之色法咒術有不可思議神力自不得列之無實用之法中既非非法又不名法當屬何等問三十義量謂不應執無色等法名為唯識違現量故違世間故此無色等法應何所指且無色等法此名為法又非唯識豈非識外有法違唯識義答一顯境名言即虛妄分別諸心心所分別所分別所熏成之諸法種子即是名言所熏成之名言種子答二此說法義相對之能詮表法非一切法之法故聲及咒術不妨為一切法中之法答三不應執無色等法名為唯識者謂不應執沒有色等法以為唯識以現量證色等故世間皆知有色等故見海刊十四卷十期
