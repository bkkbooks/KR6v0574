body:
  text: 答妙慧女士問九則問一修行出家與在家有何分別出家勝於在家否女弟子前年依姑蘇淨空尼皈依三寶淨師屢勸予出家謂汝既有志修行以出家為最方便惟女弟子俗緣羈束終難擺脫故尚未現尼相問二有何方法可擺脫一切俗緣問三年青出家勝於年老出家是否女弟子今年二十三歲淨師謂予出家當乘年青予十七剃度汝今不披剃更待何時問四出家何以必先落髮易服出家修行不過求其比在家靜心能定何必將頭髮剃光易服改裝問五衣袈裟有何意義問六出家何以必受戒持戒固是何必在頭上燒疤問七尼姑與僧同侶稱呼相同應改否問八普度眾生原不過度眾生信佛並非度眾生出家但苟度一人出家較度一人信佛孰佳問九今尼菴多而尼僧寥寥大可合併當用何種方法答一此亦須看對於修行兩個字作何解法專修持戒習禪或與持戒習禪相策應等行則自是以出家為較勝若讀誦禮拜等皆然至修布施慈濟等行亦許在家為便大士十度齊修萬行平施蓋無何優劣可言但佛時先例不出家具足苾芻尼戒祇有獲證預流果一來果絕無能得阿羅漢果者若以了生死出輪迴為志修學戒定慧三無漏行以求現生得證四沙門果則姑蘇淨空苾芻尼之言信矣因出家者已將從生以來由家族所賦予之人格完全拋卻若女媳妻母等另依佛法取得一種新人格此種新人格即是專修學三無漏行以了生死出輪迴之苾芻尼也第能成就此苾芻尼行亦須有苾芻尼之僧眾方可而在今日之苾芻尼僧眾實難得師友則戒難淨定難生故定難生故慧難發也然則雖出家亦祇能仗阿彌陀佛願力持名求往生極樂以為超出生死輪迴之捷徑耳持名求往生極樂則唯在自心信得篤實願得懇切念得貫徹而已在家出家無大關係若無何挂礙牽累遇有緣善知識逕投出家亦可較能護持信心不退答二在佛法亦大有峭然斬絕不近人情之處如一口氣不來時如何擺脫即今也便可如何擺脫人命在於呼吸入息不保出息即今便算死去有何不可擺脫然佛法隨順世間施設也不過違俗情人事則先存一擺脫之志於家人持但了舊緣不造新業宗旨定心耐性做去必亦有了畢一日看自己願望與毅力何如耳若由大智慧大解脫人觀之則那來俗緣無非真覺尚何擺脫不擺脫哉答三從較能不犯戒言之亦有謂宜待年老出家者然出家不是苟安偷活以度餘生之無恥勾當乃奮大勇猛發大精進以超三界越四流而趣證無生者自須年青乃可蓋衰老雖可能不犯戒但於持戒修禪等等亦無精力能行也答四此從消極言之毀卻換卻庸俗所貪著之形容飾好以絕愛欲若從積極言之依佛儀制仿同佛之形儀使自己觀之生策勵心使同侶觀之生和順心使世人觀之生淨敬心且亦身心夾護俾不容易成就犯戒緣也其餘若潔淨簡便等義亦附之答五梵語袈裟此云壞色即破壞色質之衣服依佛儀制與前落髮易服同義答六燒疤是受戒時獻身供佛滅障消罪之意與受戒持戒原來非一事今合為一事亦可作為提醒自己罪已減戒已受僧已成不應更沾俗染之心念之用然據吾一人之意則燒疤與否當隨人各自發願不須定燒答七若正其名比丘比丘尼沙彌沙彌尼四種同名為僧今世俗則以比丘為僧呼為和尚比丘尼為尼呼為尼姑而和尚是親教師義即師之謂在比丘比丘尼其徒對師但應稱師或稱本師或稱和尚在師無別故無別稱對於比丘等中大善知識則呼大師法師禪師等等平常年耆出家早者或稱長老或稱上座相等或呼同參或呼仁者徒輩則呼名字而大德一名上下通可以相稱然則於父母兄弟姐妹等皆可廢除不稱若從依此本師之力得生一比丘或比丘尼之新人格以言所謂從佛口生從法化生則皆稱以父亦可此其為父本不在其人之為男為女也答八信佛與出家有廣狹淺深之殊信佛者廣而淺出家者狹而深勸一人信佛即算成效剃一人出家雖亦成效但其成效須更看出家後之行果如何以為定至普度眾生之義非僅度之信佛亦非僅度之出家乃度之了脫生死超出輪回及度之成佛也答九尼菴自以能合成尼眾叢林為宜然沿習已深未能易行然方法固不難也見海刊一卷四期
