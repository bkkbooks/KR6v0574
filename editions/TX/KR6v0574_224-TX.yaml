body:
  text: 答熊道琨張世俊問問琨等閱禪家話頭覺有所疑如謂煩惱即菩提悟同未悟修同未修則釋迦大可不必多事眾生亦不必修行如煩惱非菩提則墮分別相與佛說不合如云即字係煩惱性與菩提性相同之謂則其不同者安在如說即是理邊不同是事邊而事理不二應無分別答宗明法性蓋煩惱菩提悟修等法皆無自性之平等性迷悟非異生佛一如釋迦眾生不可得何論多不多事修不修行此其冥事存理與明事相及明事理無礙言各有宗也見正信七卷五六期合刊
