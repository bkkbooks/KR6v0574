body:
  text: 答慈航問九則問一一眾生二業三識阿賴耶此三者何者在先佛法云識因業而有眾生先有其理不成若業先有業是誰造佛法則謂業因眾生造是業先有理亦不成若謂識先有識從何來是識先有理亦不成同時而有理亦不通答一眾生業識非三法何云先後眾生一名即五蘊聚色受想行識業即行蘊識即識蘊離此五蘊之外眾生之名不可得故知佛所說宇宙萬有一切諸法既不主張一因亦不主張一原非耶教所云上帝亦非科學家所云電子以太乃眾緣和合假名眾生業識耳偈云無始時來界一切法等依由此有諸趣及涅槃證得吾人研究佛學能達此無始之意義則一切疑團皆瓦解冰消矣問二一切諸佛是否因學佛法而成若不因學佛法而成豈非天生彌勒自然釋迦亦與事實相違蓋諸佛皆從聞思修而成是以吾人亦須學佛法若是學佛法而成則最初一佛是聞何人說法而後思惟修行證果耶若云最初佛不必聞法而自悟則以後一切眾生亦不必聞法而可自悟也答二一切眾生有先覺者有後覺者先覺者如發明家也後覺者如模仿者也世有一類眾生困苦之極欲思出苦思之既久知苦從何來則設脫苦之方若自己了悟不管他人事者則名獨覺若將自己了悟之法普勸一切眾生同依此法而出苦故名菩薩故云諸佛以苦為師當知一切眾生有因聞法而修行者亦有因苦而修行者苦即法也苦亦萬法中之一法不過有因聞法而自己修行證果者亦有因苦而自求出苦同時亦教他人出苦修行證果者此所謂先覺後覺之區別也問三吾人學佛本為成佛應度眾生不計時劫此為定論曩年在仰曾與法尊法師談論成佛度生吾人本願無如羅漢有出胎之迷菩薩有隔陰之昏願大力薄況三途一報五千劫再出頭來等幾時我曾向他說最低限度先證初果庶免墮三途也所以不願證四果者蓋全斷貪瞋癡已即不能再來受生度生所以只要不墮三途可以永遠發菩薩心行菩薩行此弟子之見也答三墮與不墮全仗慧願二力所謂慧者即觀察生空法空之空慧也所謂願者即吾人常常發堅固願諸佛菩薩乘大願而度生要知學佛全仗悲願智有大智而無大悲不肯度生有大悲而無大智亦不能度生故悲智即成佛之大本也問四因明作法加簡別語若如是者則一切宗皆可立決無正理可言也譬如耶教徒立宗云宗萬物是上帝所造因自許有萬能故喻如有神通之聖者又破佛教立宗云宗汝執佛性是無因不可見故喻如龜毛兔角果如此則一切法皆可立一切人皆可破則何能立正量別邪正耶答四因明簡別語係加於前後陳恐宗依不極成故以簡別語冠之因之一法要立敵雙方共計方能成立問五佛法中常云無始無始二字我看不能作時間長遠而言若作長遠言以不知為無始則是有始之無始不過吾人不知耳在我意會譬如昨夜眠夢見一老婦幼童我問其何人答曰母子今試問旁人言母親在先兒子在先答曰母親在先余斥之曰咄夢也母子尚不可得何先後之有宇宙萬有皆是夢幻故云無始是否答五此約真諦言一切諸法當體即空由緣生故故名如幻若約俗諦言世界之成住壞空四相平等不可以成為始眾生之生老病死心念之生住異滅均不可以生為始乃四相循環流轉不可以生為始以死為終若無死亦無生若定云生在先亦可云死在先乃至云老在先病在先亦無不可蓋無住壞空何有成耶無住異滅何有生耶可見講到無始是環形四相遷流非直線以何為始故名無始問六成唯識論中說種子有謂本有有謂新熏護法菩薩調和二家謂本有新熏皆有各據聖言量證明之吾意謂不然說到種子是緣生法既是緣生不可云本有皆是熏習所成不過久熏新熏不同而已不如是則種子非從緣生是本來固有落常見善種子本來固有惡種子亦本來固有進之則無記種子亦本來固有試問此固有之種子是上帝創造的嗎是無因而有的嗎是自然的嗎善惡種子既不從熏習而生落常見是外道法非佛法故吾不取本有說種子決定是熏習所成不過久熏與新熏在時間上遠近而已答六本有二字的意義是無始之別名換句話說有無始以來久熏習的亦有現在一剎那間所熏習的約過去所熏的曰本有約現在所熏習的曰新熏其實既云種子皆緣生法是熏習義非自然有亦非無因故非外道以上見廿五五廿日及二十五日佛教日報問七前五識既依五根而起云何意識不依肉團心為根而以第七末那識為根此理不明蓋損眼根不能生眼識損耳根不能生耳識則將腹內之肉團心取去不能生意識可見以肉團心為意根其理必明肉團心與前五根皆色根而生六識義類正齊答七根之一義以生長為義凡有生長之功用皆名為根譬如信精進念定慧五善根亦可名根生一切善法故若以取去肉團心而不生意識為證則割去頭腦亦不生意識亦可證明頭腦為意識之根豈有此理問八七識以八識為根八識以七識為根云何七八二識互為識根答八此約互依為義蓋七識離八識無依執為我故八識亦以七識為依被他所執故若七八二識相離則七八識不起作用故不名識而轉名智矣問九阿賴耶識以能藏種子為能藏以被末那識所執為執藏何故不以種子藏阿賴耶識為所藏答九以現行法在上蓋覆種子處下故以阿賴耶為所藏以現行法為能藏此以蓋覆為所藏名見佛教日報二五六八
