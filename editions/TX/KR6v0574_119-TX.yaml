body:
  text: 致錢誠善居士書二通一誠善居士鑒范洪致竺庵師函乃陰傳先天教同善社等邪說者八期誤登應聲明去除之見海刊十卷十期二誠善居士余此次往返湘鄂皖贛江浙閩之間觀察現在佛教教育情形其較有精神團結力者其唯武昌佛學院安徽佛學院九華佛學院與閩南佛學院耳然因地勢遠隔彼此不相和通聲氣聯結一致故使外間謠諑繁興如余經江蘇則盛謠閩院發生學潮全體解散來閩南則從上海得來傳聞謂武昌佛學院關門諸如此類按之事實真所謂無根之談但推究其原皆因彼此各自為其門庭不常通消息以致反動份子從中搗亂雖然於事實上無何損失而一部分熱心于佛教教育者不知道擔憂多少而間接上亦不無受些影響也為杜絕此謠諑起見余擬定一辦法即在各半個月須將每院院況作彼此簡略相互之報告同時將此報告投登海潮音及佛教各雜誌如此則誤傳者自不能發生搗亂份子亦無從使其技倆矣耑此即頌教安太虛一八一二一三見海刊十一卷一期
