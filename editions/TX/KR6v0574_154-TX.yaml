body:
  text: 覆吳文官長書達詮文官長轉陳主席鈞鑒頃蒙令文官長賜函垂詢深感關懷同舟勤求民隱之盛德太虛忝兼舊誼尤不能不藉之以酬互通情素之旨也太虛領導中國佛教會辦海潮音月刊躬率佛教訪問團於國內國際呼起同情闡揚抗建并有多處僧徒組救護隊等救治災傷振濟難胞雖不足言有何大勳至少於一般國民之盡力於國家民族者不相差也今值勝利和平歡騰大地而僧眾之被欺壓寺產之受侵占仍未消滅近以中國佛教會整理委員會名義曾呈由內政部社會部轉請行政院軍事委員會會同布告全國僧寺重申保護此為安定全國寺僧俾能繼續服務國家社會之公益者一也太虛又嘗聯合耶回各教徒成立宗教徒聯誼會對宗教調協國際宣傳頗有貢獻為令職業宗教師如佛教僧侶回教阿衡基督教牧師天主教神甫等各得其盡力國事之途徑曾由宗教徒聯誼會呈中央黨部請求以職業團體選國民大會代表之例全國各性宗教團體亦得選僧等代表各若干名已荷中央吳祕書長交審察會議尚祈賜予裁定俾宗教徒在國民平等立場亦同享參政之權利者二也本會南京中山路萬壽寺會所二十六年冬被敵機炸毀寺中殘屋迄今為通信隊等所分佔失去本會還京之會址又本會上海市分會會所在虹口亦於全面抗戰初起時被敵軍燒燬兩處圖書器物等損滅無遺茲已呈南京上海兩市政府就沒收之敵產上海有日僧本願寺等撥一份以資恢復會所而武昌手創之佛學院陷敵時殘存餘屋為敵駐獸醫隊今國軍接收仍佔居之雖已呈請發還尚延未實施此為發揚佛教學術文化以啟迪社會人心計祈飭令武昌南京上海軍政當局迅即發還及指撥者三也太虛所住持奉化之雪竇山寺與所屬妙高台等亦受敵機及游匪殘毀甚多前者毛穎甫先生曾談及將來須藉提倡重修而在上海東有恆路之雪竇分院亦於八一三時被敵燒毀亦祈飭上海市政府撥封閉之日僧寺屋一所恢復滬上分院此有關修復珂鄉風景名勝古蹟者四也夙疾猶艱行履未能躬謁文官長乃懇轉陳冀垂察賜示為禱此頌尊綏中國佛學會理事長太虛元月十三日見海刊二十七卷二期
