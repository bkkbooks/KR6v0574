body:
  text: 致王一亭居士書一亭先生並轉中國佛教會公鑒閱近日申報載一部分佛教徒將東渡參加汎太平洋佛青會二十六日竟標題為全係太虛之徒與日人勾結而成怪誕離奇殊堪詫異此似乎不僅日人片面宣導藉為空氣作用而兼係有人對太虛故為構陷之所致明眼人當不為所瞞也查自去冬知該會有所謂滿洲國列入早經嚴詞拒絕而談玄虞德元等雖接該會邀請亦聞皆復函嚴拒而竟有太虛首先表示態度可領數十人赴會之謠抑何與事實相反之甚除另登報聲明外並請公等據此實情對於各報所載誣詞概加否認為荷專此並頌公綏太虛謹啟二三年五月二八日見正信四卷四期
