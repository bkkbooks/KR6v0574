  text: 電賀緬僧高壽阿戾都耶法師慧鑒余去歲領導中國佛教訪問團訪問貴國佛教名德得晤法師討論中緬佛法兩無歧異兩國佛教民族應友愛親善甚佩尊見今得訊知法師八八誕辰謹代表中國佛教徒以無限之願望謹祝座下努力世界佛教運動促進中緬親善福智雙修長壽無量特此電賀重慶中國佛學會理事長太虛二十九年十一月二十四日見海刊二十二卷三期
