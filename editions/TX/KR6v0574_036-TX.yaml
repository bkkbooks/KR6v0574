body:
  text: 致常惺法師書常惺法師慧鑒法師與滿翠二子書言將赴藏并述其動機證之法師素來傾心實證之談話知出真誠且虛近講救僧運動首重真修實證以成果尤見萬里同心不謀而合此間人莫不奮然欲遮法師旋廈而虛以極須有如法師之出乎真誠解行力充者趣修成果為佛法證明作人天眼目故閩南佛化雖將因法師之去而一落千丈以虛亦恝然不顧反勸人贊成法師之謝事為宜也然龍樹無著之登地尚矣否則以菩薩心取四沙門果亦沙門之本分生空神通亦足為諸趣流轉涅槃證得之驗此於造詣之路若大論之聲聞地較然可程竊願法師從事焉若融攝魔梵漸喪佛真之汎神秘密乘殊非建立三寶之根本經書十倍華土聖證多有其人藏僧誇言未堪保信且試探藏密僧俗已有多人法師自可遊心三十七菩提分法以之奮追千古宏範三界何用門頭戶底去依傍之也因有相知之雅敢盡進言之誼非太虛不能言此非法師不足言此若息緣之處則泉州雪峰亦上選也願法師決之此訊禪悅并訊竹村元白諸君均好觀音成道日太虛敬白見海刊八卷十二期
