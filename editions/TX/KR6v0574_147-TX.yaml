body:
  text: 復羅閣英居士書來函實為佛教有心人又如此其至誠懇切殊使余不能不扶病而握管略酬近年衰病極少握管時余之新乃佛教中心以采擇古今東西學術文化包哲學科學及宗教政治經濟文藝等而適應現代機宜之新故奔放於任何一部分而離去佛教中心皆為有分離余之傾向又余之新乃漢族即中國佛教本位以採擇佛法之古源錫蘭西藏等今流日本西洋等而適應現代中國需要之新故奔放於任何一部分而離去中國佛教本位皆可有分離余之傾向昔專趨於西藏佛教學者嘗一度發生硬欲牽扯余向西藏跑而不得對余有叛逆之萌動旋亦無形消弭今後或亦有硬要牽余領導專向日本跑或專向錫蘭跑而不得遂發生叛逆的可能所謂天聲當係由偏向文藝及日本佛教的三五人雜湊所成於余亦頗含叛離的萌動當然破壞有餘而建設不足蓋凡建設非一蹴能幾必由繼承而非叛逆如叛離則叛離後又來叛離決無所成頃余所患在衰病在無繼承然藉此略表明余佛教中心及中國佛教本位之新的佛教意義思想品行健全的青年佛徒應知自擇太虛二六七二在大林見正信十卷三期
