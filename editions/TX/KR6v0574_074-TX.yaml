body:
  text: 復黃謙六居士書謙六居士元覽來信垂詢具徵精進所言雖非無見但參究心是何物在發明心之一名所明是何耳心若本無何名為心心豈竟同蛇毛兔角但名無實耶此應參究若隨緣生誰隨於緣緣復是何更應參究此不先明誰盡虛空界耶亦應參究心本無處盡虛空界何為有處知有處不知尤應參知祇管如此參究去勿問行住坐臥動靜閑忙都沒用怎麼眉間鼻端丹田氣海也沒有怎麼魔佛及善知識也沒須怎麼抑勒放任復何處安著病與疑懼不可作道理解會要須見個實在如視黑白如覺冷熱到那時自會不用口舌不用紙墨通個消息來也看經看論也但須如此參究將去楞嚴前三卷應可參究註解盡沒用但不是參究楞嚴仍祇是參究心在何處心是何物而已此祝心安見海刊二卷二期
