body:
  text: 答姚陶馥問十一則問一宗門稱教外別傳不立文字達磨祖師指楞伽四卷可以印心是何意旨答一教外別傳不立文字即此亦是不立文字之文字宋譯楞伽謂宗通說通唐譯楞伽謂自覺聖智及隨機說法此自其宗通之自覺聖智邊言之即是不立文字之意旨若自其說通之隨機說法邊言之即有不立文字之文字由此不立文字之文字方可印證不立文字之意旨故以楞伽四卷印心問二宗門見性要祖師印證否答二從佛得無師智自然智一切智成等正覺言之自不待印證而佛後以心傳心以證印證諸祖相承乃有印證事起如六祖壇經中永嘉向玄策自謂於維摩經悟佛心宗未有證明者玄策云威音王已前即得威音王已後無師自悟盡是天然外道威音王後即是佛後此義可明問三宗門見性有境界可見否答三宗門見性無分別智心境如如相應絕能所對待之相無是非差別之量則無可對之境然此如如相應之無分別智境亦即境界正如楞伽所言之自覺聖智境界不過就無能所是非相待之境故言無境而亦即是無分別智境也問四宗門見性後是分段身抑變易身答四此義不定所謂見性即依無分別智了了明見真如性也此所見之真如性雖不落聖凡階級而能見之功用卻有淺深要看見性行者之根基與程度如何若地上菩薩即屬變易身地前菩薩則屬分段身故不能作一定之判斷問五宗門見性後具神通否答五此與前條義略同其所見真如性雖無階級而功用有差別若已入聖位者則具神通未具聖位者即無神通然宗門本意非以入地為見性其所謂見性是不落功勳不落階段祇要凡夫眾生一念相應即是見性不一定要有神通故或具神通或不具神通而宗門所重者則不在具神通問六經云恆沙諸佛一佛身是一切眾生亦與諸佛同身矣以眾生皆可成佛故但成佛後同身乎抑在纏時同身乎成佛無可疑在纏若同身則諸佛悟時我何故仍迷也悟不同悟迷不同迷而云一身有何義證答六此不明佛有三身之義故糾纏不清要知恆沙諸佛一佛身或眾生身同恆沙佛身此等皆指法身法性身而言因法性身生佛平等理體無殊不僅多相不可得即一相亦不可得諸佛悟此故常住眾生迷此故流轉若就報身言則諸佛報身不一不異四智圓滿遍一切處佛佛皆遍故言不異雖然隨各各修因所成滿之果德因果相續功用各殊故言不一至就變化身言亦不一不異因變化身變化無定或一佛變化多佛度諸眾生或多佛共現一佛度一眾生故佛與佛不一不異然此二身與眾生則皆異因眾生萬行未立垢染未除未得此圓滿功德報身及殊勝妙用化身故是知平等法身雖生佛不二但所招感業報總體不同與夫所起之勝用不同故眾生無報化二身之功德故諸佛已悟而眾生仍迷生佛差別即繫於此若解三身此疑冰釋矣問七覺理初聞心如龍象經即稍久若存若亡念佛睹佛苦難無間煩惱驟來毫不得力輾轉數次或且隨溺上焉者過後空悔下焉者立相似法以自解甚焉者明知故犯此中必有癥結答七以初於覺理無透徹之了解不能發廣大長遠之心循序漸進躐等務速乃因屢遭挫折而退墮問八佛度諸大弟子必由阿含而方等而般若而法華而涅槃如此迂迴豈五百大阿羅漢等皆福薄乎慧淺乎答八此在法華亦一小分聲聞弟子自敘其經歷耳非頓悟直往大乘人及諸聲聞皆須有茲經歷問九世人多主張菩薩未能自度而先度人此種知見未知對否如其對也請示煩惱六根如何施用方可度人又有無事相足證彼人受我度竟答九自度度他至佛圓滿未成佛以前隨分自解自行法教導他人共解共行即為度他例如自歸三寶為自度教人亦歸三寶為度他問十多宗判教高下互攻究竟各宗菩薩至最後成佛時佛位平等否答十至成佛福智無不圓滿但亦依因行各有偏勝而佛果攝機亦成差別問十一普賢行願云眾生無盡此理難明依心經云不增不減則成抵觸夫迷轉成悟悟不再迷准心經言則眾生豈有無盡之理使無盡者則必與時滋生矣憑何義而自滋生乎答十一心經不增不減就法空真如性說眾生無盡就行願所緣境說然非以時滋生一以極多故名無盡二以成佛仍名究竟眾生故無盡竹摩記見海刊十七卷三期
