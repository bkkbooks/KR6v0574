body:
  text: 答楊陛雲問問弟子前曾學習調息靜坐坐至靜極之時雜念漸少忽然如浮於虛空不知有身不知有處但渾渾然似知非知似睡非睡有時亦如睡眠逮至醒來頗覺頭目清明精神爽朗四肢安適弟子常以此境告人或謂此係邪定恐入歧途故弟子近來不敢再試茲弟子參研佛學見禪宗法門亦須入定然後大徹大悟而得成佛蓋佛之法門乃至尊無上是故弟子竊有志於是特竭誠叩求吾師前之定境為邪為正若何修習可改弟子之邪定而入正定不墮魔外直至佛地又如何可以一生取辦若必須數世則菩薩尚有隔陰之迷誠恐來世一有福報便爾忘卻豈不可惜敢問修何功德能令世世不迷並懇求指示先看何種經論俾便研閲答詳考來訊所言靜中境況雖非邪定亦尚非佛法之正定蓋是欲界即吾人及六欲天界凡夫修習禪定尚未能得到梵界亦曰色界之禪定論界則禪定須欲界以上之梵界及空界乃能有之在欲界之過程上所發生之各心境於此不怖不悔不憂不喜不昏不散不浮不沈不退不失能善安住一二三年或有能得證梵界禪定者然此正所謂執身修入之凡夫定也於佛法論此亦歧途況無佛法真慧在欲界未到於禪定之過程上便往往流入鬼神仙魔等邪徑者乎來述靜中心境亦可安正徐進但急須研佛理務令正解正念同得現前以求定慧相應所謂慧者即內身心外世界徹底全空圓明寂照之真空慧也一生取辦全在乎此可請童蒙止觀禪波羅密摩訶止觀首楞嚴經細參究之見海刊一卷四期
