body:
  text: 答邊潤寰問三則邊君來問初係自述年來學佛之見解次為基督徒對彼所發之問難今答邊君來問三節且先廣邊君學佛之見解來函謂竊念一切唯心萬法唯識不了唯心終成魔外彼耶回道等教但是妄心之測度而已此段係邊君自述所得佛法正宗下舉基督徒所計之上帝而破云今當問彼汝如何而知上帝全智全能為父為主則彼不能不印可係其心之自證是則汝之上帝仍不出汝之自心則仍是心識所造也總觀此段大體無訛然欲以之而裂基督徒上帝萬能之疑網恐猶未能今廣邊君自述之見解為下文破斥之憑藉一彼基督徒所謂之上帝是否全智全能姑置弗論今先辨彼基督徒所云之上帝准之唯識教理乃為散位獨頭意識所行法處所攝之遍計所執色是獨影境但名無體等於龜毛兔角執之為實唯是非量二彼謂上帝能生萬物為萬物主似第七識執第八識為我此為以心緣心之真帶質境然第七執第八為我唯是俱生我執彼計上帝為唯一之真神是散位獨頭意識以心緣心之所緣境不了能緣心現不符所緣本質執之為實亦是非量三彼謂上帝在於天國類佛法人天乘教中之欲色界天王此由善業而感招之天報屬依他有不了依衆緣起獨頭意識緣之計為真實則是似帶質境亦為非量總上三條上帝云者純為獨頭意識所變緣之幻相唯識教理屹然不動廣見解已且答邊君來問答一來問謂物無自證須心而證然若無物則何以知有心蓋余此所謂心非與意識對辨之心乃總指能緣慮之心心所之心然此二者本係對待而言今於此二者下一定義即能緣慮能知識能了別者謂心為所緣所知所了者謂物今略列諸法論之色法是物八識及五十一心所是心又十一色法及二十四不相應行是物心義同上或唯正在能緣者謂之心所緣者謂之心心所及真如無為等亦皆為物若依世俗僅由五官所覺知之五塵外境為物則心之起可不待物例如過去諸事心能憶及睡夢入定有心無物如必待有形物方能證知有心則無色界全無色身器界心亦常起此又何也根塵相對而根塵亦心之所變現能緣之心心所雖必有所緣法為緣而能為緣之所緣法要皆心識之所現故曰諸識所緣唯心所現但由如是心現即有如是所緣法現豈離心外別有少物能起心歟心能自證更不待言答二彼基督徒謂心自證非上帝與彼以聖靈則不可此問可於廣邊君見解一段明之上帝既屬於意識所變緣有名無體之獨影境等於龜毛今謂上帝豫以聖靈則等於計龜毛可織為布可謂迷中倍人答三邊君以彼教徒計上帝萬能係腦筋之自證來問腦筋之功能及與心之異同腦筋之功能生理學家為記憶與知覺乃出於唯物論之妄計其所分大中小三腦分明是有形之色法類同唯識所謂之淨色根與根依處此二亦為心識所變緣之色法前已成立然不同器界者成唯識論云此二皆是心所執受攝為自體同安危故故腦筋但為心識證知事物之助緣能證知者是心識非腦筋凡物皆待心識證知而心能自證知不待物為證知其理極成滿智記見海刊六卷九期
