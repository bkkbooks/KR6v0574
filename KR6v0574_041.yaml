body:
  text: 致遍能常恩書三通一遍能常恩兩師鑒久知漢院教務向藉遍師維持而常師辦事務忠勤殊甚今以滿師辭去即請分就教務及事務主任以收駕輕就熟之效務即荷擔支持與院中教職諸員共商維護以策進行為盼順詢秋祺太虛手啓草二九十五二曉西院董并轉遍能常恩主任均鑒比來新學比丘狂妄稍能引楮伸筆即目無一切概由不習律儀所致本院荷院護院董老成持重而遍常二師亦素端凝穩慎獲保安全期率全於院沉靜勿令一二躁浮者恣縱其間并時以院況函告為盼順訊近祉太虛九卅三遍能常恩主任轉全院教職員均鑒一每次院議畢須即將議録寄呈覆核如有須更改者可立時指示修正二今定院刊作年刊年出一冊去年者余尚未見速寄鄂院及雪竇寺各多冊則去年開學以來者皆可編入三不另設研究部但組教職員學生研究會每星期指導或討論二三次四對余來信須署名負責太虛手啓見漢藏教理院年刊
