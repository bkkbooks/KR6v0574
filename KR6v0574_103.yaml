body:
  text: 致孫總司令書馨公總司令崇鑒伏誦篠電治在順民民在安居樂業歷陳十數年戰禍天災慘況此而不惻然哀隱者殆非人心也至云轉貧為富反弱為強在當局者方寸一轉移間耳孔子有言修已以安百姓欲安百姓斷在修已尤為至理然若何乃能轉移各方當局者爭雄競長之念易為仁讓而相調協又若何乃能攝持此轉起之善心而不敝緝熙光明以歸民德於厚則必有道也第非今人所提倡之禳災祈福拜像諷經之佛化也故唯在約取佛法孔老之精要而習俗之迷著則力須破除請為略陳其概今人所急雖在民富國強然一懸富強為的則爭端即由之以起此近今國際及國內戰亂之禍源也有王道有霸道有戰國之道懸富強為的以赴之是戰國之道也倉廩實而知禮義衣食足而知廉恥所期在禮義廉恥借富強為之階進是霸道也足食足兵足信不得已而去兵而去食雖死而信不棄是王道也竊冀公之能從於王霸之道也猶有進者觀今國內唯治下之東南數省人物較為完整風行草偃近悅遠來則天下炊纍矣肅此祗叩勛安衲太虛自杭州佛學會拜啓見東方文化
