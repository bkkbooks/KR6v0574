body:
  text: 答楊犖哉問二次十則一問疑情不可卜度卜度則成妄想卓之所不解者疑情與卜度有何區別也答宗門之第一義即不以佛祖聖賢在文字言語上所留傳的如何若何為滿足必須翻轉來向己躬下憤憤地要辨個究竟是什麼而後已即這便謂之疑情觸著磕著無不當下翻向己躬下討究他個究竟是什麼即這便謂之起疑情然不得在那要根究的究竟是什麼上用推論方法先立下幾個假設以為不是甲或許是乙不是甲乙必不出丙之與丁如來書所云疑之狀態此正所呵斥之卜度是也然參禪所要根究的究竟是什麼為何不可用推度的方法呢因為此中所要究明的究竟是什麼乃吾人情識上向來所未曾有過的且是情識上絶對不能有的要待吾人的情識窠臼徹底脫落時乃顯現的若妄想卜度則是自己騙自己自己阻礙自己留著情識遮蔽他使他不得顯現的與北京赴上海時東西南北的方向天津保定南京漢口的旅途原是情識上之所有的是絶對不同的今説此並不是為疑情不可卜度一句話做注解實是參禪用功的要緊處故不辭嘮叨耳見海刊一卷一期二問一如此用心是否妄念如參念佛的是誰一句話頭心思此念佛者果是誰耶我也何者是我耶血肉筋骨無知之體非是我也有知覺處方得謂我腦主知覺故我應在腦裏腦亦血肉物質之一種焉能化無知而為有知或係如機器電器之類因組織上而發生此種能力耶然萬物原有何種性能方能發生何種功用斷不能使本無者而化為有如汽機本有熱力之性能故方有機器之功用電機本有電力之性能方有電器之功用及降而言一切物質分子亦本具分合之性能方能起化學作用茲物質與精神絶不一類何能以物質之本能而發生精神之功用耶且窮究物質之本原出於多元之分子再進而推之則出於一元之原子再進而推之則出於渺微之以太因以太之律動種種不同而生種種原子分子又因其種種律動不同而生力生熱生音生光種種之現象是物之本原窮於以太而其性能亦極於力熱聲光氣液固而止絶無與精神可以相應相生之點當知精神由物質組織上而成之理無有是處窮搜極想無有恰當之解決如此起疑情疑則極其疑矣然參諸各禪録及來函所云似正以是為妄想為追尋為卜度在台宗則正謂之外道異計也究係如何請師就此文下一斷語問二如此用心是否合法如參念佛的是誰但心中想曰此念佛者是誰神凝於誰內視於誰念法於誰但用心至此處即止如一刀斬斷如勒馬懸崖更不再向前尋出個如何如何解出個如何如何換言之即但起疑問而不自為解答也又如參無夢無想時主人公在何處但一心看著那無夢無想時情景心問此時主人公究在什麼處一味咬定這裏如抵斷崖絶路更不再向前尋出個主人公在處來解出個主人公在處來如此用心鄙見似於各禪録暨師來函所示相符然究是合否請師就文下一斷語問三果如第二條用心愚仍有疑問二焉甲止觀之法無論繫緣制心體真等止其制心一處截斷妄想流注之法門與參禪之用話頭愚見以為并無二致且參話頭僅抵止門於觀門尚缺是止觀較參話頭猶較完備也乃禪宗則以己宗為別傳無上法門果何所以而云然也不特此也並斥行止法者謂為如石壓草果止門如石壓草則參話頭能獨異此誚乎乙佛法無論台宗止觀之法淨宗念佛之法密宗念咒之法禪宗參禪之法及其他一切宗之禪定修持之法據愚見可一例以觀無非截斷妄流制心一處由定發慧定慧等持之義盡之果如此義不謬者則愚見以為亦不必定參前人所指定之話頭即隨便自己定一話頭亦無不可耳如桌現在寫字則參墨如何是墨的或筆是從何而來的均未為不可何必定用古人公案中之話頭耶不特此也如人專心一意注想一事意不紛流者皆應與參話頭相等是世上專心於一事一物者皆合由無意悟道而悟道矣是耶非耶請為斷之問四六祖之時既無參話頭之法六祖又不許人坐禪不知依六祖教法究如何用心做功夫耶如無法不幾蹈坐在無事甲裏之弊哉問五達摩祖師九年面壁及心如牆壁之語皆與止門不殊別無奇特何以謂之別有心傳問六六祖壇經般若品中有曰欲入聖位然須傳授從上以來默傳分付不得匿其正法若不同見同行在別法中不得傳付損彼前人味其言是確有法門可傳矣佛法果有祕密法傳耶問七唯心訣列舉一百二十種邪宗不是但如何為是不見下解末文但曰唯在觀心此一語何能別得一百二十種之非耶問八終日俗事自是雜念與無念之旨自極相背若謂操俗務於功夫不妨礙則截斷妄想流注及無念等法可謂廢言若謂一日只須作少時功夫其他時仍可作事者則一日作事時多即雜念時多僅僅少時無念如何敵得生死若謂做功夫時固無妄念作事之時亦非妄念者夫作事明明念念遷流不得以動靜一如空言飾之明甚關於此點幸有以教之問九佛法住世分正法像法末法三時代法應一耳何能分三分三則將有真偽矣且像法猶可曰以像為教解釋之至末法時果以何法為法耶答一此種用心亦可算得一種人我的析空觀雖未是禪宗的參禪法卻亦非台宗所謂外道異計因外道異計是有所執取而此中但是推觀也答二及附答三禪宗參禪是專心要求發明本來意不在截斷妄想流注但途路上所附著發現的截斷妄想流注的功效亦自如來書所云此僅是附著發現的旁效故不同分止分觀的止但依交光禪師於楞嚴正脈中指前三卷楞嚴為説妙奢摩他之例則將參究話頭為妙止亦無不可參話頭原不必前人指定的話頭但要須是直截根源的疑問可以求一個天地同根物我一本的根本解決者方是若來書所援參究墨或筆之類則適成尋枝摘葉的戲論矣昔法蘭西人笛嘉爾以對於一切皆疑為不實而進求真實不已卒之悟一切皆可疑為不實而唯疑一切為不實之意不可疑為不實因疑意為不實者還是意而非他故也此亦略近於禪宗的起疑參悟者但禪宗不許人在意識的想像上推觀上建立出組織出任何道理解説境象狀況為如是者要人親切分明得入現量性境悟徹本真心地而已又若法蘭西現在的柏格森排斥各種概念謂實在的唯直覺能得因在直覺中不分能所而能所皆在覺中故則較笛嘉兒更密符一層矣近日北京大學印度哲學講師梁漱溟所作的唯識述義中謂大家不要把佛家坐禪看成什麼外國養生家中國道家印度外道的古怪神祕把戲佛家的禪定不過要求真現量罷了更沒一點別的意思永明壽禪師曰夫禪宗者真唯識量但入信心便登祖位則更大大的宣露矣能但從萬法唯心心在何處驀直追到底的追究落去最好如欲先求理解則於唯識諸書仔細研究一番亦好答四六祖前但隨人有何情識知解功習上的粘縛與他解去了還他一個本來明明淨淨的便好由他隨分穿衣吃飯去所謂修證即不無染污即不得也若坐在無事甲裏則便是為無事甲染污亦是為無事甲粘縛答五莫錯認面壁及心如牆壁便為達磨但達磨究竟有甚奇特我亦到今疑著答六壇經原文第以悟佛法者不可不傳授人傳授人須觀是器非器耳蓋六和僧須見和同解戒和同遵恐彼知見不端行履不正妄附聖法以行邪偽自誤誤人為害非鮮故須同見同行乃可而同見同行祇從自悟自證得來佛祖不過為之印定而已知見宗旨之辦接機應用之方古人喻以軍符亦非定無傳授答七情有偏著取為實法一百二十種所以皆為邪宗但觀唯心無邪不正答八動念息念皆歸迷悶若能提得起本參話頭自然做著坐著的無不是他答九正法像法末法乃依世俗諦説佛教在世間的盛衰狀況而已正法時多能從佛法修行證得聖果者像法時鮮能證果但尚多明理行道持律儀而具形像者末法則儀像亡濫以佛學資談柄比丘中修持者亦鮮矣見海刊一卷二期
