body:
  text: 復香港女眾書二通一以深密佛告善現因論生論展轉談及不為女人說過五六語等律文佛於聲聞乘專為比丘初步即超欲界故經律呵厭女令女自厭其處非一大乘則勝鬘月上等全異此深密之告善現乃以其深解空義絕不須牽及此問題我對女佛徒只勸在家學勝鬘等不令依聲聞律出家亦因不契時機於法於人兩無益也婦女應多學佛但切勿出家為尼二來信是完全不信而只憑我見爭論要知如轉變的空性是平等的轉變業果行相齊是平等的業報的當相人是人畜是畜男是男女是女凡是凡聖是聖如何妄執平等此可妄執平等惡染也不用除善淨也不應修還要什麼佛法佛制不平等的尼戒卻是改革業報使能平等的方便尼便是從受佛制不平等的尼戒而成的爾等空慕平等又如何能從佛的不平等方便以達到業報轉勝的真平等呢佛說女子為尼減損佛教是這世界共業報中的真確事實就現存世上的佛教現狀西藏緬甸錫蘭暹羅無尼佛教較純盛漢地有尼佛教衰亂廣東多尼佛教尤頹敗在家信女多菩薩尼最勝不過自了果爾等如有菩薩心如尊信佛語如護惜佛教應學在家菩薩見覺音卅至卅二期合刊
