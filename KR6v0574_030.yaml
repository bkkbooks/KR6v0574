body:
  text: 覆天童淨心老和尚書淨心老和尚慈鑒緬懷太白時以得聞德音為欣悅比蒙出示寄老人遺稿並錫教言具徵大悲心切方便門多曷勝拜感之至法無定由何有軒輊真脫諸法縛能抉出太虛之論意而救閲者之誤者鄙意正由愚法者堅執法界緣起為勝不悟平等生高下想故別開一途反其説以見其通耳專復敬祈時賜法誨并叩禪安戒弟子太虛頂禮見海刊五卷十期
