body:
  text: 覆張伯良居士書葆元居士慧鑒奉到手書喜慰有加今日剝極將復則當務之急宜培植根本人材以備他日幹國棟家之用唯識因明之學博大精微實能擷科哲諸學之奧而與一般學者以絶大之補助誠如所云能籌設一師範專門研究固為極善然在鄙意更望令行全省各校皆添設唯識一科則提高與普及並進矣又每年寒暑二假當召各屬校長及教育代表等集省開會隨時導以佛化利益使通達真俗無礙之理則教育之發展當有不可思議者矣草此敬復藉頌道安太虛和南古十月二十五日見海刊四卷十一期
