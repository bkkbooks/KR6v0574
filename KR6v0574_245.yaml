body:
  text: 答方亦民問問大乘小乘之區別如何答大乘小乘之別細言之頗深概言之大小乘均為出世法了解生死輪回程度均超過人天法人天法者在世界上要做最好的人使人間太平安樂即人法有許多宗教求升天即天法自佛教言做人及升天仍在輪回之內非永久解脫雖在天上仍受輪回能見全世界衆生在生死輪回中欲超出生死輪回求自己了脫故曰小乘以其所求者僅及自己但不害人若有人求學亦願教助然不能普度衆生故其結果僅自己得涅槃故見理亦較淺僅能空我而不能空萬法理淺行小果亦小即由小乘發心乃至小乘所修之果至大乘之發心非為一己是無己而為衆生以衆生為己如殺身成仁捨生取義其本身生命不屬於己而屬於衆人其發心為大衆故可成為菩薩此中相差頗遠大乘無一定範圍菩薩發心無量無邊故云衆生無邊誓願度如欲救國應先知吾國之歷史人民之生活狀況然後始可救國若欲普度全法界衆生必須先明白其理始能普度衆生非同小乘僅見及我空若見衆生種種煩惱必先知種種法門欲度無量衆生必學無量法門先從初發心菩薩地位漸漸修到佛之地位始能度一切衆生成佛始真能有普度衆生之智慧能力否則有其心而力不足故大乘乃自普度衆生而發心徹底了解無量世界無邊衆生之一切而度脫其煩惱要修證圓滿始能成佛成佛始有普度衆生之功能程心勉記見海刊二十六卷十期
