body:
  text: 答某學生問問佛教不婚娶絶肉食豈非使世界人類斷絶動物繁殖將來人類世界豈不變為禽獸世界耶答此于佛法中本不成問題發此問題者皆是佛法門外漢亂猜門內事若稍通佛法決無此種疑問如現在光孝寺所講的是維摩詰經維摩居士是學佛之人有妻有子有女故知學佛的人不必不婚娶的反言之現在西洋人有主張獨身主義者中國道教之道士天主教神甫等亦不婚娶然彼輩固未嘗學佛也以此可下兩條斷例學佛者不必不婚娶不婚娶者未必盡是學佛然僧人不婚娶者乃是學佛之一部分亦如天主教之神甫信天主者並非個個都作神甫學佛法者亦非一概為僧所以學佛有一部份不婚娶者乃為智慧深遠要求無限生命者説如世間之人惟圖數十年肉體之快樂爭名奪利清高者看山玩水矜節尚名生不知所來死不知所去更糊糊塗塗過了一生脫逢思想神穎者不能於此短時間肉體上之快樂為滿足亦不以子子孫孫相傳無窮為希望而要求解脫肉體不受物質之制縛得一精神上永久無限之自由快活則非絶對不婚娶而離欲修禪不可故此乃佛為程度最高深者而説也不食肉主義亦然如現在日本蒙藏等佛教徒亦有食肉故知佛並非叫一切學佛的人概禁肉食反言之近今西人講衛生者亦倡不食肉主義況中國道教及瑤池門等亦不肉食而彼輩固未嘗學佛也是以又可下兩條斷例學佛者不必不肉食不肉食者未必盡是學佛然佛法中有一部分不肉食者是慈悲心深厚的人觀夫物我同根自他一體如近年來國中兵災匪禍弱肉強食與動物相等但人類有人類的道德如孔子説仁耶穌説愛推我以及人推家以及國推國以及世界皆以仁愛相視此人類道德之超過於動物者故不肯率人食人唯食異類學佛之人其道德超過於常人不獨對同類以仁心相愛即對於異類亦具慈悲觀一切世間衆生等一子想羽毛鱗甲蠢物含靈皆名衆生故食異類之肉不殊食子之肉故不食肉佛説此人即是菩薩然亦不過由人類進化而至耳進化之極厥名曰佛自西洋進化論出明人為動物中進化而來動物既化而為人難道人不能再進化為菩薩為佛耶人既能進化為菩薩為佛何必戀戀於人界而恐人種之斷絶乎如水中孑孑進化而為蚊豈恐水中孑孑之斷絶乎作此問者無乃類是況人人不肉食而進化則動物亦皆進化進化復進化即此萬類雜生世界盡變作佛的世界勝于苦惱人類世界何可以道里計耶象賢記見海刊五卷十期附注即在光孝寺講維摩詰經雜録二則之一文庫作與某學生之一席談今入問答
