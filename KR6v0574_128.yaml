body:
  text: 復黃健六居士書健六居士鑒惠書展悉雖則溢譽之詞才追繡虎其如無悔之意德耀亢龍然此個己之間亦何關於得失憶前者華札朝至蕪緘夕復亦既披陳實情冀怯疑滯並云如有良方願承明教儻求改進儘可提商乃遽爾印刷分發挑起教內之鬥爭報章播登引來俗間之非毀致令已認之半數必需經費抗延不繳議決之會務僧員養成設辦莫從百事阻撓群凶肆擾不惟口吐刀矛上搖監察院之聽直欲身為屠劊下挾流氓幫之威弟兄反目邪外快心廟産興學雖打銷於國民會議而又促成立佛會許設雖通過於中央黨部而仍莫進行事至於斯勢安可為宣布退出夫豈容已紙老虎戳穿不堪再用破沙盆扶起但逞偏鋒鹵莽為能未嘗非法而竟成非法駢枝亂設已是糟糕而更加糟糕未見調𥅡有方硬為拉扯奚益應移居士之熱誠從事衆頑之感化稍解惟我惟私之癡徵發為教為衆之意勿存把持重謀組織知建僧寶之住持必為僧制之整理斯言決定可喻金剛實施方案能立初步基礎新進危言本祇什一希冀若得提攜之道不難和合以行吾自審捨身捨心救僧救世慧德無讓古賢福緣乃遜時傖每逢隨俗浮沉可括囊無咎無譽才一發心振拔輒招致疑神疑鬼進無可許退猶不容嫉憎所屆濫小報詈為修羅顛倒之極捏名信誣以邰黨縱無傷吾之毫髮亦可覘世之嚮趨出任勞苦徒損自他則不惟我應忘世而世亦應忘我矣嗟乎居士亦能永忘之歟專復並訊時祉釋太虛白八月四日在北平柏林寺見海刊十二卷九期
