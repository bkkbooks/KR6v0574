body:
  text: 答朱光潛問問佛教雖説因緣於宇宙最初因之問題究無解答與西洋哲學同既諸法緣生一切皆由因緣決定人類行為亦被因緣決定何能自由改造將來之因答第一問題佛認為是聰明人不當問的所以佛在世時有人問到宇宙最初因佛就是不答覆他或者答覆他沒有最初因隨拈一法從前推就有他的因向後推就有他的果佛法因果惟如此就現前事物而説若説有最初因宇宙就可以不要最初因若説宇宙萬物要有一個最初因那末最初因為什麼可以不要一個因若最初因再有因就不成最初因了若説最初因可以不要因則最初因就不在宇宙萬物內就是一個沒有的東西了所以佛説因果是就現前解釋至於因緣佛法上所謂十因四緣五果不僅有異時因果還有同時的因果現在所謂自然大抵指異時因果佛法上謂之異熟因果及等流因果因為是先決了好像不能以人力轉移的所以謂之自然但是異熟等流因果之外還有增上因果士用因果增上因果與士用因果是以當前遇到的關係而生影響要遇到如此的關係才可生如此的影響不遇到就不生所以是不決定的因為增上因士用因之不決定所以可以抉擇取捨造成或善或惡的增上因在能抉擇者中要算人是最富於活動力於行為思想最能自己抉擇就有情的內心分析依唯識説八識之中意識多分非異熟性就是説意識最易接受現遇的影響而主動轉移之人的意識最發達所以人最有造作力能覺察真偽抉擇是非自造善因這是佛教人生觀有造善惡因自由的解釋見海刊十九卷八期附注見中國需耶教與歐美需佛教文後
