body:
  text: 覆體參書體參仁者來書並譯稿已閲一過於彥按略有評正因汝所疑更抽一二於此彥明説轉識論是三十頌之略釋可認不錯我昔年閲藏時已見其然矣少一無癡心所或出解者以即是慧故略或出解者譯者欲立十整數故略此十是自性善句亦因立為十整數故十自性惑出於彥明誤解論意而立論實未開列十自性惑也不過説明前列十為自性善乃補足一句曰翻此十為自性惡而已要知翻此十即為根隨煩惱中之欲瞋逼惱等豈能於下列根隨諸惑外別立十自性惑耶至根惑中開見五而成十數則釋頌之文應爾更不足異此論六無心位文句不明作四句讀亦可一無想定二無想天三熟眠不夢四醉悶絶暫死加滅盡定即同頌中之五此殆出譯者脫誤無相論之無相應即唯識無境之無境義奘師攜來解三十頌者有十家糅合為成唯識論在印度所流行者恐尚不止十家其中有解全頌者有解數頌者有擇其要略通關節者真諦時或有梵僧總為彙集成一部名無相論其實則各家三十頌釋文之集録也此轉識論或即十家之一或為十家外之另一家均不可知汝以不整齊之論反疑頌文疏忽有所弄錯此種幼稚態度實屬不合又轉識論或出真諦以散文變譯三十頌頌文并以己意增損攙雜其間意圖令人易曉遂成此論亦未可知真諦之法相唯識學近於溝通性相之安慧學而真諦本人於此學殆不曾精徹譯時好加注語且或時以己解羼入文內遂至錯誤雜出若此論之解三性與頌不合或由解者原文如是或由譯者自圓其誤解增加語句而成蓋論中之前後二性前性後性若作依他圓成解固同頌文也丙寅元宵後二日太虛見海刊七卷四期
