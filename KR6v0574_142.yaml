body:
  text: 致屈文六居士書文六長者台鑒比來屢接清言深感尊重三寶調融四眾之誠願實為復興中國佛教之精神要素蓋今後佛教之建立須託命於四眾或七眾有秩序之和合組織不和合不能有秩序無秩序亦不能成和合民十八以來之佛教會殆因缺秩序而致欠和合歟今佛教會既以仰承國政應赴時宜所不容不設洵有改善其機構健全其組織之急需也目前荷與大悲退居陪同圓瑛法師偕臨雪竇分院殷殷以共舉佛教會事為說夫服膺無我方為佛子況圓瑛法師與虛三十餘年之友誼在人自無所間然惟論佛教會之事就目前為寧息紛爭計曾面告應速作容納各方修改會章提議之表示嗣晤常惺大悲寬道諸師亦談及針病得穴之點今偶閱最近之聯席會議錄知第八屆大會已定十月上半月舉行則至遲亦相距三個月零耳又閱所報告去年以來徵求會員之總數僅得一萬零二百餘人而查大會之選舉代表規則按會員滿五十人得選舉代表一人雖可有二百餘代表之出席然聞所徵會員大抵屬上海及鄞杭嘉各市縣就會員滿一千得選代表四人計纔有代表四十餘名縱能全集此數個市縣之數十名代表亦寧足開成號稱中華民國全國佛教徒組織之中國佛教會之全國佛教徒代表大會耶且報告中雖云已組織成六省分辦事處然據傳聞則湖南四川福建諸省皆在與原設省佛教會爭執中凡是癥結之所在設不於事前速謀周洽之法恐雖開會亦成無效竊謂在今時服務龐大之集團智慮周密宗旨公正心氣和平蓋皆為必要條件為此純以希望為好之善意提議將第八屆大會代表之選出定為原未有省佛會或已取銷省佛會且曾依新章改組之各市縣佛教會則依新章選舉在原有省佛會未取銷且多數縣佛會亦未改組之省分於茲新章未遍照行及將議修改之期內得仍依舊章由各省佛會選代表出席大會如此庶不捨棄原組織之遍於十六七省諸省縣佛教會以自殘其肢體且亦為容納爭議而解息糾紛之一道並議定代表大會須選出代表超過當然代表三分之二以上方得開會又增主席團為七人由常務理事理事監事中各推三人選出代表中推舉四人原理事長不加入主席團例如民二十蔣主席之於國民大會大會祕書處亦臨時改組之以示大公無私之意據是及前談要點若能即開一常會決議施行則當進擬修改會章之提案以為健全其機構之圖不然則認茲事尚鮮合作之坦途惟有對於公等表示其敬佩而已專肅即頌時祉太虛謹啟二五六五在常州見海刊十七卷七期
