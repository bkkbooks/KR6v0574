body:
  text: 答李直問問依起信論衆生在生滅之中雖依真如自體相熏習亦能發心修行但以有無量無邊無明起一切煩惱種種差別若不遇諸佛菩薩以為之緣而能證入涅槃則無是處讀此竊有疑義即諸佛親證真如從斷無明而證乎抑本未嘗起於無明乎依後義則佛本與衆生絶對不同三阿僧祇劫之修行於佛為多事依前義則佛與衆生絶對無異不遇諸佛不能證入於第一佛作何説況經亦云衆生即佛無明即真如一切經論但對世間人見思執著而為言説若分別不有即經論亦捨金剛經謂之如筏喻者如是亦可謂筏依渡而有經依分別而説真如依無明而立佛依衆生而證得毋使人疑佛亦從人心識中出不過一種對病下藥之法門亦相對的而非絶對的乎法華諸佛一大事因緣欲令衆生入佛之知見心經度一切苦厄以無所得故佛之大用如是即以度苦厄入佛之知見而止恐不對世間相本無出世間體也答一諸佛親證真如即非諸佛親證真如以親證真如即佛佛即親證真如於中無能證所證相故二親證真如則無明即斷亦以無明斷故名親證真如然無明雖有斷而無明無始起之期也故一切染法起於無明而無明無起三依俗事言十法界因差果別佛與衆生未嘗不異也不異則何須修佛行乃成佛果乎依真而言一法界大總相體佛與衆生未嘗不同也不同則衆生雖修行亦何能成佛乎四真如無明無始故佛界衆生界亦無始無第一佛者亦無不第一佛者無師智自然智成就慧身不由他悟故無不第一佛者而展轉無不從佛聞法發心修行者故無第一佛者第一不第一但依妄情立佛身超數量絶戲論分別五衆生即佛衆生與佛同以真如為體故無明即真如以無明乃無體之虛病其實體即真如故六言詮但彰假智所緣之假相而不證諸法之實相分別心空則親證諸法實相無明斷而真如顯衆生情盡而佛陀智圓亦即謂之入佛知見亦即謂之度一切苦厄究竟涅槃亦即謂之得無上正等正覺閣下似但認名言義相為真如為佛而不知超絶名相之實證智境之正為佛正為真如也若但念名相以為真如及佛則不過對治衆生妄想分別之一種言説即如閣下之所言者亦無不當見海刊二卷十二期
