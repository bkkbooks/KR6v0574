body:
  text: 復古松長老書古松長老元照敬展華函過蒙藻飾莫名感愧久聞高德以怠疏參訪未能一親塵教尤深欽馳恭誦道霈禪師八吉六勝頌藉知勝地垂荒愴然曷已然比年天災人禍不惟貴省之厄當此剝極將復之會法燈殆不遠重輝之日荷殷殷垂意於瑛師及虛赴閩一行且期之他日之勝緣也專復即頌道安太虛和南九月三日見海刊四卷十期
