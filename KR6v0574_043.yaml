  text: 覆濬然比丘書濬然比丘慧鑒函悉留心護教具徵信願師子尊者被難原有付法藏傳所說唯例如中國遭唐武宗之難非即全斷滅故不妨仍有人繼續近人發現敦煌石室唐寫本楞伽師資記日人某已印行亦有達摩承續傳至黃梅弘忍下諸師之說足證北宋前確有其傳專復順詢精進太虛啓七月草一見海刊十六卷八期
