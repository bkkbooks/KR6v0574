body:
  text: 復陸心梵居士書心梵居士鑒由雪竇轉來惠書藉悉一是一應望僧尼日善而不必望其日增以斯濁土中增則勢難善故二僧尼負住持佛法之責佛慈悲廣大普度衆生之旨不在皆令出家在令信佛法僧持五戒行十善以及發菩提心而修六度四攝三限制具戒而不限制出家實一矛盾許多出家而又不能具戒者豈不徒為佛門贅纍四補習學校為救濟已出家而失學者而設正本清源自當從出家限制雖有學識而更須正信切願誠意則為確論太虛復見海刊十四卷十期
