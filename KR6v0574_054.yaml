body:
  text: 致月空書六通一月空主任函報各件均悉事務職一期纔可熟手務須連任多期不得輒求自退至院費不足則非一人事僅可與尊法師從長計議提出常會通過也太一月九日二月空百醫不痊已開始用草藥酒覺無甚礙吾房內草藥酒望為傾入一小玻瓶帶來原瓶中藥再買甘酒貳斤浸之太一月十四三月空主任聞陶居士募修縉雲諸古像稍須工食木料院中當隨喜助之工人此已有另須黃梔子及藥酒須挑擔炭來便可太虛十八四月空函悉皈依證已收到竹木天災捐害近月院費尚可支否胡豆花聞慈圓有為採好晒乾者可便帶至近日手臂又增酸麻幾難寫字太二十九五月空主任西山坪產原屬禪岩捐充漢藏院學產久已省府備案二岩鄉妄指為地方公產全無理又兼善照熟土價六千一畝買自可除去三百萬元以上前議只照荒土二千元之半價自已屬最合理辦法又今但須一合理解決之辦法亦不必賣但加租亦可熟田照原租額土照地價稅畝約百元亦可彼此同為國家的地方的公益文化事業盧局長應為公平的合管的處理也石華寺焚獻穀似已難回後或呈省府設法松山案教育廳可買實一最好機會但不知吳忠本日前來說如何海定應已來山可妥商辦理之余經數醫診治病仍無起色老僧不管興亡事後事如何付後人老朽字六院中公款不可為我買瓜果我每月約一斗米煨飯外三餐小菜及早粥均隨眾不可另添太七十一原稿均存月空處
