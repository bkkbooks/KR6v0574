  text: 致鐵禪法師書徑啓者頃據梅埔六屬佛學院籌備處代表釋桑空等函稱組織梅埔六屬佛學院函請咨呈國民政府轉飭梅埔縣屬出示保護以利開辦而興佛事等因查該代表等組織佛學院出至精誠將來開展至何程度未可限量除一面照準轉咨國民政府請豫轉飭梅埔縣屬出示保護外更應照準函請法師就近贊助以利進行期臻完善此致鐵禪法師釋太虛和南見海刊七卷三期
