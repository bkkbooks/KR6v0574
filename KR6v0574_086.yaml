body:
  text: 與廖笏堂先生書二通一笏堂先生慧鑒時丁末葉魔強法弱往往有法身大士乘悲願輪扶持正教客歲大溈之事賴熱心維繫不惟衲等銘感實乃佛陀贊喜人天慶悅者已頃者長沙僧界來函稱湘省議會修改提寺產案其結果仍公產提十分之六私產提十分之五此等非法議案無慮蠻橫無理為稍有人心者所憤惋且關于佛法前途影響國家興衰不少所以者何一省作俑各省效尤涓涓不塞何所底極衲等聞此驚告疾首痛心念大法之傾危實支拄之有責奈狂瀾之方激非孤掌之堪障用特函懇閣下發護法心作師子吼轉請熊秉老領銜聯絡湖南旅京各同鄉及各名流函電湘省議會省署教育會據理直斥多方指導開彼迷雲滌茲妖孽定顛扶危在此一舉況長沙來函亦云據實調查此案操縱于少數教育界議員之手其他之議員有中立者亦有力爭不承認提產者乘此風雨如晦雞鳴不已之際正好登高一呼喚醒彼夢願公等疾趁此時鼎力挽救則庶幾法輪一轉佛日重光緇素國民胥獲其益江樹燕雲不勝引領待命之至肅此敬頌道安諸維慈照不一太虛啟見海刊四卷三期二笏堂先生大鑒漢皋雁去京國雲來卓議名言良深景佩衲因憶民二國會初開嘗請願吾僧選舉當選之權未幾國會顛播致猶稽議其書載于佛教月報尚可按覆也乃者貴省省選僧界亦同選舉但仍無當選之權耳然衲於此時反不敢令吾僧有茲矣蓋議員當選非賄莫成非爭莫獲而碌碌庸僧少受教育未具阿羅之德菩薩之操一入斯途必將盡失其所貴乎有僧者而僧翻可以無之也故于發表民九十一期海潮音之整理僧伽制度論乃主張僧伽祇守其卓遐清讓之風以宏佛化之普及為職而由正信佛法之士女組擁護佛教社專為保障三寶似較妥適然順時因勢未知孰為至宜顧吾僧竟絕無注意及斯商論及斯者上者僅能自修下者反叢世詬鮮有可與之共盡明教救世之責任者斯則竊所深引為巨憂者也設能藉公之偉論集國中緇素之視線以相研究於此則何幸之耑覆即頌仁安衲太虛和南見海刊四卷四期
