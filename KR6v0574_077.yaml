  text: 復王實居士書展讀惠書洵卓然不為環境籠罩能自抽其智種靈苗於火宅之中者惟似甚戚戚於家獄之不能超出則當觀家性空了無逼迫自可安忍一切艱辛苦難而於其中成就波羅密行焉若家事能捨離者開春元初即來院修持學習二三載亦未始非成滿二利之因但隨緣勿加勉強為要太虛白見海刊三卷十二期
