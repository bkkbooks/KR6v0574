body:
  text: 答穆藕初問十則問一事業不能廢止斯不能不受諸種業緣束縳吾人如何乃可解脫業緣避去煩惱而修養身心乎答一世界事業是人類應做的職務衣食問題胥惟是賴所以吾人必得各盡世務不能以欲去業縛故遂因噎廢食並此應幹的本分也廢止起來這層是大家所應知道的大抵世人的一切業緣和煩惱是由於虛假的意念迷住了本心乃相生相演而成的世人苟能一念覺悟不為虛假的意念迷住了本心則業緣末由而生煩惱不滅自滅佛學是教人去迷歸真了徹本心的無上法門所以吾以為世人只要能夠歡喜念佛解得佛學精義則事業儘管經營煩惱亦可自滅常人無所事事時必尋種種消遣法如嗜酒的飲酒好打球的打球之類但此類消遣實際上於身心未見有多大益處愚意倘能利用時機以其所最歡喜的消遣法即出至誠心代之以學佛精進勿怠久而久之不難返朴歸真還吾本心到得此心不為物役無所罣礙時則業障本已無煩惱何由生真正快樂在此修養身心之道亦在此問二世界習慣上的觀念以為學佛者須得解脫世務銷聲匿跡隱藏於深山叢林去處的故其心中有一層隔膜執認佛學是教人消極的因之大家淡然視之有時還要妄加誣蔑未識將何詞以闢之答二事業與學佛並行不悖的關係頃已略說出家者果是學佛但在家者亦未嘗不可學佛世人附會佛教是消極的心理大約是鑑於以前學佛者大都隱跡山林與世無聲無息致生此想其實大謬要知世間本有現成佛法衆生祇缺一覺致愈趨愈遠甚且認定學佛就是出世的消極觀念了今即以出家在家比較論之出家人之不應終天念念佛號算了事而必得說法講經盡覺人的天職化飯以糊其口蓋亦猶在家人之應盡一天本分吃一天飯斯為正當可知學佛初不必從棄世逃俗做起只消從現今所有的職位上做去就夠了且佛教所謂布施波羅蜜實不限於何界何人是故行有餘力則處處行方便或自己無力則從旁歡喜贊助這是輕而易舉人人所能做的至若設立一工廠則賴之維持生計者若干人創某種實業則因而得以衣溫食飽者又若干人此皆布施的真義亦即吾佛利他主義準是以言學佛正是極平常的事體祗要人類各盡正當的職業各發真正的善心譬如做官的則盡其做官的本分以利國福民為職志弗作絲毫利己損人的貪瞋想時刻懷著自利利他的菩提心則成佛之得操左券可以預言他若為士為農為工為商亦復如是要之但能各從原有的職位腳踏實地做去各充其菩提心腸打得破利害關頭使此心毫無牽纍不再作物質的奴僕則菩提正果自然能成功極樂佛國不患無分了於此吾們可以知道世人之所以漠視佛教實由於觀念的根本誤會考其觀念誤會的由來祗因未明佛教真相故講到佛教的積極處尤非淺見者所知佛門以度盡一切衆生脫離種種苦厄為宗旨舉世間所有無量數升沉六道具有性覺的生物雖蟄飛蠕動甚至微纖不能以肉眼見者在佛眼視之皆一例平等皆有成佛的根基以故佛門宏願在在乘機提撕衆生覺悟速超生死苦海而登彼岸為惟一責任則其純主積極永不消極的真精神於斯可見一斑了問三頃聆高論大啓愚塞可知學佛是自救救人最積極的無上法門惟世人惑於舊說以為學了佛則六親不認父母都棄是故衆人認為學佛是大背孝道的向者其漠視佛教的心理此或亦一原因敬問如何以解釋之方可祛除衆執答三孝字含有廣狹二義何為狹義的孝即世間所講者是他們認為天經地義的孝之範圍不外能夠奉養父母於生前能夠不忘親恩於死後又儒教之言孝云三年無改於父之道可謂孝矣吾們自頂及踵莫非父母之遺賜受恩何等深重而所以報之者僅僅曰能奉養曰能久而不忘曰能不改親志就算是孝了麼尤其是缺缺不滿足的則其所謂報親云云只限於報今身的父母恩至於歷千萬劫來吾的前世親恩曾未計及此其範圍之狹立義之隘為何如何為廣義的孝即佛門中所講者佛教所倡孝之範圍不僅以能報今世親恩而止並且上推過去世下而未來世無不容括在內凡自無始以來升降循環恆河沙數不可計極的衆生中在佛門視之胥有吾前世億兆賜身之父母在是故其報恩宏願處處以歷世親恩為懷亦處處以衆生盡往樂土為禱此其言孝範圍之廓大垂教之徹底又何如總之佛門之視三界衆生無論其為披毛戴角無論其為昆蟲螻蟻要皆在覺之度之之列然則對於舉世生靈所發之菩提心已如是如是豈有對於生身的父母反而棄之不顧忘恩背義的麼世人執迷僅須以此解之問四向者我國士夫尚能以儒教道德之說領袖群衆為治國規範可是到了晚近士夫自己既不能以身作則致衆行無軌人欲橫流滔滔莫之能禦丁此時會要是希望澄清亂源惟有待諸佛教遍施點化故拙見佛教之在今日匪特有不能再作袖手旁觀的態度並且有不能不越俎代儒之勢法師以為何如答四誠然佛教所倡因果說裨益世道人心處甚大此乃儒者所公認的至其範圍的廣大可說舉世倫理道德之說無與其匹而其切如事理圓通精妙尤非他教所可及他種宗教事理每多說不圓通處如基督教的改造人心立說云吾人的上面冥冥中有個萬能全力的主宰此萬能的主宰就是世界上人類以及事事物物被所創造被所主宰的上帝細味其意含有階級之限度姑弗論而且頗有顯著的偏見好似人類之為人類完全是立於被動地位的上帝要他們怎樣他們就怎樣了據此論之人類所作的善惡行為都非人類本心自主的若再嚴格的言之竟可說人類行為既非出於自主苟使造成種種過失人類當然可以不負何種責任的然則試問萬能的上帝為何不以其全力的主宰權使人們個個向善呢為何不先預防制止人們的造業行為呢又為何放任人們去做出那種種敗德的事情呢其矛盾之點灼然可見這是不能為諱的至於佛教所倡的因果定律則否其一定不易之理是永遠顛撲不破的何以故蓋種因下去自然結果出來事物公例如此并無所謂奧妙存乎中所以種何種因在先者遲早必結何種果於後雖一念之微而無不種因無不結果因因果果不爽毫釐速者則果成於剎那間可於眼前見之遲者則果成於數十百年後或未來世中仍顯其作用觀此則可知種下何因無不結出何果所差者不過遲與早之一間明甚世間諸種問題千端萬派有非平常道德範圍所可囊括者而因果律則能之所以者何因其生滅變化自然制裁如竿見影如響應聲一切世業終不能越此範圍世間尊嚴的法律與衆口的輿論是用為保障人類安寧的一種規範這是誰也知道的人要是生存在世則必得循此軌範要是不循此軌範則法律與輿論就隨後要來干涉輕則剝奪自由權重則剝奪生活權處置之嚴大有凜然不可犯之概以故人類之尊而視之也好像是大家所公認的生存信條然恪守惟謹不敢抗違人類之得以生存而相安者不可謂非法律與輿論的功效然而此猶有未盡善處苟有人於此一旦忽然灰心了以為做人是乏味的奉守生存之信條是不自由的因之不願再生人世並即破壞人類生存信條起來以為無論甚麼天大的事只用一死了之都可冰消瓦解於是不幸而竟充其消極之一念任性的作出放任不羈的行為來任性的作起五逆十惡來任性的殺人又任性的縱火起來凡是世人絶對的不許做的行為而他偏偏違衆胡作起來到此地步試問法律還有甚麼效力否輿論還有絲毫功用否照那麼說世間人類既沒有了存活之保障力豈不要歸到滅盡的危慘麼曰否否世間法雖有窮竭失效之時而因果律制裁萬惡的無上神力則是相續不窮的即使你以為造諸惡業一死即干淨可是因果定律卻不容你這樣好過阿一死之後必得輾轉銷清夙業而後已蓋前者一死不過銷滅了虛假的軀殼然其心識則永永不滅的是故肉身雖千死萬生而心識卻不如是死後復有來身來身還有來身生生不息升沉六道受種種苦為畜生為羽類為蠕動之蜉蝣為微細之生物各隨宿世業因而受業報何曾以其形骸的暫時毀滅而消滅其痛苦的報施呢是故苟使衆生眼前多種善因就使你不想得到何種善報而善報自至就使你不願做人而因果律不容你不做人並且隨了你所種善因的多少而使你獲多少的善報或者使你將來做個較優於眼前地位的人或且使你得到超人的地位尤善者或且使你為菩薩造乎其極而證佛果蓋後者種種果全由前者種種因演造出來非偶然以成的然則佛教因果之說的確為萬古不易之至理明甚至其與世道人心的關係亦非他教所能及蓋因果說以必有的事理曉人以切膚之痛積極方面則足以勉人為善消極方面則可以戒人為惡中人及上智知希聖法賢即下愚者亦不敢為非作惡而凶者知所懼貪者知所惕觸目驚心遂各不敢窮惡以逞惜乎向來那般學佛的動輒去尋那隱居生涯不與世務而因果定理也未經盡情闡發宣傳致世人疑信參半仍不免盲種惡因而演成今日痛苦之惡果而今而後佛教任務綦重當然不可效法從前的學佛者徒計靜中業趣拋卻應盡的世務了問五佛學之在今日誠有宣傳昌明之必要惟如何而可使一般普通人起信仰如何而一一覺之度之還乞詳為指教答五現今昌明佛學的要務自然首先要使人起信仰但是尤要的莫如先使明理不然則雖有信仰的人其實不過增了一般盲從者究非根本之計惟是負此項任務的人才尚難覓得因為此項人才一須真正明瞭佛學的精義與藏經的奧旨而後足以發揮佛學的妙諦二須旁通世間學術熟悉社會情形因為世人見解的錯謬觀念的迷惑都是由於被虛假的世學和物欲的魔力洗染著倘能參透其弱點所在因勢利導對症下藥當不難脫去其重重迷障而使之覺悟三須確能實行自利利他自覺覺他之主義的像以前學佛者專攻小乘法隱跡山林派實非所取因其與世隔絶的太遠對於覺世利他曾未計及與衆生不生若何感化上述云云是關係人才方面先應提倡之點亦即昌明佛學之重要起點此外為學佛者所應知而實行的學佛惟心願在利他非惟應盡覺人的任務並須做些社會上實利的事業才好如基督教的致力種種公益事業寓實行利他主義於宣傳宗教中體用兼施其用意深足取法的問六法師設立佛學院之辦法與宗旨如何答六年來奔走南北頗想從設立佛學院為起點由漸推行佛教或以機緣未到或以時局影響輒半途中止比來漢皋得諸人士贊助力爰組斯院院內現有學者五十八人初級暫定二年畢業明夏第一班可卒業苟志在深造者則留院精修更下功夫漸增其程度此院標的在造就一班稍明佛學的普通人才使出院後各依先覺覺後覺之本旨悉力做去日久熏陶效當匪鮮此外則有佛學講演會以及佛教學校等等之進行用意亦在灌輸佛化於社會上一般普通人問七佛學深湛微妙非淺嘗粗解者所能貫徹精義今老法師定佛學院程度僅三數年不嫌稍缺精徹麼答七現在昌明佛學的願望重在救濟人們太缺乏佛化的飢荒故求在短時期間普及佛化為主猶之方今國內教育家努力提倡平民教育從事開辦義務學校志在普及國民小學的程度使不識字者略受些教育認識幾個字為目的者一般無二至中大學的程度初不在教育家普及教育之限度內的鄙意普及佛學亦如是問八老法師昌明佛學的宏願聞之甚佩拙見倘在各大商埠如滬寧京津一帶多立大規模的佛學院與武漢等處連成一氣請各地高僧及諸大法師主其事預料成效必更偉速行將見紛紛亂世一變而為清淨樂土答八誠如尊論而尤希望從各大商埠竭力宣傳到洋人方面去因為洋人現占人類最大勢力到處有他們的蹤跡一經信奉佛教昌明的效力當益倍蓰惟現在尚少此項啓發洋人的人才去灌輸佛化倘得精通洋文而研究佛學之士擔任宣傳就不難達此目的問九歐戰以還佛化漸見流傳至歐土德國人士頗多熱誠研究佛學的傾向此正佛教漸漸蓬勃的好氣象答九大抵處境順遂時衆迷往往不易覺悟及遭際乖逆乃豁然大悟如去夙障世人之存出家思想的往往而然德國的傾向佛化亦復如是以其戰時受創最深故其人民之覺悟亦較他國為早惟向來正教未昌當此馬克低貶得食艱難之會頗有為飢火所驅妄造擇人而噬之殺業以種纍劫難於解脫之苦因者亦大可悲憫矣問十國中連年擾攘民不聊生欲謀撥亂反正其惟望之普及佛法乎答十此言良是現在國中尤其是水深火熱的諸省非厄於兵禍即苦於匪患但夷考其實則以佛化少及之區居多數平日沒有佛教感化無人為之提撕警覺致一念之迷深而不及干戈相循受諸痛苦要是平日能夠信奉佛教沾潤法雨變化殘忍惡念為慈悲心腸受苦決不至於斯極可知佛教誠為調劑亂世救急金丹實無疑義倪兼涵記見海刊五卷一期注一原題太虛法師講佛學記今改題
