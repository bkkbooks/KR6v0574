body:
  text: 致段執政書講經沙門太虛謹致書段執政大鑒誦前致各省區軍民長官一電陳述銷禍修德移兵為農之微恉莫名欽景故茲擷華夏之文化體佛用儒應世界之思潮斟今酌古為我國人一揚榷焉一曰為學當以正覺為標的也正者忠實公正誠之謂也覺者真知達見明之謂也比來之言學者衒奇説以自高失其忠實之真知矜偏曲以相競亂其公平之達見播茲邪説中于萌俗生乎其心害乎其政此民生之所以不安國群之所以多患也故不問其所治之學為亞為歐為科為哲為政法為禮教必也忠事理之實契以真知公人情之平衡之達見誠正而明覺明覺而誠正則心地清而世間寧矣二曰立行當以仁慈為根本也德行雖廣有根幹焉儒曰仁恕佛曰慈悲自世人標發展私欲為進化之母人以肥身家蕃親族為務國以逞強積財富為專職人與人競國與國爭觀我國近年因擁兵據地而構禍頻頻者胡莫非縱貪鬥狠之所致哉故期息亂歸治必修慈心三昧其道在繩己之過而勇改憫人之苦而強恕無我之大悲漸充體義之至仁斯普本茲攄舒萬行適應群化則或剛或柔或嚴或寬或急或緩粹然皆善矣三曰施政當以利便為準繩也用平實之正智依體群之大仁凡所施為於政事者權其便宜因以利導使之害無不除利無不獲今我國地廣民衆而孱然至無以自立者則農工不興地多棄財兵匪為患民莫安業也現在四川西康已定為特別區域其他邊徼荒地更不知凡幾逐漸墾拓俾成重鎮無餉飢兵雖百數十萬失業匪民雖數千百萬亦何難安置哉此屯兵興農安民衛國利便之道莫逾於此由此發施政令整理財政振興工商普及教育皆可推行無限矣國事萬端綱舉三要願教邦人力圖成之見海刊六卷十期
