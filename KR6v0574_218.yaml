body:
  text: 大林答問四則鍾仁益問行持與研究佛學孰善答王陽明先生主張知行合一研究佛學為知實踐行持為行如是則行持與研究佛學並重若依知難行易學說而言則當研究佛學而後行持若依知易行難學說而言則當先做行持工夫而後研究佛學然據余之愚見行持與研究佛學並行者為最優次則專做行持工夫者最次則為專事研究佛學者李圓嘉問我國佛經夥矣汗牛充棟不計其數然欲遍而讀之雖竭畢生之精力以求之不能窺其全豹故必加以選擇編輯學佛用書程序內分初級用書高級用書大乘用書小乘用書使一般中外士女有志研究佛學者由淺入深循序漸進得入門徑而宣傳佛教宏揚佛法答關於選擇學佛用書實為現世之唯一重要問題幸勿東翻西閲虛糜光陰而終無所得茲將所選擇之書目臚列如左初級用書佛教小學教科書佛教中學教科書參考書一佛學小叢書二佛學此為第一學年三佛乘宗要論四佛教三字經此為二學年五三字頌高級用書第一年五乘共教經佛本生經大乘本生心地觀經律優婆塞戒經淨心誡觀法沙彌律儀論馬鳴莊嚴經論本生鬘論佛學概論五蘊論百法論六離合釋史文宗派源流選讀國文第二年三乘共教經雜阿含經緣起誦四十二章經遺教經律四分律論俱舍論頌注異部宗輪論因明入正理論攝大乘論史文印度佛教史選讀國文第三年大乘相性經楞伽經如來藏經解深密經大般若經第五分律瑜伽菩薩戒本及研究律論論集論二十唯識論觀所緣緣論辨中邊論十二門論中論三十唯識論史文中國佛教史選學國民常識第四年大乘行果經華嚴離世間品法華經涅槃迦葉品無量壽會彌勒上下生經大日住心品律梵網經整理僧制論及研究律藏論大乘莊嚴論涅槃論十地論法華論淨土論史文各地佛教史選學世界常識鍾普平問欲將世界上之儒道回耶各教鎔為佛化一爐當用何法實施答儒釋道耶回五教之教旨雖異而其勸人為善則一也第回教徒誅除異己思想頑固知識淺薄僧侶無緣故不易同化歸佛道教徒書符鍊丹扶乩示藥長生不老足以惑人故亦不易同化降佛若夫儒耶二教教徒文字精深智慧聰睿知識開通好學下問故藉文字為媒介可使一般儒耶二教徒廣究研求印入腦海終可佛化然欲儒道耶回各教鎔為佛化一爐或以宗通或以說通舍此莫由劉圓振問佛教徒之生産法當如何答出家為僧本係鳳毛麟角凡人莫不敬之故關於衣食住行不生問題為學生時即由寺院供給及為傳教師時每日隨處可得食按印度習俗每家門前置飯一碗專為供給三寶者及為法師時弟子供養食不勝食無所謂生産法也若夫在家佛教徒之生産法農工商學兵各司其業一面生産一面學佛養性修行多種善報何樂而不為圓嘉記見正信一卷十二期
