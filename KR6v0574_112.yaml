body:
  text: 致李石曾先生書石曾先生道鑒欽景高德每悵緣慳邂逅雲林曷勝欣幸昨聞唯一多一之論今思實唯一及實多一均有違事物真相而假唯一假多一則皆可順真相而説何者實唯一近於執常一用之我執實多一近於執有各體之法執捨唯一而取多一近於小乘之破我執而存法執故多一雖較唯一為勝亦宜捨之如觀一事由多方面為關係而集成故無實唯一同時復觀彼多方面關係亦一一依此一事為關係而發現故無實多一反之則一事集成由於一一故實無此一事而唯彼一一可假説有多一而無唯一又一一發現依於一事故實無彼一一而唯此一事可假説有唯一而無多一無實曰空假説曰假觀事物真相之即空即假曰中先生雅量沖懷應不以直陳管見為忤幸評正之專此即頌靜安太虛謹白見海刊九卷一期
