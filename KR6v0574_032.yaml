  text: 致班禪熊希齡函班禪大師秉三先生均鑒頃接四川佛教會來電云云太虛但講經耳不知其可茲幸五族佛徒班師允為領袖各區教産秉公素殷護持而又值二公均列議席為此敬陳來電祈察至所關佛教宏護之事應如何籌議施行統希尊裁為荷專此恭請大安太虛和南見海刊六卷三期
