body:
  text: 答李汝清問八則答一非謂念一日或至七日即可得一心不亂謂念至一心不亂可住於定中一日或至七日若身心俱定當然飲食便利皆絕此由定法持身之故也答二一心不亂即三昧三摩地別名然念佛古有事一心理一心之義唯有一念佛心相繼無間更無其他想念為事一心此念佛心亦絕而又不落於無知無分別智親證真如為理一心非可言狀更非催眠狀態答三得理一心可斷見惑或斷無明然未斷思惑亦或頓斷事一心則暫伏耳答四得理一心則無生不生若事一心則尚須常念常發願乃生答五屬於橫死且死由瞋癡故爾答六不定能往生如念願真切亦或往生答七不能往生並須隨其一生行業善惡及死時心念善惡而定其升沉然念佛之善根終在後生遇緣可發答八照師授或照本鄉所通用之音念之便可見海刊十三卷六期
