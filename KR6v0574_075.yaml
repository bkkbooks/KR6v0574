body:
  text: 覆仰西居士書仰西居士淨鑒整理僧制有智者皆所同意惟如何整理則往往異其方法拙著整理僧伽制度論過荷推許而衲則僅望人之稍能注意於此漸由討論而進行而已然寸莛不足發洪鐘之響竟亦無一人相談及者有之則惟廣州湯君雪筠與居士耳在湯君之意則因衲於教産計算未符浮增過多易招世人起覬覦之心衲狃於浙江之鄞縣杭縣等一二縣之情狀未能周察他處實不能辭疏闊之咎也所冀有志者共起討究異日時機成熟或可收補偏救弊之微效而已尊論笠居之所倡議者誠足抉其隱患防其流弊然笠居實一熱心振興佛教之大心衆生也殆因悲願太切遂覺所感僧伽環境之過壞言之未免偏激而擇術亦未遑深思耳衲兼録其議一由其所善者亦拙著整理僧伽制度論所曾議及之一部分二欲借其指摘者為雷火針使麻木僧界稍為警覺非以其所取倚賴政府之方法為可行也同抱興教護法之宏願冀與笠居平懷討論也太虛復見海刊二卷七期
