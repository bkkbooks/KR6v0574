body:
  text: 致梁任公書任公先生史席曩者承贈與中國歷史研究法之大著今卒讀之下獲帝網重重之法界觀焉隨推一史迹之關繫其引伸可以無盡則剖一微塵出大千經典夫亦何奇之有以之擴充為事事物物之研究法誠吾人智慧之無盡藏哉於中若窮三日之力卒考定奘師由貞觀元年赴印具見獅子搏兔之精神彌使欽景焉唯所引涅槃經佛説從今日始不聽弟子食肉及入楞伽經佛説我於象腋央掘魔涅槃大雲等一切修多羅中不聽食肉謂涅槃經共認為佛臨滅度前數小時間所説既象腋等經已説何得云從今日始鄙意象腋等經是對別機別説涅槃始為諸弟子明制故不妨云從今日始又涅槃時有通別別在滅度一日夜通則通於一化始終故楞伽不妨引涅槃復次釋尊入滅年代邇因歐人據西藏文釋迦傳及印度石柱刻文之阿育王時代巴利文之錫蘭島史等作為旁證日本人和之先生亦主張之咸趨重衆聖點記之説推定佛寂在西紀前四百八十五年而中國舊傳佛滅度於周穆王五十二年即西紀前九百五十年之説勢將不能存立然阿育王有二人年代前後非一既不足據而藏傳島史之傳説恐更不如吾國傳説者之可信至衆聖點記乃依善見律以傳善見律是解法藏部之四分律者法藏部之分出在佛滅三百至四百年間釋律之善見論應更為晚出當在佛寂四五百年間由此善見律成立後始每一年一點計之明佛滅在周穆王之世尤較可憑信也隨感書請垂教并訊大安太虛和南見海刊三卷十期
