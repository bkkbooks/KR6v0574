body:
  text: 復大菩提會祕書維利申喀函維利申喀法兄大鑒頃奉五月十一日大函藉悉前寄匯票業蒙察存并承寵召參預大法苑開幕典禮至深感謝悲觀比丘現在印度屆時由彼前來參預典禮至為便利請徑函悲觀知照通信地址向加隆吉打中國總領事盧春芳君索取便妥承囑開列捐款人姓名一節可以紀念刊上鐫左列字樣中國佛教徒捐款人代表太虛募集關於協助貴會一節事關教務自當盡力向中國佛教徒宣傳期有裨補承贈法苑影片擬於敝刊海潮音上揭印俾一般佛教徒得共瞻仰抑尤有不能已於言者吾人得睹佛法在其誕生地復活之光明前途與數千年來潛伏印度人民心坎之真理今已醒覺實感無上之愈快惟有虔誠祝禱印度將再為宣揚佛法之領導者且為全世界佛法之發源地茲承寄贈大菩提雜志至深感謝以後煩寄上海閘北同濟路大中華化學工廠轉交託為佛教復興運動一文有暇當即草就寄奉專復并頌近佳太虛謹復見海刊十二卷九期
