body:
  text: 答李守中問二則問一印度教與佛教有何區別答一印度教人大概除回教基督教以外包括婆羅門教耆那教佛教錫克教等由印度人所創興宗教統稱為印度教而視佛教等為印度教之一派故謂釋迦牟尼為印度教之宇宙神第九次化身於人世之聖人並期望第十次化身之統一各教之聖人於未來然實際耆那教與佛教並不承認印度教之神在印度仍有純粹之耆那教徒二百餘萬純粹之佛教徒百餘萬耆那教與佛教都不承認創造并主宰宇宙之神佛教更進而只認因緣生滅不許有各情有常一之精神自我而錫克教等則均許有宇宙唯一之神大抵可認為印度教之一派然就可許為印度教者中仍多派別所奉之神非一最新之拿麻克利西派僅供教祖拿麻克利西而不供神像太戈爾等近之較舊為印度摩訶沙巴派華譯印度大乘會其實應譯印度大會則為較寬大之婆羅門教包含事奉各種不同的婆羅門教之神者甘地尼赫魯等近之然其政治運動與錫克教均排斥回教則與甘地尼赫魯所領導印度國民大會可包回教徒基督教徒之純政治運動又有不同而印度教中尤側重婆羅門教派嚴守階級制者則較印度摩訶沙巴更舊矣問二發展西藏教育當用何法如站在教育的立場看西藏的佛教當如何答二此一問題筆者前年在時代精神上曾發表一較長之論文現手頭無此雜志請從藏有此項雜志處查考之見文化先鋒二卷八期
