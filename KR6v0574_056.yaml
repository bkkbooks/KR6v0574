body:
  text: 與慈雲法師書四通一慈雲法師座下函悉用意雖不無理由而印度瑜珈學派之說未足為憑華嚴及密宗等大乘經典固多重禮拜然按人間佛化之原本可尋之阿含不重禮拜亦不無禮拜造像始佛時優填王造佛旃檀像其他弟子菩薩諸天像皆後起百丈初制亦不立佛殿也順問近好太虛六八二慈雲賢友來書及附致梅坡稿雖平正亦好事不如無夢遊侍者福善多事老朽聞之粲然未加呵止卒因透漏了香氣招致蜂蝶嗡嗡不已傳聞福侍者投佛化新聞有示林梅坡不卜浮沉如何按查或更發噱朽太十二十九三慈雲法師附致定慧和尚希轉交今計劃佛教整委會遷京辦理擬議全國五十至一百大剎直屬中佛會今聘各大剎住持財務者為預備川省或能佔四五剎耳且看大剎熱心如何太虛復七八四慈雲法師鑒惠書并件均悉昭覺開辦僧校至深欽佩惟校長務由智光方丈專任切勿將虛名挂上為要校長暨教職諸公統希致候太虛謹啟九十二慈雲法師藏稿
