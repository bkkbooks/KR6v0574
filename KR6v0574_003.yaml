  text: 復閩南佛化新青年會閩南佛化青年公鑒承函示粘葉二君討論之件具見諸君慎重佛法之至意謬荷諮詢鄙見竊謂粘君語妙思玄欲人將恩怨冤親作一場夢幻觀之雖足令人深省然或致聰明者流粘玄玩世轉不若葉君之詞嚴義正於此人心陷溺之險海中有乘一葉扁舟而誕登彼岸之妙愚見如是尚祈審裁並祝公綏釋太虛和南見海刊五卷六期
