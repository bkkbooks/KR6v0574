body:
  text: 覆妙蓮尼書余以講經轉徙粵鄂致來書久稽未覆為歉大德與妙曇大德皆憑一念之決裂出世網洵女中丈夫也頃有靜禪大德來信全與二德志同行合而能化一家俱為佛子尤見殊勝殆將來佛法大興之兆耶然諺云出家如初成佛有餘所望諸德能以古德自師能常與善知識友親近策勵使初心有進無退耳考諸德發心皆不唯求自了而已且抱有宏法利世之志余為計之當先糾集若月空師并妙慈妙曇靜禪妙蓮諸德就某庵合併成一尼衆叢林一時不要太求人多氣旺必同志者方與同住以免流弊如是二三十人即可成立一尼衆叢林斟酌妙曇靜禪大德所擬叢林制之能實行者先實行之以余計之則可辦一白話文之小旬刊一種以為傳布宗旨宣揚教義之樞紐內糾集就地信佛女士設立一新蓮社每朔望及佛誕等日集社衆開大會念佛懺悔發願受齊戒行善施并講演教義林內衆尼日常功課職務則各按步就班以精進修習之庶幾善信熏資師友護持而自利利人一時俱得成就諸德今忽於此時不約而同各發此無上勝心有大因緣非為偶然期諸德能水乳和融而同宏佛化也至今父母一時不能信佛須知佛有不可思議之力非人之智巧所預當於早晚禮拜三寶代父母懺除業障資發其神識使不期而能信佛此亦孝順子女之第一大孝行也當誠心行之令妹但堅其信心勸其不必急於出家須早晚在家十分殷勤孝順奉事父母以奉事父母時常默念阿彌陀佛以感化之并在家於曉起時或臨睡時澄心靜氣以溫和之聲念阿彌陀佛數百聲則父母不久必為感通也焚指焚身等事其理非一在悟心之士確見身非自己故焚身不過去除一重報障並非自盡又身乃吾所得之一報果吾能善施用之即是用之以造善因其所重者則在能捨除世間所最貪愛之物耳痛不痛則亦有將理勉強制情而忍痛為之者亦有得深忍定了無痛苦者但此種行不須提倡也太虛復見海刊一卷十一期
