body:
  text: 答顯教問問夫佛法以唯識為宗識法有八各有相應心所而數不同然則諸識心所之定數再為佛法之最切近問題也明矣奈何釋迦既遺於前彌勒無補於後無著不以問彌勒世親又略於偈頌致使諸家解釋懸異諍辨如是耶若謂舉一反三留為後世智者研究之餘地是有深意也是某同學語故因而發之則四諦十二因緣等之有決定數量者為淺意耶且以安慧等諸菩薩之智尚不免於錯誤則後世之錯誤者必不少矣佛盡知未來豈坐視其誤不先為之解決耶又護法決定十八心所將為不留後世研究之餘地矣若謂護法見諸家解釋已誤不得已起而正之應時機也則佛何不先知彼等之必誤而預為顯示之乎若謂佛固知後世有護法者當能正之無事汲汲也則是已誤護法以前之衆生矣若謂佛以為此非重要之問題故不說之則違吾前之所言又護法等何必諍此瑣細之故不憚煩乎且彼前家立之後家破之後家立之後又破之護法出世既晚其後此宗亦衰鮮有問津故無復破此者戒賢學護法玄奘學戒賢傳於此土遂以此護法所定為決定正義又安知其不如前諸家之未盡正耶又安知後世不又有智者起而再正之耶若爾則後後正其前前前前不及後後佛法即墮進化例中為永遠之不決定量矣不決定即為謬誤為有上又安所稱真實無上之佛法耶又吾輩惡用敝精勞神以研究此不決定謬誤之法徒遺後世之鄙笑耶凡為諸家諍辨之法皆可如此疑之答一此論文有能起此疑之勢而汝前未有起疑者遂亦未有因而解答之者汝今既有此疑我乃因之解答彼心所數之判定亦如是釋迦彌勒無著世親之際以無多少違異之說遂不感有判定之要茲因世親頌文隱略初家貼文為釋祇九心所次二三四家以餘字顯遍染隨煩惱遂各依集論瑜伽一文又有多少不等至是趨勢上有論定之必要護法乃權衡四家斟酌諸教減其必減增其必增若減若增皆出其所以然之故而後為之判定遂成正義非以居最後為正義乃以顯義已十分明了更無疑滯處故為判定之論二佛法無盡隨宜而說佛已說法如爪上土未說之法如大地土彌勒等亦如是不應以未說故致疑或引其餘已說之四諦等數為例難且四諦等隨其義類建立名數亦不執定或一諦二諦三諦四諦乃至無量諦各據一門各明一致亦不相妨故初說九心所以八大隨攝於根本中故慧心所攝於我見故隱略說九隨眠概略之機亦成所宜次二三四家各依一門明一義亦各成其意趣以為利樂護法時有論定之要乃出定論亦應機之所宜故在前無誤人之過在後不墮進化之例三須知不但心所之數至護法始為明確之論定即心王之數亦至護法始論定前此小乘唯六或一而大乘或取淨第八並立為九皆不明確至護法論定心王有八皆通染淨故三界唯心萬法唯識義佛標其宗至護法始完成之也會以前條意旨亦曰時機所宜使之然耳四學佛之道依聖教量信教成真比量解理依真比量對治非量行得真現量證此論重在引發人人得真比量故勞精敝神學之者非但令記誦其文句而在令人比觀其義而道其故由之得決定解不可引轉否則觀此說既知遇他說時又疑莫決羅列多說比觀究竟則不惟後一說有功而前諸說亦輔成之待未了義顯了義故五觀所疑問未為善疑問者不徒所當疑者而發問故善疑問者應比觀四家與護法之義四家之義既有未了護法之義究了否耶參綜衆相以觀其義使仍有罅漏可疑也則徑提出所疑以問以研究之可也使事理燦然而了無可疑斯即定論所在何須好肉挖瘡更生回惑徒以曾經不定即因致疑則曾經疑應終莫決汝疑汝問復何所為若懷疑不以解決為目的則懷疑但在於懷疑亦失其懷疑之用矣見海刊五卷四期附注原題答佛學院學人顯教疑問之批判
