body:
  text: 覆仁山法師等書仁山法權霜亭智光卻非寬道聖裔懷崑諸法師暨四川湖南貴州等省佛會諸公均鑒荷先後垂詢關於中國佛教會滬辦事處之如何由少數人集議變更前者在南京所開理監聯席會議之議決案如何以改于上海開會及代表須現會會員為限朦呈中訓部備案虛事前均無所知但未離滬前九月二十六日離滬已傳聞為變更之說故曾在九月二十四日佛教日報發表談話聲明若變更京聯決議決不再預問會事遂即回山養息此非虛為德不終蓋殊覺會議及民內部指導等均類兒戲不如山中高臥之為愈耳專復即頌公綏太虛謹啟十月十二日廿五十十七佛教日報
