body:
  text: 覆日本佐伯定胤書定胤大法師元鑒前荷錫臨廬阜備領教益欣喜無量近維起居勝常法樂有加為頌頃承惠書敬悉貴聯合會已推定大法師與木村水野二公為東亞佛教大會準備委員并已議定日期及招待方法具徵辦事精神之切實深為東亞佛教前途慶幸至須待秋間始能開會亦殊恰當以敝處之各省佛教聯合會雖在分途進行而以去秋來東北東南疊興軍事交通梗阻團結艱難致中華佛教聯合會亦尚難及時成立今亦將展期夏間於廬山先開中華佛教聯合會再推各省代表以出席貴處之東亞佛教大會也俟貴處印刷物寄到敝處有何成議時再行奉告先此馳達并祝法安中華佛教聯合會籌備處啟見海刊六卷一期
