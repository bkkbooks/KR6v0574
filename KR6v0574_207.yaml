body:
  text: 答黃懺華問七則問一凝然真如不作萬法一語見何論著問二關於三法印之解釋以何書為最詳問三明心見性一語為宗門所常用心與性有何分別問四懇將應無所住而生其心一語加以極簡單之解釋問五懇以極簡單之解釋指示三界唯心與萬法唯識二語之區別問六觀世音為等覺菩薩三十二相應緣示現原無定法何以世人多圖觀音為女身又起自何時問七宗門原為不言之教但不得已而思其次以何書解釋禪宗為最確切詳明答一凝然真如云云見於賢首家之教義章等乃誤解唯識家所言真如而指斥之辭答二三法印之解釋日文有一佛學概論言之頗詳惜已忘其名答三明心見性心即心識性即真如謂心識若空了或明了即見真如答四應無所住而生其心只是應以我法雙空的觀行智或根本智而生六度等清淨行後得智利他行等答五唯心唯識心識一同二別同者具體綜括言之曰三界唯心抽象分析言之曰萬法唯識心識名異事同別者識指了別境識即前六識由前六識了別萬法上溯凡愚不可知之七八識境明不離識曰萬法唯識心者阿陀那識染淨通名賴耶如來藏如指環與金為地上菩薩直說藏心變現三界身資財等如楞伽密嚴勝鬘華嚴等明答六在中國相傳屢現女身得女人多數崇奉乃成女像他國則不然答七禪宗稍有學理組織者曹洞若洞上古轍等但只一派指月録各派全但無組織唐代之壇經禪源詮宋之傳燈録等見海刊九卷二期
