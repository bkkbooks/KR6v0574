body:
  text: 復李琯卿先生書去年底談話半途中止不單你底意思未盡宣揚即我也覺得尚多討論的地方故今日接讀你的來信把去年研究未了的問題提出來繼續研究我是極歡迎的承你的過分誇獎我可是不敢當今亦聊貢所知以憑審裁而已還望你再進而賜教為幸據說你對於佛教在情意上已是非常信的了但在理智上猶有通不過處今細考你於理智通不過底地方不過是唯物論或心物並行論對于唯心論的衝突罷了佛學與西洋的唯心論唯物論心物並行論都沒有多大關係因佛學中底三界唯心萬法唯識是不同西洋底唯心論的且唯識論在佛學中說明緣起底方面雖稍關重要在第一義諦上仍不成立的故曰若執唯識為真實有亦同法執蓋佛法實是一法不立的凡所說都不過解除心惑底工具心惑本空工具何寄西洋底哲學無論唯心論唯物論或心物並行論都是先認定現前底人世是實有底東西乃從而推究此現前實有底人世在未有以前原本是一件什麼東西於是或說元唯是心元唯是物元唯是心物並行乃再從而說明原本雖然是一件什麼東西向後由如何若何乃變成現前的人世此在發足點先迷了錯了故無論如何橫推豎究終無一是佛說全不如此因為現前的人世現前就是空的就是沒有的現前的人世就都沒有又何論現前的人世以前原本是什麼呢譬如且沒有兔角又何論兔角原本是什麼現前的人世全同迷夢一般迷著了迷夢去做雖似形形類類都實有的若悟知是迷夢時這形形類類又何嘗有一絲毫呢必先於此有些體會於佛法方能領解迷著了夢事為實有便宛然實有這便是三界唯心萬法唯識底注腳了心識者何曰迷夢是三界萬法者何曰夢事是迷夢夢事皆畢竟無實故三界唯心萬法唯識亦畢竟無實必先悟實無心識可唯乃可談三界唯心萬法唯識心識是無定體的故依心識所現底時間空間亦無定量的無定量則無始終無內外無邊際無窮盡不得局定一地球或一太陽系言近則即無一念一塵不當相自如遠則雖十方十世亦無可覓今假說有真如為萬有實性除卻真如皆幻相幻用毫無實體但真如乃非心非物一切俱非的絶無形相可取作用可得的沒有一時一處單有真如而沒有心或心物的亦沒有一念心一塵物非真如的萬有雖皆依真如為實性所變成然真如但永永為萬有的實性從不變成萬有故不可說從真如以發生萬有真如可比為科學上的真空真如遍含靈動不居底覺力比如真空中遍滿以太合真如與靈動假說為本心本心的自體相是通明淨妙的假說為如來藏或佛性至成佛時即為佛的法身然以本心靈動不居故虛擾昏動鬱成迷執譬如見勞成疾假說為第七識幻萬有含藏於本心復本心隱藏於萬有假說為第八識譬如勞見空翳於是有情衆生無情世界內六根外六塵中六識萬有森羅變化不可以究詰皆認識於意識之分別然意識六識第七識第八識展轉為因為緣以相生起都無有始而真如常為真如未嘗或變佛性常為佛性亦未嘗或變若意識了悟所分別底森羅萬有皆由心動變成實體唯是真如真如絶無心動變成底森羅萬有復知心動底不已由昏動底迷執迷執底不解由認識底分別分別底不止由不了宇宙物我底森羅萬有本空乃觀絶無物我但是真如以止認識底分別由止認識底分別以逆解昏動底迷執迷執解則衆生世界空藏識萬有融隱藏的佛性顯常樂我淨底佛果成佛已有解脫迷執底經驗力故永不復生迷執又以曾經歷迷執底境界故遍知迷執中底事這便是唯識底概觀由上底結論一天地人物雖在迷執分別中亦即是空無的二天地人物但從幽深底迷執與顯著的分別所幻現的三山河大地實唯真如真如實無山河大地迷執若除必不得仍有山河大地存在譬如見病所見的華翳實唯虛空虛空實無見病所見的華翳見病若愈必不得仍有華翳存在今我們雖知但是真如絶無物我仍不消滅者以幽深的迷執未除故亦如見病未愈雖知空無華翳華翳仍不消滅佛二九四九年四月二十五日太虛見海刊三卷五期
