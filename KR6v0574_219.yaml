body:
  text: 答談玄問三則問一事相上的生佛是否有增減答一理無增減應已了知今就事相上說有一眾生成佛即眾生界減少一眾生這從世俗世俗諦應說有增減也然在世俗勝義諦上蘊處界等諸法唯識一部分眾生因有佛種性故而成佛此亦成其本來的佛若另有一部分無種性的不成佛則故不增不減又依勝義世俗諦亦不增減如天台宗佛分六即眾生亦然蓋眾生乃眾法合和而生義佛亦眾法合和而生故亦名眾生在天台宗眾生稱理即佛佛亦稱究竟眾生不過佛是清淨五蘊等一眾生所生耳因此無論居在何位生佛之界限不能分離此帶相明性之說故亦為從事相上明也問二法相宗的無種性與法性宗的一切眾生皆有佛性如何融會答二法性宗從勝義勝義說佛性則一切諸法平等平等雖無情亦同以一真法界為體性如天台宗極主張無情皆有佛性而此理在法相宗亦承認如能顯慧日中邊論謂如以勝義真如性為佛性則情與無情皆有佛性然法相宗的種性乃從種子起現行上說有為性有差別故此依護法義及本有義說若依種子可新熏生義無種性將來遇著新熏亦可成佛以諸佛極深悲願為增上緣能令受熏生種如法華經所謂佛種從緣起是故說一乘亦此義耳問三最初的佛及最後的佛如何成就答三依勝義生佛不增不減即無最初最後可言今且依世俗世俗言最初佛以苦為師因為眾生遭了苦痛想出離苦而求解脫碰盡種種難關後來一碰碰著了真解脫門依之修持乃成最初的佛從是有此初佛為師或授記或教授求成佛者便容易多了至於最後成佛的依法相說因有無種性眾生可度故菩薩仍可度生成佛其實菩薩雖發願度盡眾生而未到眾生度盡已皆成佛因為已智悲圓滿矣最後成佛的菩薩闕大悲願所緣之境其實亦如最初成佛的菩薩闕於真智慧所依之教但闕於所緣之境悲願雖較難成若能緣過去眾生強發悲願亦終可圓成耳談玄記見正信二卷二期附註原題佛理上的三個問題今改題
