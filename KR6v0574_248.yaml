body:
  text: 在首都佛學會答問陳秉良問出生菩提心經何以檢閱藏經目錄無有答此經在藏經中列方等部再者此經譯本原有佛說二字後為印者略去徐心明問自他變換發菩提心意義云何答發菩提心修法有二種一由己心轉移如目蓮救母之心先將為己心除去專心在救母出苦更進一步普觀一切眾生皆如母處苦中應以救母出苦之心而來廣度一切眾生遂發生大悲菩提心了二以理觀察自身從四大五蘊等觀照畢竟無我唯是他和合自性空再進一步觀察一切眾生不知出苦沒有能力出苦乃發以他為自的菩提心唯以救眾生為事總之自私自利心是眾生心利他心即無上菩提心也熊道瑞問此經謂有三種菩提然聲聞菩提與辟支菩提似無分別而經上亦未明白指示答聲聞與辟支所發之菩提均屬自利不過聲聞係生有佛之世聞佛音教生菩提心者而辟支則觀十二因緣在無佛世亦可發此心李子寬問持怖魔咒可能持得靈驗否答凡持密咒如音韻準確自當靈驗譯音難讀準故以師傅口傳為佳孔士豪問童蒙止觀中之六妙門精義何在答童蒙止觀與六妙門根本是兩部書不過通行本訂在一本書上童蒙止觀乃智者大師為初入門者所說故名童蒙內講二十五前方便種種止觀法基礎而六妙門則是各止觀中六重次第之專門止觀屬數息觀所謂六次第者即一數二隨三止四觀五還六淨此六妙門乃數息不淨二甘露法門之一他若念佛持咒誦經等等雖入手不同然皆可證入三昧徐心明問六妙門中有十二種醫病法門是否佛說答是治禪病的亦即調身之法如去寒去熱等張蓓蘅問佛教主張清淨無為固然甚好假使世界上的人個個去出家修學清淨無為法那麼世界上又成一種甚麼現象呢答說佛教主張人人去出家這是一般人誤解佛教佛教中本來有四眾弟子皆可修持佛法至於清淨無為恐怕妳也是誤解了要知道我們一個人其所以在六道中頭出頭沒者皆由無明起煩惱而感後有於是由惑造業由業感苦永無了期今若能修清淨無為即證諸法空相所謂不生不滅不垢不淨不增不減更進一步由大覺悟的菩提心創造安樂世界復次佛法中講戒殺放生乃護眾生心而然以眾生既隨業報而受生即執著此生命如殺害之必起反抗因之互相殘殺循環不已今佛法之提倡戒殺放生即息此業趨向清淨無為之初階再進一步根本辦法所謂觀察此世界非天神造非物質造但由無明起煩惱而有生命解脫煩惱自達清淨莊嚴法界並非叫人離此世界別求也張一鳴問業報有無自性答業報本如幻如化如本人執著有自性則起煩惱業受生死苦若能觀如空華則解脫張又問無心有沒有煩惱答若空觀成就漸無煩惱張又問經云善能分別無法相於第一義無不動試問既了達真如妙理於第一義諦亦能不動乎答一切法皆是因緣和合如幻如化無自性故空即謂真空不空既明真空則不起貪瞋癡種種煩惱了一切法皆是真空法性即雖分別諸法而於第一義不動也謝連貴問菴摩那識是否是真性種子斷否答菴摩那識即清淨心自與真性相應而一切清淨功德種子仍是不滅的此識譯義即無垢識趙乙林問參禪容易入魔可有預防之法否答如照二十五種前方便預備完成自無入魔之慮矣隆信記見海刊二十七卷十二期杜名廉問一何謂無緣慈答一慈分三種一生緣慈緣眾生令脫苦而得樂二法緣慈菩薩已見眾生性空緣於蘊等諸法憫眾生苦使斷無明煩惱之慈悲也三無緣慈大菩薩與佛證眾生及諸法皆空心無本緣自然起平等慈悲心隨眾生類拔苦與樂故云無緣慈也總言之前二尚有情執第一是待眾生為對象而起慈第二待諸法為對象而起慈此無緣慈乃不待對象而行慈也問二出生菩提心經說咒破魔的魔何指答二魔有四種一煩惱魔能壞一切功德造諸惡業淪于生死應以智慧破之二業魔能縛眾生受種種苦以懺悔減輕及修對治功德消除之三死魔斷眾生命根前二魔降伏後此自消除四天魔阻眾生發出世心尤阻發大菩提心作一切功德事業諸佛及大菩薩說咒破之故說咒破魔乃破天魔及魔眾也問三僧肇論云旋嵐偃嶽而常靜江河競注而不流何解答三大風吹壞須彌山可謂天翻地覆之大動然動係和續假相能見剎那滅真相則即動而不動故云常靜下句例此問四煩惱即菩提何解答四煩惱與菩提本是相反的兩回事如未斷煩惱時即無菩提可言已得菩提時則無煩惱勢不兩立如明與暗二者皆是因緣生法空無自性空性無二故相即又當煩惱生時由觀照其空而覺悟即是菩提如濕柴本非是火因火力強盛旋亦為生火燃料矣徐心明問當吾父母有病即想祈禱佛菩薩加被早愈每每果愈真是菩薩感應抑自己心理作用耶答當誠切祈禱默佑時自得佛菩薩以無緣慈力而來感應之乃一方自心祈求力一方佛菩薩感應力如明月照百川潭水清靜即現明月渾濁則不見汝當急切祈佑時心必無他雜念以懇誠故為佛菩薩感應亦無疑也蔣金章問一初入信仰佛教階段宜先看何種經藉按步研究答一可先訂購太虛叢書預約看之此書乃按步驟而編製由淺入深自得佳境問二佛學大小乘何別答二小乘在智境上即是證得生空而未證法空在範圍只求自了不為法界眾生同得離苦乃由一己修戒定慧達解脫生死之涅槃大乘菩薩深達法空普為法界眾生發四宏誓願轉無量眾生世界成清淨佛剎問三佛法傳入中國歷史近二千年而佛教整個精神與意義何仍未發揚答三佛法衰敗原因固非一端然以歷史言佛教于隋唐時發揚最盛經唐武宗摧殘後直至宋初雖復興已陷偏枯而至清季更衰頹之極故至今佛教不昌幸今社會開放研究佛學之知識份子日漸增多今後佛法可期昌盛也隆信記見覺群二十二期王佑人問孟子云不動心與佛學而不動心同否答孟子所謂不動心乃約修養工夫而言不動指富貴不能淫等等而佛學所謂動即不動係指法性而言世間物事雖是紛動只是假相有動而實際未嘗動也隆信記見覺群二十二期
