body:
  text: 與大圓居士書六通一大圓居士法喜承問行捨之義當不作行蘊起時即捨為解蓋五受之中有捨受此云行捨乃示別非屬受蘊之捨心所而是屬行蘊之捨心所耳然捨之為無偏倚無滯著也有平等中容之意亦金剛經應無所住之義瑜伽師地論云如是菩薩行勝義故於一切法平等平等以真如慧如實觀察於一切處具平等見具平等心得最勝捨此可知行捨之所謂捨非有抑止之意但為心行平等之善心所法耳幸居士再參詳之又承示曾蕭兩君詢敝院明春有無招班一事按敝院修學科之學人於本年年假考試未免有人降班故於程度高尚者明春當可插班加入惟須已具佛學根底且國文通暢或曾學日英文之一者為合格惟審擇焉專復并訊講祉太虛和南璧華居士均此問候見海刊三卷十二期二大圓居士鑒接電時知蔣已離鄂故未致電今日已另函京矣讀一期潮音藉知本院情狀及居士之書為感返日本時佐伯送性相學典樣本附奉并訊全院安吉太虛啓見海刊十卷四期三大圓居士鑒今抵滬收讀手書殊用欣慰此行於各國雖布佛法聲氣猶未能責以財施唯中國能設有可供西人來學之學院則來學者蓋將有人矣故吾意亦擬於本院籌備試辦然其辦法對於以前者當改變容稍暇擬商故對於預科及某等辦法暫勿宣布唯於經費能先籌畫甚盼之請告院職員董諸公為荷并訊公安太虛啓見海刊十卷四期四大圓居士覽宏法之人除心地宗通教義說通外更須將自身之嗜好家屬之牽纏法眷即徒弟學生等之糾繞去令淨盡乃能灑灑脫脫隨機應緣如月印潭過無痕跡竊嘗自勉而未能借觀居士能解能行通身乾淨然未免屬眷之纍能猛然割斷作比丘宏法乎天龍仰之矣餘題別簡并訊禪悅太虛合掌來問不探分別論所執何在護師破意立意何在遽為分別論代立種子代取銷常一體執曾謂護師無的放矢乃爾耶須悟計有一個心體性常無漏名性本淨離客塵染即顯無漏故無漏法非生因生即不從種子生此正分別論之執處故例數論相雖轉變而體常一破之又以若有漏心之體性是無漏應無漏心之體性是有漏破之此中差別因緣不可得故一句謂若汝計有漏心體性是無漏之宗得成我說無漏心體性是有漏之宗亦成以彼此差別之理由不可得故然我宗若成則成心性本染永染而汝心性本淨宗被破此破意也至立意在有為無漏是生因生無漏現行親從無漏種生並非心體向來性是無漏今但顯出其相不須從種子而生者故必有無漏之種也至護法二解妙契性相一心空理所顯真如曰性本淨是指無為無漏二心王體曰性本淨是指有為無覆他處說如來自性清淨亦依此言而本有無漏種雖亦可釋心性本淨然分別論不曾立種豈能代引成彼若云種子隨義假立則諸法孰非隨義假立者諸所破外道應皆可為假立義以救之如此徒尚浮辨無義無利迷佛菩薩立破之意深矣且章太炎君非專佛者尚知儒佛雖同六度唯有漏無漏為異故不應以諸子百家之有漏凡語濫無漏聖言嗚呼豈從無漏智流出之聖教乃猶待有漏之凡語為補苴耶如曰隨俗方便則粗言野語皆可何但諸子剷文士習持聖言量是所望於居士見居士林林刊第十期附注原題分別一切種相之研究五大圓居士法舫師同鑒讀來書知張胡二君向佛之志甚堪嘉許可於佛前拜受三皈今為取法名慧莊慧嚴以為紀念又最新科學若相對論量子論等已摧前三十年之科學執見而近佛說雖尚隔未達而學佛者應精究利用不應排斥中國少真科學佛學者不通科學科學者不通佛學互排類盲近見中央研究院王小徐作佛法的科學說明頗佳今後真能光闡佛法者屬此類法舫評錦漢者較善因為佳須知錦漢亦是毫無科學知識認彼為科學便錯了太虛啓見海刊十卷七期六大圓開士書偈皆發悲煥智讀之極為神往貴府諸弟多亡為世為教殊惜才凋耳除足下兒女外全家所遺恐惟寡婦孤兒女可就家改淨行林作工學佛以和合生活則家之名相既除家世之人亦無得以家之名相繫枷矣並問無惱太虛謹復見海刊十卷十一期
