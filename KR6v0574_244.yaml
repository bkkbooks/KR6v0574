body:
  text: 答傅汶明問二則問一佛教分幾宗那一宗最合於未出家者修習答一佛教各宗為歷史上演變而出其中有印度原有之宗派亦有來中國後始有之宗派亦有來中國後不傳者小乘諸部派是也中國之佛教十宗二宗小乘七宗大乘律宗通大乘小乘之間此乃由中國佛教綜合先後變化而言不必一定記其宗派以多宗已與今無關而不有或今有而亦無一定區別故不必言宗派而言最為一般易修之法門則淨土法門是問二學佛除讀經外尚應靜坐是否未出家亦可靜坐答二靜坐是做功夫而做功夫不限於靜坐念佛拜經修布施參禪持咒均屬做功夫靜坐在中國儒家道家亦習之佛教雖亦靜坐但修禪定不限於靜坐靜坐為修禪定初步功夫故佛法中亦有靜坐修禪定之方式其用意則大有不同常人之靜坐或為衛生如因是子而道家則煉精氣神自身體中提煉出一部為將來長生之物佛法則不然乃由戒生定由定生慧先修戒以除一切不良習慣養成有規律生活由此基礎而修定和平統一使精神凝定人之精神本光明覺照常人時昏亂故失本心之智慧有定乃能不昏亂為除昏沉睡眠與浮動散亂故靜始能啓發本心智慧明心乃見一切法之真實性亦即見人生本來面目宇宙真相能明見宇宙人生真相則去除一切無明黑暗而可以無復錯誤顛倒不生煩惱不起不合理行為則生死輪回之痛苦乃可解脫故佛修禪定以靜為始由不昏沉不散亂而至清明凝靜乃啓本心智慧光明而照見宇宙人生真性此乃佛法靜坐之理能修到明心見性即可成佛但常人多不易做到即出家人亦每難做到故有種種方便法門如念阿彌陀佛臨終時往生極樂世界可以得妥善之修行處再漸圖上進程心勉記見海刊二十六卷十期
