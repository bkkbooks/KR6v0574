body:
  text: 致劉甫澄軍長及川東各信佛者書謹聞建金剛菩提之塔建西南和平之會設華嚴講誦之校派康藏留學之僧博施修福濟衆興善仰企精誠曷勝紉佩惟是住持佛法責在寺僧窳敗之餘整治是待必一新寺僧之面目使能表現佛教精神乃可回群衆之視聽如不揣其本而徒齊其末則雖以求覺而反自迷民衆將駭為奪生人之資養事神鬼之渺茫不惟無以見公等安國福民之至意或且轉招來佛教蠹民病國之謗詞致對如來之正法益滋常識之障礙豈不與公等初心所期適相僢馳者哉達摩言造像興寺並無功德般若謂齋會求福末劫衰相此皆為真正大護法之士作進一步之論者也茲太虛以禮謁雙峨遊涉三巴竊聞弘化之懇誠彌切私心之感動乃將所擬建立中國現代佛教住持僧大綱檢請垂察采行庶獲效易俗移風之功耳雖二十年之遠效將在全國而第一期之發論可由一省從來禍亂靡定之癥結一言以蔽之曰國民思想信仰失其重心而已今萬方猶在喜亂之際若諸公獨建治平之基則他日光榮之歷史寧不焜耀千秋而炳燁五洲也哉惟公等出勇決之智為弘毅之圖則國民之幸亦人世之福也至於遣青年苾芻留學康藏詢為互相切磋所必需之舉然在今寺僧形勢之下無論其不能成事實也即令諸寺各派其學無根抵之僧前往空拋歲餼漫為雲遊而已以言吸收其所長而糾正其所短汰除糟粕而輸貢精華亦安有可期哉而前者北平佛教藏文學院所有入藏求法團之衆今滯留康藏間者猶不下二十餘人此輩於佛典藏文皆已造有基礎而轉徙溝壑半成餓殍若能給以資助俾獲卒成其所業不其事半功倍歟見海刊十一卷十二期
