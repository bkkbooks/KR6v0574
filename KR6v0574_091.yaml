  text: 致西北大學校長書佩青先生大鑒夏初得示知台駕有陜西之行頃接回音並賜大學章程藉悉壹是而貴大學成立之速皆出宏謀碩畫莫名欽佩閱豫科有因明大意而本科文學院於印度文化擷其精要或可設一因明唯識學講座敬質高明以為然否哲學綱要已函購遙承關照為感專復並訊起居吉祥衲太虛和南見海刊五卷一期
