body:
  text: 復王容子居士書容子居士淨鑒得元白居士來函知居士潛心佛法欲精究唯識以成妙觀甚見志道之篤而擇門之專也略貢所習希借覽焉考唯識五觀最注重者乃在遣虛存實與捨相證性二觀耳中間三觀特簡菩薩智中之微細淆訛而已欲成觀智先明理趣欲明遣虛存實捨相證性之理趣當審究三性之義何謂三性一者遍計所執自性此即第六意識依第七末那為根執宇宙物我等一一法為實有自體乃五趣二乘之凡愚有情共有之虛妄執著此即所當遣除之虛也二者依他起性乃了知假實色心有為無為有漏無漏諸法一一皆展轉互相仗託以為因緣而悉由識心分別顯現了無離識心外之實有物所執為宇宙物我等之實有物但是意識所取名言之境唯有假名都無自體若如是知則順實相此即所當存留之實也準此諦理一遣一存相為剴切安住中正由比量之假觀入現量之真觀是為最初唯識觀成三者圓成實性由第一觀更進一步捨離一切識心變現名言境界而進觀即心自性之離言實性由之證入本來圓滿本來常住本來清淨本來成就一切功德之真如心是為究竟唯識觀成此唯識觀皆中道觀一入現量便成祖佛下手極分明簡易徹體無淆訛過患誠有智者所當勤務者也至上生兜率淨土之法門有彌勒上生經及兜率龜鏡等書居士當能自尋覽之可毋庸贅述爾專此順訊道安釋太虛和南見覺社叢書第四期
