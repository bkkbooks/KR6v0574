body:
  text: 答英國里爾大學教授愛斯嘉拉博士問八則答一佛教來中國中國之政治早成立且儒家認為專職故佛教取超然態度退處方外以免衝突其影響多在民間之道德風俗中而在國家之政制法制上較少影響答二但於佛教團之組織及寺院僧眾之管理上由佛教徒之法律與中國之政法倫理相互之關係產生一僧官法六朝時已有之明清來於京師設僧錄司府設僧綱司縣設僧會司民國以來廢除另制由縣知事管理之寺廟管理條例二許為僧眾之禮部考試給度牒法起於隋唐時至清初廢除計由大寺院傳戒給戒牒以為僧眾三印度之佛教各派戒律威儀法經中國律宗唐道宣等調和大乘之律宗法至今猶為初入僧受戒期所必習及律宗寺院所遵行之法四寺院清規起於禪宗宋明來經國家認可為各宗寺院調和採用今猶為各宗大寺院日常習用之法此外則由佛教之慈悲不殺生觀念影響信佛之帝王臣宰減刑大赦及保護動物生命等亦有之中國佛徒之蔬食即由梁武帝極力主張所致答三三國時孫權受康僧等之感化東晉時石勒苻堅受佛圖澄釋道安之感化南朝宋文帝以至隋文帝唐太宗等歷代英主皆有由佛教慈悲而滅殺之關係答四五六梁僧祐著宏明集以及佛祖通載佛祖統紀釋氏稽古略等書中散見之答七見於第二條一二三四各項中有可相比較者答八關於佛教法吾曾著整理僧制論他日當以一冊送閱今中國改為民主國主張由佛教之自由平等仁愛等原理為立法根據客中未帶書籍潦草答復請原諒之見海刊九卷十二期
