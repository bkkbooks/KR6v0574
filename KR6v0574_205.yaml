body:
  text: 答字林報西人問四則問一據佛家之因果必然律大本因之信仰是否全無理由答一各宗教或其他學派以根據現實人物果所推想其未有前之一種大元因無論說為人格的神或非人格的精神及物質虛空等等在佛教的真理上皆決然否認之但在俗情上則隨順解釋為欲界的天主或色界的天主或無色界的心識或物質界的原素而仍否認為世界萬有唯一之大本因也何者以天主心識質素等亦即為萬有之一有故此一有可為大本因則餘一切有皆可為大本因餘一切有為所生果此一有亦為所生果以其理平等故天主等不得單為大本因現實人物亦不得單為所生果故佛教之因果論乃是無邊無中無始無終的何者無邊虛空中的世界是無數的我們現見的世界與其餘無數世界在虛空中與一微塵與其餘無數微塵在虛空中無異的無數的世界在空中或成或住或壞或空是不同時的故世界的成住壞空是循環無端的不得斷割任何一端為世界生起的大本因換言之則任何一端皆可為世界成住壞空的現象之因及果的其式如下住成世界壞空由空為因而成為果由成為因而住為果由住為因而壞為果由壞為因而空為果故皆非特定的大本因或特定的所生果亦皆為因及為果也又無數世界中的人物更是無數的無生的物件若一石塊一木棹等成住壞空同於世界而生物則分為四有其式如下死有現有生物中有生有由現在有活著現象的生物到有死了現象的生物由死了現象的生物到有死與生中間現象的生物由死與生中間的生物到初發生的生物由初發生的又到現行活著的生物故生物現象亦與非生物的世界同是循環無端的既無始起之點亦無終盡之點則不得指任何一點為大本因了統計生物無數眾生與非生物無數器界循環變化的因果以察其變動的因果之關係又可表如下式非生物生物環境心識行業生物非生物皆以行業為因緣所生之果行業又以心識在環境中活動為因緣所生之果而心識既即為生物之內含要素又即依生物非生物為環境而現起故心識又是生物非生物為因緣所生之果但行業到生物非生物是已成而必然的因果即自然界的因果現象是而生物非生物到心識與心識到行業是未成而不必然的因果以其未成而不必然也故有自由活動創造的餘地自由活動而刱造不善的行業可致鬼獄畜生等苦的身及器界自由活動而刱造善的行業可致人天乃至佛等樂的身及器界此佛教應觀法界性一切唯心造等之唯心論唯識論之所建立而教人以自造善因自致樂果之真理也由是觀之佛教的因果真理一方可云是無本的一方可云是心樞的無本故不受任何之限制心樞故可有相當之自由有相當之自由故善惡可分而責任應負不可不孜孜自勉勉人以為善也但此佛教之心樞的因果論之所謂心識乃即是現有的心識亦即是依生物為根及生物非生物為境所生起之心識故亦不同彼唯心哲學等所指為萬有大本因的心也心樞云者但明心為萬有因果變動中之樞紐而已問二吾人何故不應仰賴順從此大本因來支配吾人之自動的良心與自意的判決及來體會人物個性相互交感之快樂與人物任意支配之嗜好答二第一問題的大本因既經否決則第二問題大本因的如何若何自不成問題矣但吾人亦承認發達至最高善的佛陀其福慧圓滿的人格精神有輔助吾人為善之能力其所教訓吾人的言說為指導吾人覺悟之要道故吾人皈依佛法及依佛法修學的朋友問三夫此可愛而真實的大本因人格之存在與其能任意支配生物非生物之一切關係乃宗教之最有價值有理性的推論而佛教獨斥其非但此二說皆為人群之所信服皆在人類中放大光明二說既如此相違吾人將何以知其二者相互或比較之價值乎答三第三問題前半亦不成問題至後半所云價值則吾人以為認有任何大本因的宗教學派在相當俗情上亦各有相當價值但在真理上則唯佛教有價值而餘者皆無價值吾人若以真理為判斷固不問於此二者之主張與信從的人數孰多也若問所云真理是何物則即前所云無本的心樞的因果論是問四上帝之旨在促進生物之繁盛妙在救人即于此世界之中不必退出此世界之外凡接近之者皆得受其直接之感應而變化其體質豈佛陀之意在消滅生機逃出此如魔之世界意謂依克己工夫所達到之地位得較依上帝之旨所可達者為更有理性有價值而為可靠且完美之最高地位乎答四第四問題前半之上帝云云吾人既不承認任何之大本因則亦不成問題矣至後半所云佛陀之意云云此猶是小乘的佛徒之意而非大乘的佛與佛徒的真義大乘的佛與佛徒的真義則在啟導此世界他世界之人類及一切生物可以自由活動的心識引令向善的路上發達進化以各各進化到福慧圓滿之佛的世界故其達到之地位當然認為比任何宗教學派所認為最高之地位更為有價值且合理性而完美要之佛法的因果是自心的因果不依其他一物為大本因故佛法的因果是平等的因果即依一切生物平等可自由活動的心識藉已成佛果的勝緣可平等發達至佛世界故反之則認有大本因的宗教乃是以他一物為因而自則為果的自但為果而不能為因則無自造其因之自由而為善為惡亦非自心之責任故無道德律之存在此如專制之帝國萬民有罪罪由帝王萬民有福福由帝王故萬民不負其責任又承認有特定之一物為大本因的彼之一物但為因而非果故為不平等因而世界萬有又但為果而非因故但為不平等因所產生之果有但因而非果之一物則彼一物可無因而有萬有亦應無因而有如是則因破因破則無因無因亦無果故無因果律之存在由此真理上決無特定一物大本因之可能但由無數量的世界眾生生滅連續上可說明因果的關係見海刊七卷十二期
