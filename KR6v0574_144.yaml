  text: 復周繼武居士書繼武居士慧鑒展惠書並所附書覽之心意快然殆非言喻虛之起信宗地上菩薩心境説義得楞伽藏識寄居如來藏中證之及起信不唯以真如為真如兼以淨法為真如義又真如亦為所緣緣義虛皆發端而微得附書益臻明了喜何似之當即將件送海潮音發表俾閲者同沾法樂專頌禪悅太虛謹復二五八五見海刊十七卷九期
