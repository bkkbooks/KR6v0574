body:
  text: 與胡適之書適之先生在現代評論讀了大著的菩提達磨因我對于這事也曾用過一回推攷特寫出寄上我以為洛陽伽藍記上所載的菩提達摩是的確有這個波斯胡僧的但卻不是後來禪宗奉為初祖的菩提達摩禪宗所奉為初祖的事實上人物應是先生在嵩山少林寺為魏君臣道俗舉國奉為大禪師的佛陀扇多至其名字則是後來禪宗的人為避去佛陀扇多乃影借達摩波羅與菩提達摩菩提流支的名字另用此名立為祖的略言其證據有三種一奇異的禪風由佛陀扇多後漸昌二傳達摩與流支不合然此實為扇多與流支議地論不合之故事三二祖神光慧可即傳扇多禪的慧光律師一名折成二名至宣律師僧傳所載則出於禪宗傳說流行後更采伽藍記一百五十歲之說而成這點意見或可備哲學史的參攷見海刊九卷六期
