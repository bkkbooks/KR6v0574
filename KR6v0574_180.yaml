body:
  text: 為追薦羅斯福總統告全國佛教徒電全國佛教團體徒衆均鑒羅斯福總統在美國為未曾有之聯四任者在全世界為同盟國之執牛耳者仁聲義聞洋溢全球吾佛徒方以鐵輪王奮戈乃定期之不圖未及觀成遽傳噩耗所幸蕭規曹隨勝業必成吾佛徒哀慕之餘其各誦經念佛竭誠追荐以見公道在人良心未泯戰爭必可消弭和平定能永久矣中國佛學會理事長太虛叩元見海刊二十六卷五期
