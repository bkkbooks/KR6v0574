body:
  text: 答王蓉清居士書頃由嚴廳長轉至寶書因太虛嘗廁迹桑門乃猥蒙獎飾並垂詢以佛法愧對奚似然辭意殷厚雅問高深雖未堪以僿陋酬既逢淨名又安能不略供其愚仰靳訶正乎竊挽近士夫之學佛或助文章之波瀾或供名理之紬繹求其刳心皈命精義入神者殆亦罕覯長者以仲尼學易之年而學佛必能法隨法行與説食數寶者異則所云佛學愈後愈深亦愈趨愈捷者殆有任運增進欲罷不能之樂歟嘗論佛教之教義法界性相圓滿真常如釋尊大覺一念普印是為根本之教有情迷執未能相應展轉方便隨類開解爰成差別之義從差別義間有談佛學之進化者謂小乘大乘皆渾成於釋尊住世之日而未露小乘大乘之罅隙釋尊寂後以律相故小乘教團最先成立次成立小乘有宗次成立小乘空宗次馬鳴成立大乘次龍樹成立大乘空宗次無著成立大乘有宗則由渾而畫矣傳入華夏匯成天台賢首二家皆為大乘圓宗天台宗成立之時禪宗未盛故於化法不立頓教賢首宗成立時禪宗風行日久遂立頓教以收之然天台之化法四教各分十六門入理之外別有一離言諦可當禪宗且比立頓教為尤善何則教者隨機所説之軌範物解宗者聖智所證之任持自性故教譬幼少壯老而宗譬人教譬江河淮海而宗譬水略其形相數量而直觀體性人性水體固靡間於幼少壯老江河淮海也賢首之立小始終頓圓五教小始終為漸圓則非頓非漸然除頓教當教亦各有修入階次雖有由小轉進乎始乎終乎圓者上智之士頓悟圓修小始非所必經也李唐以降宗支離岐戒學浸不注重小乘先衰密宗旋替三論慈恩天台賢首諸教觀浮休不易修習於是反躬切己之行會歸乎禪淨二途賢首稍近乎禪三論天台之與慈恩其所歸雖有極樂兜率之異要皆往生淨土之法耳至達摩東來不立文字直指人心見性成佛禪宗以建宗教以分其示人入道之門誠簡要切適矣蓋人心入道之基第一當確立諦信法性心第二當休歇攀緣境界心夫吾人聞他人之言而信之恆不如目擊身觸其相而信之之確乎不可拔真如法性吾人固可以反證之心體者也與其遍探法藏而猶不能疑斷信生曷若有術焉令了了自見而疑絶信成乎抑研尋經論不得不隨順名言以分別則轉使攀緣心熾然盛行縱得知解明了緣止信立亦何若由銷除識想而悟入獲信心時諸攀緣心頓與之俱息乎此宗門之所以殊勝也宗門所重尤在必令叩心內悟不從文字語言以生解逮既證悟桀然有得然尚有微疑未亡即不能自決所悟證者果與佛祖所傳之道同否也是則必有待乎先覺之印證若永嘉定慧命於曹溪汝既如是吾亦如是二語所謂以心印心也非此則道統不存信無由立故曹溪門人策永嘉曰大德無師獨悟威音以前則可威音以後則天然外道也佛法住世之日不許有獨覺者亦是此意惟後世亦有依佛祖經論語録以印證者耳機鋒乃宗家活用雖著於馬祖實則釋尊拈花迦葉微笑早發厥端即少林答神光將心來與汝安一語直使二祖有手無可伸處盡力祇道個覓心了不可得亦何殊馬祖一喝百丈耳聾三日哉提究話頭如香巖因溈山問父母未生前本來面目力參數年聞擊竹聲徹悟即其緣起溯禪宗初至之時學者未有依傍直吐胸襟故一語相契即可印心嗣以禪録流布學語者寖盛馬祖乃變用閃電擊石之機從不及擬議思量間掀翻意識揭露本懷又久之機鋒亦成熟習口舌滑利便堪取給妙喜乃專持一可疑不可解之問題先使人貫注全神叩心參究然後觸令悟入要之機鋒話頭皆以救一時之弊俾不能在文字語言伎倆窠臼上立腳躲跟售其欺妄因之死心踏地見則直下見不見則回光反究私謂禪林至今亦幾同餼羊之存沿其末流失其本源有大師者出當一撥而返之少室之朔耳長者今有志禪宗應以外息諸緣內心無喘身如牆壁斯為第一其次則置傳燈録一部朝夕研幾一句一字苟心頭未能悄然誓不放過一旦遇著狹路冤家如目中著剌不拔除不能一刻暫寧窮參力究不徹不已則必有破黑漆桶入大明國之時紙上無佛祖舌下無禪師最要者每日黎明必跏趺靜坐一二時耳長者能發此無上勝心當知已曾親近百千萬億佛深植道根願黽勉以求貫徹則佛法多一靈驗之人亦佛法之幸也至以釋尊馬祖龍樹無著天親達摩並論從學術史觀之未嘗不可若格以佛教之教律釋尊為忍土賢劫第四佛獨尊無侶未應虛擬也又今之叢林寧波有觀宗寺係專習天臺者其餘教下諸家不惟無學習之專所且沙門中鮮有學習之者然有歐陽竟無居士頗精攝論章太炎居士頗精唯識黎端甫居士頗精三論近已逝世李政綱居士頗精真言而淨律二門各禪林大都兼行亦多專修淨業者律門僅聞有南京寶華山耳禪宗之曹洞宗盛行日本閩粵贛亦未絶流傳習禪之叢林茲當以揚州高旻寺為最善其次則鎮江金山寺杭州天目山寧波天童寺每值冬期起禪七之時皆可參預也沙門之高行姑就普陀言淨有印光法師禪有昱山禪師印師之近刊信稿即附奉覽又佛法引導論一卷於大小乘禪教律淨頗有論列嘗為訂正其辭亦足以見余懷之所存也見覺社叢書第四期
