body:
  text: 覆王弘願居士書七通一承示譯權田僧正兩部曼荼羅通解付海潮音登載甚是歡迎電版應可加入歐陽君所著誠如居士所言拙著指耶回所奉天神無甚依據也羅漢菩薩變易生死論疏中往往談及楞嚴七卷中所説衆生顛倒嘗謂即是變易生死是自主而非業繫是進化而非輪回則竊説為與分段生死不同者也是等流而猶帶異熟是增進而猶未圓滿則竊説為與佛地真常不同者也太虛和南見海刊一卷二期二徑復者愈出愈好固將有此期望而回視所曾出者則未有此滿意之處當期之於居士之大作耳大作接得已預告於第六期矣太虛陰六月底仍回杭州所詢悲華及笠居一係別署一為湖南寶慶佛教慈兒院善因苾芻也此復弘願居士大鑒太虛合十見海刊一卷六期三承詢真帶質境之義久稽未答為歉按唯識三境四分諸義雖聖智自證所知實常情共由之則餘宗取之為説見義未諦語意離異沉晦者多宋明以來轉益汗漫致學人莫究其真也今按真帶質境第六第七兩識皆有之而吾人日用中所明了者則但第六意識一分其屬於第七末那者自是深隱不易明了然第六識於境無所不緣故不得就日用中一分明了之意識境指出之蓋現行明了意識中所明了諸現行心及心所即意識所緣之真帶質境也譬如忽於行路之時足為棘刺所傷身識意識同緣痛觸身識同時意識所緣性境及獨頭意識所緣似帶質境是時意識之了知中兼將能緣彼痛觸之痛覺領以為境能領痛覺為境者即明了獨頭意識所領為境之痛覺即真帶質境是時明了獨頭意識若不兼領痛覺為境則痛覺止息後在明了獨頭意識中應不能重現當時痛覺之相故由是觀之則意識上當時必有以心以明了獨頭之意識緣心緣身識意識之痛受之真帶質境可知矣凡吾人內觀現行自心心所聚與未成佛者他心通之知他心其能觀能知之心皆能緣之明了獨頭意識其所觀所知之心皆所緣之真帶質境概可知矣夫心本無可緣而取之為所緣境者但是帶能緣所緣兩心於其中間所變生之相正猶眚目燈光之間所現五色重疊輪影五色重疊輪影雖非燈光之真實相然亦必依燈光而有且淨目所見燈光之真實相亦不離此眚目所見五色重疊輪影而有故退非似帶質境及影像境進非性境而但為真帶質境也以心緣心但為真帶質境故雖深觀唯識若現前尚少存所緣以為唯識性者必未能真住唯識性而真住唯識性時必智都無所緣也至佛智自體顯照一切法則不復在此例復次明了獨頭意識之自證分亦常人日用間所能證知比如忽起一是非心即此所了別之是非為相分即此是非之能了別為見分而此是非心即為彼相分見分所依持之自證分體彼所了別之是非是非之能了別即為此自證分所變起之相分見分用由自證分言之但是一是非心就用上剖説為相分見分之二耳故自證分在意識亦非玄奧難知也途中草草不盡所懷惟居士更深究開顯之太虛書於九江舟次見海刊一卷十二期四弘願居士慈鑒屢讀大著歎為震旦居士中之具正知見者并歎為震旦專門真言宗之一人因見與印光仁航二公之書遂借附鄙議亦聊資義蘊之揮發耳乃居士不引據真言宗經論將悲華所立之義逐條抉其謬非但傳述弘法之如何示現日蓮之如何奇特殊深惋惜夫佛史所載各宗祖師應化之事迹悲華雖不學亦嘗瀏覽及之惟守舊尋常墮於諸祖所張施之教弶中者或驚詫之耳若悲華則窺透從上佛祖之方便權巧苟有因緣正不妨示現為奴兒弘法婢子日蓮之奇特用援墮入其教弶中者以出之耳有居士囫圇謂悲華之説全是以顯理疑密義然何謂顯理何謂密義由悲華觀之則居士所談者皆是顯理而悲華所指者無非密義特人多迷不審實耳蓋悲華於女身成佛義僅為之疏解固未駁難也悲華且言蠢動蠕靈山河木石皆成佛況女身乎況在家人乎居士偏見其所言之一邊執為駁難女身成佛義使之參瑜伽焰口觀音三摩地偈文按偈文所言乃一種之禪觀竊不知居士之舉此其意何屬也又悲華但言仁航之法華六十五不思議功德采之日蓮宗故仁航不應翹之為獨得之解訾傲於人耳初未嘗謂其采之日蓮宗為不可也居士誤為以仁航六十五不思議功德力之采之日蓮宗為不可抑何錯甚一法梗心智失等照一翳在目空華亂墜居士試放捨一切端居以靜觀之誰有所執誰有所壞悲華用一切法不有一法大乘且不執況小乘乎小乘且不廢況大乘乎願演圓音宏宣密義津梁後學勿懈開示悲華和南見海刊二卷七期五弘願開士道鑒蒙疊函垂訊劉大心自戕事劉大心即劉嵩申前在杭州曾訪吾數次相識並贈吾居士參禪提要因知其為親近法一禪師而留心禪宗者至其素行若何則非所知印光諦間范古農皆相識惟馬一浮尚未知為何許人耳然此四人對劉大心有無誣謗卻非所知惟去年偶聞劉大心略曾談及耳日前由杭有寄來傳單一束內述馬子毒邪術云云適有曾毅齋自杭來漢遂詢以有無其事據云有一姓劉之外道為一淨土宗馬某批駁憤而自戕不成乃發此傳單云云亦疑即劉大心之事則劉之自戕當係確有之事而曾毅齋直以外道呼之則劉為杭州一帶主張淨土宗者所不容當亦實事噫良可歎矣太虛敬覆見海刊三卷十二期六弘願居士慧鑒讀敬告海內佛學家書知日本雷斧僧正將至中國此誠一大因緣事也以近年聞密教之風而興起者多得力於居士所譯雷斧諸書者而雷斧於日本密教之學者中洵亦一代泰斗然雖冒僧正之名實缺僧行聞之演華師其年七十餘時猶娶妾聞日本僧皆如此已成通俗所行殆不亞居士非議於淨土真宗之某某上人者夫密教貴行空言無行則祇能以哲學者視之不能以密教阿闍黎視之也故私意當請其周遊講學等以杜威羅素而不應有開壇灌頂之事質之居士以為何如悲華和南見海刊五卷二期七弘願居士覽比年天下洶洶人失其性莫非值譽利則貪癡即縱處人己則瞋慢相凌播流四毒構成衆凶乃知非先自降伏煩惱則凡百皆為資福之具耳宏法宏法多少人將假此名以行其惡語之曷勝痛心去春雷斧之事日僧演華等續續來信且宣誓以證其所云之皆實豫以君等已心喪其主客氣用事不能止惡徒以長瞋因之默爾而息其意在不添火宅之焰非有他也近衡時尚稍發危言乃聞門弟傳述君於所撰之報紙公然惡口相加豫惟有痛自慚愧祝君心快而已他復何言太虛白見海刊六卷七期
