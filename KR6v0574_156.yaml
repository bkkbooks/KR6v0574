body:
  text: 與過聖嚴居士書三通一聖嚴居士去年屢邀赴錫曾允今春可行茲於半月間農曆二月草外如無臨時要故當可赴錫住十日先此預告福善法師已於前月卅日病故十六送殯順問年祉太虛手啓國曆二月草七二聖嚴居士震華法師昨又病故了天氣仍寒赴錫或須展期望告超一法師他的來信閲悉不久到錫再談太虛三十一三聖嚴居士古二月初八函悉一五萬元已為轉致二我精神不濟赴錫請事務簡單免多勞纍切囑切囑三准草六日到錫你勿須草一二來回源廣二位亦勿要草五六來回但草六在錫相接便可此間可與聖輪同來閏月初一起可講菩薩學處大綱三日只能講三日餘不能講在閏月初六七或抽空到常州蘇州各一日菩薩學處大綱可印一千張作講稿中國佛學會無錫縣分會一即日可先將會員名冊登記好三四十人至數百人均可二舉七人為籌備員成籌備處報縣政府請指導三在我到時二三日間先報縣府定期開成立會四我在錫不能久停務須先預備好太虛古二月初十日
