body:
  text: 致中山先生治喪處函無量海濱雨岩滄白錫卿先生並治喪處諸公鈞鑒太虛今日於中央公園社稷壇講經回寺閲報驚悉中山先生業於昨日辭世至為感悼特函致哀惋民國元勳之忱藉申景仰又聞法會同人傳貴處有停靈社稷壇之說太虛以中山先生為民國之魂式安中山先生之靈爽即為安奠國魂與宣講般若而護國安民之宗旨融徹相為一致已商法會同人函請貴處於議定之後先三日通知以便量移法會於他處也專此並頌公安太虛和南見海刊六卷三期
