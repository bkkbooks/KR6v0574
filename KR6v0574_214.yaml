body:
  text: 答王寂照問六則問一西藏西康蒙古底喇嘛們既是出家的人為什麼還吃肉和佛制示違問二仲尼為儒童菩薩這事出在何典問三關雲長既是佛教底護法者仲尼既是儒童菩薩為什麼還享血食問四大悲準提二咒那一咒最優問五準提菩薩是觀世音菩薩的化身問六準提菩薩的本跡載在什麼經答一出家戒於直接殺生必禁斷然以地理民習之異宜五淨肉食不無開許所以出家持蔬者唯漢地僧耳日暹緬錫蒙藏皆開也答二老聃迦葉仲尼儒童為六朝時一種調和道儒之傳說但印度稱少年淨行之士為儒童並有經說釋迦夙生中曾為儒童菩薩殆以仲尼類乎釋迦本生中之儒童菩薩言之歟答三關雲長為佛教之護法神見於佛祖統紀等記載關孔血食之享出於中國祭祀之習俗非關佛制且非一與佛教有關係必禁斷血肉更可參閲第一條之答義也答四五六可檢閲商務印書館所出續藏經中千手千眼觀世音菩薩大悲心陀羅尼及七佛俱胝佛母心大陀羅尼法各卷自可獲悉見海刊十三卷一期
