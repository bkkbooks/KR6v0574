body:
  text: 致寶慶縣知事函縣長先生均鑒敬啓者頃接點石禪院來函稱因修築牆腳致與楊姓興訟其中情節敝院亦未能遙測但素聞點石禪院道風最高自尊美公開闢叢林以來常有修行衲子於中行持佛法至今未衰雖或因衆生難調難伏偶生膠葛而貴縣長為一方之保障乃佛法之外護尚望特別擁護隨緣開解令道俗兩得其宜則佛法甚幸世法甚幸南望昭陵企懷靡盡惟大居士常護念之肅此敬請勛安並希賜覆武昌佛學院院長釋太虛見海刊五卷七期
