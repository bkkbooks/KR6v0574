body:
  text: 復大勇禪人書大勇禪人入覽由杭轉到來書知汝尚能忍耐寒苦果於冰雪中煆鍊一番養成衲僧剛骨將飽暖安逸之習氣洗除亦未始非自家之真受用處耳據汝來信所呈見解正所謂信位則得人位則未因為汝但知沒有誰卻未知就是伊之故所以透不過無義味語然縱使於此也透得過了尚是說道理禪於從上混淆是非顛倒黑白極沒有道理的葛籐仍須絆倒又縱使於一切淆訛公案一一皆勘破無疑了亦不過是一個頭頭上見物物上明的了事人於佛祖親到親入的去處尚是五台山上望瓊崖坐著不動終是都沒有交涉的佛祖大法非可以輕心慢心得之汝住金山纔數月毫未得益談何容易雖然不用貪看天上月且須照顧手中橈但向汝開卷時定中作意時則有的猛著精彩捱過去一旦與眠食俱共的文殊大士覿面相遇且為吾問訊起居也玄師公及山中諸善友便為道安太虛在武昌講經處書見海刊一卷十二期
