body:
  text: 答羅普悟問五則問一自歸依後即研究教理尤與唯識之教契應每日晨起靜坐調身調息調心者約三數年近益勇於修證於念佛修密參禪似均不大相應於觀照唯識及於四尋思四如實智之觀照確甚契應惟友人多以念佛修密為可靠而相勸勉余亦未能決定究應用何法門願求開示答一念佛修密多仗他力四尋思觀確不容易須於靜坐有基礎方可修之汝既於靜坐有相當工夫或可行之惟既能修三尋思觀餘法即可不修問二近擬持誦慈宗三要惟真實義品自己雖以為全文都能了覺然是否真能了解無從證明設非真正了解依而起觀恐有錯誤余以為四尋思以名事自性差別分別觀照先將名事離相觀觀名惟是名事惟是事名事分離其相了了至名自性名差別均屬假立毫無實事亦易照破事自性差別覺係依他起性因緣所生實無自性差別可得不知可否答二名事相離及名自性差別並事差別均屬假立容易觀照惟事自性觀為假立較難要知事無自性依他所起離去遍計所執即顯圓成實性以四尋思為觀門由四尋思觀所引四如實智即五重唯識觀正證唯識法性方為正智問三密淨友人總以唯識恐著名相有入海算沙不能擺脫名句文之危險來相阻撓自己覺數年來讀師之著述講演尚有心得尤以佛法總決擇談一文用執依圓三性融會一切法門讀之能令人將整個佛法悟徹一如何能被名相所拘答三法相係由分別智所引後得智所顯所說一切唯識如幻無實何足以為拘礙問四慈宗三要雖準備持誦觀照而菩薩戒本擬先試行然後再正式受持可否如此答四如是甚好但要知觀真實義係理觀以證離言法性觀彌勒上生係事觀以顯依正莊嚴問五真實義品之解釋可否全依遁倫記答五倫記係搜集衆說可作參考以細觀本文為是羅普悟記見海刊十三卷三期之江浙遊記
