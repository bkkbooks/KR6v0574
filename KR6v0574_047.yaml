body:
  text: 與止安書止安座下茲由吳校長來商定關于大雄中學之事務由校長聘座下為事務主任月薪肆百元並由校董會委兼會計監督則係義務負責依收支預算施行如有超過則須與校長陳明校董會始得開支另由校長委余自力為會計員辦理寫帳製表册等月薪二百元並委金劍管理員真容兼庶務員協辦事務月薪一百元所有會計員庶務員均在事務主任領導下辦理其職務希稟承校長以襄成良美之校風為主校董會董事長太虛卅二年二月二十六日稿存止安法師處
