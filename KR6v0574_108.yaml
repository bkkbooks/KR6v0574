body:
  text: 致林宰平先生書宰平先生大鑒違教云久時切思慕比讀大著李石岑人生哲學序所主張之自然的及非個人的人生哲學與虛曩在星洲講演之無我緣成的人生世界大意相同以尊意説自然在明無我見説非個人在明衆緣成故或自然即緣成非個人即無我亦可以無我故緣成緣成故無我也此無我緣成實為萬有真相然先生獨能委婉曲折言盡其致説破一般科學哲學者之毛病有鑒空衡平之概以之知先生比年於佛學上用功之得力殆非一般囂然以學佛稱者堪及耳欽服欽服太虛白見海刊八卷十二期
