body:
  text: 復洪樵舲居士書樵舲開士慧照獲親手翰如面故人過蒙獎飾無任慚悚開士以文章氣節回向禪那般若茲更進崇戒行曷勝欽佩承詢楞嚴獨選耳根其勝安在衲於攝論嘗專章論之今再略言一觀音於此界緣勝故二音聞於此方教勝故三反聞於禪觀境勝故習定惟聲最難離脫故聲為禪定之刺也四多聞於阿難機勝故若夫法性平等實無優劣惟垂審擇焉專復即訊起居吉祥衲太虛和南見海刊三卷十二期
