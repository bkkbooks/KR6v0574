body:
  text: 與慈航書三通一慈航八日函悉你的耿直是可取的但未將事理辨清魯莽言動是可恥的一誰說以俗服來代替二何處有新僧籍你曾從何處入籍今要脫離這二項都是沒根據的三海潮音上曾有一二人議改僧服乃一二人的言論我未置可否你亦儘可向作文的一二人在海潮音辨論既無所謂新僧籍亦不應對我及對海潮音言四試制訓練班僧服亦訓練班僧在班時試用往者救護隊僧亦曾著大同小異之各隊制服僅可提為是否適當之討論材料未經一律規定五我的意思甲佛傳制服佛教大禮服僅七條或九條以上的田紋袈裟熱帶地方完全採用錫緬暹羅黃布田紋袈裟可也但寒帶只披袈裟不敷禦寒除舉行佛教法會儀式仍披各地田紋袈裟為大禮服外漢地蒙藏日本又各加有當地當時適用之便服乙漢僧現時通用之便服非佛制袈裟原略同唐明時漢人之俗服乃適宜古時之便服今當修正為適宜現時之便服即海青及長短衫褲等應認清皆適宜古時之漢地便服並非佛制袈裟此修正適今之便服則訓練班僧制服便為一種試用之刱制然為刱制之特殊便服並非同於俗服丙佛傳服制適熱帶用本無帽鞋襪故仍以光頭赤腳為原則既無佛制僧帽鞋襪則僧所用帽鞋襪無非是隨各地習俗采用之帽鞋襪故必須時亦采用當地潔樸簡便之帽鞋襪以上各點認清辨明則你脫離新僧籍及反對新僧會恢復佛制打倒偽裝不全是無的放矢的亂喊嗎願你底理智更清明一點老人太虛字九一二慈航你這文的錯誤就是沒有把偽裝變裝佛制範圍認清佛制只有三衣五衣即裙此外都是隨時隨地的變裝只變裝也無所謂偽你講的黃襖黃褲黃襪黃鞋黃帽黃風兜又那一項是佛制而不是變裝東初等所議改的服裝也不過是變裝不全同俗裝若用俗裝則隨用俗服便可何用議改但三衣佛制是應遵用的適時地的變服可討論的你主張改你的變服與東初等提改他說的變服同是主改的如何反對只有商討太虛三慈航法師慧覽一從漢口葦舫轉來的信也收到了不過甚慢以航空直寄上海為宜二佛學月刊上見作文大進步了內三唯論一文甚好不知何人作三你聯絡華智念西弘船廣洽等甚見費心祝你的香火廟成功四認真做起事來這裏也缺人何況你在馬來亞缺人幫忙儼然不知在何處五你有寫信給你的與所講的邱慈良等好徒弟真難得我手邊沒有照像鎮江印的小傳寄一張他看看順祝願行自在老朽太虛九廿八以上慈航存稿
