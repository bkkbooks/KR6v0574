body:
  text: 為國難電告全國佛徒各地佛學會中國佛教會各省縣佛教會各正信會居士林佛學機關佛教團體及各叢林寺庵四衆同人公鑒茲值我國或東亞或全地球大難臨頭我等均應本佛慈悲一懇切修持佛法以祈禱侵略國止息凶暴克保人類平和二於政府統一指揮之下準備奮勇護國三練習後防工作如救護傷兵收容難民掩埋死亡維持秩序灌輸民衆防空防毒等戰時常識諸項各各隨宜盡力為要中國佛學會理事長太虛叩見海刊十八卷八期
