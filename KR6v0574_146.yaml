  text: 復李蔭亭居士書蔭亭居士鑒得書悉隱修五台為欣為慰所譬三期頗佳但吾意確立僧寺整理法乃是軍政使僧出家受戒修學辦事皆如法整理而在家佛徒亦皆助成乃為訓政整理完成僧能真住持佛法在家能正信護佛法乃入憲政今去初期尚遠遑云三期幸再慧察勿得少喜足并祝精進太虛手復二五十二一見海刊十七卷十一期
