body:
  text: 復志禪先生書志禪先生清鑒教示誦悉過蒙獎飾慚愧無地足下英年志佛曷勝傾佩鄙意最好是於佛法能真覺實行而不捨世俗去秋在北京講維摩詰經所唱導者即為斯義至大慈機緣成熟之説假如有一人於人世於佛法已能領悟自覺有出家之必要而在離脫一方面若父母妻兒等都能善法安放心無不寧在趨向一方面又能得善良師友則亦便可為出家機緣成熟之徵比邱尼難言聞杭州城內有一茅庵尚好未知確實此覆問訊無量釋太虛三月十二日見海刊一卷二期
