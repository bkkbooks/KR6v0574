body:
  text: 答王靜山問問物欲所蔽氣稟所拘如何能改善答氣稟所拘各自不同如孔子言顏子之不遷怒怒之起在自己未覺察時則無法自制待覺察後則可以反觀一下究其自何而起明其皆因緣和合而起則可冰消瓦解若未覺察則不能用其功若當不知不覺突然而發怒時才覺即可以用回光反照功夫以解化之此自功夫上言然於性理應多研究關於物欲佛典上有粗細兩種五欲財色名食睡粗五欲是也色聲香味觸細五欲是也金剛經曰不住色生心不住聲香味觸法生心然後生清淨心能不為物欲所蔽了知一切均空矣至於氣稟所拘即佛經所言之業報所拘是也業自煩惱生煩惱自心而緣起能無煩惱乃根本解決程心勉記見海刊二十六卷六七期合刊
