body:
  text: 致雲南唐省長書蓂公省長崇鑒允欽威德意必從禪那般若中來曩荷電邀即圖參謁以事牽率未遂所懷頃與王夢菊居士過從每聞勝行彌深嚮慕蓋環顧華國殺機遍發茲晉省亦淪戰渦而卓然獲保寧謐者唯公之治下耳按庶民所求本祇在安生樂業而已有能遂民之欲者則翕然歸往將如赤子之就慈母孔孟之言王道方百里方七十里方五十里皆足致之況泱泱大風之雲南歟而所難者得人心也以衲之愚竊謂公命世英豪宜膺救國救世之大任然其起點乃在乎睦鄰以止外紛專志以隆內治外紛止則軍備簡內治隆則政教修軌乎正覺動於大悲集滇才以行滇民之所欲行出滇財以施滇民之所欲施則資生之情暢而禮義之性充滇之富皆公之富滇之榮皆公之榮既安且尊天下仰之由是推之全國如順水使舟更何阻滯廓而大之菩薩之道亦造端乎此矣十年而國必寧卅年而世可平以公託質之高而憑勢之厚宜有如斯盛德大業昭當代而垂後世焉為天下蒼生曷勝祝禱之至肅此祇頌勳祺釋太虛上言見海刊七卷六期
