body:
  text: 復鄭雨生居士書雨生大居士澄照欣接雲翰如聞謦咳宏法誠意形於楮墨翹首海天曷勝欽景惟是過蒙獎飾殊增愧慚耳自覺書海潮音蟬聯至今衲雖稍效綿薄實皆出中外學佛諸公或資以財或助以文乃能保存及茲流傳漸廣而歷年荷大居士之惠施者尤獨深厚此當率海內外諸閲海潮音者馨香以致其謝忱者也今又承慨捐千圓以充基本彌徵見善勇為他人莫及如得大居士者十人則海潮音之慧燈常耀何至時虞飄蕩哉先此馳謝並祝道康衲太虛和南見海刊五卷四期
