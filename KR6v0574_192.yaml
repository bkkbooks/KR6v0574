body:
  text: 答覺非問十三則答一濟生會假扶乩行善事同善社借孔附佛欺罔人世皆迷信仙鬼者與佛教初不相干也答二知進香求福不知正法大都習俗使然亦由能讀書明理者少故佛教之經論雖燦然大備而知之者卒鮮矣答三念佛持齋固亦有益但若能明理而看空名利色則為益斯大答四人人出家為必無之事如實有其事則已非復人間而為佛土矣對人世全體言非對個人言故與個人修一世便能成佛不成佛無干答五講經能深入淺出難聽經能了解實行難誠如所議然亦無法將佛法説低使皆能懂以説低便同俗情非復佛法故唯有設法將人智程度增高漸夠得及耳答六出家者每年亦不為少然真實發心出家者少故往往還俗或隨波逐流而去徒污佛門復虧僧德故吾不勸人出家答七但一經應酬經懺即依此為生兼且不免出外應酬故難佳也答八湖州白雀寺係梁武帝時一比丘尼總持禪師之所開創總持遇達磨發明心地復隱此山專誦法華經至云妙莊嚴王女觀世音菩薩均係附會之説但大菩薩本無男女相而應化則無定相觀世音應化為女身經中及事迹上均有答九欲得改轉除非使進香者一齊皆明白道理如閣下方可否則欲令改轉殊難也答一借境觀心藉像明佛此為設教之意今有雜塑神鬼多像者實屬不對但最少一尊釋迦佛像必不可無也答十一不剃髮或是尼但不得是比丘尼耳答十二同是人身自天生之此語不然佛法不許言天生但言業報同在人中先業善者報為男身先業惡者報為女身故有清濁然造業由心皆可自主故復平等答十三皈依多師亦習俗使然乃廣參善知識之意孩童亦多有禮尼為師者見海刊三卷四期
