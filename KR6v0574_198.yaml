body:
  text: 答黃子理問二則問一佛法不立名言不可思議言其非思想議論之所能及然不用議論猶可也若思想不用從何而入答一佛法不可思議而思議為入佛法之門故學者宜由思議之門以入不可思議之佛法三藏十二部皆佛菩薩應眾生之機而說使眾生由名言之門入得達於不立名言之境之利益而名言之效彰現在眾生之所以成為眾生者原無異於昔故此文字語言之可用於過去者即可用於現在可用於現在者即可用於將來不分三際普利一切而無礙蓋名言猶指佛法猶月名言雖非佛法實可由名言以見佛法猶指雖非月可以由指以見月也但眾生迷執已深每每認指作月則屬認者之自誤而指又受過也故曰不立文字不離文字問二以相言一切法由因緣生以體言則本自清淨本不生滅既本來清淨則普遍清淨緣從何來答二一切法由緣生本來無自性若執為另有體在則如外道之所謂冥性神我大梵靈魂等是即為遍計執遍計執者總言之即為我法二執其與生俱有者名俱生執由生後種種傳習名象而成者名分別我法二執不知諸法實相本來無我皆由緣生而此由緣生者亦無自相無實體可得即此無自相無實體之體即為本體異生不解此理一一執為實有遂有自他人我之別而貪瞋痴慢以生造種種惡業流轉生死不得解脫若了達一即一切一切即一融通無礙俱無自相可得而此無自相可得之相即為實相且知此無我之實相即佛果位之清淨緣生法則戲論自除顛倒自化尚何生死之可畏尚何涅槃之可求哉三論宗專破遍計執性遍計執性破而清淨緣生法自明唯識宗但明依他起性依他起性明而遍計執自破遍計執破則依他起即為圓成實性矣二乘破遍計執我相已空而即安於空寂故僅屬化城若了知無相之相一切妙用即無不含容無不具足所謂照而寂寂而照不落斷滅方為究竟又爾當體活潑潑地即是是為佛之真體佛之極則但在凡夫分位不得不修二空觀以除分別俱生二執尤宜廣修梵行以除無始來由二執所造種種惡業與久遠所成種種惡習而後行解相應得還本來面目然為中下說法驟難明此徹底之深理故說因果報應兼帶有自他人我之相令其略有把握不至若無可捉摸者而其固定之我執不易速得解脫亦勢使然也甲子春正黃子理記見海刊五卷三期附註原題佛學院親聞錄今改題
