body:
  text: 復朱鐸民居士書二通一鐸民居士慧鑒惠書覽悉所提可糾正偏失甚佳佛法誠以衆生為對象然中國佛徒舊習濟救鬼畜漠視人群罪苦之化度於佛出人間佛身同人佛說人身難得古德云端心慮趨菩提者唯人為能等義致成偏失佛教於人群失其重要性重人事者亦輕佛教為近世佛教衰落之要因乃證明佛對一切衆生尤以度衆生中之人類為先務世出世善法之進修以人乘為初步因為對治激而過者起佛法以人為本位傾向甚而唱言人本主義陷佛法於世教俗學之淺狹忘佛法對一切衆生之深廣立場亦成偏失正兩端之偏失彰一貫之中德已發其機於門弟子所集之人生佛教人乘重戒善天乘基戒而重定出世三乘基戒定而重慧戒定慧亦視乎當此而已矣病廢不能多運思走筆略而未詳復訊法喜太虛啓四二十七見海刊二十六卷六七期合刊二鐸民居士玄覽昨晚得長箋未能盡讀今晨始閲之畢為法殷勤乃爾能不力疾略答乎一於常途知見一言從揚落知見為說非吾此言意法華唯為開示悟入佛之知見佛之十號一曰正遍知八正道之第一曰正見知見其可輕歟知見非一類有聖真有凡俗吾此言意在常途二字常途一詞亦唐賢常用指習常通俗之途而徹真或切要之特見每多殊勝故未可據常途之解概之耳二方便一詞解亦缺徹孔子云可與適道未可與權蓋必透徹乎道而活用乎道乃可與權權即方便也維摩曰無方便智縛有方便智解大日曰方便為究竟法華曰以方便力故為五比丘說十度之第七曰方便波羅密自行化他皆有事乎方便吾所謂適切時機之要旨亦存乎方便耳三乘字義以佛法為運達究竟言唯一佛乘則二乘亦不得為乘順衆生機先運載達所欲達之地言則緣覺聲聞固與佛乘並稱三乘而五戒十善八次第定運載出四惡趣而住人天深密等經佛亦說人乘天乘與三乘並說為五乘以乘為出世善法天乘人乘為世間善法同有善法之運載用耳佛之說法非但為出家比丘說亦為一般人說其為一般人說皆先說施論戒論五戒十善等生天之論遇有勝根乃為說出世法非如後師動不動為說大乘也亦正唯明二乘而後說大乘乃顯大乘之勝明人乘天乘而後說出世三乘乃顯出世三乘之勝正唯不明人天乘乃儒道混若知儒人乘而道天乘猶為世間善而出世三乘乃唯佛為勝耳宜辦者一至宜辦者十與商榷者一二大抵為向所倡言而施行尚艱也商榷者三四緬甸暹羅錫蘭無大乘經咒咒音今聞有正以西藏者但今已有習梵文者當正以梵文耳抗戰起後中國佛教會隨京滬淪陷而停頓陪都迄未能復立兼之組織未健全議行亦時扞格吾以聊盡吾心而已吾之所說亦非專為緇流而說為緇徒說者每多未布文字布之文字者大抵為一般人說其中自多鼓勵白衣弟子為之者嘗病白衣好談習緇流事而緇流又趨習白衣事不能各隨其分宜而精進居士盍亦力行居士所應行事并力為諸居士闡說居士所應行事而共策勵乎縉雲山居尚佳暑熱漸增惟珍衛太虛手啓六二十六見海刊二十六卷十期
