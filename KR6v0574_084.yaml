body:
  text: 覆月華居士書月華居士青及寄來各件可為逐漸發表於海潮音上所舉四事具徵宏法熱忱第一第二條尤見卓識蓋此二條世之無智者多為迷惑而婦女沉溺其中者殊夥也第三條明年在北京西磚胡同法源寺開佛誕全國佛教聯合紀念會居士等可聯合同志多人將所擬舉辦之事用公函陳請該會施行可也第四條於京昔雖開辦未能持久在漢二三年內或亦能成立耳女佛學院雖在籌備尚以女界中未能有積極負責進行之人故現猶未有成效可言耳此復即訊淨祺太虛手書見海刊四卷一期
