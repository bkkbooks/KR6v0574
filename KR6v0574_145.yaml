body:
  text: 復江易園居士書易園居士垂鑒不親謦咳彈指十餘年矣而每睹妙論輒深嚮往比潘對公屢轉宣和韻佳什彌增景仰承示諸佛功德平等圓滿一攝一切一切攝一確為至言故十方諸佛與蕅徹諸古錐讚彌陀者如用以移讚藥師應無二致其在皈仰彌陀緣深極樂者正可專一願行心無旁馳而志向藥師淨琉璃者亦復如是釋尊以應機適緣分別說之虛秉釋尊遺教不礙圓融而區析想居士亦必能不撥分析而通達圓融也專復并頌法喜太虛和南見海刊十七卷十期
