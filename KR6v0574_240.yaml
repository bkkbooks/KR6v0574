body:
  text: 答余樹東問二則問一印度佛教情形如何答一印度人多數信仰印度教印度教乃混合婆羅門教耆那教佛教而成其中婆羅門人多故婆羅門教勢較深問二佛教與儒教並行而中國佛教仍難盛行何故答二因為在中國政治地位上儒家先有其優勢居政治地位者多屬儒者故佛教推行頗難若居政治地位其先屬佛教徒則推行佛教若今日之緬甸暹羅等則佛教亦可為治國之道非不若儒家也程心勉記見海刊二十六卷六七期合刊
