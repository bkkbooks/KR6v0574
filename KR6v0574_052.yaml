body:
  text: 與優曇書五通一優曇法師覽巨贊法師來帶來你的信及香一盒又密持居士港幣百元心尊居士銀耳與參各一盒均收謝另舫法師與妙吉祥一書已付海刊巨贊面告各節大致均由其函覆唯聞你與心尊居士等議移設巴利文學院於港且可購地造屋誠勝事但錫蘭三師農曆十月間即赴陜能先于秋底租屋供住免赴陜跋涉則請彼等即滬返港乃便如去陜難再還矣商覆為要太虛手書九十九二優曇仁者今索麻等三比丘決從滬到港過冬希即為預備住處及與其直接通信至港為荷順問近祉太虛十十四三優曇學士十八日函頃從上海轉來已悉一大鎮十分墮落無面來見恐須你與他見面了二妙吉祥文稿在二十八卷一期刊出三到京以雄校鬧火災百事停滯你護照待託人試辦四惟幻同時也得了他的信巨贊昨在杭亦來信五太虛藏訂十一部聞尚未收到靜濤居士亦未見太虛十二十二四優曇賢者覽錫蘭來電似擬為索麻等欲還錫而發頃不知索等仍寓港否仍寓港勸留至明夏一同赴陜可留則留不可留則過夏還錫以了來華原案已去港則為代復發電者告以一索等無志學華文大乘二不願赴原約之西安只可聽之并請靜濤居士參詳其意太虛一月十七日五優曇賢者索麻等不知中國之大不赴預定之地妄據片知以斷全局真井蛙之不足責你來信我已遊甬今始覆之墨禪事已告福善可再直函勿函余又領護照事亦直函託隆信以函余轉告遲誤太虛二十五日稿存優曇處
