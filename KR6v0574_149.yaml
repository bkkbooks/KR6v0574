body:
  text: 與陳靜濤居士書三十通一靜濤居士鑒前昨曾遊白雲山明晨去羅浮山五日回後在居士林講上生經有就能仁寺設佛學院之議但一希望港方何夫人等合助經費不知有無可能二須有常駐主持的人亦不易得未知居士以為如何順問近祉太虛啓草三十二二正書函未寄間接來書再述如下蓮覺原不望他去代向別人募但伊自捐的即書在所交册上便可可與説希望捐二三千元也陳總司令處曾談及恢復光孝寺當即允設法恢復又能仁寺辦華南佛學院鐵禪叔穎等已數談及中大勷大因罷課未講昨今復旦中學學海書院曾講草三十二二二靜濤居士鑒此間昨已開講唯識由顏居士翻譯聽衆四五百人秩序尚好明日去居士林開示臘五六七在該林講下生經擬臘初十間還港返滬何王方蕭覺各募潮音捐希催順訊近祉太虛草三十二七三靜濤居士慧鑒日前復函應荷察轉昨得何亦韜君帶來廣釋專刊各百本當以專刊各二十本分寄重慶海社漢院閲六期覺音佛教與上海一文中有史實相違者略為辨正可付覺音刊出一頻伽藏經創刊於宣統二年而印成於民國二年華嚴大學則於民三冬始開辦也二八指頭陀逝世於民國元年冬其中華佛教總會在民元春組織承清季各省分立之僧教育會聯合改組之設會所於上海靜安寺辦事處於上海清涼寺及北京法源寺至民二春在滬正式成立省支部達二十二縣分部達四百餘實為上海有中國佛教總團體之最隆盛時代雖因八指頭陀之逝會得增強確立而繼續主持乏人民三復由清涼寺清海為會長改稱中華佛教會各省解體民四袁氏頒布寺廟管理條例三十一條取銷佛道教會之組織則清涼寺之中華佛教會更成一空招牌但此空招牌清涼固至今懸在清海寺門前也民十四余在北京發起中華佛教聯合會各省有承風組織者如湖南佛教聯合會及上海之江浙佛教聯合會等然未普遍健全至民十七余在南京發起中國佛學會籌備召集全國佛教徒會議以設立中國佛會民十八乃開成立會於上海設會所南京與辦事處於上海民十九民二十間甫堪繼承民元二間佛教總會之隆盛而此後圓瑛等把持漸索無生氣至民草四擅改為兩級制及理事長制各省紛爭解體即等於懸空招牌於清涼寺之中華佛教會矣原文所述適得其反三濮一乘等之佛學叢報發行於民元之初斷斷續續至民三出至十二期告終余主編中華佛教總會所出之佛教月報則才出四期即停頓此中事或為原文關係人尚未成年尚未信佛前者或為有意變更事實迷亂聽聞者故為據實糾正順候近祉太虛啓見華南覺音第九期四靜濤居士鑒時得港函藉悉應機弘揚佛法精進無倦深以欣慰并悉李金榮居士亦來港均承對吾關注殊為感紉頃山居尚適請紓遠念惟今在港之閩嶺東武先後學僧及皈依之男女居士非少數其學僧或有困於生活者希有一聯絡組織以相扶助勉勵切磋勿渙散退墮而能隨宜修化也順候近祉太虛啓三卅一五靜濤居士慧鑒接奉七日詳函彌佩悲智兼充茲略答復於下一關於寄回三百圓除百圓贈覺音外所餘見覆墨竹二君信二華南覺音公指示甚當囑令速改不定期刊以便從速續出三學會留俟機緣四海刊遷港登記確為一大問題綜合竺摩來信所云陽曆年內決在昆明由塵空負責四五個月後觀時局演變如何再定遷否五雞足山佛學院事件藉此俾大醒芝峰法尊在川責重不再來滇會覺談玄墨禪竺摩惟幻亦幻寧波責重亦難來滇慧松岫廬能集合一處教學相長未嘗非盛事故致芝醒函附還可由港發而所慮者主持不得其人勢將耗力於另一套事與所期南轅北轍尤礙者將與醒芝等相抵而兩無所成鼓山前車可鑑而曾養甫居士徒耗心血並浪費國力民力為可惜六俟出國宣傳事定約慈航或兼惟幻赴緬並轉印暹一行蔡慧誠在滬常通信忠實誠如所云洪雪堂談培啓李因如諸君遇時便為致問七某慈善社未徵同意以吾名號召已發不究但希轉囑以後非先得同意勿再爾聘張聖慧主持東蓮教務甚贊成當附函代勸心經問題另覆白慧師八貴行各處遭困憂國憂家常增苦悶惟擴為大悲學維摩詰為盼順頌增益太虛謹啓八八十四六靜濤居士鑒昨函應荷惠察關雞足山事今又思及雞足山佛學院為一具體之事宜以虛雲老為院長陳定謨為院護即副院長而周惺甫與曾養甫為正副董事長而吾則由蔣總裁以國民精神總動員會會長名義此只須向蔣公一提諒無不應函聘認雞足山佛教之整理建設為全國佛教整理建設之根據為國民精神總動員在宗教方面要素之一為較泛崇之雞足山佛教整理建設導師則於定謨芝峰大醒等之實際工作人員可時豫最高原則之指導使能有所統歸總持而不致散漫旁騖或被其他舊習及歧路所耽誤實為要著唯與定謨計之今短期內並擬邀芝峰慈航或加惟幻為訪問團員赴緬錫印等一遊覺音不定期刊令速續出擬假為港宣傳之一支也即候近祉太虛啓草八八十五七靜濤居士鑒正擬致書并寄惟幻以美國通訊因其譯經甚佳便廣流布乃適接十九日第五號函但所云九月四號函卻未收到恐已遺失信中所言有何要事須再來函重述一定謨於十五號到昆余原訂草四號偕定謨及葦舫等赴雞足乃葦舫不及來而定謨覓屋安家未得今已在一再展期中尚難定期二訪問團雖因時局阻誤外匯改遲但仍決照原議進行中此為中央函聘導師密一團員若干祕書翻繹而成談云山已約為翻譯或祕書在印候我但對外顯用佛徒自組所成以增強宣傳力慈航惟幻聘書已下由外部電仰光領事可即辦但慈航法師或已辦到矣惟事關機密祇為二三知者言之耳三定謨或可促到仰光代談云山此一段遊緬後仍返雞足以雞足學院祇關係康緬而與印錫暹原無關也四慈航惟幻每人由港赴緬仰光連辦護照等須港幣若干望為代擬一最省之預算來以便經費到即可匯交五了如師再求學問事業深造固佳但覺赴渝僅可專學願此者可去雞足或可兼辦事俟與定謨商之昆明連日大雨余居山未至城相會六復寫起居録當俟團員集後分派為之迭函所言具見精心擘劃知無不言言無不盡之菩薩心行惟力行勿懈七君效來晤時當為介紹勿念專此統希轉達並詢近祉太虛啓九月二十七日八靜濤居士慧鑒草八日詳函復函請寄昆明雲南省佛教會甚感熱誠轉函稍稽及撥款未決歐局驟緊遲復數日今款已決尚待領取然極承關注不能不先酌復一附條所言甚當但根緣各異亦只盡勸導耳二周居士帶來襟章三十枚收到為謝三定謨租屋極難且此間生活貴并虞空襲故眷屬宜住大理下關上雞足一日程屋易費廉附設籌備處與山上易聯絡已為約諦聞來接余上雞足者妙乘此間佛會派去先籌備歡迎余者曾公亦熟在山幫同籌備定謨在吾先或同時可至雞足但不宜同出國以款方限僧衆李子寬曾請自費隨行亦已遭勸止也對曾公惠書祈婉言致意四餘見與慈航等書并頌安樂太虛啓九五九靜濤居士鑒頃因事飛渝擬下星期五仍飛昆明日內並匯款香港也茲以得外部通知已電香港皇后大道簽證貨單辦事處專員協助慈航惟幻簽發護照事希派人與該處接洽為荷此頌近綏太虛啓十草一一靜濤居士鑒茲財部發下國幣二萬圓每圓換一先令二辨士又四分一換英金一千一百餘鎊之中央銀行匯票一紙但此外匯須在香港領取因是香港匯票寫居士姓名請為代取取得後即為照另開一單支配之專此即頌台祺太虛謹啓十草四一一香港草八年九月九日至二十日之大公報上之論暹羅排華運動一文請購裁一全份來為荷以後該報有關於緬暹印錫之紀事論評均請寄又昨航快所託約英金百鎊折購國幣寄昆明如不合算折購港幣寄昆明亦可二萬係今日航空匯出靜濤居士鑒太虛啓一二靜濤居士鑒昨函應達今接草八早航函茲復如下一財部草五號改用航空匯寄我有收條諒今應已收到二匯暹仰昆多一番手續誠屬麻煩除祈力為向中央銀行或財政監督官力為設法俾可早為匯出而此間亦函渝請電港設法三向仰領入口證渝亦曾電仰榮領事不知慈惟二師曾先將詳情開報榮領事否又聞近來英屬往來已稍鬆動請再赴英政府發護照處一探問之或付電費請彼電緬政府電準如即領得則慈惟可速購船往矣四合影及剪報收到為感五陳蘇紙即為轉交陳昨已有函矣六體真體妙尼辦渝飛港款巨而手續繁雜不如由惟幻匯國幣數百圓與重慶中大梁子鍾益亭居士託為照料在宜在渝均可在宜鍾亦有分店也較為便妥此時旅途甚艱萬勿輕動專此即頌近綏太虛啓草七十一一早一三靜濤居士鑒今日晤蔣公已説妥由鑄一銀塔慈航所造銀塔可刻上蔣中正贈字樣上款暫不刻亦可專此請轉達慈航師等太虛又及一四靜濤居士鑒電悉款係中央銀行重慶分行於十月二十六日航空匯港由太虛匯與陳靜濤居士者日內想必能到也惟慈航惟幻兩君不能領得仰光入口證而由港即行者吾意可於領得匯款時速即由港乘飛機來昆明所印刷定鑄之重物由香港寄仰光則可由滇緬公路赴緬昨接曾克念君等來電華緬僧聯會在緬甸之瓦城迎接亦請由滇緬路前去也如此則除匯仰光及留十五磅在港作印鑄郵電費外所餘款亦可交慈航師攜來也如何盼先飛復即候近祉太虛十一三一五靜濤居士鑒函電均悉一關於為佛團發函電及街車等費統希在六十鎊內支付已耗勞身心殊甚對此再勿客氣二印小册製襟章印照片等亦皆在前款中支付三前慈航曾言製一鍍金之銀塔亦在前款中支付加鐫上託太虛大師攜存上行佛教勝地另行蔣中正二八一一二六字樣四茲已定車十四日由昆明到下關十六日上雞足山草三日回大理草五到草八到臘戍十二月一日到瓦城二三日即轉仰光無故不再更變五最近十七日前有要函可寄昆明佛教會轉十七日起則須寄仰光中國佛學會轉矣所最關心者惟慈惟兩團員之簽照當仍以在港候簽為便轉昆殊不易也我到仰後總可把入口準照寄港五昨又接到發來兩函并匯仰光之千鎊支票一紙收存無誤六本來信早函寄因等候聯泰段某兌款四日間每日推明日致有延擱但止今晨仍即李子文兌來五百港幣俊安電器行二百港幣均每百三四二圓算其段某一千港幣待下午如能辦妥再函告否則當函託存港也專此順候近祉團日記寄存無關政治部分亦可採出發表我日記付覺音太虛啓十一月十三一六靜濤居士鑒宿雞足山四夜今晨下山即轉緬約於十二月一日可到瓦城也昨日已成立雞足山學院籌備處推公等十五人為籌備員余兼主任定謨義周雞足石鐘寺主持兼副主任妙乘兼事務性空兼書記劃定以石鐘寺後閣為院址當由定謨等支出籌備費法幣三百圓並決由定謨兩個月內回山主持進行先此函告並祝時祉太虛啓十一草二十七靜濤居士慧鑒赴暹未成在星候船今決草四日可離星赴西貢惟幻師回港應晤及矣慈航決暫留馬來亞再去仰光今託者一轉告惟幻師剪攝電影要在二百尺以上能到三百尺最好又攝影再晒二百餘張一全套僅寄重慶羅漢寺宗仙方丈留交二前託寄等慈之十鎊款今迄未收到務查原匯寄處追還並先復昆明佛教會為荷專復順候近綏太虛手啓四草三一八靜濤居士草二函悉費神至感一暹匯退票連前存應否為改存美金請酌行二佛誕考暫停不印三蓮苑深以為惜四覺音刊事可照行五雲南佛會未改選故名義未能卸除六白慧等已到重慶七醒芝等是否住靜安寺天慧現亦到渝曾來見過告其者與公同八聞營業不振為憂仍熱心法務殊佩慰順頌近祉太虛啓五草九優曇師擬贈還舍利一枚令供養以在重慶故未及寄待下次寄一九靜濤居士慧鑒抵渝曾接一函已復諒荷察及今與葦舫等安處縉雲希釋念去年來託費神為辦諸事殊感寄暹羅款已退還否收支各帳及尚存辦法祈結示一紙為盼順頌時祺太虛啓草九六十五二靜濤居士鑒昨復書應先察及茲接教育部函抄奉閲覽應以惟幻去為最宜否則祇有另覓他人望再一代詢惟幻又另找他人擬詢法舫芝蜂岫廬等芝蜂亦望一代電詢如何教授為傳譯大乘楞伽經並負籌備世界佛教聯合會責也順詢近佳太虛啓八十五二一靜濤居士鑒一二奉悉昨並復惟幻矣三草舍詩存此間以郵寄為難尚未見一本擬請由香港航空寄一部來馮君現居昆明當囑再寄港草本也四見復墨禪等函五弘化精舍事議定六條均當正式書來可允芝蜂信亦待其時再發必要時吾或亦可飛港也去年見寶乘師文就歎為難得希先致意即頌時綏太虛啓九草一二二靜濤居士慧鑒惠書附件均悉除潮音詩存可不害及海刊已轉告發行人外一復書録如另紙二芝師最宜他人頗難選要多有人促來乃佳三教職寶乘墨禪二師預定外餘待芝師定再與商訂四招生學課及組織表與書院額見復墨禪紙五全章及規約等容參考漢院閩院徐定之六此事全係感公熱誠護法而勉應務希注察盡言使無疏謬太虛草九十八二三靜濤居士慧鑒華南佛學院雖勉任而最要須芝峰代院盼多有人促其振作起精神來港印順今在貴陽已有專務無已即由寶乘暫代院如何覺須此層先定其餘乃可全定也順訊時綏太虛啓十草七二四靜濤居士鑒前寄回草二號函並復收到二千圓應均察及茲閲畢詩存已製正誤表由海刊社印送又寄來之一本中缺第六十七八十六頁擬請飭抄這一頁寄來補上又芝峰再不來墨與居士不須去滬以去亦不來來亦非自願而無精神芝前函推會覺不知會覺現在何處要芝轉邀會覺來代或由港徑函邀會覺來代亦可印順現擔任貴陽大覺精舍主講方由此間邀人去亦難使來港否則就港人中如寶乘為代祈酌辦並詢近祉太虛啓十一十六二五靜濤居士墨來信述芝近況甚詳諒居士亦聞之如此恐難望來港而醒覺亦然且恐來亦難洽另外應請就留港之吾門人選察擇其宜代者一人除寶墨已定外並再加教職二人即可組織成立萬一必無人或須辭退或暫空亦希設計開春南洋安定我有飛港可能專此順候時祉太虛啓十二三二六靜濤墨禪仁者同覽封函待發接李素發居士飛函摘覺音載寶乘食嘢詩深致不滿有恐黃君見而退心説我亦覺此時寶竺不應以譏戲授其他嫉忌人以隙來信求復由陸無為轉交殆即陸搜剔以挑撥耶希善巧開解之為幸太虛又及二七前紙未發今接轉來草八號書並鄧爾匹先生詩甚感法舫等稍俟仰光無礙教育等原希望在緬多有聯絡且預備英文亦善印光法師高齡謝世此間佛侶亦同悲法弱寶靜壯歲當能速起沉痾也併問香江諸友太虛啓元十六二八靜濤居士慧鑒得卅三號函悉已由南洋領足球隊凱旋香島至為欣慰而馬來民淪回教地繫英政華僧寺適應唯利是求之僑民繁衍其不能滿教史教理參印之望尚待言耶乃知識僧青年亦往往墮落其間殊可悲憫覺中國政治及社會不澄清僧徒蝨其中亦無改善可期黃居士誠如所言惜無多願行純潔者引攝成有力清淨佛團以宣化耳自來墨水筆便帶至重慶南岸獅子山慈雲寺交止安師收轉可也李俊承之公債息金票參百元亦照收到矣給惟幻師之國幣百元本已照其函囑付其俗妹體妙尼收矣既又取去百港幣諒係需用不須追索催將自由史觀早譯為英文是要優曇囑交演培之款以演培不在此未交故其草元請退還之印度來英文已轉致中央宣傳部以待復芝醒誠如所論但此間艱苦不易招致暫盼仍消極持守耳墨禪閉關盼習作國文好甚慰了如師能掩修更好順頌時綏太虛謹啓卅八草七二九靜濤居士慧鑒承託人帶下自來水筆一枝改進略史十本已收到為感惟略史需求者多苦未能多得耳日前囑止安以來紙訪君澤尚未回音但今日得君澤寄轉卅四號函矣居士年長吾兩歲對佛教革進誠勇有加殊令感佩惟所云之僧青不多得而社會腐之政治梗之亦只可盡心而已菩薩學處如得地得緣當拚捨衰軀一踐行今國教會仍擱阻中對全國僧寺不敢奢望矣於演培亦見愛才之篤在此吾亦特栽培之今為合江辦法王學院向吾請去主教務耳川中近由漢院學僧出去開辦僧學者已五六處惟格於僧寺傳統只分途小辦不能聯合為整個之系統也演培之學院有可發展希望已令飛邀芝醒未卜如何圓淨滬識殊早可以郵址告順頌近祉太虛九十四附靜濤來函虛公導師菩薩尊論國家政治及社會不澄清佛教無改善可期甚佩高明但俟之河清人壽幾何弟子以為盡形壽盡人力向佛革運動之途徑邁進陸續訓練基本幹部依照青年團組織將學生會盡量擴大招攬智識超越思想前進願行純潔不慕利養之僧伽輔佐提挈決必有成功之日弟子年齡雖老五十五亦極願追隨師座致力佛革與佛教惡勢力奮鬥也演培師佛學國文在僧青年中堪稱傑出決為可造之材今讀尊示謂已不在漢院頗為系念究不知演培師轉居何地近況若何有何任務便乞賜慰芝醒法師以渝方艱苦不易招致聞之惘然但以兩師之才及過去歷史若一任令投間置散一任其赧顏妥協心中大為臲卼耳上海李圓淨居士昔者囿於一宗之見對師座主張不甚投契年來與弟子相交日深常以師座著述送閲現已一改故態對師座不特有正確之認識且信仰日固彼數欲修函致敬因郵遞不通茲將彼昨日來函一段附呈可資印證李居士在佛學著作上似有一部分之權威弟子頗欲羅致為師門臂助甚盼師座賜函嘉勉由弟子轉去師門甚幸弟子靜濤頂禮九月二日三靜濤居士慧鑒惠函欣悉并轉示芝峰大醒亦幻諸子矣三四日後將赴奉化或天童育王與慈溪等舊遊一應邀請恐度陰曆年於甬矣荷關注大雄校費等殊感李金榮居士前者曾交與中國佛教醫院捐册一本亦曾允捐大雄校費如抵甬相晤均為詢及此次留滬未晤李榮祥居士如見時可言及以呂碧城居士遺款作藏經會編費為囑順候年祺太虛手啓卅五十五草九稿存陳靜濤處
