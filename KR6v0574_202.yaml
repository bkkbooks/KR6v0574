body:
  text: 答善因問九則問一五遍行心所是否屬現量所攝答一且看是何識之五遍行若是第八識及前五識之五遍行是屬現量若是第七相應則屬非量若在第六則通三量待臨時方定問二現量是否要離念答二夫經論中所謂離念者是離三界有漏心心所之虛妄分別念非是完全不了知如無想定等且無想定等亦完全無心識不過伏滅前六識之心心所而第七第八二識之王所全存不得謂全然無想不寧惟是即無分別之根本智此五遍行四別境除慧以慧即智是主故十一善法及心王因中或六或七心王果上加第八心王猶完全相應不減失假使此二十一法都離則完全消滅矣何能謂智謂明謂菩提哉故知經論所謂離念者即離虛妄分別而已非連無分別智相應心心所等亦離去也問三無分別智以何為主答三無分別智以無漏慧心所為主餘皆屬伴問四禪定與參禪兩名辭其工夫固知大別而兩個禪字似亦不同謂一是定而不思一是思而不定答四兩禪字不必別以參禪雖是思惟參究而禪定亦非全無思慮不過但守定中之空寂靜慮不同平常粗浮亂想而已且此空寂靜慮時其五遍行四別境十一善法及心王亦皆趨於定心所非謂定中全無一切如木石而已問五真現量不許擬議如有問曰吃飯否而答者隨諾不涉擬議斯是真現量否答五非也以此際雖未擬議然往昔實從擬議比較計度過來不過日深月積相習成性似乎未涉擬議也而實則非真現量乃似現量也或名世間現量亦可蓋真現量惟是聖智自證境界非言說所能形也問六世間隨問隨答之語既不可為現量然諸大善知識在法台上或他處之隨問隨答其不涉擬議者斯可算是真現量否答六亦非真現量以彼此際雖未涉擬議然往昔親證現量後亦曾用諸法比較其正誤以故一經直問遂能正答且問者開口至語落時已歷許多剎那答者何能將現量境界一直道出故曰第一峰頭不容話會第二峰頭略可商量但此種答問如果從真現量中來亦可算是道理現量問七近日所謂感覺似即五遍中之意觸是否答七感即觸覺即受問八第六定中獨頭意識可算現量然率爾意識既未明證衆境何得亦算現量答八現量有二種一者觀行智證現量具遍行別境等法在定中獨頭及無漏智是二者世間現量但有遍行五法或癡等無念慧等昧然若無所知即率爾意識及有漏前五識與第八識是古之開悟者如香嚴等皆因平日常修習定慧心行同時意識一旦忽然與慧心所相應即得一剎那之現量智此現量智觀行位上雖偶暫現然功力未充如閃電而已若得初果或登初地則成證不退也問九此二種現量其區別何在答九世間現量無定慧等雖見聞如未見聞觀行現量即定中獨頭有定慧等所以能了了常知若智證現量則同明鏡了然無忘矣見海刊六卷二期
