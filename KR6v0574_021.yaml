body:
  text: 致中國佛教會書三通一敬復者承詢班師請定釋尊紀念日虛意可定國曆五月月圓日為佛教紀念日以開會獻花演講等新儀式舉行紀念而四月初八等降生出家成佛涅槃等可仍舊貫見海刊十八卷六期二中國佛教會公鑒敬啟者頃晤甯波徐專員傾談之下深佩以菩薩心現宰官身其屬望佛教之護國輔民者至殷且切曾舉三大端以言一講經說法勿但在寺院待信仰者來聽應遍入民眾以淺顯文語作通俗之宣講二聯合各寺院多作醫病救災濟貧及教育等慈善公益事業三各寺院每日課誦為佑國福民世界和平之祈禱而于浙江尤有極關切之二事則寧紹台之漁業與杭嘉湖之蠶業為國計民生之所係然無數生命之被傷害亦未始非天人感召災禍萌生之因素而解冤拔苦祗有仗佛菩薩為之超度太虛感其誠懇因議每年佛曆二月十八九慶祝觀世音菩薩誕辰為眾蠶通疏超薦四月初七八慶祝本師文佛誕辰為眾魚通疏超薦由本會通告全國各寺院著為常例而本年時期已過則於六月十八九及十一月十六七補行之想本會同仁對此應有同感祈即提議通過通告全國各寺院施行為幸又關於釋尊誕辰在吾國自應以四月八日浴佛節為定例然錫蘭西藏且傳及南洋西洋各國已均以陽曆五月月圓日為紀念日則吾國加入為世界佛教國之一亦應以此日為世界佛教紀念日舉行適合時機開會儀式順此附及并頌公綏太虛謹啟二六年六月七日見海刊十八卷七期三敬啟者頃抵滬接閱公函藉悉被推為籌建會所常委但虛即須赴廬山及鄂湘川數月勢難擔承特此函辭希即改推為荷又同時接閱黃監事傳單一紙內言會所不須另建似稍有理盍移壽資辦僧學蓋興土木不如造人才也前曾囑敝寺上海分院代送薄儀二元諒蒙察收此請中國佛教會同仁公鑒太虛謹啟二六六十四見正信九卷五十期
