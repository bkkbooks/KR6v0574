body:
  text: 覆能信書二通一能信禪人覽函悉雖自訟無何進益而觀於禪宗確然有其自信之處實未嘗無進益也禪宗為中國佛法之真髓希益精進為囑密宗藉果力為增上緣亦不可含混誠有之非全出於混也然仁者仍以速出關赴緣工作半工半禪為善順問時祉太虛見海刊十三卷十一期二能信法師覽接來書論學律年限及受戒程序亦深有理致但五年學律非出律文乃古人一時之制頃於出家既有高中畢業程度習律儀禮樂二年亦已可矣且練辦事或研究教禪需時甚多亦皆在律儀基礎之上非捨於律故律行仍俱進也專弘律者當於專精教理院時專研律學並於參學林時專修律行以養成律師資格至菩薩戒當於受比丘戒畢即受學之不受者聽在家發心皆可授菩薩戒比丘反須限若干年後理實不合比丘戒以嚴成其尊菩薩戒以寬成其大倒之反失其用矣望更察之順祝禪悅太虛白見海刊十五卷四期
