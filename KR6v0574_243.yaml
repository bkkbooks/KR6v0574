body:
  text: 答吳覺僧問問本人在軍界不能戒殺佛戒殺軍主殺其手段適相反故佛學不談戰備似不利於當前之國難軍人輕視佛法亦影響于未來之淨土兩均有弊如何乃宜答戒殺乃人天乘二乘之理如受戒殺之戒便不能為軍人以普通凡夫人或小乘人守不守戒對事相而言故在人天戒與二乘戒則不可為軍人惟菩薩戒則不同前二者自個人言若僅受三皈而未受戒者則無妨礙至於菩薩戒則以大衆為前提菩薩無我以衆生為我負一國責任之軍人當以全國國民為本位為盡保衛國民之責任而殺敵無犯反之若任人侵凌而不衛民反為殺生故視其目的而定其應殺與否菩薩乘之殺敵乃為大多數人之生而去其害從救大多數人之大悲心起故不礙于戒殺而反是實行菩薩行若以侵略心殺之則失菩薩心若達空性則無物無衆生更無軍人一切無相而無殺不殺可言若自因果和合言則一切俱有差別而無量然能以慈悲為本而方便行殺仍為大乘行也程心勉記見海刊二十六卷八九期合刊
