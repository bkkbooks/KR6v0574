body:
  text: 答王達五問三則問一因果法則與懺悔是不是矛盾的染業可以懺悔嗎那就是有因不一定有果不能懺悔嗎那懺悔又有何益答一懺悔有兩面的意義一面是消滅往昔的舊業一面是止息以後的新業引句成語就是畢故不造新往昔的諸業大多是可以懺悔的但業因甚強而已成熟者是不可轉的定業然悔的本身也是一種因果新的惡業不生新的善業即生長而往昔的惡業也因善業的生長由慢慢的減退以至消滅善猶水也惡猶火也以水制火火焉得不滅種豆得豆種瓜得瓜這是一定的因果法則但是瓜豆種下之後如果又加以催毀維有播種的因卻不能生出以後的果這就是因果法則與懺悔並不矛盾的明證至已經成熟而強有力的業何以不能懺悔的道理就是緩不濟急這與弦上之箭一經射出無法收回是一樣的以上是說的事懺悔除此還有一種理懺悔六祖謂本來無一物何處惹塵埃可為理懺的說明惟本來無一物是空寂而清淨的諸法實相非登地菩薩不能體證在初學尚未證得的凡夫只可把住念頭時時覺照禪宗用功大抵如是理懺即使未能實證也可以使定業重報輕受問二小乘發心但求自了也能果證羅漢解脫生死那學佛何必以大乘是尚再反轉來說大乘利人即是自他俱利而其證果還可超出羅漢以上但求自了的小乘人又何必不發大乘心答小乘羅漢還有法執所知障他的解脫只解脫了三界六道的分段生死沒有解脫菩薩的變易生死不能稱為究竟所以學佛的人都應該發大乘菩薩心修大乘菩薩行但求自了是不合算的所以本唯大乘可是這是大乘菩薩的看法在小乘人因為根器的關係他是不能覺得的佛應小乘人的根機使先得自了所以便又有了小乘問三淨土仗他力可以帶業往生不再退轉皆習淨土者所常道不知淨土所謂一心不亂何嘗不仗自力業未滅盡又何能往生就不退轉往生既不退轉是學佛了生死之目的已達那麼見佛聞法還求甚麼答第三問題淨土的確不能離自力因為必須自心了解淨土法門深信切願又加以若多若少持念佛名習行衆善的心力才能與阿彌陀佛的本願力感應才能臨命終時仗佛力接引帶業往生佛說十方虛空有無量世界淨穢不一所以西方淨土也的確是有的並非誑說往生以後但受諸樂無有衆苦相處的伴侶又都是不退轉的菩薩更加見佛聞法那有新染能生那有舊染不滅怎麼會退轉呢所謂仗他力明白的說未往生以前及正當往生時要仗自力感他力往生以後依仗他力增自力不退轉的意思是說帶去的業在佛土淨緣增上力中定可以消滅至盡故可不退見佛聞法正是增上淨緣怎麼能說往生以後再無聞法的必要王達五記見海刊二十七卷九期附注原題敦請虛公本師開示的幾個問題
