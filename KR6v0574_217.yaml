body:
  text: 答九蓮寺學生問三則問一東三省能不能收回問二先有雞子先有蛋問三人死了再托生的話是真的嗎答一第一是政治問題東三省到底能不能收回這不要問別人但問自己到底要不要收回若果你有自信的力量和堅強的志願我敢擔保能夠收回因為中國民族有悠久的歷史人才之多物產之富若有志願與自信力量決有收回東三省之希望但個個人不可去希望人須要個個人拿出自信的力量來才可答二第二是哲學問題今分二種來說明一知識論此問題若知識論上看來可以不成問題因為這個問題構成的基礎是雞子與蛋必這兩物已同時存在乃可構成此問題若一在先一在後則一已有一未有便不能依此二物以構成問題了但是未生子前就不能稱之為父因為有了子才稱為父那末父子是同時產生與存在的所以不應說先說後這是依知識論說的二若依宇宙論來講當宇宙生物變化之始可由一種不成蛋的蛋產生不成雞的雞再由不成雞的雞產生略像蛋的蛋後來漸漸進化到完全的雞與完全的蛋譬如人身上垢汗就會生出虱子來其實那虱子從何處來呢依佛經上說四生乃先從濕生進到卵生由不蛋的蛋生濕生由雞生蛋是卵生答三第三屬於宗教問題若以現存在的人說是以前死的人托生則未來的人就是由現今的人死了再托生在佛法上所謂業識流轉的說明太深奧了想你們一時不容易領會且用你們常常喊的一句口號精神不死來說明精神不死是有一種精神力可以不隨人身死亡而磨滅的功用精神力是一種看不見的東西雖看不見卻有一種活動的表現人都有這個精神力能夠淨善與惡濁能夠光明與黑闇在社會在國際在個人都是有這種精神的所以吾人現在的身命是由先前一種的精神力托生父母而成的身命捨身受身從無始來不知多少次了儻若今生做人做得不好叫做精神墮落後來難免要變成下等動物所以我們都要好好的做人把永不會死的精神提高起來談玄記見正信一卷八期附註原題記九蓮寺請太虛大師說法今改題
