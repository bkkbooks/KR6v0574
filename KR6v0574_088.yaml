body:
  text: 覆徐潤琴居士書慧敷居士鑒宜沙同遊恍然猶在心目而自春徂冬忽將卒歲每一回思輒為慨嘆前聞抵省垣正擬邀為一聚旋悉以因病回沙今得來示頗令心慰所云經懺之事佛言比丘乞食以資生命此為今僧衆唯一乞食法門能整理完善洵為兩利之道但僧同散沙各謀其食寧有整理可言無已其將拙著整理僧伽制度論集資刊行各寺並由各縣長召集教務會議以組一某某縣各寺院應赴經懺聯合處而整理之耳此訊近益太虛和南見海刊四卷十一期
