body:
  text: 復衛西琴先生書衛西琴先生大鑒兩次傾談極為心洽今以依先生教育之宗旨而欲達其目的必須先從大乘佛化以得到符合外內上下渾然一體之宇宙人生實際之孔家儒化與大乘佛化乃能收事半功倍之效承先生之誠懇垂問謹以此意貢獻幸參究之並祝得大成功外表形下的人世物質人生宇宙之真實人群渾然一體精神內容形上的人心西洋大部文化偏於外表形下的東洋一部文化偏於內容形上的孔家儒化是符合外內下上渾然一體之宇宙人生實際施行者注重之點在乎人群如何調達人群之內心使發為適宜人群性情之常德倫理如何制用人群之外世使成為適宜人群生活之器具事物大乘佛化是符合外內上下渾然一體之無限世界眾生實際施行者注重之點即在無限世界眾生之實際使之消除過患成滿功德平均發達以至無上之佛法界見海刊六卷六期
