body:
  text: 與正信會諸居士書十二通一法舫森甫奉僧益亭諸仁者轉武漢諸上善均鑒得寄來各件藉悉鄂院有恢復之望而漢會亦注重研究世苦日亟待佛法解救亦愈急而各地佛化遂亦盛起武漢今亦得徐督辦夏司令提倡曷勝哀慰專祝弘法精進太虛手啟三月十一日見正信一卷二期二奉僧森甫益亭諸仁者均鑒函悉頃因廈門學僧定於舊曆四月八日畢業函電催往今看時局可往尚須一行故赴鄂或俟一二月後再定遙承注念先此復聞并訊同會均好太虛啟四月二十四日見正信一卷五期三奉僧達五居士并研究部居士鑒聞近來研究重開甚所盼望比來國中青年思想傾唯物日甚若能附一青年佛學研究組以余之自由史觀緣生史觀等為研究尤要唯察修持部除日常修持外可分聘律儀阿闍黎禪觀阿闍黎真言阿闍黎各一人以為各隨所喜以修習之軌範耳並祝福慧太虛手啟一月二十三日正信二卷二期四森甫益亭奉僧三理事長台鑒十三日來函展悉有楊厚慈女居士捐屋地充女眾學舍之事亦殊難得而即有融筌二尼能肩斯任尤為不易但近今每事纔一興起即已力竭故常有不能持久或雖持久而不能充實發揮之苦若武昌女眾院及菩提精舍能合為一當可圖振作然不能也今此事於持久及充擴之道應先注意及之尼眾依八敬而有宜名八敬學院而為學當自學律儀起沙彌尼室叉摩那尼比丘尼貴精不貴多惟理事諸公決之并祝年祺太虛謹復一月廿三日見正信二卷二期五森甫益亭奉僧國楨子中雲程子平等諸居士均鑒今得森甫居士等電函請余即來武漢弘化殊感諸仁者熱誠之意惟是余須明夏陰四月乃能抵漢今在此間講經正月底方了二月初抵滬於二三月在雪竇處理其事皆有預定時緣也潮州開元寺極請住持然以難負責辭卻今後雪竇為世苑禪觀林閩院為世苑中日系教理院仍在進行也專復並祈商子寬居士於世苑圖書館來年經費切實籌劃維持為禱太虛見正信二卷二期六森甫居士鑒仲喈逝世於會中失一要人而總務諸事尤須要居士特殊致力為勞矣然得少堯居士之熱心勤懇亦當更見進步耳得雪竇來信已收到二百元為祝功德無量修持部護法社諸居士未及一一望并為致意又去年曾計劃買進會左首之屋地不悉成事實否如成事實所議辦宿舍廚房食堂浴室廁所諸事必須妥議辦法以期無弊而有益或能於中稍作能引起青年興趣之高雅游藝之設備亦一引導青年方便也見正信二卷二期七益亭居士鑒閱正信刊之報告悉比來慈濟之事精進有加至為欽佩今正信會頗為漢市所推重者在慈濟而尤以居士主持得宜誠信昭孚所致然由此居士之福慧功德亦日充尚祈勤勇無懈而國楨居士等嘗數言當力為扶助也專此并祝慈濟團居士均福太虛手啟一二十三見正信二卷三期八瑞卿居士并宣化團諸居士鑒察近來宣化成績殊為進步此皆居士與諸團員熱心弘化之所致尚望精進益求擴充而得有相宜場所則通俗宣講所並附設小學尚可分設也專此順祝功德太虛手啟一二十三見正信二卷三期九得慧成居士書驚悉宣化團余主任病逝曷勝悲悼余居士比來發心勇猛於宣揚法化尤為努力不料溘爾遽逝雖捨濁土而生淨域然少一弘化菩薩矣尚希善選人繼主宣化以愈發揚之太虛三九見正信三卷二十一期一子寬理事長益亭達五副理事長奉轉監事長并轉理監事及會員全體公鑒閱九成居士來函及二十四年度徵信錄成績斐然洵可為武漢文化慈善之一重要團體固出正副理事長監事長領導有方暨各部社團主任與理事努力精進之所致實尤為全體會員至誠和洽勤行愛護之表現今後願益加尊重珍惜勿自毀裂以期光大盛昌而不替本會在精神上應即為太虛學會雖不要有其名而凡會員必須體達此宗旨乃可精誠致志除會章宣言格言及佛法僧義廣論為各會員所應體會奉行外對於太虛之學說行事應為密切之觀察及貫通之研究最低限度當於正信第六卷第十一期之本會導師在佛法中之意趣一文認清面目故此時當速印小冊分發各會員審受恆持勿忘勿渝若專標一宗一派一人之小組不得羼入本會是為至囑專此即祝全會和樂太虛謹啟二五十見正信九卷十五期一一與正信會會眾函日本近年對中國之大蹂躪全出不明人我性空自他體同善惡業報因果緣生之癡迷及掠奪不已之貪黷武不止之瞋凌厲驕傲之慢等根本煩惱我中國佛徒必須運大慈悲以般若光照破其妄執邪見以方便力降伏兇暴魔焰速令日本少數侵略派的瘋狂病銷滅拯救日本多數無辜人民及中華國土人民早獲安全世界人類克保和平于曉暮二時人人作此迴向祈禱為要二六八十八見正信十卷六期一二九成居士鑒函悉關於調整正信刊各點極為贊成希望能將佛法輪裝在抗戰建國心行中煥發新光也惟若能仍作為週刊小冊似尤好也聞鍾會長與胡鵬程理事等將同來川朝峨嵋順此函迓并候時祉太虛見正信十一卷二期
