body:
  text: 致薛部長書展奉批及賜函所陳者敬悉已蒙采擇莫名感紉閱七月四日報載大部行政綱領九改正禮俗內分一定禮制二定服制三改良不善風俗十寺廟登記一調查管理寺廟僧道二調查管理教會教民及其財產具徵對於禮俗宗教之至意惟內容詳細雖未能知而察大部之現制以禮俗宗教等僅屬於警政司之一科似有未備北平前此之內務部設禮俗司內分宗教等科名義亦欠周正鄙意大部應添設一禮教司內分禮俗科祀廟科宗教科禮俗科辦理定禮制定服制改良不善風俗提倡良善風俗等事宜祀廟科包括不屬於宗教之祀館祀廟如先賢祠先烈祠各祀神之會館及各姓之宗祠與孔廟關廟岳廟等及城隍廟土地廟各種習俗上之魯班廟老郎廟娘娘廟之類釐訂其應革應興應改善及如何管理之辦法宗教科則包括基督教天主教佛教道教回教等各國或中國公認之宗教宜由大部召集一全國宗教會議以議訂一宗教行政條例內分一修正及發揚各宗教之教義二規定各宗教之教團組織法三規定各宗教寺院菴堂或教會等財產管理法四改良各宗教之儀制五規定各宗教管理人及傳教師等之獎懲法然後頒布各省依條例執行竊禮教之良否與世道人心民風國俗之關係匪鮮今值訓政開始又適逢振作有為勵精圖治之部長當其事其望能樹立百年遠大之基選任專家悉心考訂為此再呈愚見祈鑒核采納為幸專肅并頌勛綏釋太虛謹上七月七日見海刊九卷六期
