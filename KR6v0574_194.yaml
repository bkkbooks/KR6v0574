body:
  text: 答潘圓音問八則答一提倡教學不濟貧窮是由智強悲弱智悲未能平均耳非但學佛者有之社會中多有此類人或亦因貧窮者多善門難開及濟貧適以長惰等觀念先橫梗在胸也貴親娶四妾或係學佛前已成之事實非學佛後發生之行為且少女偶然心欲為尼實不應便贊同當令在家中修行能至善根堅固不為境緣搖奪時方可聽令出家蓋出家尼衆類皆愚濫甚或犯規敗常不忍言狀與其墮落於後何似慎重於始既免玷污佛門亦可減少罪過然事非一向若與因勝緣勝出家可望道業有成者則阻止其出家者罪亦極重答二出家若要為一個好出家人是件極艱難極勞苦之事在家稍有欣慕豈能便談到此女人癡愛情欲嬌縱等煩惱俱重佛制初不許女人出家後雖開亦深限制但勸令在家信學修行故出家者少答三未能明出世法發出世心多求來生福報此本普通人之心理亦導普通人為善之法門耳答四夫婦居室是淫不是邪淫在家五戒不戒之故與出家人別答五常念彌陀自然有益但也須將關於念佛各經書研閲方能信解願行答六中國受教育人少婦女及平民大都迷信鬼神報應故信佛者少答七所論誠然但當時答的人或亦因女子姑息無志者多欲激發其憤悱自立之心故不惜口業耳答八非是佛經中不勸人止惡行善只因易説難行故講者多而行者少耳答九此無不贊成幫助的但你既發此議便由你去辦何如若希望他人終是沒有用的事見海刊三卷三期再答潘圓音問答一學佛者與普通人比論有同不同今且略一分析就中自然以智悲兼強者為最好但智強悲弱悲強智弱二類猶不無偏長可取惟智悲兼弱斯為下耳如第一次來函所述令親對於佛學很有些研究平常吃齋念經都很誠心並且印送佛書此吾所謂智強也而不肯周濟貧窮親友此吾所謂悲弱也此乃吾就來函所述以分判者究竟令親是如何一人則非吾所知要之智強誠有益不如能濟之以悲為更有益吾前答之意如是答二有捨名利色而不為周濟貧苦者亦有不捨名利色而能周濟貧苦者亦有由特別原因故不周濟貧苦而非關不能捨名利色者即依釋尊言其捨王子宮室妻妾之尊榮富貴並非為欲將其所捨之尊榮富貴以周濟他人之貧苦蓋是為求大覺以度群生須捨離之以便專志精修耳所謂不為周濟貧苦而捨名利色者是也故不應如來函混為一談答三福德智慧二俱圓滿方是佛不能以清寂概之以福德圓滿故能順應衆生癡情之所求用為後時漸漸得令度脫之遠緣求壽得壽求子得子等皆經教明載不可一偏抹煞答四前答中所云皆關於佛之教義如是人之事實如是者來函雖為女子鳴不平亦不過一不平鳴耳無當真理也答五未能真實知出世法若知有來生深信輪回因緣果報不虛汲汲以為善修福即人天之正教故前答豫之蓋此為正信佛法輪回因果之理者與迷信鬼神報應絶不相同迷信鬼神報答者看得佛同鬼神一般且不能知道如何是佛又安從信佛哉即信佛亦等於迷信鬼神耳答六佛非糊糊塗塗可迷信者故受教育識道理者始能正信其所了解之佛法然佛法方便多門隨機引導智解暗短者若能虛心領受智者之糾正自能漸趨正道惟自執為是斯難教化至云受過教育者多信耶教由此耶教辦學校多青年學子多出其中亦由初不知佛法是何義者妄以佛徒自居致為人將信佛看同迷信鬼神一般稍受教育者遂亦少信佛教答七若能照所講經義而行自然能將實際之道德自行教人行但講經而不照經行致如前次來函之所云故曰講者多而行者少答八因勝若其人於佛法已能真正了解生決定信發堅固心要求出家依佛法修正自利利衆緣勝若根身敏健才器優秀等此佛教中許人出家之條律原是如此見海刊三卷九期
