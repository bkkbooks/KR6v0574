body:
  text: 答周頌堯問五則答一此係夙生善根及一時精誠之感應所現但一心念佛不必記挂計較答二此由夙生惡業招此微苦償必不更招後報答三依佛經理信解修行不須求籤問卜答四於一切時一切處心中默念佛皆無妨礙答五此世界是一大火宅縱離得家亦未能出但能念佛誦經臨終往生西方極樂方是脫離火宅時也故但須在家中安心忍耐如是行去不要退轉便好切忌別打妄想見海刊四卷九期
