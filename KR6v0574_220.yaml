body:
  text: 答向鑑瑩問二則問一修淨土一句彌陀誠可了可否兼作利生事業問二小大相性合而為整個之佛法可以不分否答一淨土法門為難信易行之法只要信願真切不管行多行少皆可往生發心弘法利生濟世度人願力更為殊勝上品上生可操左券一句彌陀可了係對某一種人方便接引之談非必須捨萬善而不為也答二佛法界中本無小大性相顯密之分就根差而教別有小大性相顯密等有二用處一應機説教無棄此就彼之虞二修證程序收登高自卑之效見海刊十三卷十一期
