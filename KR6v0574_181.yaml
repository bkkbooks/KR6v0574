body:
  text: 答黃覕子問二則問一八識之中第六是意而第七末那為意識所依故亦名為意若然則六為能依七為所依即與眼識之依眼根耳識之依耳根無異何以六名識而七亦名識乎答一梵語末那此譯為意八識中第七識正名為意意者恆審思量是也第八恆而不審第六審而不恆前五不恆不審唯第七恆審思量以執第八見分為內自我體故名為意剋實言之第七第六俱名意識以恐相淆故第七存末那之梵語而不譯為意然立名雖同而義還有異第七名為意識是持業釋意之恆審思量是第七之業用識之了別是第七之體相即用此第七識之業標第七識之非他識即用顯體即體持業意即是識第六名為意識是依主釋猶夫眼識依眼根故名為眼識第六依第七為根故亦名意識根者勝增上緣有依如發屬助五義依意之識意助之識屬意之識意發之識如意而轉之識故名意識意之與識二各有體用其所依勝增上緣之根標此第六非是他識故與第七即意是識而名為意識者義有異也第七之為第六識根正如眼耳鼻舌身為前五識之根也然第七識自體是識以復為第六識依助屬發如之根故又名意根但在意根一名又有三義一者即第七識獨為第六勝增上緣復通為前五染淨依即第七識未淨則前六皆染與第六之如第七而轉同復與賴耶為俱有依有則俱有第七不執第八為我第八即捨賴耶之名故第七識偏名意根二者八個識之等無間緣通名為意根此即自體是意根也三者在隱祕教但說有六識而未說有八識者所云意根即隱含第七與第八二識此通常說六識六塵六根之意根也問二如來一代時教天台賢首均判五時獨慈恩宗則依深密等經判為三時而以最初華嚴判屬第三時本在方等之後法華之前之般若卻又判屬第二時種種不同他宗之處果何據乎答二慈恩依深密等判為三時所謂有時空時中道時者時者時義非指時代此中亦有頓漸不定頓教不歷三時從始至終皆中道時即華嚴是在不定教亦不定歷三時或從有入中道或從空入中道方等諸經皆是唯約漸教乃歷三時初從依他起性祕相而說對治凡夫斷見說續有情建立人天因果對治凡夫斷常二見說惟有諸法而無我建立二乘因果次乃依遍計執性說畢竟空義淘融執見解除法縳在經正指般若諸部然後會歸前二性顯圓成實性令入中道在經正指深密法華等部蓋在頓教之機從始至終皆聞華嚴在不定機從始至終皆聞方等亦有始終唯聞阿含教機亦有始終唯聞般若教機亦有始終唯聞法華教機唯不定教中有一類從小入大從空入中之漸機者乃歷此三時耳故天台之判五時教亦有通五時以融之閲教觀綱宗可知矣見覺社叢書第一期
