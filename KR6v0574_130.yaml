body:
  text: 致王曉西居士函二通一曉西居士并轉漢藏教理院董事會公鑒今得滿智師來信可以回渝辦院事但詢件頗多鄙意可請為漢文佛學主講法師每月月薪三十元但由再請助講一人事務僧二三人即可先開辦漢文班如康格西已請來即漢藏同時開辦可者希即徑去院函上海佛學書局公請滿智法師可也專此即候公祉太虛謹啓見漢藏教理院開學紀念特刊二曉西居士鑒奉惠書悉北衡居士亦在漢候甫公惟願川事得一妥善之解決從此政理民康耳藏院得院董諸公維護尚能持續為感但院中仍慮經費不繼而院務無積極進取精神希相機充實經費并時一安慰院員之心也順頌時綏太虛啓十一月十六日自上海發漢院存稿
