body:
  text: 告國內佛學同志書國內諸善知識均鑒太虛誓施捨身心以弘佛法十餘年來對於一切艱難毀謗皆所不顧想諸公中亦不乏深知者比年熟察中國之事變皆從世界各國而來非世界有力諸國對於佛法有相當之信解則中國之佛教亦必常有搖動不安之形勢故甘以頭目腦髓作犧牲品扶病至歐美一遊觀機設化抵巴黎之後差幸佛天之護佑稍有效力前星期在東方博物院作佛學源流及其新運動第二次講演聽者各國名流五六百人頗多感發旋商西爾法勒肥博士及該院院長阿甘博士等議設世界佛學苑以昌明佛學陶鑄文化增進人生之福慧造成世果之安樂為宗旨旋由彼二人邀集愛斯嘉拉伯希和等著名學者十餘人共同發起決議即在東方博物院先設一世界佛學苑巴黎通訊處并邀請中國之發起人近來歐美學者對於佛學確已有研究之傾向聞日本將派三千布教師至歐美傳教中國為日本佛教之祖國於此尤須努力此由各國佛學者共同建設之世界佛學苑中國佛學者尤不能不出為倡導之人此苑若成則佛法宏布歐美一切中國文化皆隨之而為世人重視中國乃能得各國人士之諒解安全發達建設地未定如主張在中國亦可預算建設費百萬元如各國贊同設在巴黎法國發起人已擔任捐出院基而議由中國發起人首任捐建設費四分之一以為信導巴黎最大銀行之東方匯業銀行經理已認收保捐款華法英國文簡章緣起一月間可印布諸國故特函求諸公為發起人函告巴黎通訊處并先認捐及匯寄數萬元至巴黎收款處則他國發起人皆踴躍輸將不難觀成矣太虛不日應請至英比德并告即祝諸公精進太虛自巴黎上言見海刊九卷十期
