body:
  text: 復希聲居士書披讀玄示輒為憮然宋明來學佛之士但求福報者不論外殆人人眼高於頂以一超頓了為標的華嚴法華涅槃且不足措心況三論唯識乎況成實俱舍所宗阿含乎第課之實際行證雲棲師已謂震旦當時無一須陀洹人此由學無階次徒事憑虛邁往之故也靈峰師欲揣其本齊之以戒而勢不能逮將一句阿彌陀佛救之又數百年及於今日人慕禪淨卒之禪非其禪淨非其淨無所遇而非儱侗顢頇之徒耳於此自為躲跟已不勝其劣卑之慢矧欲應析微究元之科學哲學思潮而昌明至法乎故對於仁者輯録研習俱舍之所得公布以供國人之資發明慧極深欣贊但須以趨入唯識為蘄向勿於此畫止而已太虛於大小乘經律論雖稍曾涉獵觀其大略了無精解俱舍諸疏尤目未嘗遇仁者問道於盲不免有負盛意而太虛或能因大著為將來研究俱舍之一引緣耳見海刊二卷十一期
