body:
  text: 復程天度居士書惠來大作洵亦梵音海潮音中之一妙音矣而來書所問尤為切要解先行繼行起解絶寡欲得佛法之真實受用勿滯知解須歷修證而致修之道貴在精確專篤不應虛務玄遠天台小止觀一書依其十門次第不稍躐等修習之最為有效無患不然則專念阿彌陀佛以求生極樂亦千穩百當之法門也勿昏勿散勿暴勿寒選擇一門安行五載當會見於三摩地也此致天度居士太虛合十見海刊一卷八期
