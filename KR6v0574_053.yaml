body:
  text: 與海定等書十四通一尊院長葦海主任覽函均悉一樂觀事早知半月餘矣於吾人無礙二想占吾院為德僑之人在歌樂前日訪止之矣三本日院護隆樹抵北泉否所議如何四山洞歌樂曾訪居院長林主席孔奉祀等談甚洽又山洞曾晤張主席弟張雲帆局長願為本院請張主席增補助費或給官價米海定到山洞可送些院碑等專訪之五金劍之柴調解及佃戶換佃辦妥否六塔坪民衆校勿須預計學生多寡多辦些時必有人勿遲疑速辦七華岩一尼文學中西醫學俱好或能到塔坪施診又塔坪講經已宣布否未宣布可停太虛二月二十日自重慶華嚴寺發二海定主任送上車後以車在路兩次修理到榮昌已天黑矣足見行路之難今想早回院拆修圖書館仍考慮無必要可緩一動工恐用錢多也有餘錢以先燒磚瓦為善吳校長應在北碚雄校事務主任已定否余已定舊正月回渝即問近好太虛一月二十七日自榮昌發三海主任葦法師來函云講堂傾斜甚即趁假期動工花數千元圖書館緩修不妨即撐修講堂是要把瓦片卸除柱梁撐直或添換好再蓋瓦則開學可用而再過若干年亦不妨矣有緣法蓋新講堂可於後操場建立原講堂可不拆之此嚴定法師意頗妥又前一紙可寄葦師而前購谷念石即由院出一收存谷念石款一千六百元條寄渝轉我太虛二月三日自榮昌發四海定函悉一講堂另建基在藥師後雖不及在講堂後然與宿舍連絡成一氣並配雙柏後之樓屋亦佳但須基堅耳加以改狹為六丈餘或在四十萬內可建矣二舊堂薦正修復須找此項老工匠能手價廉工實勿找工程師當可省費與何院護談當在四萬內作之三黛湖給價何院護已允作修舊堂用可以舊堂修整費函告他請他付款三葦舫止安到金劍已得報真容亦來過矣四捐冊係周經手印印出期尚遠圖樣改變可不須寄蓉五佃戶增苞谷勿強增以傷情感山中佃戶須善感化俾遇事能幫忙六松山案及禪岩買樹亦悉要須設法還債開支費為要告塵空法師抄來出生菩提心經亦收到太虛二月二十二日自重慶發五妙虛海定師鑒俞蘭馨居士為夏季考大學自修要借塔坪暫住我意必需在民衆學校教點課方可希與林衆分派之為荷順問近佳太虛三月十一日六尊院長塵海主任同覽余及本院辦院務人員到渝無適當住處常在羅漢寺無固定的東挂西搭殊不成樣且本院在渝的住所是永需的今與宗方丈商就羅漢寺合造三樓底乃大殿對面擬造韋馱殿處底歸羅寺樓歸本院全包十五萬元本院出一半七萬五千元本山本年包谷費收作此用便夠此速待議定復信即決遲恐有增價太三六自重慶發七尊院長塵海主任覽今日晤教部陳部長談本院員生緩役事陳答應可緩囑即備一文到部此文另抄一分由我直函陳部長並教職員學僧名冊一份當可辦到在本院員生免役之地步而全國僧衆作救護隊的免役已訪軍政部長亦可辦到矣專此即問院衆近佳太三十五自重慶發八海定一關本院員生免役已晤教育陳部長仍呈教育部轉便可昨函尊院長令辦呈軍委稿未妥暫不改可還妙欽暫存二曹潤民至謝律師處而不來我處交件能速催把原交股款付還并數月來息金免多煩亦可羅明興件仍存我處太三十七自重慶發九海定大雄來信悉一校舍校具等難完備草創期難免要各員生諒校長辛苦經營暫安漸求進步二學生情形告校長囑教職妥為馴化三止安能負事務主任仍可不能囑校長另請菩薩是衆生的奴僕囑止安真容相密出家事務職要忍辱耐煩做出成績來使人感服稍難即求退只永無長進的廢人四小偷應員生共組防衛學生勞作可闢地種菜疏五經費現尚存無問題包谷售付千五百元餘校長負籌六衛生擬募贈藥品水池應續築太虛三二十九自重慶發一海定校董據吳校長託徐主任持函報告陳恩海體育教員兼代訓育主任頗多不合應即辭退已託徐主任代為處理並請校董會派一代表協助處理茲由校董會即派校董為代表協助徐主任妥為處理為盼餘由徐主任面達校董長太虛四七自重慶發一一海定主任據續遠來信似乎兼職務過多或金劍管理另派人或商葦法師察其內情如心月隆法可各分兼一事又未知已到過金劍并查過大雄校帳及監察近來用途否太字四十六一二海定覽函悉前數函皆另復應早知悉白雲寺事最好由其寺有關之一僧或數僧函呈巴縣佛教會及重慶市佛教會可據以質問該局紹隆及溫泉等近如何江北鳳皇寺及瑪瑙觀寺亦以數僧飛呈省教會並省府保護並改組縣佛會太虛四十七自重慶發一三海定師覽關大雄中校立案事頃得市教育局通知所有照片每樣須再補兩張望一將各照片片底二所取得之教育局契據等收條速即掛號寄羅漢寺宗仙方丈轉鄒元律師手代為補照片及領回契據即可批下也我約後天到北碚通知吳子貽候我順問近好太虛七二十七自重慶發一四海定主任院中收支雖暫可維持而已有寅吃卯糧之勢一方要開發財源一方尤要力行節儉希以堅忍勤敏赴之事務處月空圓光永生等漸能練達須發長遠心而事繁或須添改人可稟承尊院長為之如遇重要事則商承尊法師而葦塵二師慧明超明師亦咨商以行老人三十二十二七原稿存漢藏教理院事務處
