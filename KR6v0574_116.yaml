body:
  text: 致蔣總司令書介公澄照太虛至歐本為宣揚三民主義所根據之中國民族文化精神及佛學來日在巴黎東方博物館演講聽者六七百人皆各國名人由該院院長翻譯結果大生效力昨今兩日其學者名流紛來訪問遂提出在歐洲或美洲設立一世界佛學院以昌明佛學陶鑄文化增進人生之福慧造成世界之安樂為宗旨由各國熟心佛學者設立以研究超國族之世界性佛學大荷贊許推太虛為創議人簽名發起已得希爾法勒肥費奴爾伯里和馬斯博德未愛威爾加爾伯底女士佛雪普里流斯奇哈根馬松阿塞爾庫郎格拉乃威努愛斯克拉臘爾哇臘爾女士布臘訶古樓塞巴士等大學院大學之教授院長共議即在東方博物院先設一世界佛學苑巴黎通訊處籌備進行太虛先擔任每月百元經費不敷者由彼等分同擔負之已議草案緣起華文譯法英德文印布各國并提出國際聯盟會議預籌建設費連地基華幣百萬元如各國佛學者贊同設在法國彼承認即由彼等捐與地基并由巴黎之里昂信託公司經理擔任收款存款此人與某美國女士已聲言當即捐款故中國及華僑方面太虛亦告以可籌募二十萬元之數今英比德都亦已來信約定太虛前往演講故一星期後即至倫敦三星期後過比至德預計籌得同樣效果唯設法英德之通訊處既已增加太虛之費用而建設費在中國亦不可不先付到一部以為各國人出捐之倡導然聲明不受各國政府之款以免政治捍隔然個人名義則無論居何地位皆可收受環顧中國唯公有此遠大之眼光心量故請公先電駐法之中國公使館轉示東方博物院認捐十萬元作世界佛學院建設費并先匯存巴黎之里昂信託公司一萬元以示倡導是所切禱今歐美最高學者皆已有研究東方學術之傾向老子孔子及印度之吠檀陀等雖亦有人研究但皆看為東方學術之支流除基督教回教以外公認為貫通東方各民族文學哲學藝術政治風化之普遍精神乃在佛學且實唯佛學以具足西洋近代之科學理智而更有最廣大哲學可以籠罩一切哲學駕出於其上若令西洋人真個了解必能敬服而歡喜領受由是隨佛學而各種東方學術以至中國之文化思想亦可深入普遍於歐美人之心內而以中國民族道德精神為根據之三民主義遂能為歐美人真正了解而得望諒許不妨礙且能協助中國民族之完全獨立共進於中山先生天下為公世界大同之通路三民主義以仁愛信義忠實和平等道德為本源在歐美人未完全領受了解整部東方學術之根本精神以前終難諒解嘗察之歐人心理不視為不可解例吳稚暉先生言俄人以恨為革命出發點而不了解中山先生以愛為革命出發點是即視為徒托拾歐美之片段思想縫綴以成遂生隔閡或鄙薄之意此皆由根本上不了解不接受三民主義所源之中國文化及東方學術而致若能將公認為東方學術共通精神之佛學引其由研究而深入普解於一切中國文化即為三民主義大昌於世界之日茲者法比諸報已載日本外務省通知歐美各國之日本公使館將派三千人至歐美傳佛教殆亦已窺及歐美人已大有對於佛學之傾向故有此大舉然日本以其為帝國主義工具之偽佛教或反足引起西洋人反感而使永不了解東方學術之精神中國亦受其害故中國如公之有遠大眼光者不可不急起直追超日本而先之今若得公如太虛所請則世界佛學院之基立三民主義亦隨佛學而飛騰矣惟賜察俞允中國幸甚世界幸甚專此敬頌政綏太虛敬上見海刊九卷十期
