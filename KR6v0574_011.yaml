body:
  text: 致中國佛學會書中國佛學會杭州武漢福建首都上海普陀等處發起人及籌辦委員均鑒太虛離滬後時在旅行之間對於中國消息悵無所聞今至德國之佛郎府大學中華學院小事休息得籌備處來信稍悉近況知八月一日及九月一日曾召開常會學會但研究會術故擬另組教會鄙意可即由籌備處召開佛教代表大會將學會改組為中國佛教會以今中國之佛教不可不有此全國之組織也太虛三月內可回國當再報告遊歷之經過先祝諸公精進太虛謹啓見海刊九卷十一期
