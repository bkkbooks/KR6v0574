body:
  text: 復淨行居士書兩展來書具窺信心淳厚道性貞純然云為衆生懺悔發願時心念不能專力蓋懺悔發願原須於念佛前與念佛後行之念佛時專心念佛全心念佛全佛是心圓滿清淨中不容他而懺悔發願之力自然融貫在中又云不能為衆生發願及回向一切智此自是博地凡夫情強理弱之通病不足為薄於大乘信根之徵可隨時觀一切苦惱衆生熏發大悲每日讀誦圓覺或維摩等大乘經典熏發大智依此不思議熏自生不思議化耳至云本了無生情偏妄計起信論說初心菩薩以後念覺前念覺即不覺故知情計在前了悟在後情計之生乃由無始妄習起念即覺覺即念滅久之妄計之情自然成無生之智所以云不怕念起祇恐覺遲也見海刊一卷一期
