body:
  text: 復黃懺華居士書二通一懺華仁者鑒來問蓋由無始熏習所集成之現識業流非依教解理所能轉染成淨必由行而致果乃有效力行果不論其高者即台家所謂觀行即佛已不易致能致此其功用已非凡矣以大乘是全法界之系統全達本空之無染無淨恆轉之非常非斷不畏生死煩惱長劫積行而致求速效則小乘遠離衆緣但空自我之戒定慧行較易成功出家者正解深欲則一生專修大抵可證果位然即用精察勘破世界之道以精察勘破日常心行所謂燈原是火不須另求也太虛見海刊九卷一期二懺華開士覽展讀惠柬超俗之思溢於言表遊心之遠則朝市適成大隱請持慈宗三要為寄託之內樂地何如學會近況曾得誠善函告惟漠無常費慮難久持足下其兼圖之入川在即而溽暑惱人頗躊躇了順訊時佳太虛手復七月二十六日見海刊十一卷七期
