body:
  text: 答湯雪筠問二項二十則甲問對覺社及海潮音所欲參末議者一覺社宜多設支處要多集同志如北京上海廣州星洲等處尤為最要地點二宜在北京廣州上海星洲四處開辦日報旬報蓋近世無論何國及鼓吹何種主義皆須賴報紙之力以轉移人心然後易於籌款撥地三海潮音宜增多影片宜多古佛名剎名山及印度古迹等畫像以喚起閲者興味并宜闢同道住址一欄以便大衆函商四宜多闢名山遊記一欄及近代名僧居士事略五宜以淺近之白描派文字著述千萬不可用白話文因中國言語不能統一惟文字能統一若用白話文反難明白且白話文若除卻哩呢的底這那等字即是白描派文尤覺了利直捷也六杭州交通不如上海香港廣州之便宜速設支處七宜有具體由淺入深之著作使世人不致誤趨歧途八辦日報只須籌開辦費若在廣州開辦瑛可決入能敷出且多得捐款舉辦其他報業九宜提倡組織旅行印度西藏日本佛教旅行團十宜提倡組織旅行演講佛學團乙問所未理解者一禪宗應從何入手宜購閲何種書籍經卷二六祖壇經謂以無念為體又云無者無何事念者念何物無者無二相無塵勞之心念者念真如本性真如是念之體念是真如之用云云是六祖教人以無念為體非如止門之百物不思換言之即教人念本性也且照壇經無念二字非連綴而讀似屬無字一解念字一解也然本性無形相如何念法若謂去諸妄念即是本性但去諸妄念一切皆空則經又云不著空不著不空若準此言之則念亦應不著念不著不念矣究竟如何為合三壇經云心不住法道即流通金剛經云應無所住而生其心然則參禪者應一切不著以心聽心之所之以自性聽自性之發慧乎四參禪何以要起疑情究疑何物何以一切忌著而疑情獨不忌著五楞嚴華嚴及印光禪師皆言佛土黃金為地七寶為池凡所用度皆是化現無不如意是以淨土為實有也何以經又言隨其心淨即佛土淨六祖壇經云東方人有罪念佛求生西方西方有罪念佛求生何國又曰迷人念佛求往生彼土悟人自淨其心是以淨土為無也究竟淨土是有是無抑屬寓言六密宗所謂二乘地者聲聞地辟支地也有云若墮二乘地是名菩薩死若墮地獄地畢竟得至佛若墮二乘地畢竟遮佛道其理云何七坐禪要攝六根惟耳最難攝敢問坐幾許年月方能有效八坐禪之經過若何乞法師説法師初時坐禪由入手之日以至今日其經過所見之境地如何九坐禪何以著魔魔何形相魔是否係佛譬喻諸妄之詞抑是實有魔鬼乞為詳示并示不著魔之法十古德云禪宗無淨土十人九錯路淨土無禪宗萬修萬人去有禪有淨土猶如帶角虎味其詞是淨土禪宗須合冶一爐始得乞示其故甲答對於覺社及海潮音各節第一節尊議原覺社之初願但真正發自覺覺他人心有己利利人能力之同志卒難多得故尚無一處能成立非有所靳之使然也第二節與第一節同要之此皆非所不欲特未能耳如何使能為此尚請賜教第三節亦因辦事無人及辦事無財故難期完美第四節則儘可依議或收入雜記欄中第五節無可不可因海潮音對於文體原無何主張但隨順時機之所宜耳第六節尊議誠然但覺社原設於上海嗣因無有真正同志辦事故姑移設於杭州而已第七節編輯此項佛書亦嘗計及但終須有經費及有多人幫同作事方可實告之現在覺社作種種事僅有一二人而已其餘但自修耳第八節閣下如能本乎覺社之名義與宗旨在廣州開辦日報固覺社同人所極其馨香頂祝者也第九第十節以言提倡則覺社所出之書報上無不可盡力提倡之者但要期其實現必別有何種巧妙方法乃可否則亦空言以提倡而已蓋吾十餘年來凡關於宏揚佛法振興佛教之舉千端萬緒應提倡者無不盡力提倡馴至今日乃百千萬億分中尚無有一絲一毫之成效可觀也濁劫衆生緣淺障深惡重如山善輕如毛於佛之無上甚深微妙清淨之法絶無所能心契縱得一二嚮風餐化者亦但有急求自度之懷欲求符覺社之名義者未之逢也噫此佛所由往往言菩薩道之難行歟乙答對於所問教義各節一禪宗入手端在發明本心心在何處心是何物於此二問題參究穿透方有商量門路參究時不拘行住坐臥均可用不著閲看經書要參看者則楞嚴經金剛經楞伽經圓覺經等經六祖壇經黃蘗語録宗鏡録指月録宗範等書須一一反向自心研究之二但將大乘起信論心真如門一章及真如三昧一章熟讀深思義無不了三但先參究發明本心此義自了否則終依稀倣佛千言萬語亦不能為解説清楚也四有疑故不得不研究有疑故必須要求一個真明白著即不疑疑即不著疑即參究疑即要求個明白有奮進之力無住著之事五有淨佛土是言其結果自淨其心是言其修因譬如吾人以無始心未清淨造諸染業生於此五濁忍土為人人身世界推厥本因皆是心業造成但業成果生業果未謝則固實有此人身世界然則豈以隨其心淨即佛土淨而淨土為無哉正以身淨之故而淨土是有耳念佛求往生是佛為未能悟心之衆生所開之一異妙方便門無論迷悟皆可修證六祖則專為悟心之士説切實得生淨土之所修因行而已法無不相通會我們以前造了惡業現在既實有這個惡濁之人身世界諸佛諸祖心業清淨亦便有淨佛國土我們現在能依照諸佛所言而行即便與諸佛祖清淨心行一致豈不決定往生淨土其義昭昭若是何有是有是無抑屬寓言之疑惑哉六菩薩以能成就無上佛果盡未來際普度衆生為義二乘地是已得到解脫衆苦之地位者自己沒有苦惱便不知衆生之苦不易有所感動而發心度人轉不若地獄中衆生以苦極之故推己及人而能發普度衆生之心故其説如此然亦抑揚之談未為了義如實言之應曰墮二乘地者其菩薩心較墮地獄者尤難發耳蓋二乘亦非畢竟不能發菩提心也七可修楞嚴經旋聞法門快則百日遲則十年八可將憨山夢遊集年譜詳細閲之九可將楞嚴經詳細研究之十先由禪宗悟心後依淨土修行禪宗是頓悟法門淨土是頓修法門非禪宗恐一生不能頓悟徹底非淨土恐一生不能頓修到家不到家則不免蹉跎故合之為妙見海刊一卷十期
