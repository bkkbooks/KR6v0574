body:
  text: 復岡田恆一先生書岡田先生閣下去秋來承以貴報相贈名論卓議讀之至為欽佩而采譯貴報之大事轉登敝處海潮音月刊者頻矣今又荷華翰遙頒獎飾逾恆殊為感慚靡已而適豫講經北京有稽裁覆為歉至東亞佛教大會洵為盛舉亦今交通便利時代東亞各地佛教徒應有之事惟此間佛教徒衆頗以省界國界為佛教之障各人皆願為普遍大地之佛教教徒而不願為某省某國之佛教徒故貴處佐伯僧正等囑推中國各省代表出席東亞大會尚鮮得其同意而僉謂當以超出國家之佛教徒名義出席東亞大會為宜蓋昔之佛徒出家今之佛徒進而主張出國以謂不超出國家不足為真正之佛徒此論不知貴報以為如何此希賜察并加以指教為盼釋太虛和南上見海刊六卷四期
