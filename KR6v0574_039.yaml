body:
  text: 致滿智書四通一滿智法師覽得各來函知院內座下力任維持殊慰惟經費搖動終以為慮昨訪旭東亦力任函渝於省方經費先行籌墊必可恢復而渝方經費則當請潘白諸公設法維持也院內充實教材當減漢文而加藏文方符名實希注意籌及曉西居士均此太虛啓二十一年十月二十五日二滿主任并轉北衡曉西院董同鑒接兩函藉悉能海法師講比丘律院員生集聽甚喜流言不與計較甚佳信用規模樹之非易滿主任當續維持為要但院中最注意為藏文教理亟望法師教授藏文菩提道次第並代催法尊喇嘛來川應體師來渝可任佛學教員兼學監勝濟夏間亦可回也順問均好太虛白三滿智賢者慧鑒疊接來書雖每形怨憤但殷殷師生之念及為法為衆之意亦見近來修養有進而福壽亦增加矣然甚望再能擴宏忍之量平褊躁之火溫而有禮以待人恭而無逸以臨衆續為維持教務而事務員尚能稱職則同何院護王院董監督之可也本年下學期起并望能注重藏文基本讀寫不負甫公等之望以濟時艱一院之成立才財兩缺勝濟不久可返渝冀從慈悲忍辱福慧雙修并保養身體健康以釋遠念虛白四滿智法師鑒院員生全體來函及所附會議録與告行書均閲悉一余因此間要務并省漢藏院經費決明夏乃來渝二告行書所言不背余武昌辦學院及歷來對學僧之訓辭但余既未能處居一處以執行而其他又鮮能負責執行者座下既有志有能於此且於漢院已成相當基礎即當負責辦下去以免能説不能行之誚蓋咯血之不妨事前何院護曾剴切言及而醫療此病之貴在心氣寬和與起居無甚關係故亦並無辭職他去之必要並函院董會略改院章之教務事務主任制為院務主任制制表見致院董函委負全責以勵施行如此即從第三學期起座下最少當再負責一年方可有頭緒而座下聰雅之資亦為余所識拔對余亦有八九分忠信但時不免為憍躁刻狹所擾而近來亦似時能修省改善深為可嘉亦徵識驗之增進每由歷事造修而成也常恩會計寄來四五二月報告册及附函亦辦理殊善舉為領袖事務員亦妥應體法師來信之意亦甚善余意第三學期仍以應師兼學監月薪不兼學監者拾二元左右兼學監二十元左右書記國文永暉師能繼者繼否則應以文淵師教國文而勝濟助教佛學兼書記以遍能師領袖教員并以藏文嚴切注重即可教課每日四點至四點半便多溫習故教員亦足數也研究部不須辦為宜餘若公園設圖書處應即辦除每月院務會議及帳目報告外開學前一月須以每學期教員功課表寄余核定進退更動教職員須經余核定或由會議及臨時處置須即陳報既為此決定故辭別書退還可不印發但講求學二篇可另成一篇付潮音編入而其中與趙百符所談亦最好録出另成一篇來發表太虛手啓並見漢藏教理院年刊
