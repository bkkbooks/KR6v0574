body:
  text: 答金中和問二則問一宗教多是清淨無為慈悲博愛然於國家前途是否有益究竟能救國否答一有一些人於史實多有認識不清之病如猶太人因不信基督教故其教不行於猶太而猶太之亡國於基督無干且基督於別國而信之者則強如猶太人驅耶穌教徒於羅馬羅馬乃至今英德等均強存佛教在印度史上盛行時其國亦強其後婆羅門教復興佛教受其排斥而漸衰自唐三藏取經後數十年佛教漸衰婆羅門教興焉又數百年回教侵入印度即當中國元朝時征服印度人之回教徒亦蒙古族印度先亡於回教佛教益衰故知佛教盛行印度時其國盛強逮佛教衰而其國亦漸衰今印度人多不信佛教故有亡國之事若自中國歷史觀之佛教在唐宋明清初興時代均頗發達清末國家將亡亦即佛教最衰落之時至於蒙古西藏之佛教亦非完全之佛教僅政治上利用其一部份而安靜其民衆耳然自國家之民族強弱言其民族為被統治者乃由統治者利用佛教以柔弱之然其民族為強者則佛教化之亦愈興又小乘是消極自修法大乘佛法常言慈悲意即先天下之憂而憂後天下之樂而樂慈悲即積極救人救世故處今日之中國地位當以中國為其本位如今日之抗戰建國精神求達中國之自由平等非若侵略者之意是即合於佛教慈悲心也蓋以衆生之苦為苦以抗戰禦外侮救今日中國人所受之災難而免於敵人之壓迫是即慈悲心救世心然慈悲救世要有方便為門應自救國做起故凡救國救世之兵仍是大乘慈悲之意問二人生之來源如何答二人生來源亦可曰生命來源然自佛法言則無始無終但時有變化如此世為人因造得好可繼續再為人或為較人更高之天若因造得不好則可變成比人更不好如禽獸此皆由自造之因果皆人自造天者較人世界高一層之世界然亦受因果之支配至於地獄則較人苦之世界各人之禍福由自心造信佛依佛理而行可以免苦得福佛教是使人不造惡因而悟真理因生命無始無終可以不求長生至於平常所謂靈魂非佛家之言佛教亦無此物至覺悟後之化身仍與世人同法身則為佛身真體不生不滅矣報身亦可云永生常云佛有三身法身報身化身報身至大覺悟成佛而永生化身則由有機緣至人間然為時不久機緣盡則其身滅法身則無始無終不生不滅程心勉記見海刊二十六卷八九期合刊
