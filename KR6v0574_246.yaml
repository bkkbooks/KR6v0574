body:
  text: 答徐恆志問二則問一顯教説成佛須三大阿僧祇而密教説即身成佛其異同處何在凡夫慧照觀心有即身成佛之可能否答一密教外禪宗亦言即身成佛華嚴宗亦言三生成佛此皆大乘教之一部份禪宗自法身言悟法身即成佛密宗自身修成幻化身即成化身佛至於説凡夫如何即生成佛可用禪宗明心見性見性成佛用密宗先修幻身成佛或用修淨土法臨命終時往生淨土不退第二生亦即成佛但禪宗密宗即生成佛均非報身成佛報身要修因感果則淨土宗二生華嚴三生為極速常途則三阿僧祗劫乃成佛也問二觀心功夫得力八識中根本習氣翻動時每至心疲力竭當如何降之以何方便乃能斷盡一切煩惱入自在無礙境答二觀心功夫於八識亦有熏種起現關係然以第六識為主由第六識如逆水行舟回光返照豫影響於第七八識轉變其無始習氣故頗費力惟有返觀窮察久久行之透過第七識之障礙關頭始能永久觀照欲透過第七識須至第六識轉變妙觀察智後平等性智始可現前以此第六識第七識無分別智力久久行之則八識方可得習氣漸淨故先修止觀觀照心性次用妙觀察智平等性智之無分別智至第八地乃能斷一切煩惱達自在無礙境程心勉記見海刊二十六卷十期附注自答姚際虞問至此皆答問選録中分出
