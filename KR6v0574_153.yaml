body:
  text: 覆楊星森居士書三通一楊居士星森慧鑒閲十三日惠書獲知北平近年佛化時況至深欣慰吾所著各書雖頗切時要過承各方推許亦彌滋悚疚頃病廢日久不惟艱于搆思握筆而口講亦難故真現實論講録海刊者未克完成也世苑圖書尚全近將由葦舫返鄂恢復但房舍殘毀整理不易李子寬抵漢皋擬設一書局專出版海潮音及編印拙著各書亦猶在籌劃中耳前者承寄至慈宗三要攝頌供縉雲院衆公閲後珍藏院圖咸所讚佩住心繼歐譯著精進清淨亦續編述聞之甚喜叔迦比已有詳告并悉辛喇嘛慈舟法師亦居舊都化導有加胡妙觀之逝雖久已知而頃知現明普照諸老與芾煌居士亦已西逝頗感老成零落漢藏院譯編曾刻印十餘種內學院竟無逝後無何表現但恩洋在內江立一東方文教學院曾出孔孟學案等及出一期叢刊巴利三藏院設西安今尚在邀請錫蘭講師真現實論已出者請從中華購之海刊遺存不多擬檢寄若干也北平各舊雨新知統希問好不一一太虛手啓十一月十七日稿存楊星森處二楊木居士閲佛學月刊各文深以贊喜今有李子寬等在南京辦佛教文化社決編印余之全書預約出版唯須有專責編校者居士能至京專負責斯事者速函復漢口佛教正信會轉知為盼太虛三月十日三楊居士來兩信暨與李子寬各信均悉所述叢書搜編各點均善吾國曆十一月十五前可在京盼十五前到京及面定種種來此供給膳宿外僅可七萬元月津來京旅費希先墊用以菩薩願行而不計者能早到京為荷專編勘叢書及關于編行叢書往來信件等不管文化社他務也復問近健太虛十月二十七日
