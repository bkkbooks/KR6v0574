body:
  text: 覆李哲生先生書哲生先生大鑒展奉惠書極佩高明承詢三事茲以應事鮮暇略答如下一情意理智為一人所具固應平均發達西洋判為截然之二事正其偏至之處而佛法則平均發達圓滿故曰智悲兼大或悲智圓融去其偏而除其執則曰非宗教且非哲學即智而悲可云哲學之宗教即悲而智可云宗教之哲學則亦宗教亦哲學然尋常哲學與宗教二概念之範圍又不足以盡之故祇可謂之佛法而不便歸之於哲學或宗教之類中二大論本於中國之文化及社會情形以言佛教施行之所宜殊與向所持論者相契然翹舉密宗為密教對其餘一切佛法名為顯教乃出於日本空海之說而本非原來之意故祇有小乘教大乘教而密部則大乘教中一部分之特殊行法也以此言修密應悉本於大乘教律而不得另成一教庶得其宜三關于教制之改革極須慎重所論良是十年前所作整理僧制論多本於叢林制而益加於闊大精密之組織以廣其用茲檢奉一冊請垂察之但從二十餘年來出入叢林主持叢林贊助叢林之經驗確知中國雖尚有具有規模之寥寥數十叢林亦已徒存形制而缺乏其原設此形制之真精神矣故今覺得非從一般佛徒中吸收一部分真正於佛法有修學而且具宏法願行者為重新之建設不能振佛教於今後故又有建立中國現代佛教住持僧大綱之作而關於住持僧即保有西洋舊教之整嚴其社會民眾之信行者更主為佛教正信會之組織以期普及民眾則開放為西洋新教之自由發揮兼此二意以觀之亦可謂與尊旨頗多不謀而合上來就垂問之點草草申述殊不足以盡其意統祈諒察并候時祉太虛敬復十一月十六日見海刊十一卷十一十二期合刊
