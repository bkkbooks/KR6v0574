body:
  text: 擬致錫蘭摩訶菩提會書法舫來函亦忘了原約措此錯誤言詞今可以世界佛學苑祕書葦舫名義正復一函與哥侖布摩訶菩提會一原訂約雙方為哥侖布摩訶菩提會與西安世界佛學苑巴利三藏院雙方交換各二僧華赴錫二僧以學巴利文佛教為主兼傳華文佛教錫來華二僧以學華文佛教為主兼傳巴利文佛教各期五年二雙方未達目的地前及離目的地後來回一切費用皆由自備到後由訂約雙方互供膳宿并供每月三十羅比備用三事前曾警告應由加飛重慶轉飛西安不可走海道乃回信經海道所增困難及一僧之費用概由自任故只可聽之四索麻等抵滬為備供膳宿處一星期便即赴陜上海並無世界佛學苑機構後以索麻等要求在上海安居三月另籌備宿處及食費約耗萬餘羅比由上海佛教團體及信徒籌付然索麻比丘等只熱心傳巴利佛教對于學習華文佛教無表示求學五當安居初西安已派善歸比丘來接待至安居將終索麻等表示決返香港過冬善歸始返西安為修住處及種種籌備歡迎與專員往返結果不去不惟大失人望且空耗經費不資矣六決返香港係出索麻等自意然苑長仍囑香港信徒豫以資助并約春暖再至西安後因索麻等又怕西安寒冷及疑地方不安等重慶蛾眉漢口及寧波之延慶寺雪竇山等亦均表示可歡迎前去乃索麻等突然來信于一月六日乘船經星嘉坡而返錫矣今詳告索麻比丘來華離華之經過于貴會者非欲責以他事但欲貴會明了種種違約行動全出索麻等三比丘而敝苑之西安巴利苑則不僅忠實履約且曾為種種額外之招待也此致哥侖布摩訶菩提會世界佛學苑祕書葦舫稿存世苑祕書處
